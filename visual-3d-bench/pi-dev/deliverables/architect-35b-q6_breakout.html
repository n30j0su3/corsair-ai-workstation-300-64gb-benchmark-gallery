<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { border: 2px solid #1a1a3a; border-radius: 8px; cursor: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type = 'square', volume = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sndPaddle() { playSound(300, 0.1, 'square', 0.12); }
function sndBrick() { playSound(523, 0.15, 'sine', 0.15); }
function sndWall() { playSound(440, 0.08, 'square', 0.08); }
function sndLoseLife() { playSound(150, 0.4, 'sawtooth', 0.18); }
function sndPowerUp() { playSound(880, 0.2, 'sine', 0.12); }
function sndGameOver() { playSound(200, 0.6, 'sawtooth', 0.18); }
function sndLevelUp() { playSound(660, 0.3, 'sine', 0.14); playSound(880, 0.3, 'sine', 0.12); }

// Game state
let state = 'start'; // start, playing, paused, gameOver, levelComplete
let score = 0;
let lives = 3;
let level = 1;
let mouseX = canvas.width / 2;
let keysDown = {};
let particles = [];
let powerUps = [];
let balls = [];
let lasers = [];
let activePowerUps = {};
let powerUpTimers = {};
let shakeTimer = 0;
let shakeIntensity = 0;
let comboCount = 0;
let comboTimer = 0;
let ballTrail = [];
let lastTime = 0;

// Paddle
const paddle = { x: canvas.width / 2, y: canvas.height - 30, width: 100, height: 14, speed: 8, baseWidth: 100 };

// Ball
function createBall(x, y, dx, dy) {
  return { x, y, dx, dy, radius: 8, speed: 5, active: true, trail: [] };
}
function resetBall() {
  balls = [createBall(paddle.x, canvas.height - 30, 0, 0)];
  ballTrail = [];
}

// Bricks
let bricks = [];
const brickRows = 6;
const brickCols = 10;
const brickWidth = 70;
const brickHeight = 24;
const brickPad = 4;
const brickOffsetTop = 60;
const brickOffsetLeft = 30;

const brickColors = [
  ['#ff4444', 30],  // row 0 - red, 30 pts
  ['#ff8844', 25],  // row 1 - orange, 25 pts
  ['#ffcc44', 20],  // row 2 - yellow, 20 pts
  ['#44cc44', 15],  // row 3 - green, 15 pts
  ['#4488ff', 10],  // row 4 - blue, 10 pts
  ['#8844ff', 10],  // row 5 - purple, 10 pts
];

function createBricks() {
  bricks = [];
  const rows = Math.min(brickRows + Math.floor((level - 1) / 2), 8);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < brickCols; c++) {
      let hp = 1;
      if (level >= 3 && r < 2 && Math.random() < 0.3) hp = 2;
      if (level >= 5 && r < 1 && Math.random() < 0.2) hp = 3;
      bricks.push({
        x: brickOffsetLeft + c * (brickWidth + brickPad),
        y: brickOffsetTop + r * (brickHeight + brickPad),
        width: brickWidth,
        height: brickHeight,
        color: brickColors[r % brickColors.length][0],
        points: brickColors[r % brickColors.length][1],
        hp: hp,
        maxHp: hp,
        row: r
      });
    }
  }
}

// Power-ups
const POWER_TYPES = ['multi', 'wide', 'laser', 'slow'];
const POWER_COLORS = { multi: '#ff44ff', wide: '#44ff44', laser: '#ff4444', slow: '#4488ff' };
const POWER_LABELS = { multi: '×3', wide: 'WIDE', laser: 'LASER', slow: 'SLOW' };

function spawnPowerUp(x, y) {
  if (Math.random() > 0.2) return;
  const type = POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)];
  powerUps.push({ x, y, type, vy: 2, width: 40, height: 16 });
}

function applyPowerUp(type) {
  sndPowerUp();
  switch (type) {
    case 'multi':
      const newBalls = balls.filter(b => b.active).slice();
      newBalls.forEach(b => {
        if (b.active) {
          balls.push(createBall(b.x, b.y, -b.dx, b.dy));
          balls.push(createBall(b.x, b.y, b.dx * 0.5, -b.dy * 0.8));
        }
      });
      break;
    case 'wide':
      paddle.width = Math.min(paddle.width + 60, 220);
      paddle.baseWidth = paddle.width;
      activePowerUps.wide = true;
      powerUpTimers.wide = 600;
      break;
    case 'laser':
      activePowerUps.laser = true;
      powerUpTimers.laser = 600;
      break;
    case 'slow':
      activePowerUps.slow = true;
      powerUpTimers.slow = 600;
      balls.forEach(b => {
        if (b.active) {
          const spd = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
          b.dx = (b.dx / spd) * 3;
          b.dy = (b.dy / spd) * 3;
        }
      });
      break;
  }
}

function updatePowerUps() {
  for (const type in powerUpTimers) {
    powerUpTimers[type]--;
    if (powerUpTimers[type] <= 0) {
      delete powerUpTimers[type];
      delete activePowerUps[type];
      if (type === 'wide') {
        paddle.width = paddle.baseWidth;
      }
      if (type === 'slow') {
        balls.forEach(b => {
          if (b.active) {
            const spd = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
            if (spd < 0.1) {
              b.dx = (b.dx / (spd || 1)) * 5;
              b.dy = (b.dy / (spd || 1)) * 5;
            }
          }
        });
      }
    }
  }
}

// Particles
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 30 + Math.random() * 20,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.05;
    p.dx *= 0.98;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Lasers
function fireLaser() {
  if (!activePowerUps.laser) return;
  lasers.push({ x: paddle.x - 10, y: paddle.y, vy: -8 });
  lasers.push({ x: paddle.x + 10, y: paddle.y, vy: -8 });
  playSound(1200, 0.1, 'sawtooth', 0.08);
}

function updateLasers() {
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.y += l.vy;
    let hit = false;
    for (let j = bricks.length - 1; j >= 0; j--) {
      const b = bricks[j];
      if (l.x >= b.x && l.x <= b.x + b.width && l.y >= b.y && l.y <= b.y + b.height) {
        b.hp--;
        if (b.hp <= 0) {
          score += b.points;
          spawnParticles(b.x + b.width / 2, b.y + b.height / 2, b.color, 10);
          spawnPowerUp(b.x + b.width / 2, b.y + b.height / 2);
          bricks.splice(j, 1);
          sndBrick();
          shakeTimer = 4;
          shakeIntensity = 2;
          comboCount++;
          comboTimer = 60;
          if (comboCount > 1) score += comboCount * 2;
        }
        hit = true;
        break;
      }
    }
    if (l.y < 0 || hit) lasers.splice(i, 1);
  }
}

// Input
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});

canvas.addEventListener('click', e => {
  if (state === 'start') {
    startGame();
  } else if (state === 'gameOver') {
    resetGame();
  } else if (state === 'levelComplete') {
    nextLevel();
  }
});

document.addEventListener('keydown', e => {
  keysDown[e.key] = true;
  if (e.key === 'Escape') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
  if (e.key === ' ' && state === 'playing' && balls.length > 0 && balls[0].dx === 0 && balls[0].dy === 0) {
    launchBall(balls[0]);
  }
  if (e.key === 'l' && state === 'playing') fireLaser();
});

document.addEventListener('keyup', e => {
  keysDown[e.key] = false;
});

function launchBall(b) {
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;
  const spd = Math.sqrt(b.dx * b.dx + b.dy * b.dy) || 5;
  b.dx = Math.cos(angle) * spd;
  b.dy = Math.sin(angle) * spd;
  playSound(400, 0.1, 'sine', 0.1);
}

// Game control
function startGame() {
  audioCtx.resume();
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  resetBall();
  createBricks();
  particles = [];
  powerUps = [];
  lasers = [];
  comboCount = 0;
  comboTimer = 0;
  activePowerUps = {};
  powerUpTimers = {};
}

function resetGame() {
  state = 'start';
}

function nextLevel() {
  level++;
  const baseSpeed = 4.5 + level * 0.5;
  resetBall();
  createBricks();
  powerUps = [];
  lasers = [];
  activePowerUps = {};
  powerUpTimers = {};
  paddle.width = paddle.baseWidth;
}

function loseLife() {
  sndLoseLife();
  lives--;
  shakeTimer = 10;
  shakeIntensity = 5;
  if (lives <= 0) {
    state = 'gameOver';
    sndGameOver();
  } else {
    resetBall();
  }
}

function checkLevelComplete() {
  if (bricks.length === 0) {
    state = 'levelComplete';
    sndLevelUp();
  }
}

// Collision
function ballBrickCollision(b, brick) {
  const cx = Math.max(brick.x, Math.min(b.x, brick.x + brick.width));
  const cy = Math.max(brick.y, Math.min(b.y, brick.y + brick.height));
  const dx = b.x - cx;
  const dy = b.y - cy;
  return dx * dx + dy * dy < b.radius * b.radius;
}

function ballPaddleCollision(b) {
  if (b.y + b.radius >= paddle.y && b.y + b.radius <= paddle.y + paddle.height + 5 &&
      b.x >= paddle.x - paddle.width / 2 && b.x <= paddle.x + paddle.width / 2) {
    const hitPos = (b.x - paddle.x) / (paddle.width / 2);
    const angle = hitPos * Math.PI / 3 - Math.PI / 2;
    const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
    b.dx = Math.cos(angle) * speed;
    b.dy = Math.sin(angle) * speed;
    if (b.dy > 0) b.dy = -b.dy;
    b.y = paddle.y - b.radius;
    sndPaddle();
    spawnParticles(b.x, b.y, '#ffffff', 4);
    return true;
  }
  return false;
}

function ballPowerUpCollision(b, pu) {
  if (b.x + b.radius > pu.x && b.x - b.radius < pu.x + pu.width &&
      b.y + b.radius > pu.y && b.y - b.radius < pu.y + pu.height) {
    applyPowerUp(pu.type);
    return true;
  }
  return false;
}

// Update
function update() {
  if (state !== 'playing') return;

  // Paddle movement
  let paddleMove = 0;
  if (keysDown['ArrowLeft'] || keysDown['a']) paddleMove = -1;
  if (keysDown['ArrowRight'] || keysDown['d']) paddleMove = 1;
  if (paddleMove !== 0) {
    paddle.x += paddleMove * paddle.speed;
  } else {
    // Mouse follows with smoothing
    const diff = mouseX - paddle.x;
    paddle.x += diff * 0.15;
  }
  paddle.x = Math.max(paddle.width / 2, Math.min(canvas.width - paddle.width / 2, paddle.x));

  // Update balls
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (!b.active) continue;

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.shift();

    b.x += b.dx;
    b.y += b.dy;

    // Wall collisions
    if (b.x - b.radius <= 0) { b.x = b.radius; b.dx = Math.abs(b.dx); sndWall(); }
    if (b.x + b.radius >= canvas.width) { b.x = canvas.width - b.radius; b.dx = -Math.abs(b.dx); sndWall(); }
    if (b.y - b.radius <= 0) { b.y = b.radius; b.dy = Math.abs(b.dy); sndWall(); }

    // Bottom - lose ball
    if (b.y + b.radius >= canvas.height) {
      b.active = false;
      balls.splice(i, 1);
      if (balls.length === 0) loseLife();
      continue;
    }

    // Paddle collision
    ballPaddleCollision(b);

    // Brick collisions
    for (let j = bricks.length - 1; j >= 0; j--) {
      const brick = bricks[j];
      if (ballBrickCollision(b, brick)) {
        const cx = Math.max(brick.x, Math.min(b.x, brick.x + brick.width));
        const cy = Math.max(brick.y, Math.min(b.y, brick.y + brick.height));
        const dx = b.x - cx;
        const dy = b.y - cy;

        if (Math.abs(dx) > Math.abs(dy)) {
          b.dx = -b.dx;
        } else {
          b.dy = -b.dy;
        }

        brick.hp--;
        if (brick.hp <= 0) {
          score += brick.points;
          spawnParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color, 14);
          spawnPowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2);
          bricks.splice(j, 1);
          sndBrick();
          shakeTimer = 4;
          shakeIntensity = 2;
          comboCount++;
          comboTimer = 60;
          if (comboCount > 1) score += comboCount * 2;
        }
        break;
      }
    }

    // Power-up collisions
    for (let j = powerUps.length - 1; j >= 0; j--) {
      if (ballPowerUpCollision(b, powerUps[j])) {
        powerUps.splice(j, 1);
      }
    }
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Update power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    pu.y += pu.vy;
    // Catch by paddle
    if (pu.y + pu.height >= paddle.y && pu.y + pu.height <= paddle.y + paddle.height + 5 &&
        pu.x + pu.width >= paddle.x - paddle.width / 2 && pu.x <= paddle.x + paddle.width / 2) {
      applyPowerUp(pu.type);
      powerUps.splice(i, 1);
    } else if (pu.y > canvas.height) {
      powerUps.splice(i, 1);
    }
  }

  updateLasers();
  updatePowerUps();
  updateParticles();

  // Screen shake
  if (shakeTimer > 0) shakeTimer--;
}

// Draw
function drawPaddle() {
  const x = paddle.x - paddle.width / 2;
  const y = paddle.y;
  const w = paddle.width;
  const h = paddle.height;

  // Glow
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#66ccff');
  grad.addColorStop(1, '#3388cc');
  ctx.shadowColor = '#66ccff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Laser indicator
  if (activePowerUps.laser) {
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x - 2, y - 2, w + 4, h + 4, 8);
    ctx.stroke();
  }
}

function drawBall(b) {
  if (!b.active) return;

  // Trail
  for (let i = 0; i < b.trail.length; i++) {
    const t = b.trail[i];
    const alpha = (i / b.trail.length) * 0.4;
    const size = (i / b.trail.length) * b.radius;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  }

  // Ball
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 10;
  const bGrad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.radius);
  bGrad.addColorStop(0, '#ffffff');
  bGrad.addColorStop(1, '#aaaaaa');
  ctx.fillStyle = bGrad;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBricks() {
  bricks.forEach(b => {
    const hpRatio = b.hp / b.maxHp;
    const brightness = 0.6 + hpRatio * 0.4;

    ctx.shadowColor = b.color;
    ctx.shadowBlur = 4;

    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height);
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, adjustColor(b.color, brightness));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.width, b.height, 3);
    ctx.fill();

    ctx.shadowBlur = 0;

    // HP indicator for multi-hit bricks
    if (b.maxHp > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.hp, b.x + b.width / 2, b.y + b.height / 2 + 3);
    }
  });
}

function adjustColor(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.floor(r * factor)},${Math.floor(g * factor)},${Math.floor(b * factor)})`;
}

function drawPowerUps() {
  powerUps.forEach(pu => {
    ctx.shadowColor = POWER_COLORS[pu.type];
    ctx.shadowBlur = 8;
    ctx.fillStyle = POWER_COLORS[pu.type];
    ctx.beginPath();
    ctx.roundRect(pu.x, pu.y, pu.width, pu.height, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(POWER_LABELS[pu.type], pu.x + pu.width / 2, pu.y + pu.height / 2 + 3);
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function drawLasers() {
  lasers.forEach(l => {
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(l.x - 1, l.y, 3, 14);
    ctx.shadowBlur = 0;
  });
}

function drawHUD() {
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 16, 30);
  ctx.textAlign = 'center';
  ctx.fillText(`Level: ${level}`, canvas.width / 2, 30);

  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.beginPath();
    ctx.arc(canvas.width - 20 - i * 24, 24, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#ff4444';
    ctx.fill();
    ctx.strokeStyle = '#ff8888';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Combo
  if (comboCount > 1 && comboTimer > 0) {
    const alpha = comboTimer / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`COMBO ×${comboCount}!`, canvas.width / 2, 56);
    ctx.globalAlpha = 1;
  }

  // Active power-ups
  let puX = 16;
  const puY = canvas.height - 20;
  for (const type in powerUpTimers) {
    const remaining = powerUpTimers[type];
    const maxTime = 600;
    const alpha = remaining / maxTime;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = POWER_COLORS[type];
    ctx.font = '12px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${POWER_LABELS[type]} (${Math.ceil(remaining / 60)}s)`, puX, puY);
    ctx.globalAlpha = 1;
    puX += 90;
  }
}

function drawStartScreen() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title
  ctx.shadowColor = '#66ccff';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#66ccff';
  ctx.font = 'bold 52px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('BREAKOUT', canvas.width / 2, 180);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#88aacc';
  ctx.font = '18px "Segoe UI", Arial, sans-serif';
  ctx.fillText('A Classic Arcade Game', canvas.width / 2, 220);

  // Instructions
  const instructions = [
    '🖱️  Move mouse or Arrow Keys to control the paddle',
    '🏓  Ball bounces off paddle based on hit position',
    '🧱  Break all bricks to advance to the next level',
    '⚡  Catch power-ups for special abilities',
    '🔴  3 lives — don\'t let the ball fall!',
    '',
    '🔫  Press L to fire lasers (when active)',
    '⏸️  Press ESC to pause',
    '🚀  Click to launch the ball'
  ];

  ctx.font = '16px "Segoe UI", Arial, sans-serif';
  instructions.forEach((line, i) => {
    ctx.fillStyle = '#aabbcc';
    ctx.fillText(line, canvas.width / 2, 280 + i * 30);
  });

  // Start prompt
  const pulse = 0.7 + Math.sin(Date.now() / 500) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#66ccff';
  ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
  ctx.fillText('Click to Start', canvas.width / 2, 540);
  ctx.globalAlpha = 1;
}

function drawPausedScreen() {
  ctx.fillStyle = 'rgba(10, 10, 26, 0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#66ccff';
  ctx.font = 'bold 40px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 20);

  ctx.fillStyle = '#88aacc';
  ctx.font = '18px "Segoe UI", Arial, sans-serif';
  ctx.fillText('Press ESC to resume', canvas.width / 2, canvas.height / 2 + 30);
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(10, 10, 26, 0.8)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width / 2, 220);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font = '28px "Segoe UI", Arial, sans-serif';
  ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 300);

  ctx.fillStyle = '#88aacc';
  ctx.font = '20px "Segoe UI", Arial, sans-serif';
  ctx.fillText(`Level Reached: ${level}`, canvas.width / 2, 340);

  const pulse = 0.7 + Math.sin(Date.now() / 500) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#66ccff';
  ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
  ctx.fillText('Click to Play Again', canvas.width / 2, 420);
  ctx.globalAlpha = 1;
}

function drawLevelCompleteScreen() {
  ctx.fillStyle = 'rgba(10, 10, 26, 0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowColor = '#44ff44';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 42px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level - 1} COMPLETE!`, canvas.width / 2, 200);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffcc00';
  ctx.font = '24px "Segoe UI", Arial, sans-serif';
  ctx.fillText(`Score: ${score}`, canvas.width / 2, 270);

  ctx.fillStyle = '#88aacc';
  ctx.font = '18px "Segoe UI", Arial, sans-serif';
  ctx.fillText(`Ball speed increases in next level!`, canvas.width / 2, 310);

  const pulse = 0.7 + Math.sin(Date.now() / 500) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#66ccff';
  ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
  ctx.fillText('Click to Start Level ' + level, canvas.width / 2, 400);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const intensity = shakeIntensity * (shakeTimer / 10);
    ctx.translate(
      (Math.random() - 0.5) * intensity * 2,
      (Math.random() - 0.5) * intensity * 2
    );
  }

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = 'rgba(40, 40, 80, 0.3)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  if (state === 'start') {
    drawStartScreen();
    ctx.restore();
    return;
  }

  // Game elements
  drawBricks();
  drawPowerUps();
  drawLasers();
  drawPaddle();
  balls.forEach(b => drawBall(b));
  drawParticles();
  drawHUD();

  // Launch prompt
  if (state === 'playing' && balls.length > 0 && balls[0].dx === 0 && balls[0].dy === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '16px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Press Space to launch', canvas.width / 2, canvas.height - 60);
  }

  if (state === 'paused') drawPausedScreen();
  if (state === 'gameOver') drawGameOverScreen();
  if (state === 'levelComplete') drawLevelCompleteScreen();

  ctx.restore();
}

// Game loop
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  if (dt >= 16) {
    update();
    draw();
    lastTime = timestamp;
  }
  requestAnimationFrame(gameLoop);
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
    return this;
  };
}

requestAnimationFrame(gameLoop);
</script>

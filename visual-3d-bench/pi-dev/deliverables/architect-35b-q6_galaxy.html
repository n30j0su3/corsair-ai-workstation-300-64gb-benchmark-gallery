<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Galaxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#nebula {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
#galaxy-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1;
}
</style>
</head>
<body>
<canvas id="nebula"></canvas>
<canvas id="galaxy-canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- Nebula Background ---
(function() {
  const canvas = document.getElementById('nebula');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const nebulaLayers = [
    { cx: 0.35, cy: 0.45, rx: 0.35, ry: 0.25, color: [15, 5, 40], opacity: 0.12 },
    { cx: 0.65, cy: 0.55, rx: 0.30, ry: 0.20, color: [5, 10, 45], opacity: 0.10 },
    { cx: 0.50, cy: 0.50, rx: 0.25, ry: 0.15, color: [20, 5, 35], opacity: 0.08 },
    { cx: 0.25, cy: 0.60, rx: 0.20, ry: 0.12, color: [10, 5, 30], opacity: 0.06 },
    { cx: 0.75, cy: 0.35, rx: 0.22, ry: 0.14, color: [5, 15, 35], opacity: 0.07 },
    { cx: 0.45, cy: 0.30, rx: 0.18, ry: 0.10, color: [12, 8, 38], opacity: 0.05 },
  ];

  function drawNebula() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    nebulaLayers.forEach(n => {
      const cx = n.cx * canvas.width, cy = n.cy * canvas.height;
      const rx = n.rx * canvas.width, ry = n.ry * canvas.height;
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
      gradient.addColorStop(0, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},${n.opacity})`);
      gradient.addColorStop(0.5, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},${n.opacity * 0.4})`);
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(1, ry / rx);
      ctx.translate(-cx, -cy);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(rx, ry), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }
  drawNebula();
  window.addEventListener('resize', drawNebula);
})();

// --- Galaxy ---
(function() {
  const canvas = document.getElementById('galaxy-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 30, 50);
  camera.lookAt(0, 0, 0);

  // --- Galaxy Particles ---
  const particleCount = 50000;
  const arms = 3;
  const armWidth = 3.0;
  const galaxyRadius = 35;
  const coreRadius = 4;

  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  const sizes = new Float32Array(particleCount);

  const coreColor = new THREE.Color(1.0, 0.95, 0.85);
  const midColor = new THREE.Color(0.5, 0.6, 1.0);
  const edgeColor = new THREE.Color(0.15, 0.2, 0.7);

  for (let i = 0; i < particleCount; i++) {
    const arm = i % arms;
    const armAngle = (arm / arms) * Math.PI * 2;

    // Distance from center - more particles near center
    const dist = Math.pow(Math.random(), 0.6) * galaxyRadius;
    const normalizedDist = dist / galaxyRadius;

    // Spiral arm winding
    const spiralAngle = armAngle + dist * 0.15;

    // Spread perpendicular to arm
    const spread = (Math.random() - 0.5) * armWidth * (0.3 + normalizedDist * 0.7);
    const spreadAngle = Math.random() * Math.PI * 2;
    const radialSpread = Math.cos(spreadAngle) * spread;
    const tangentialSpread = Math.sin(spreadAngle) * spread * 0.3;

    // Core particles (inner region)
    if (dist < coreRadius && Math.random() > 0.3) {
      const coreR = Math.random() * coreRadius;
      const coreTheta = Math.random() * Math.PI * 2;
      positions[i * 3] = coreR * Math.cos(coreTheta);
      positions[i * 3 + 1] = (Math.random() - 0.5) * 2.0 * (1 - coreR / coreRadius);
      positions[i * 3 + 2] = coreR * Math.sin(coreTheta);

      const coreBrightness = 1.0 - coreR / coreRadius;
      colors[i * 3] = 1.0;
      colors[i * 3 + 1] = 0.9 + coreBrightness * 0.1;
      colors[i * 3 + 2] = 0.7 + coreBrightness * 0.3;
      sizes[i] = 0.4 + coreBrightness * 0.6;
      continue;
    }

    positions[i * 3] = Math.cos(spiralAngle) * dist + radialSpread * Math.cos(spiralAngle) - tangentialSpread * Math.sin(spiralAngle);
    positions[i * 3 + 1] = (Math.random() - 0.5) * 2.5 * (1 - normalizedDist * 0.5);
    positions[i * 3 + 2] = Math.sin(spiralAngle) * dist + radialSpread * Math.sin(spiralAngle) + tangentialSpread * Math.cos(spiralAngle);

    // Color gradient from core to edge
    if (normalizedDist < 0.3) {
      const t = normalizedDist / 0.3;
      colors[i * 3] = coreColor.r + (midColor.r - coreColor.r) * t;
      colors[i * 3 + 1] = coreColor.g + (midColor.g - coreColor.g) * t;
      colors[i * 3 + 2] = coreColor.b + (midColor.b - coreColor.b) * t;
    } else {
      const t = (normalizedDist - 0.3) / 0.7;
      colors[i * 3] = midColor.r + (edgeColor.r - midColor.r) * t;
      colors[i * 3 + 1] = midColor.g + (edgeColor.g - midColor.g) * t;
      colors[i * 3 + 2] = midColor.b + (edgeColor.b - midColor.b) * t;
    }

    // Size based on distance
    sizes[i] = (0.6 - normalizedDist * 0.35) * (0.5 + Math.random() * 0.5);
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const vertexShader = `
    attribute float size;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `;

  const fragmentShader = `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.0, d);
      float glow = exp(-d * 4.0) * 0.6;
      vec3 finalColor = vColor + glow;
      gl_FragColor = vec4(finalColor, alpha * 0.9);
    }
  `;

  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const galaxy = new THREE.Points(geometry, material);
  scene.add(galaxy);

  // --- Core glow ---
  const coreGeo = new THREE.SphereGeometry(1.5, 32, 32);
  const coreMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const coreGlow = new THREE.Mesh(coreGeo, coreMat);
  scene.add(coreGlow);

  const coreGlow2 = new THREE.Mesh(
    new THREE.SphereGeometry(3.0, 32, 32),
    new THREE.MeshBasicMaterial({
      color: 0x8888ff,
      transparent: true,
      opacity: 0.06,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    })
  );
  scene.add(coreGlow2);

  // --- Stars background ---
  const starCount = 3000;
  const starPositions = new Float32Array(starCount * 3);
  const starSizes = new Float32Array(starCount);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 200 + Math.random() * 300;
    starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i * 3 + 2] = r * Math.cos(phi);
    starSizes[i] = 0.3 + Math.random() * 0.7;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
  const starMat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float size;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (150.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float alpha = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(0.9, 0.9, 1.0, alpha * 0.6);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  scene.add(new THREE.Points(starGeo, starMat));

  // --- Mouse Interaction ---
  let mouseX = 0, mouseY = 0;
  let targetRotY = 0, targetRotX = 0;
  let isDragging = false;
  let prevMouseX = 0, prevMouseY = 0;

  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    prevMouseX = e.clientX;
    prevMouseY = e.clientY;
  });

  canvas.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const dx = e.clientX - prevMouseX;
      const dy = e.clientY - prevMouseY;
      targetRotY += dx * 0.005;
      targetRotX += dy * 0.005;
      targetRotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotX));
      prevMouseX = e.clientX;
      prevMouseY = e.clientY;
    } else {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    }
  });

  canvas.addEventListener('mouseup', () => { isDragging = false; });
  canvas.addEventListener('mouseleave', () => { isDragging = false; });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    isDragging = true;
    prevMouseX = e.touches[0].clientX;
    prevMouseY = e.touches[0].clientY;
  });
  canvas.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
      const dx = e.touches[0].clientX - prevMouseX;
      const dy = e.touches[0].clientY - prevMouseY;
      targetRotY += dx * 0.005;
      targetRotX += dy * 0.005;
      targetRotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotX));
      prevMouseX = e.touches[0].clientX;
      prevMouseY = e.touches[0].clientY;
    }
  });
  canvas.addEventListener('touchend', () => { isDragging = false; });

  // Mouse wheel zoom
  canvas.addEventListener('wheel', (e) => {
    camera.position.z += e.deltaY * 0.02;
    camera.position.z = Math.max(15, Math.min(120, camera.position.z));
  });

  // --- Animation ---
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    // Auto-rotation
    if (!isDragging) {
      targetRotY += 0.002;
    }

    galaxy.rotation.y = targetRotY;
    galaxy.rotation.x = targetRotX;

    // Core glow pulsation
    const pulse = 1.0 + Math.sin(elapsed * 2) * 0.1;
    coreGlow.scale.set(pulse, pulse, pulse);
    coreGlow2.scale.set(pulse * 1.1, pulse * 1.1, pulse * 1.1);
    coreGlow2.material.opacity = 0.05 + Math.sin(elapsed * 1.5) * 0.02;

    // Subtle camera sway based on mouse
    if (!isDragging) {
      camera.position.x += (mouseX * 3 - camera.position.x) * 0.01;
      camera.position.y += (30 + mouseY * 2 - camera.position.y) * 0.01;
    }
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
})();
</script>
</body>
</html>

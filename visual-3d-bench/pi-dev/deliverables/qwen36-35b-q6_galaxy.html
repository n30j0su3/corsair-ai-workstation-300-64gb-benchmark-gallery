<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Galaxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #556; font: 13px/1.4 monospace; text-align: center; pointer-events: none; opacity: 0.6; }
</style>
</head>
<body>
<div id="info">Click &amp; drag to rotate · Scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    const PARTICLE_COUNT = 50000;
    const ARM_COUNT = 5;
    const ARM_SPREAD = 0.6;
    const GALAXY_RADIUS = 18;
    const CORE_RADIUS = 2.0;
    const ARM_TIGHTNESS = 0.35;

    let mouseX = 0, mouseY = 0;
    let targetRotX = 0, targetRotY = 0;
    let isDragging = false;
    let prevMouseX = 0, prevMouseY = 0;
    let rotVelX = 0, rotVelY = 0;

    // Scene
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 12, 22);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    // Nebula background layers
    function createNebula() {
        const nebulaGeo = new THREE.PlaneGeometry(120, 120, 1, 1);
        for (let i = 0; i < 3; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const cx = 256, cy = 256;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 256);
            const hue = [260, 220, 300][i];
            grad.addColorStop(0, `hsla(${hue}, 60%, 25%, 0.12)`);
            grad.addColorStop(0.3, `hsla(${hue}, 50%, 15%, 0.06)`);
            grad.addColorStop(0.7, `hsla(${hue}, 40%, 8%, 0.02)`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 512, 512);
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({
                map: tex, transparent: true, depthWrite: false,
                blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(nebulaGeo, mat);
            mesh.position.z = -30 - i * 15;
            mesh.position.x = (Math.random() - 0.5) * 10;
            mesh.position.y = (Math.random() - 0.5) * 10;
            mesh.rotation.z = Math.random() * Math.PI;
            mesh.userData.rotSpeed = (Math.random() - 0.5) * 0.0003;
            scene.add(mesh);
        }
    }
    createNebula();

    // Galaxy particles
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const randoms = new Float32Array(PARTICLE_COUNT);
    const armIndices = new Int32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const arm = Math.floor(Math.random() * ARM_COUNT);
        armIndices[i] = arm;
        const t = Math.random();
        const radius = CORE_RADIUS + Math.pow(t, 0.6) * (GALAXY_RADIUS - CORE_RADIUS);

        const armAngle = (arm / ARM_COUNT) * Math.PI * 2;
        const spinAngle = radius * ARM_TIGHTNESS;

        const spread = ARM_SPREAD * (0.3 + 0.7 * Math.random());
        const randomAngle = (Math.random() - 0.5) * spread;
        const randomHeight = (Math.random() - 0.5) * (0.5 + (1 - t) * 1.5);

        const x = Math.cos(spinAngle + armAngle + randomAngle) * radius;
        const z = Math.sin(spinAngle + armAngle + randomAngle) * radius;
        const y = randomHeight * Math.exp(-radius / 6);

        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        randoms[i] = Math.random();

        // Color: white-hot core -> yellow -> orange -> deep blue tips
        const coreFactor = Math.max(0, 1 - radius / CORE_RADIUS * 2);
        const midFactor = Math.max(0, 1 - radius / (GALAXY_RADIUS * 0.4));
        const edgeFactor = Math.max(0, (radius - GALAXY_RADIUS * 0.5) / (GALAXY_RADIUS * 0.5));

        let r, g, b;
        if (coreFactor > 0.5) {
            r = 1.0;
            g = 0.95 + 0.05 * (1 - coreFactor * 2);
            b = 0.85 + 0.15 * (1 - coreFactor * 2);
        } else if (midFactor > 0.3) {
            const t2 = (midFactor - 0.3) / 0.7;
            r = 1.0;
            g = 0.5 + 0.45 * t2;
            b = 0.15 + 0.7 * t2;
        } else {
            r = 0.1 + 0.3 * (1 - edgeFactor);
            g = 0.15 + 0.35 * (1 - edgeFactor);
            b = 0.6 + 0.4 * (1 - edgeFactor * 0.5);
        }

        const brightness = 0.5 + 0.5 * Math.pow(1 - t, 0.5);
        colors[i * 3] = r * brightness;
        colors[i * 3 + 1] = g * brightness;
        colors[i * 3 + 2] = b * brightness;

        sizes[i] = (0.04 + 0.12 * (1 - t)) * (0.7 + 0.3 * randoms[i]);
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Custom shader for soft particle glow
    const particleVertexShader = `
        attribute float size;
        varying vec3 vColor;
        void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `;

    const particleFragmentShader = `
        varying vec3 vColor;
        void main() {
            vec2 center = gl_PointCoord - 0.5;
            float dist = length(center);
            if (dist > 0.5) discard;
            float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
            alpha = pow(alpha, 1.5);
            float glow = exp(-dist * 4.0) * 0.5;
            vec3 finalColor = vColor * (1.0 + glow);
            gl_FragColor = vec4(finalColor, alpha * 0.85);
        }
    `;

    const particleMaterial = new THREE.ShaderMaterial({
        vertexShader: particleVertexShader,
        fragmentShader: particleFragmentShader,
        vertexColors: true,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });

    const galaxy = new THREE.Points(geometry, particleMaterial);
    scene.add(galaxy);

    // Core glow sprite
    function createCoreGlow() {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        grad.addColorStop(0, 'rgba(255, 245, 230, 0.6)');
        grad.addColorStop(0.1, 'rgba(255, 220, 180, 0.3)');
        grad.addColorStop(0.4, 'rgba(200, 160, 255, 0.08)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 256, 256);
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({
            map: tex, transparent: true, blending: THREE.AdditiveBlending,
            depthWrite: false, opacity: 0.9
        });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(8, 8, 1);
        scene.add(sprite);
    }
    createCoreGlow();

    // Background stars
    const starCount = 2000;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    const starCol = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 60 + Math.random() * 80;
        starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i*3+2] = r * Math.cos(phi);
        const brightness = 0.3 + Math.random() * 0.7;
        starCol[i*3] = brightness;
        starCol[i*3+1] = brightness;
        starCol[i*3+2] = brightness + Math.random() * 0.2;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
    const starMat = new THREE.PointsMaterial({
        size: 0.15, vertexColors: true, transparent: true, opacity: 0.7,
        blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
    });
    scene.add(new THREE.Points(starGeo, starMat));

    // Mouse interaction
    renderer.domElement.addEventListener('mousedown', (e) => {
        isDragging = true;
        prevMouseX = e.clientX;
        prevMouseY = e.clientY;
        rotVelX = 0;
        rotVelY = 0;
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevMouseX;
        const dy = e.clientY - prevMouseY;
        rotVelY = dx * 0.005;
        rotVelX = dy * 0.005;
        prevMouseX = e.clientX;
        prevMouseY = e.clientY;
    });

    renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
    renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        camera.position.z = Math.max(8, Math.min(60, camera.position.z + e.deltaY * 0.02));
    }, { passive: false });

    // Touch support
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDragging = true;
            prevMouseX = e.touches[0].clientX;
            prevMouseY = e.touches[0].clientY;
        }
    });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (!isDragging || e.touches.length !== 1) return;
        e.preventDefault();
        const dx = e.touches[0].clientX - prevMouseX;
        const dy = e.touches[0].clientY - prevMouseY;
        rotVelY = dx * 0.005;
        rotVelX = dy * 0.005;
        prevMouseX = e.touches[0].clientX;
        prevMouseY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

    // Animation
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();
        const delta = Math.min(clock.getDelta(), 0.05);

        // Gentle auto-rotation
        galaxy.rotation.y += 0.0008;

        // Apply mouse rotation
        if (!isDragging) {
            rotVelX *= 0.95;
            rotVelY *= 0.95;
        }

        galaxy.rotation.x += rotVelX;
        galaxy.rotation.y += rotVelY;

        // Clamp vertical rotation
        galaxy.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, galaxy.rotation.x));

        // Update nebula rotation
        scene.children.forEach(child => {
            if (child.userData.rotSpeed) {
                child.rotation.z += child.userData.rotSpeed;
            }
        });

        // Subtle particle animation - gentle wave
        const posArray = geometry.attributes.position.array;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const idx = i * 3 + 1;
            const yBase = posArray[idx];
            const wave = Math.sin(elapsed * 0.5 + randoms[i] * 10) * 0.02 * (1 - randoms[i]);
            posArray[idx] = yBase + wave * 0.01;
        }
        geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>
</body>
</html>

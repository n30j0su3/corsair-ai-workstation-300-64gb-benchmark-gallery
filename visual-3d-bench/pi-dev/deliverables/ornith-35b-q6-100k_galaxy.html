<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spiral Galaxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const PARTICLE_COUNT = 50000;
  const ARMS = 4;
  const ARM_SPREAD = 0.6;
  const GALAXY_RADIUS = 60;
  const CORE_RADIUS = 5;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 40, 70);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Nebula background planes
  const nebulaGeo = new THREE.PlaneGeometry(200, 200, 1, 1);
  const nebulaMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor1: { value: new THREE.Color(0x0a0020) },
      uColor2: { value: new THREE.Color(0x001030) },
      uColor3: { value: new THREE.Color(0x1a0030) }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor1;
      uniform vec3 uColor2;
      uniform vec3 uColor3;
      varying vec2 vUv;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        float a = hash(i);
        float b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0));
        float d = hash(i + vec2(1.0, 1.0));
        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }

      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        vec2 shift = vec2(100.0);
        for (int i = 0; i < 5; i++) {
          v += a * noise(p);
          p = p * 2.0 + shift;
          a *= 0.5;
        }
        return v;
      }

      void main() {
        vec2 uv = vUv * 2.0 - 1.0;
        float t = uTime * 0.02;
        vec2 p = uv * 3.0 + vec2(t, t * 0.7);
        float n = fbm(p);
        float n2 = fbm(p + 5.2 + t * 0.3);
        vec3 col = mix(uColor1, uColor2, n);
        col = mix(col, uColor3, n2 * 0.5);
        float dist = length(uv);
        float vignette = 1.0 - smoothstep(0.0, 1.5, dist);
        col *= vignette * 0.4;
        gl_FragColor = vec4(col, 1.0);
      }
    `,
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const nebulaPlane = new THREE.Mesh(nebulaGeo, nebulaMat);
  nebulaPlane.position.z = -80;
  nebulaPlane.renderOrder = -1;
  scene.add(nebulaPlane);

  // Galaxy particles
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const colors = new Float32Array(PARTICLE_COUNT * 3);
  const sizes = new Float32Array(PARTICLE_COUNT);
  const randoms = new Float32Array(PARTICLE_COUNT);
  const armIndices = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const armIndex = Math.floor(Math.random() * ARMS);
    const armAngle = (armIndex / ARMS) * Math.PI * 2;
    const distance = Math.pow(Math.random(), 1.5) * GALAXY_RADIUS;
    const armSpiralAngle = distance * 0.08;
    const spread = ARM_SPREAD * (0.3 + Math.random() * 0.7) * (1.0 - distance / GALAXY_RADIUS * 0.5);
    const xSpread = (Math.random() - 0.5) * spread * 2;
    const zSpread = (Math.random() - 0.5) * spread * 2;
    const ySpread = (Math.random() - 0.5) * spread * 0.3;

    const angle = armAngle + armSpiralAngle + xSpread * 0.02;
    const x = Math.cos(angle) * distance + xSpread;
    const z = Math.sin(angle) * distance + zSpread;
    const y = ySpread * (1.0 - distance / GALAXY_RADIUS * 0.8);

    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;

    const normalizedDist = distance / GALAXY_RADIUS;
    const coreFactor = 1.0 - Math.min(normalizedDist * 2.0, 1.0);

    const r = 1.0 * coreFactor + 0.4 * (1.0 - coreFactor);
    const g = 1.0 * coreFactor + 0.6 * (1.0 - coreFactor) * 0.6;
    const b = 1.0 * coreFactor + 0.8 * (1.0 - coreFactor);

    const variation = 0.05;
    colors[i * 3] = Math.max(0, Math.min(1, r + (Math.random() - 0.5) * variation));
    colors[i * 3 + 1] = Math.max(0, Math.min(1, g + (Math.random() - 0.5) * variation));
    colors[i * 3 + 2] = Math.max(0, Math.min(1, b + (Math.random() - 0.5) * variation));

    const baseSize = 0.3 + Math.random() * 0.7;
    const coreBoost = 1.0 + coreFactor * 1.5;
    sizes[i] = baseSize * coreBoost;

    randoms[i] = Math.random();
    armIndices[i] = armIndex;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

  const particleMaterial = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
    },
    vertexShader: `
      attribute float size;
      attribute float aRandom;
      uniform float uTime;
      uniform float uPixelRatio;
      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        float dist = length(position.xyz);
        float twinkle = 0.7 + 0.3 * sin(uTime * 2.0 + aRandom * 6.28);
        float sizeAttenuation = (300.0 / -mvPosition.z);
        gl_PointSize = size * sizeAttenuation * uPixelRatio * twinkle;
        gl_PointSize = max(gl_PointSize, 1.0);
        vAlpha = 0.6 + 0.4 * twinkle;
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        vec2 center = gl_PointCoord - 0.5;
        float dist = length(center);
        if (dist > 0.5) discard;
        float alpha = smoothstep(0.5, 0.0, dist);
        alpha = pow(alpha, 1.5);
        float glow = exp(-dist * 4.0) * 0.5;
        vec3 finalColor = vColor + glow;
        gl_FragColor = vec4(finalColor, alpha * vAlpha);
      }
    `,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const galaxy = new THREE.Points(geometry, particleMaterial);
  galaxy.rotation.x = 0.3;
  scene.add(galaxy);

  // Core glow sprite
  const coreGeo = new THREE.PlaneGeometry(15, 15);
  const coreMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      void main() {
        vec2 center = vUv - 0.5;
        float dist = length(center);
        float glow = exp(-dist * 3.0);
        float pulse = 0.9 + 0.1 * sin(uTime * 1.5);
        vec3 col = mix(vec3(1.0, 0.95, 0.8), vec3(0.6, 0.7, 1.0), dist);
        gl_FragColor = vec4(col * glow * pulse, glow * 0.6);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });
  const coreGlow = new THREE.Mesh(coreGeo, coreMat);
  coreGlow.position.copy(galaxy.position);
  scene.add(coreGlow);

  // Mouse interaction
  let mouseX = 0, mouseY = 0;
  let targetRotX = 0.3, targetRotY = 0;
  let isDragging = false;
  let prevMouseX = 0, prevMouseY = 0;
  let rotVelX = 0, rotVelY = 0;

  document.addEventListener('mousedown', (e) => {
    isDragging = true;
    prevMouseX = e.clientX;
    prevMouseY = e.clientY;
  });

  document.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const dx = e.clientX - prevMouseX;
      const dy = e.clientY - prevMouseY;
      rotVelY += dx * 0.003;
      rotVelX += dy * 0.003;
      prevMouseX = e.clientX;
      prevMouseY = e.clientY;
    } else {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    }
  });

  document.addEventListener('mouseup', () => { isDragging = false; });

  document.addEventListener('wheel', (e) => {
    camera.position.multiplyScalar(e.deltaY > 0 ? 1.05 : 0.95);
  });

  // Touch support
  document.addEventListener('touchstart', (e) => {
    isDragging = true;
    prevMouseX = e.touches[0].clientX;
    prevMouseY = e.touches[0].clientY;
  });

  document.addEventListener('touchmove', (e) => {
    if (isDragging) {
      const dx = e.touches[0].clientX - prevMouseX;
      const dy = e.touches[0].clientY - prevMouseY;
      rotVelY += dx * 0.003;
      rotVelX += dy * 0.003;
      prevMouseX = e.touches[0].clientX;
      prevMouseY = e.touches[0].clientY;
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', () => { isDragging = false; });

  // Stars background
  const starsGeo = new THREE.BufferGeometry();
  const starsCount = 2000;
  const starsPos = new Float32Array(starsCount * 3);
  for (let i = 0; i < starsCount; i++) {
    const r = 100 + Math.random() * 200;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starsPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starsPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starsPos[i * 3 + 2] = r * Math.cos(phi);
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
  const starsMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.3,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true
  });
  const stars = new THREE.Points(starsGeo, starsMat);
  scene.add(stars);

  // Animation loop
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    // Update uniforms
    particleMaterial.uniforms.uTime.value = elapsed;
    nebulaMat.uniforms.uTime.value = elapsed;
    coreMat.uniforms.uTime.value = elapsed;

    // Galaxy rotation
    galaxy.rotation.y += 0.001;
    coreGlow.rotation.z -= 0.002;

    // Mouse influence on camera
    if (!isDragging) {
      targetRotY = mouseX * 0.3;
      targetRotX = 0.3 + mouseY * 0.2;
    }

    // Apply rotation velocity with damping
    rotVelX *= 0.95;
    rotVelY *= 0.95;

    galaxy.rotation.x += rotVelX;
    galaxy.rotation.y += rotVelY + 0.001;

    // Camera subtle movement
    camera.position.x += Math.sin(elapsed * 0.1) * 0.01;
    camera.position.y += Math.cos(elapsed * 0.15) * 0.01;
    camera.lookAt(0, 0, 0);

    // Nebula rotation
    nebulaPlane.rotation.z = elapsed * 0.01;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    particleMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
  });
})();
</script>
</body>
</html>

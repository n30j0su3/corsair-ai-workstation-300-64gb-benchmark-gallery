<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean Shader – Gerstner Waves</title>
<style>
*{margin:0;padding:0;overflow:hidden}
body{background:#000}
canvas{display:block}
#info{position:absolute;top:10px;left:10px;color:#fff;font:12px monospace;pointer-events:none;text-shadow:0 0 4px #000}
</style>
</head>
<body>
<div id="info">Ocean Shader · Gerstner Waves · Three.js</div>
<script type="x-shader/x-vertex" id="vertexShader">
uniform float uTime;
uniform float uSeaHeight;
uniform float uFoam;

varying vec3 vWorldPosition;
varying vec3 vNormal;
varying vec2 vUv;
varying float vFoam;
varying vec3 vViewDir;

// Gerstner wave parameters
struct Wave {
    float amplitude;
    float wavelength;
    vec2 direction;
    float speed;
};

// Multiple wave layers
const int NUM_WAVES = 5;
Wave waves[NUM_WAVES] = Wave[](
    Wave(0.8,  60.0,  normalize(vec2(1.0, 0.3)), 1.2),
    Wave(0.4,  35.0,  normalize(vec2(0.8, 0.6)), 0.9),
    Wave(0.25, 22.0,  normalize(vec2(-0.5, 0.8)), 1.5),
    Wave(0.15, 14.0,  normalize(vec2(0.3, -0.7)), 1.8),
    Wave(0.08,  8.0,  normalize(vec2(-0.6, 0.4)), 2.2)
);

vec3 getWaveDisplacement(vec2 pos) {
    vec3 displacement = vec3(0.0);
    float totalSlopeX = 0.0;
    float totalSlopeY = 0.0;

    for (int i = 0; i < NUM_WAVES; i++) {
        Wave w = waves[i];
        float k = 6.28318 / w.wavelength;
        vec2 dir = w.direction;
        float c = w.speed;
        float phase = dot(dir, pos) * k + uTime * c;
        float cosPhase = cos(phase);
        float sinPhase = sin(phase);

        displacement.x += w.amplitude * dir.x * cosPhase;
        displacement.y += w.amplitude * sinPhase;
        displacement.z += w.amplitude * dir.y * cosPhase;

        totalSlopeX += -w.amplitude * k * dir.x * dir.x * sinPhase;
        totalSlopeY += -w.amplitude * k * dir.y * dir.y * sinPhase;
    }

    // Compute normal from wave slopes
    float sx = 0.0, sz = 0.0;
    for (int i = 0; i < NUM_WAVES; i++) {
        Wave w = waves[i];
        float k = 6.28318 / w.wavelength;
        vec2 dir = w.direction;
        float c = w.speed;
        float phase = dot(dir, pos) * k + uTime * c;
        float sinPhase = sin(phase);
        sx += -w.amplitude * k * dir.x * sinPhase;
        sz += -w.amplitude * k * dir.y * sinPhase;
    }
    vec3 normal = normalize(vec3(sx, 1.0, sz));

    return displacement;
}

float getFoam(vec2 pos) {
    float foam = 0.0;
    for (int i = 0; i < NUM_WAVES; i++) {
        Wave w = waves[i];
        float k = 6.28318 / w.wavelength;
        vec2 dir = w.direction;
        float c = w.speed;
        float phase = dot(dir, pos) * k + uTime * c;
        float crest = pow(max(sin(phase), 0.0), 8.0);
        foam += w.amplitude * crest;
    }
    return clamp(foam / (uSeaHeight * 3.0), 0.0, 1.0);
}

void main() {
    vUv = uv;
    vec3 pos = position;
    vec2 pos2D = pos.xz;

    vec3 displacement = getWaveDisplacement(pos2D);
    pos += displacement;

    vFoam = getFoam(pos2D);

    vec4 worldPos = modelMatrix * vec4(pos, 1.0);
    vWorldPosition = worldPos.xyz;
    vViewDir = normalize(cameraPosition - worldPos.xyz);

    // Approximate normal from displacement
    float eps = 0.1;
    vec3 posRight = position + vec3(eps, 0.0, 0.0);
    vec3 posFront = position + vec3(0.0, 0.0, eps);
    vec3 dispRight = getWaveDisplacement(posRight.xz);
    vec3 dispFront = getWaveDisplacement(posFront.xz);
    vec3 tangent = normalize(vec3(eps, dispRight.y - position.y, 0.0) - vec3(0.0, displacement.y, 0.0));
    vec3 bitangent = normalize(vec3(0.0, dispFront.y - position.y, eps) - vec3(0.0, displacement.y, 0.0));
    vNormal = normalize(cross(bitangent, tangent));

    gl_Position = projectionMatrix * viewMatrix * worldPos;
}
</script>

<script type="x-shader/x-fragment" id="fragmentShader">
uniform float uTime;
uniform float uSunAngle;
uniform float uFoamIntensity;
uniform vec3 uSunDir;
uniform vec3 uDeepColor;
uniform vec3 uShallowColor;
uniform vec3 uSkyColorTop;
uniform vec3 uSkyColorBottom;
uniform vec3 uCameraPos;

varying vec3 vWorldPosition;
varying vec3 vNormal;
varying vec2 vUv;
varying float vFoam;
varying vec3 vViewDir;

vec3 fresnel(vec3 F0, float cosTheta) {
    return F0 + (1.0 - F0) * pow(clamp(1.0 - cosTheta, 0.0, 1.0), 5.0);
}

vec3 getSkyColor(vec3 dir) {
    float t = max(dir.y, 0.0);
    vec3 sky = mix(uSkyColorBottom, uSkyColorTop, pow(t, 0.6));
    return sky;
}

float sunDisk(vec3 rd) {
    float d = dot(rd, uSunDir);
    return pow(max(d, 0.0), 800.0) * 20.0;
}

float sunHalo(vec3 rd) {
    float d = dot(rd, uSunDir);
    return pow(max(d, 0.0), 8.0) * 0.4;
}

void main() {
    vec3 normal = normalize(vNormal);
    vec3 viewDir = normalize(vViewDir);

    // Reflection direction
    vec3 reflectDir = reflect(-viewDir, normal);

    // Sky color for reflection
    vec3 skyColor = getSkyColor(reflectDir);

    // Fresnel
    float fresnelFactor = 0.04 + (1.0 - 0.04) * pow(clamp(1.0 - dot(viewDir, normal), 0.0, 1.0), 5.0);
    vec3 waterColor = mix(uDeepColor, uShallowColor, 0.5 + 0.5 * dot(normal, vec3(0.0, 1.0, 0.0)));

    // Combine reflection and water color
    vec3 color = mix(waterColor, skyColor, clamp(fresnelFactor, 0.2, 0.95));

    // Sun specular
    vec3 halfDir = normalize(uSunDir + viewDir);
    float spec = pow(max(dot(normal, halfDir), 0.0), 512.0);
    color += vec3(1.0, 0.95, 0.8) * spec * 2.5;

    // Sun disk
    float sunDiskVal = sunDisk(reflectDir);
    color += vec3(1.0, 0.9, 0.7) * sunDiskVal;

    // Sun halo / glow on water
    float sunHaloVal = sunHalo(reflectDir);
    color += vec3(1.0, 0.8, 0.5) * sunHaloVal * 0.5;

    // Subsurface scattering approximation
    float sss = pow(max(dot(viewDir, -uSunDir), 0.0), 3.0) * 0.15;
    color += vec3(0.0, 0.4, 0.3) * sss * (1.0 - fresnelFactor);

    // Foam
    float foam = vFoam * uFoamIntensity;
    color = mix(color, vec3(0.9, 0.95, 1.0), pow(foam, 1.5));

    // Distance fog
    float dist = length(vWorldPosition - uCameraPos);
    float fogFactor = 1.0 - exp(-dist * 0.003);
    color = mix(color, uSkyColorBottom, clamp(fogFactor, 0.0, 0.6));

    // Tone mapping
    color = color / (color + vec3(1.0));
    color = pow(color, vec3(0.9));

    gl_FragColor = vec4(color, 1.0);
}
</script>

<script type="x-shader/x-vertex" id="skyVertexShader">
varying vec3 vDir;
void main() {
    vDir = position;
    vec4 pos = projectionMatrix * mat4(mat3(viewMatrix)) * vec4(position, 1.0);
    gl_Position = pos.xyww;
}
</script>

<script type="x-shader/x-fragment" id="skyFragmentShader">
uniform vec3 uSkyColorTop;
uniform vec3 uSkyColorBottom;
uniform vec3 uSunDir;

varying vec3 vDir;

float sunDisk(vec3 rd) {
    float d = dot(rd, uSunDir);
    return pow(max(d, 0.0), 800.0) * 30.0;
}

float sunHalo(vec3 rd) {
    float d = dot(rd, uSunDir);
    return pow(max(d, 0.0), 6.0) * 0.6;
}

float sunScatter(vec3 rd) {
    float d = dot(rd, uSunDir);
    return pow(max(d, 0.0), 2.0) * 0.15;
}

void main() {
    vec3 dir = normalize(vDir);
    float t = max(dir.y, 0.0);
    vec3 sky = mix(uSkyColorBottom, uSkyColorTop, pow(t, 0.5));

    // Sun glow
    sky += vec3(1.0, 0.7, 0.3) * sunScatter(dir);
    sky += vec3(1.0, 0.9, 0.6) * sunHalo(dir);
    sky += vec3(1.0, 0.95, 0.85) * sunDisk(dir);

    // Horizon haze
    float horizonHaze = exp(-pow(dir.y * 4.0, 2.0));
    sky = mix(sky, vec3(0.9, 0.85, 0.8), horizonHaze * 0.3);

    gl_FragColor = vec4(sky, 1.0);
}
</script>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(30, 25, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance = 10;
controls.maxDistance = 300;
controls.target.set(0, 0, 0);

// Sun direction
const sunAngle = 0.35;
const sunDir = new THREE.Vector3(
    Math.cos(sunAngle) * Math.cos(0.5),
    Math.sin(sunAngle),
    Math.cos(sunAngle) * Math.sin(0.5)
).normalize();

// Sky uniforms
const skyUniforms = {
    uSkyColorTop: { value: new THREE.Color(0.1, 0.3, 0.7) },
    uSkyColorBottom: { value: new THREE.Color(0.6, 0.75, 0.9) },
    uSunDir: { value: sunDir }
};

// Sky dome
const skyGeo = new THREE.SphereGeometry(2000, 32, 32);
const skyMat = new THREE.ShaderMaterial({
    vertexShader: document.getElementById('skyVertexShader').textContent,
    fragmentShader: document.getElementById('skyFragmentShader').textContent,
    uniforms: skyUniforms,
    side: THREE.BackSide,
    depthWrite: false
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// Ocean uniforms
const oceanUniforms = {
    uTime: { value: 0 },
    uSeaHeight: { value: 3.0 },
    uFoam: { value: 1.2 },
    uSunDir: { value: sunDir },
    uDeepColor: { value: new THREE.Color(0.0, 0.05, 0.15) },
    uShallowColor: { value: new THREE.Color(0.0, 0.3, 0.35) },
    uSkyColorTop: { value: new THREE.Color(0.1, 0.3, 0.7) },
    uSkyColorBottom: { value: new THREE.Color(0.6, 0.75, 0.9) },
    uCameraPos: { value: camera.position }
};

// Ocean plane
const oceanGeo = new THREE.PlaneGeometry(800, 800, 512, 512);
oceanGeo.rotateX(-Math.PI / 2);
const oceanMat = new THREE.ShaderMaterial({
    vertexShader: document.getElementById('vertexShader').textContent,
    fragmentShader: document.getElementById('fragmentShader').textContent,
    uniforms: oceanUniforms,
    side: THREE.DoubleSide
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
scene.add(ocean);

// Fog
scene.fog = new THREE.FogExp2(0x8aa8c8, 0.002);

// Animation
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    oceanUniforms.uTime.value = elapsed;
    oceanUniforms.uCameraPos.value.copy(camera.position);

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
  border: 2px solid #333;
  border-radius: 4px;
  box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, volume = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playBrickHit() { playSound(520, 'square', 0.1, 0.1); }
function playPaddleHit() { playSound(300, 'triangle', 0.15, 0.12); }
function playWallHit() { playSound(200, 'sine', 0.08, 0.08); }
function playLoseLife() { playSound(150, 'sawtooth', 0.4, 0.15); }
function playPowerUp() { playSound(800, 'sine', 0.3, 0.12); playSound(1200, 'sine', 0.3, 0.1); }
function playLevelUp() {
  playSound(400, 'sine', 0.15);
  setTimeout(() => playSound(600, 'sine', 0.15), 150);
  setTimeout(() => playSound(800, 'sine', 0.3), 300);
}
function playGameOver() {
  playSound(300, 'sawtooth', 0.3, 0.15);
  setTimeout(() => playSound(200, 'sawtooth', 0.5, 0.15), 300);
}
function playLaser() { playSound(1000, 'square', 0.08, 0.06); }
function playLifeGained() { playSound(600, 'sine', 0.2); setTimeout(() => playSound(900, 'sine', 0.3), 200); }

// --- Constants ---
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

const PADDLE_W = 100, PADDLE_H = 14, PADDLE_SPEED = 8;
const BALL_R = 7;
const BRICK_ROWS = 6, BRICK_COLS = 10;
const BRICK_W = 68, BRICK_H = 22, BRICK_PAD = 4;
const BRICK_TOP = 50, BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

const POWERUP_TYPES = ['multi', 'wide', 'laser', 'slow'];
const POWERUP_COLORS = { multi: '#00ffaa', wide: '#ffaa00', laser: '#ff4444', slow: '#4488ff' };
const POWERUP_LABELS = { multi: 'MULTI', wide: 'WIDE', laser: 'LASER', slow: 'SLOW' };
const POWERUP_SIZE = 18;

const POWERUP_DURATION = 8000;

// --- State ---
let gameState = 'start'; // start, playing, paused, gameOver, levelComplete
let score = 0, lives = 3, level = 1;
let paddle, balls, bricks, particles, powerUps, lasers;
let keys = {};
let mouseX = W / 2;
let activePowerUps = {};

function initPaddle() {
  return { x: W / 2 - PADDLE_W / 2, y: H - 30, w: PADDLE_W, h: PADDLE_H, color: '#4488ff' };
}

function createBall(x, y, dx, dy) {
  const speed = 4 + level * 0.5;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  return {
    x: x || W / 2,
    y: y || H - 50,
    dx: dx || Math.cos(angle) * speed,
    dy: dy || Math.sin(angle) * speed,
    r: BALL_R,
    active: true
  };
}

function createBricks() {
  const rows = BRICK_ROWS + Math.min(level - 1, 3);
  const bricks = [];
  const points = [50, 40, 35, 30, 25, 20];
  const colors = ['#ff4466', '#ff6644', '#ffaa22', '#44dd44', '#22aaff', '#aa44ff'];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        alive: true,
        color: colors[r % colors.length],
        points: points[r % points.length],
        row: r
      });
    }
  }
  return bricks;
}

function initGame() {
  paddle = initPaddle();
  balls = [createBall()];
  bricks = createBricks();
  particles = [];
  powerUps = [];
  lasers = [];
  activePowerUps = {};
  score = 0;
  lives = 3;
  level = 1;
}

function initLevel() {
  paddle = initPaddle();
  balls = [createBall()];
  bricks = createBricks();
  powerUps = [];
  lasers = [];
  activePowerUps = {};
  // Keep score and lives
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

function spawnPowerUp(x, y) {
  if (Math.random() > 0.2) return;
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerUps.push({
    x, y,
    w: 40, h: 18,
    dy: 2,
    type,
    color: POWERUP_COLORS[type],
    label: POWERUP_LABELS[type],
    time: 0
  });
}

function applyPowerUp(type) {
  playPowerUp();
  const now = Date.now();
  if (type === 'multi') {
    const newBalls = [];
    balls.forEach(b => {
      if (b.active) {
        for (let i = 1; i <= 2; i++) {
          const angle = Math.atan2(b.dy, b.dx) + (i === 1 ? 0.4 : -0.4);
          const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
          newBalls.push(createBall(b.x, b.y, Math.cos(angle) * speed, Math.sin(angle) * speed));
        }
      }
    });
    balls.push(...newBalls);
  } else if (type === 'wide') {
    activePowerUps.wide = { start: now, end: now + POWERUP_DURATION, paddle: { w: paddle.w } };
    paddle.w = PADDLE_W * 1.6;
  } else if (type === 'laser') {
    activePowerUps.laser = { start: now, end: now + POWERUP_DURATION };
  } else if (type === 'slow') {
    activePowerUps.slow = { start: now, end: now + POWERUP_DURATION };
    balls.forEach(b => {
      const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
      const newSpeed = speed * 0.6;
      const angle = Math.atan2(b.dy, b.dx);
      b.dx = Math.cos(angle) * newSpeed;
      b.dy = Math.sin(angle) * newSpeed;
    });
  }
}

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape') {
    if (gameState === 'playing') gameState = 'paused';
    else if (gameState === 'paused') gameState = 'playing';
  }
  if (e.code === 'Space') {
    if (gameState === 'start') { initGame(); gameState = 'playing'; }
    else if (gameState === 'gameOver') { initGame(); gameState = 'playing'; }
    else if (gameState === 'levelComplete') { initLevel(); gameState = 'playing'; }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (gameState === 'start') { initGame(); gameState = 'playing'; }
  else if (gameState === 'gameOver') { initGame(); gameState = 'playing'; }
  else if (gameState === 'levelComplete') { initLevel(); gameState = 'playing'; }
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (gameState === 'start') { initGame(); gameState = 'playing'; }
    else if (gameState === 'gameOver') { initGame(); gameState = 'playing'; }
    else if (gameState === 'levelComplete') { initLevel(); gameState = 'playing'; }
  }
});

// --- Update ---
function update() {
  if (gameState !== 'playing') return;

  // Clean up expired power-ups
  const now = Date.now();
  Object.keys(activePowerUps).forEach(key => {
    if (activePowerUps[key].end < now) {
      delete activePowerUps[key];
      if (key === 'wide' && activePowerUps.wide) paddle.w = activePowerUps.wide.paddle.w;
    }
  });

  // Paddle movement
  if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= PADDLE_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) paddle.x += PADDLE_SPEED;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
  // Mouse follow
  paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));

  // Laser shooting (auto-fire when laser power-up active)
  if (activePowerUps.laser && Math.random() < 0.06) {
    lasers.push({ x: paddle.x + paddle.w * 0.25, y: paddle.y - 5, dy: -7 });
    lasers.push({ x: paddle.x + paddle.w * 0.75, y: paddle.y - 5, dy: -7 });
    playLaser();
  }

  // Update lasers
  lasers.forEach(l => { l.y += l.dy; });
  lasers = lasers.filter(l => l.y > -10);

  // Laser-brick collision
  lasers.forEach(l => {
    bricks.forEach(b => {
      if (b.alive && l.x > b.x && l.x < b.x + b.w && l.y > b.y && l.y < b.y + b.h) {
        b.alive = false;
        score += b.points;
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 8);
        playBrickHit();
        spawnPowerUp(b.x + b.w / 2, b.y + b.h / 2);
        l.y = -100;
      }
    });
  });

  // Update balls
  balls.forEach(ball => {
    if (!ball.active) return;

    const speedMult = activePowerUps.slow ? 1 : 1;
    let spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    if (spd === 0) spd = 1;

    ball.x += ball.dx * speedMult;
    ball.y += ball.dy * speedMult;

    // Wall collisions
    if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); playWallHit(); }
    if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); playWallHit(); }
    if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); playWallHit(); }

    // Bottom - lose ball
    if (ball.y + ball.r >= H) {
      ball.active = false;
    }

    // Paddle collision
    if (ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + 4 &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w) {
      
      ball.y = paddle.y - ball.r;
      const hitPos = (ball.x - paddle.x) / paddle.w; // 0 to 1
      const angle = (hitPos - 0.5) * Math.PI * 0.7; // -63 to +63 degrees
      const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
      const newSpeed = Math.min(speed, 8 + level * 0.3);
      ball.dx = Math.sin(angle) * newSpeed;
      ball.dy = -Math.abs(Math.cos(angle) * newSpeed);
      playPaddleHit();
      spawnParticles(ball.x, ball.y, '#88aaff', 5);
    }

    // Brick collisions
    bricks.forEach(b => {
      if (!b.alive) return;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
        b.alive = false;
        score += b.points;
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 14);
        playBrickHit();
        spawnPowerUp(b.x + b.w / 2, b.y + b.h / 2);

        // Determine bounce direction
        const overlapLeft = (ball.x + ball.r) - b.x;
        const overlapRight = (b.x + b.w) - (ball.x - ball.r);
        const overlapTop = (ball.y + ball.r) - b.y;
        const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
        if (minOverlap === overlapTop || minOverlap === overlapBottom) {
          ball.dy = -ball.dy;
        } else {
          ball.dx = -ball.dx;
        }
      }
    });
  });

  // Remove inactive balls
  balls = balls.filter(b => b.active);

  // Lose life if no balls
  if (balls.length === 0) {
    lives--;
    playLoseLife();
    if (lives <= 0) {
      gameState = 'gameOver';
      playGameOver();
    } else {
      balls = [createBall()];
    }
  }

  // Power-up collisions
  powerUps.forEach(p => {
    p.y += p.dy;
    p.time++;
    if (p.y > H) { p.active = false; return; }
    if (p.y + p.h > paddle.y && p.y < paddle.y + paddle.h &&
        p.x + p.w > paddle.x && p.x < paddle.x + paddle.w) {
      p.active = false;
      applyPowerUp(p.type);
    }
  });
  powerUps = powerUps.filter(p => p.active !== false);

  // Update particles
  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.05;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // Check level complete
  if (bricks.every(b => !b.alive)) {
    level++;
    playLevelUp();
    if (level > 10) {
      // Won the game
      gameState = 'gameOver';
    } else {
      gameState = 'levelComplete';
    }
  }
}

// --- Draw ---
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0d2b');
  grad.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(60, 60, 120, 0.15)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPaddle() {
  const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  grad.addColorStop(0, '#66aaff');
  grad.addColorStop(1, '#2255cc');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();

  // Glow
  ctx.shadowColor = '#4488ff';
  ctx.shadowBlur = 15;
  ctx.fillStyle = 'rgba(68, 136, 255, 0.3)';
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall(ball) {
  if (!ball.active) return;
  const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.5, '#aaccff');
  grad.addColorStop(1, '#4488ff');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = '#88bbff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, shadeColor(b.color, -30));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 3);
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPowerUps() {
  powerUps.forEach(p => {
    const pulse = 1 + Math.sin(p.time * 0.15) * 0.1;
    ctx.save();
    ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
    ctx.scale(pulse, pulse);

    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(-p.w / 2, -p.h / 2, p.w, p.h, 5);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.label, 0, 0);
    ctx.restore();
  });
}

function drawLasers() {
  lasers.forEach(l => {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 8;
    ctx.fillRect(l.x - 2, l.y - 6, 4, 12);
    ctx.shadowBlur = 0;
  });
}

function drawHUD() {
  ctx.fillStyle = '#ccc';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 15, 25);
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level}`, W / 2, 25);
  ctx.textAlign = 'right';
  // Draw lives as hearts
  let lifeText = '';
  for (let i = 0; i < lives; i++) lifeText += '❤️ ';
  ctx.fillText(lifeText, W - 15, 25);

  // Active power-up indicators
  let py = 45;
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  Object.keys(activePowerUps).forEach(key => {
    const pu = activePowerUps[key];
    const remaining = Math.max(0, Math.ceil((pu.end - Date.now()) / 1000));
    ctx.fillStyle = POWERUP_COLORS[key];
    ctx.fillText(`${POWERUP_LABELS[key]}: ${remaining}s`, 15, py);
    py += 16;
  });
}

function drawStartScreen() {
  drawBackground();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 52px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('BREAKOUT', W / 2, H / 2 - 100);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px sans-serif';
  ctx.fillText('Move paddle with mouse or Arrow Keys', W / 2, H / 2 - 30);
  ctx.fillText('Break all bricks to advance levels!', W / 2, H / 2);

  ctx.fillStyle = '#88ccff';
  ctx.font = '16px sans-serif';
  ctx.fillText('Power-ups: MULTI-BALL  WIDE PADDLE  LASER  SLOW BALL', W / 2, H / 2 + 40);

  // Blinking start text
  if (Math.floor(Date.now() / 600) % 2 === 0) {
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('Click or Press Space to Start', W / 2, H / 2 + 110);
  }
}

function drawPausedScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2 - 10);

  ctx.fillStyle = '#aaa';
  ctx.font = '20px sans-serif';
  ctx.fillText('Press ESC to Resume', W / 2, H / 2 + 35);
}

function drawGameOverScreen() {
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4466';
  ctx.font = 'bold 56px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText(`Final Score: ${score}`, W / 2, H / 2);
  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`Reached Level ${level}`, W / 2, H / 2 + 35);

  if (Math.floor(Date.now() / 600) % 2 === 0) {
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('Click or Press Space to Restart', W / 2, H / 2 + 90);
  }
}

function drawLevelCompleteScreen() {
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 48px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level - 1} COMPLETE!`, W / 2, H / 2 - 40);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 10);

  ctx.fillStyle = '#aaa';
  ctx.font = '20px sans-serif';
  ctx.fillText(`Next: Level ${level}`, W / 2, H / 2 + 45);

  if (Math.floor(Date.now() / 600) % 2 === 0) {
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('Click or Press Space to Continue', W / 2, H / 2 + 90);
  }
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return `rgb(${R},${G},${B})`;
}

// --- Main Loop ---
function gameLoop() {
  update();

  switch (gameState) {
    case 'start':
      drawStartScreen();
      break;
    case 'playing':
      drawBackground();
      drawBricks();
      drawPowerUps();
      drawLasers();
      drawPaddle();
      balls.forEach(drawBall);
      drawParticles();
      drawHUD();
      break;
    case 'paused':
      drawBackground();
      drawBricks();
      drawPowerUps();
      drawLasers();
      drawPaddle();
      balls.forEach(drawBall);
      drawParticles();
      drawHUD();
      drawPausedScreen();
      break;
    case 'gameOver':
      drawGameOverScreen();
      break;
    case 'levelComplete':
      drawLevelCompleteScreen();
      break;
  }

  requestAnimationFrame(gameLoop);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

gameLoop();
</script>

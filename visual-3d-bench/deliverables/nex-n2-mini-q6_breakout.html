<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout / Arkanoid</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(8, 16, 32, 0.88);
      --accent: #42f5c8;
      --accent2: #ffd166;
      --danger: #ff4d6d;
      --text: #eef7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 10%, rgba(66, 245, 200, 0.16), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(255, 209, 102, 0.12), transparent 26%),
        linear-gradient(180deg, #050914 0%, var(--bg) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
    }

    #gameWrap {
      position: relative;
      width: min(96vw, 960px);
      aspect-ratio: 3 / 2;
      max-height: calc(100vh - 32px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(66, 245, 200, 0.12) inset;
      background: #020711;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #020711;
      cursor: crosshair;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(66, 245, 200, 0.12), transparent 38%),
        rgba(2, 7, 17, 0.78);
      backdrop-filter: blur(5px);
      z-index: 5;
    }

    .overlay.hidden {
      display: none;
    }

    .panel {
      width: min(560px, 92%);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 0 24px rgba(66, 245, 200, 0.35);
    }

    .subtitle {
      margin: 0 0 18px;
      color: #b9c9dc;
      font-size: 1rem;
      line-height: 1.55;
    }

    .instructions {
      display: grid;
      gap: 8px;
      margin: 18px 0 22px;
      text-align: left;
      color: #dcecff;
      font-size: 0.95rem;
    }

    .instructions span {
      color: var(--accent2);
      font-weight: 700;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 13px 24px;
      background: linear-gradient(135deg, var(--accent), #4d7cff);
      color: #03111d;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(66, 245, 200, 0.22);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px);
    }

    .small {
      margin-top: 14px;
      color: #9eb0c7;
      font-size: 0.86rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 8px;
      }

      .panel {
        padding: 22px 18px;
      }

      .instructions {
        font-size: 0.86rem;
      }
    }
  </style>
</head>
<body>
  <main id="gameWrap">
    <canvas id="gameCanvas" width="960" height="640" aria-label="Breakout game canvas"></canvas>
    <div id="overlay" class="overlay">
      <section class="panel" aria-live="polite">
        <h1 id="overlayTitle">Breakout</h1>
        <p id="overlayText" class="subtitle">
          Smash the bricks, collect power-ups, and survive three lives.
        </p>
        <div class="instructions">
          <div><span>Move:</span> mouse or Arrow Left / Arrow Right</div>
          <div><span>Pause:</span> Escape</div>
          <div><span>Fire lasers:</span> Space when Laser power-up is active</div>
          <div><span>Restart:</span> Enter or R after game over</div>
        </div>
        <button id="actionButton" type="button">Start Game</button>
        <div id="overlaySmall" class="small">Click Start or press Space to begin.</div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const overlaySmall = document.getElementById("overlaySmall");
      const actionButton = document.getElementById("actionButton");

      const W = canvas.width;
      const H = canvas.height;

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const rand = (min, max) => min + Math.random() * (max - min);
      const distSq = (ax, ay, bx, by) => {
        const dx = ax - bx;
        const dy = ay - by;
        return dx * dx + dy * dy;
      };

      const keys = Object.create(null);
      const mouse = { x: W / 2, y: H / 2, active: false };
      const powerupTypes = [
        { key: "multi", label: "Multi", color: "#ffd166" },
        { key: "wide", label: "Wide", color: "#42f5c8" },
        { key: "laser", label: "Laser", color: "#ff4d6d" },
        { key: "slow", label: "Slow", color: "#b388ff" }
      ];

      let audioCtx = null;
      let score = 0;
      let lives = 3;
      let level = 1;
      let started = false;
      let paused = false;
      let gameOver = false;
      let messageTimer = 0;
      let messageText = "";

      let paddle = {
        x: W / 2 - 60,
        y: H - 48,
        w: 120,
        h: 14,
        baseW: 120,
        speed: 690,
        velocity: 0
      };

      let balls = [];
      let bricks = [];
      let particles = [];
      let powerups = [];
      let lasers = [];
      let laserCooldown = 0;

      let timers = {
        wide: 0,
        laser: 0,
        slow: 0
      };

      function ensureAudio() {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;
          if (!audioCtx) audioCtx = new AudioContextClass();
          if (audioCtx.state === "suspended") audioCtx.resume();
        } catch (error) {
          audioCtx = null;
        }
      }

      function beep(freq, duration, type = "sine", gain = 0.045) {
        if (!audioCtx) return;
        try {
          const now = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();

          osc.type = type;
          osc.frequency.setValueAtTime(freq, now);
          gainNode.gain.setValueAtTime(0.0001, now);
          gainNode.gain.exponentialRampToValueAtTime(gain, now + 0.012);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

          osc.connect(gainNode).connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.03);
        } catch (error) {
          audioCtx = null;
        }
      }

      function playSound(name) {
        if (name === "paddle") {
          beep(260, 0.055, "square", 0.035);
          setTimeout(() => beep(520, 0.045, "triangle", 0.025), 28);
        } else if (name === "wall") {
          beep(180, 0.045, "triangle", 0.025);
        } else if (name === "brick") {
          beep(720, 0.055, "square", 0.035);
          setTimeout(() => beep(980, 0.045, "square", 0.025), 35);
        } else if (name === "power") {
          beep(520, 0.08, "triangle", 0.04);
          setTimeout(() => beep(780, 0.08, "triangle", 0.035), 80);
          setTimeout(() => beep(1040, 0.1, "triangle", 0.03), 160);
        } else if (name === "life") {
          beep(360, 0.08, "sine", 0.04);
          setTimeout(() => beep(260, 0.12, "sine", 0.035), 90);
        } else if (name === "gameover") {
          beep(220, 0.16, "sawtooth", 0.045);
          setTimeout(() => beep(150, 0.22, "sawtooth", 0.04), 150);
        } else if (name === "level") {
          beep(440, 0.08, "triangle", 0.04);
          setTimeout(() => beep(660, 0.08, "triangle", 0.04), 90);
          setTimeout(() => beep(990, 0.12, "triangle", 0.035), 180);
        }
      }

      function rectsIntersect(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function circleRectIntersect(circle, rect) {
        const closestX = clamp(circle.x, rect.x, rect.x + rect.w);
        const closestY = clamp(circle.y, rect.y, rect.y + rect.h);
        return distSq(circle.x, circle.y, closestX, closestY) <= circle.r * circle.r;
      }

      function baseSpeed() {
        return 360 + (level - 1) * 42;
      }

      function maxBallSpeed() {
        return baseSpeed() + 150;
      }

      function speedMultiplier() {
        return timers.slow > 0 ? 0.72 : 1;
      }

      function createBall(offset = 0) {
        const speed = baseSpeed() * speedMultiplier();
        const angle = rand(-0.35, 0.35);
        const spread = offset * 18;
        return {
          x: paddle.x + paddle.w / 2 + spread,
          y: paddle.y - 12,
          vx: Math.sin(angle) * speed,
          vy: -Math.cos(angle) * speed,
          r: 7,
          color: "#f8fbff"
        };
      }

      function resetBalls() {
        balls = [createBall()];
      }

      function addMultiBall() {
        if (balls.length >= 6) return;

        const source = balls[balls.length - 1];
        const count = Math.min(2, 6 - balls.length);
        for (let i = 1; i <= count; i++) {
          const clone = {
            x: source.x,
            y: source.y,
            r: source.r,
            color: source.color
          };
          const angle = (Math.PI * 2 * i) / (count + 1);
          const speed = Math.hypot(source.vx, source.vy) * 0.92;
          clone.vx = Math.cos(angle) * speed;
          clone.vy = Math.sin(angle) * speed;
          if (clone.vy > 0) clone.vy *= -1;
          balls.push(clone);
        }
        playSound("power");
      }

      function applyPowerup(type) {
        const info = powerupTypes.find((item) => item.key === type);
        if (!info) return;

        if (type === "multi") {
          addMultiBall();
        } else if (type === "wide") {
          timers.wide = 12;
          paddle.w = Math.min(190, paddle.baseW + 42);
        } else if (type === "laser") {
          timers.laser = 10;
        } else if (type === "slow") {
          timers.slow = 8;
        }

        showMessage(`${info.label} power-up!`);
        playSound("power");
      }

      function spawnPowerup(x, y) {
        const type = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
        powerups.push({
          x,
          y,
          w: 36,
          h: 18,
          vy: 150 + Math.random() * 55,
          type: type.key,
          color: type.color,
          label: type.label
        });
      }

      function initLevel(nextLevel) {
        level = nextLevel;
        bricks = [];

        const margin = 34;
        const gap = 8;
        const brickH = 25;
        const cols = 8 + Math.min(3, level % 3);
        const rows = 5 + Math.min(3, Math.floor(level / 2));
        const top = 72;
        const brickW = (W - margin * 2 - gap * (cols - 1)) / cols;
        const values = [100, 90, 80, 70, 60, 50];

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const hue = (205 + row * 22 + col * 8) % 360;
            bricks.push({
              x: margin + col * (brickW + gap),
              y: top + row * (brickH + gap),
              w: brickW,
              h: brickH,
              row,
              col,
              hp: row === 0 ? 2 : 1,
              maxHp: row === 0 ? 2 : 1,
              value: values[row % values.length],
              color: `hsl(${hue}, 92%, ${row === 0 ? 62 : 56}%)`
            });
          }
        }

        showMessage(`Level ${level}`);
        playSound("level");
      }

      function showMessage(text) {
        messageText = text;
        messageTimer = 1.25;
      }

      function restartGame() {
        ensureAudio();
        score = 0;
        lives = 3;
        level = 1;
        started = true;
        paused = false;
        gameOver = false;
        timers.wide = 0;
        timers.laser = 0;
        timers.slow = 0;
        paddle.w = paddle.baseW;
        paddle.x = W / 2 - paddle.w / 2;
        balls = [];
        powerups = [];
        lasers = [];
        particles = [];
        initLevel(1);
        resetBalls();
        hideOverlay();
      }

      function startGame() {
        ensureAudio();
        if (gameOver) {
          restartGame();
          return;
        }
        if (!started) {
          started = true;
          hideOverlay();
        }
      }

      function pauseGame() {
        if (!started || gameOver) return;
        paused = !paused;
        updateOverlay();
      }

      function resumeGame() {
        if (!started || gameOver) return;
        paused = false;
        hideOverlay();
      }

      function loseLife() {
        lives -= 1;
        playSound("life");

        if (lives <= 0) {
          gameOver = true;
          started = false;
          showMessage("");
          updateOverlay();
          return;
        }

        showMessage("Life lost");
        resetBalls();
      }

      function updateOverlay() {
        if (gameOver) {
          overlay.classList.remove("hidden");
          overlayTitle.textContent = "Game Over";
          overlayText.textContent = `Final score: ${score}. Press Enter, R, or the button to restart.`;
          overlaySmall.textContent = "No page reload needed.";
          actionButton.textContent = "Restart";
        } else if (paused) {
          overlay.classList.remove("hidden");
          overlayTitle.textContent = "Paused";
          overlayText.textContent = "Press Escape to resume, or use the button below.";
          overlaySmall.textContent = "Your game state is preserved.";
          actionButton.textContent = "Resume";
        } else if (!started) {
          overlay.classList.remove("hidden");
          overlayTitle.textContent = "Breakout";
          overlayText.textContent = "Smash the bricks, collect power-ups, and survive three lives.";
          overlaySmall.textContent = "Click Start or press Space to begin.";
          actionButton.textContent = "Start Game";
        } else {
          hideOverlay();
        }
      }

      function hideOverlay() {
        overlay.classList.add("hidden");
      }

      function updatePaddle(dt) {
        const left = keys.ArrowLeft || keys.KeyA;
        const right = keys.ArrowRight || keys.KeyD;
        const dir = (right ? 1 : 0) - (left ? 1 : 0);

        if (mouse.active) {
          const targetX = mouse.x - paddle.w / 2;
          const diff = targetX - paddle.x;
          paddle.x += diff * Math.min(1, 14 * dt);
        }

        if (dir !== 0) {
          paddle.x += dir * paddle.speed * dt;
        }

        paddle.x = clamp(paddle.x, 12, W - paddle.w - 12);
        paddle.velocity = (paddle.x - paddle.lastX) / Math.max(dt, 0.0001);
        paddle.lastX = paddle.x;
      }

      function updateBalls(dt) {
        for (const ball of balls) {
          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;

          if (ball.x - ball.r < 0) {
            ball.x = ball.r;
            ball.vx = Math.abs(ball.vx);
            playSound("wall");
          } else if (ball.x + ball.r > W) {
            ball.x = W - ball.r;
            ball.vx = -Math.abs(ball.vx);
            playSound("wall");
          }

          if (ball.y - ball.r < 0) {
            ball.y = ball.r;
            ball.vy = Math.abs(ball.vy);
            playSound("wall");
          }

          if (ball.y - ball.r > H) {
            loseLife();
            return;
          }

          if (
            ball.vy > 0 &&
            ball.x + ball.r > paddle.x &&
            ball.x - ball.r < paddle.x + paddle.w &&
            ball.y + ball.r >= paddle.y &&
            ball.y - ball.r <= paddle.y + paddle.h
          ) {
            ball.y = paddle.y - ball.r - 0.1;

            const relative = clamp(
              (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2),
              -1,
              1
            );
            const currentSpeed = Math.min(maxBallSpeed(), Math.hypot(ball.vx, ball.vy));
            const angle = relative * Math.PI * 0.39;

            ball.vx = Math.sin(angle) * currentSpeed + paddle.velocity * 0.12;
            ball.vy = -Math.cos(angle) * currentSpeed;

            if (Math.abs(ball.vx) < 80) {
              ball.vx += 80 * Math.sign(ball.vx || 1);
            }

            playSound("paddle");
          }
        }
      }

      function updatePowerups(dt) {
        for (let i = powerups.length - 1; i >= 0; i--) {
          const p = powerups[i];
          p.y += p.vy * dt;

          if (rectsIntersect(p, paddle)) {
            applyPowerup(p.type);
            powerups.splice(i, 1);
            continue;
          }

          if (p.y > H + 30) {
            powerups.splice(i, 1);
          }
        }
      }

      function spawnLaser() {
        lasers.push({
          x: paddle.x + paddle.w / 2 - 2,
          y: paddle.y - 4,
          w: 4,
          h: 20,
          vy: 760
        });
      }

      function updateLasers(dt) {
        if (timers.laser > 0) {
          timers.laser -= dt;
        }

        if (timers.laser > 0 && keys.Space) {
          laserCooldown -= dt;
          if (laserCooldown <= 0) {
            spawnLaser();
            laserCooldown = 0.16;
          }
        }

        for (let i = lasers.length - 1; i >= 0; i--) {
          const laser = lasers[i];
          laser.y += laser.vy * dt;

          let remove = laser.y > H + 30;

          if (!remove) {
            for (const brick of bricks) {
              if (!brick.destroyed && rectsIntersect(laser, brick)) {
                breakBrick(brick, 55);
                remove = true;
                break;
              }
            }
          }

          if (remove) {
            lasers.splice(i, 1);
          }
        }
      }

      function breakBrick(brick, points) {
        if (!brick || brick.destroyed) return false;

        brick.destroyed = true;
        score += points;
        spawnParticles(
          brick.x + brick.w / 2,
          brick.y + brick.h / 2,
          brick.color,
          brick.maxHp > 1 ? 18 : 12
        );
        playSound("brick");

        if (Math.random() < 0.18) {
          spawnPowerup(brick.x + brick.w / 2, brick.y + brick.h / 2);
        }

        return true;
      }

      function updateBricks() {
        for (let i = bricks.length - 1; i >= 0; i--) {
          const brick = bricks[i];
          if (brick.destroyed) continue;

          if (circleRectIntersect(balls[0], brick)) {
            const prevX = balls[0].x - balls[0].vx * 0.016;
            const prevY = balls[0].y - balls[0].vy * 0.016;
            const brickCenterX = brick.x + brick.w / 2;
            const brickCenterY = brick.y + brick.h / 2;

            if (prevX < brickCenterX) {
              balls[0].x = brick.x - balls[0].r - 0.1;
              balls[0].vx *= -1;
            } else if (prevX > brickCenterX) {
              balls[0].x = brick.x + brick.w + balls[0].r + 0.1;
              balls[0].vx *= -1;
            } else if (prevY < brickCenterY) {
              balls[0].y = brick.y - balls[0].r - 0.1;
              balls[0].vy *= -1;
            } else {
              balls[0].y = brick.y + brick.h + balls[0].r + 0.1;
              balls[0].vy *= -1;
            }

            breakBrick(brick, brick.value);
            break;
          }
        }

        if (bricks.every((brick) => brick.destroyed)) {
          level += 1;
          initLevel(level);
          resetBalls();
        }
      }

      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = rand(70, 260);
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.35, 0.75),
            maxLife: 0.75,
            size: rand(2, 5),
            color
          });
        }
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 360 * dt;
          p.life -= dt;

          if (p.life <= 0) {
            particles.splice(i, 1);
          }
        }
      }

      function updateTimers(dt) {
        for (const key of Object.keys(timers)) {
          if (timers[key] > 0) timers[key] = Math.max(0, timers[key] - dt);
        }

        if (timers.wide > 0) {
          paddle.w = paddle.baseW + 42;
        } else {
          paddle.w = paddle.baseW;
        }

        if (messageTimer > 0) {
          messageTimer -= dt;
        }
      }

      function update(dt) {
        if (!started || paused || gameOver) return;

        updateTimers(dt);
        updatePaddle(dt);
        updateBalls(dt);
        updatePowerups(dt);
        updateLasers(dt);
        updateBricks();
        updateParticles(dt);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, "#061224");
        gradient.addColorStop(0.62, "#030914");
        gradient.addColorStop(1, "#01040a");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = "#42f5c8";
        ctx.lineWidth = 1;
        for (let x = 0; x <= W; x += 48) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (let y = 0; y <= H; y += 48) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = "#42f5c8";
        ctx.fillRect(0, 0, W, 2);
        ctx.fillRect(0, H - 2, W, 2);
        ctx.restore();
      }

      function drawHUD() {
        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.38)";
        ctx.fillRect(0, 0, W, 54);

        ctx.font = "700 18px system-ui, sans-serif";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#eef7ff";
        ctx.fillText(`Score: ${score}`, 22, 28);

        ctx.fillStyle = "#42f5c8";
        ctx.fillText(`Level: ${level}`, 170, 28);

        ctx.fillStyle = "#ff4d6d";
        ctx.fillText(`Lives: ${lives}`, 282, 28);

        if (timers.wide > 0) {
          ctx.fillStyle = "#42f5c8";
          ctx.fillText(`Wide ${timers.wide.toFixed(1)}s`, 405, 28);
        }

        if (timers.laser > 0) {
          ctx.fillStyle = "#ff4d6d";
          ctx.fillText(`Laser ${timers.laser.toFixed(1)}s`, 560, 28);
        }

        if (timers.slow > 0) {
          ctx.fillStyle = "#b388ff";
          ctx.fillText(`Slow ${timers.slow.toFixed(1)}s`, 705, 28);
        }

        if (messageTimer > 0 && messageText) {
          ctx.globalAlpha = clamp(messageTimer / 1.25, 0, 1);
          ctx.font = "800 34px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "rgba(2, 7, 17, 0.72)";
          ctx.fillRect(W / 2 - 170, 92, 340, 58);
          ctx.strokeStyle = "rgba(66, 245, 200, 0.55)";
          ctx.strokeRect(W / 2 - 170, 92, 340, 58);
          ctx.fillStyle = "#eef7ff";
          ctx.fillText(messageText, W / 2, 122);
        }

        ctx.restore();
      }

      function drawBricks() {
        for (const brick of bricks) {
          if (brick.destroyed) continue;

          ctx.save();
          ctx.shadowColor = brick.color;
          ctx.shadowBlur = 10;
          ctx.fillStyle = brick.color;
          roundRect(ctx, brick.x, brick.y, brick.w, brick.h, 7);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.38)";
          ctx.lineWidth = 1;
          roundRect(ctx, brick.x, brick.y, brick.w, brick.h, 7);
          ctx.stroke();

          if (brick.maxHp > 1) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
            ctx.fillRect(brick.x + 5, brick.y + brick.h - 7, brick.w - 10, 3);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(brick.x + 5, brick.y + brick.h - 7, (brick.w - 10) * (brick.hp / brick.maxHp), 3);
          }

          ctx.restore();
        }
      }

      function drawPaddle() {
        ctx.save();
        ctx.shadowColor = "#42f5c8";
        ctx.shadowBlur = 18;
        ctx.fillStyle = "#42f5c8";
        roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 10);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
        roundRect(ctx, paddle.x + 10, paddle.y + 3, paddle.w - 20, 4, 4);
        ctx.fill();
        ctx.restore();
      }

      function drawBalls() {
        for (const ball of balls) {
          ctx.save();
          ctx.shadowColor = ball.color;
          ctx.shadowBlur = 14;
          ctx.fillStyle = ball.color;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
          ctx.beginPath();
          ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.32, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPowerups() {
        for (const p of powerups) {
          ctx.save();
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 14;
          ctx.fillStyle = p.color;
          roundRect(ctx, p.x, p.y, p.w, p.h, 8);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.fillStyle = "#03111d";
          ctx.font = "800 11px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(p.label, p.x + p.w / 2, p.y + p.h / 2 + 0.5);
          ctx.restore();
        }
      }

      function drawLasers() {
        for (const laser of lasers) {
          ctx.save();
          const gradient = ctx.createLinearGradient(laser.x, laser.y, laser.x, laser.y + laser.h);
          gradient.addColorStop(0, "rgba(255, 255, 255, 0.95)");
          gradient.addColorStop(0.35, "rgba(255, 77, 109, 0.95)");
          gradient.addColorStop(1, "rgba(255, 77, 109, 0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(laser.x, laser.y, laser.w, laser.h);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          const alpha = clamp(p.life / p.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawCenterHint() {
        if (started && !paused && !gameOver && balls.length === 0) return;
        if (started && !paused && !gameOver) return;

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(2, 7, 17, 0.55)";
        ctx.fillRect(W / 2 - 230, H / 2 - 42, 460, 84);
        ctx.strokeStyle = "rgba(66, 245, 200, 0.45)";
        ctx.lineWidth = 2;
        roundRect(ctx, W / 2 - 230, H / 2 - 42, 460, 84, 18);
        ctx.stroke();

        ctx.fillStyle = "#eef7ff";
        ctx.font = "800 24px system-ui, sans-serif";
        ctx.fillText("Press Space to launch", W / 2, H / 2 - 8);

        ctx.fillStyle = "#b9c9dc";
        ctx.font = "600 15px system-ui, sans-serif";
        ctx.fillText("Move with mouse or Arrow Left / Arrow Right", W / 2, H / 2 + 22);
        ctx.restore();
      }

      function draw() {
        drawBackground();
        drawHUD();
        drawBricks();
        drawPowerups();
        drawLasers();
        drawPaddle();
        drawBalls();
        drawParticles();
        drawCenterHint();
      }

      function roundRect(context, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        context.beginPath();
        context.moveTo(x + radius, y);
        context.lineTo(x + w - radius, y);
        context.quadraticCurveTo(x + w, y, x + w, y + radius);
        context.lineTo(x + w, y + h - radius);
        context.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        context.lineTo(x + radius, y + h);
        context.quadraticCurveTo(x, y + h, x, y + h - radius);
        context.lineTo(x, y + radius);
        context.quadraticCurveTo(x, y, x + radius, y);
        context.closePath();
      }

      function updateMousePosition(event) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * W;
        mouse.y = ((event.clientY - rect.top) / rect.height) * H;
        mouse.active = true;
      }

      canvas.addEventListener("mousemove", updateMousePosition);
      canvas.addEventListener("mouseenter", updateMousePosition);
      canvas.addEventListener("mouseleave", () => {
        mouse.active = false;
      });

      window.addEventListener("keydown", (event) => {
        keys[event.code] = true;

        if (event.code === "Escape") {
          event.preventDefault();
          pauseGame();
          return;
        }

        if (event.code === "Space") {
          event.preventDefault();
          ensureAudio();
          if (!started || gameOver) {
            restartGame();
          } else if (paused) {
            resumeGame();
          }
          return;
        }

        if (event.code === "Enter") {
          event.preventDefault();
          if (!started || gameOver) restartGame();
          return;
        }

        if (event.code === "KeyR") {
          event.preventDefault();
          restartGame();
        }
      }, { passive: false });

      window.addEventListener("keyup", (event) => {
        keys[event.code] = false;
      });

      actionButton.addEventListener("click", () => {
        ensureAudio();
        if (gameOver) {
          restartGame();
        } else if (paused) {
          resumeGame();
        } else {
          startGame();
        }
      });

      let lastTime = performance.now();

      function loop(now) {
        const dt = Math.min(0.033, Math.max(0, (now - lastTime) / 1000));
        lastTime = now;

        update(dt);
        draw();

        requestAnimationFrame(loop);
      }

      paddle.lastX = paddle.x;
      initLevel(1);
      resetBalls();
      updateOverlay();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; border: 2px solid #333; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type = 'square', vol = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sndPaddle() { playSound(440, 0.1, 'square', 0.12); }
function sndBrick() { playSound(600 + Math.random() * 400, 0.12, 'square', 0.1); }
function sndWall() { playSound(300, 0.08, 'sine', 0.08); }
function sndLose() { playSound(150, 0.4, 'sawtooth', 0.15); }
function sndPowerup() { playSound(800, 0.2, 'sine', 0.12); setTimeout(() => playSound(1000, 0.2, 'sine', 0.12), 100); }
function sndLaser() { playSound(1200, 0.06, 'sawtooth', 0.06); }
function sndLevelUp() { [0,100,200,300,400].forEach((d,i) => setTimeout(() => playSound(500+i*100, 0.15, 'sine', 0.12), d)); }
function sndGameOver() { [0,200,400,600].forEach((d,i) => setTimeout(() => playSound(400-i*80, 0.3, 'sawtooth', 0.12), d)); }

// Game state
let state = 'start'; // start, playing, paused, gameover, levelup
let score = 0, lives = 3, level = 1;
let paddle, balls, bricks, particles, powerups, lasers;
let keys = {};
let mouseX = W / 2;
let powerupTimers = {};
let animFrame;

// Brick colors
const BRICK_COLORS = [
  { fill: '#ff4444', stroke: '#cc0000', points: 5 },
  { fill: '#ffaa00', stroke: '#cc8800', points: 10 },
  { fill: '#ffdd00', stroke: '#ccaa00', points: 15 },
  { fill: '#44dd44', stroke: '#00aa00', points: 20 },
  { fill: '#4488ff', stroke: '#0055cc', points: 25 },
  { fill: '#aa44ff', stroke: '#7700cc', points: 30 },
  { fill: '#ff44aa', stroke: '#cc0077', points: 35 },
  { fill: '#44dddd', stroke: '#00aaaa', points: 40 },
];

const POWERUP_TYPES = [
  { type: 'multiball', color: '#ffdd00', label: 'M', chance: 0.12 },
  { type: 'widepaddle', color: '#44dd44', label: 'W', chance: 0.12 },
  { type: 'laser', color: '#ff4444', label: 'L', chance: 0.1 },
  { type: 'slowball', color: '#4488ff', label: 'S', chance: 0.1 },
];

function initPaddle() {
  paddle = { x: W / 2, y: H - 30, w: 100, h: 14, baseW: 100, speed: 8 };
}

function createBall(x, y, dx, dy) {
  const speed = 4 + level * 0.5;
  const angle = (dx !== undefined && dy !== undefined) ? Math.atan2(dy, dx) : -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
  return {
    x: x || W / 2,
    y: y || H - 50,
    dx: dx !== undefined ? dx : Math.cos(angle) * speed,
    dy: dy !== undefined ? dy : Math.sin(angle) * speed,
    radius: 6,
    speed: speed,
    attached: x === undefined
  };
}

function createBricks() {
  bricks = [];
  const rows = Math.min(5 + Math.floor(level / 2), 8);
  const cols = 10;
  const bw = 68, bh = 22, padding = 4, offsetX = (W - cols * (bw + padding) + padding) / 2, offsetY = 50;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const colorIdx = r % BRICK_COLORS.length;
      const hp = level >= 5 && r < 2 ? 2 : 1;
      bricks.push({
        x: offsetX + c * (bw + padding),
        y: offsetY + r * (bh + padding),
        w: bw, h: bh,
        color: BRICK_COLORS[colorIdx].fill,
        stroke: BRICK_COLORS[colorIdx].stroke,
        points: BRICK_COLORS[colorIdx].points,
        alive: true,
        hp: hp,
        maxHp: hp
      });
    }
  }
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function spawnPowerup(x, y) {
  const roll = Math.random();
  let cumulative = 0;
  for (const pu of POWERUP_TYPES) {
    cumulative += pu.chance;
    if (roll < cumulative) {
      powerups.push({ x, y, dy: 2, type: pu.type, color: pu.color, label: pu.label, w: 28, h: 16 });
      return;
    }
  }
}

function applyPowerup(type) {
  sndPowerup();
  switch (type) {
    case 'multiball':
      if (balls.length > 0) {
        const b = balls[0];
        for (let i = 0; i < 2; i++) {
          const angle = Math.atan2(b.dy, b.dx) + (i === 0 ? 0.4 : -0.4);
          balls.push(createBall(b.x, b.y, Math.cos(angle) * b.speed, Math.sin(angle) * b.speed));
        }
      }
      break;
    case 'widepaddle':
      paddle.w = paddle.baseW * 1.7;
      powerupTimers.widepaddle = 600;
      break;
    case 'laser':
      powerupTimers.laser = 480;
      break;
    case 'slowball':
      balls.forEach(b => {
        const cur = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
        const factor = 0.6;
        b.dx *= factor;
        b.dy *= factor;
        b.speed *= factor;
      });
      powerupTimers.slowball = 480;
      break;
  }
}

function resetLevel() {
  initPaddle();
  balls = [createBall()];
  createBricks();
  particles = [];
  powerups = [];
  lasers = [];
  powerupTimers = {};
}

function startGame() {
  score = 0;
  lives = 3;
  level = 1;
  resetLevel();
  state = 'playing';
}

function nextLevel() {
  level++;
  state = 'levelup';
  sndLevelUp();
  setTimeout(() => {
    resetLevel();
    state = 'playing';
  }, 1500);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Escape') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
  if ((e.key === 'Enter' || e.key === ' ') && state === 'start') {
    audioCtx.resume();
    startGame();
  }
  if ((e.key === 'Enter' || e.key === ' ') && state === 'gameover') {
    startGame();
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('click', () => {
  audioCtx.resume();
  if (state === 'start' || state === 'gameover') {
    startGame();
  }
});

// Update
function update() {
  if (state !== 'playing') return;

  // Paddle movement
  if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
  if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;
  paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));

  // Laser powerup timer
  if (powerupTimers.laser > 0) {
    powerupTimers.laser--;
    if (powerupTimers.laser <= 0) delete powerupTimers.laser;
    if (keys[' '] && !keys._laserFired) {
      lasers.push({ x: paddle.x - 8, y: paddle.y - paddle.h / 2, dy: -8 });
      lasers.push({ x: paddle.x + 8, y: paddle.y - paddle.h / 2, dy: -8 });
      sndLaser();
      keys._laserFired = true;
    }
    if (!keys[' ']) keys._laserFired = false;
  }

  // Wide paddle timer
  if (powerupTimers.widepaddle > 0) {
    powerupTimers.widepaddle--;
    if (powerupTimers.widepaddle <= 0) {
      paddle.w = paddle.baseW;
      delete powerupTimers.widepaddle;
    }
  }

  // Slow ball timer
  if (powerupTimers.slowball > 0) {
    powerupTimers.slowball--;
    if (powerupTimers.slowball <= 0) {
      delete powerupTimers.slowball;
    }
  }

  // Update lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    lasers[i].y += lasers[i].dy;
    if (lasers[i].y < 0) { lasers.splice(i, 1); continue; }
    for (let j = 0; j < bricks.length; j++) {
      const br = bricks[j];
      if (!br.alive) continue;
      if (lasers[i].x >= br.x && lasers[i].x <= br.x + br.w && lasers[i].y >= br.y && lasers[i].y <= br.y + br.h) {
        br.hp--;
        if (br.hp <= 0) {
          br.alive = false;
          score += br.points;
          spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 12);
          sndBrick();
          if (Math.random() < 0.15) spawnPowerup(br.x + br.w / 2, br.y + br.h / 2);
        } else {
          spawnParticles(lasers[i].x, lasers[i].y, br.color, 4);
          sndBrick();
        }
        lasers.splice(i, 1);
        break;
      }
    }
  }

  // Update balls
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const ball = balls[bi];

    if (ball.attached) {
      ball.x = paddle.x;
      ball.y = paddle.y - paddle.h / 2 - ball.radius;
      if (keys[' '] || keys['ArrowUp'] || keys['w']) {
        ball.attached = false;
      }
      continue;
    }

    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collisions
    if (ball.x - ball.radius <= 0) { ball.x = ball.radius; ball.dx = Math.abs(ball.dx); sndWall(); }
    if (ball.x + ball.radius >= W) { ball.x = W - ball.radius; ball.dx = -Math.abs(ball.dx); sndWall(); }
    if (ball.y - ball.radius <= 0) { ball.y = ball.radius; ball.dy = Math.abs(ball.dy); sndWall(); }

    // Bottom - lose ball
    if (ball.y + ball.radius >= H) {
      balls.splice(bi, 1);
      if (balls.length === 0) {
        lives--;
        sndLose();
        if (lives <= 0) {
          state = 'gameover';
          sndGameOver();
        } else {
          setTimeout(() => {
            balls.push(createBall());
          }, 500);
        }
      }
      continue;
    }

    // Paddle collision
    if (ball.dy > 0 &&
        ball.y + ball.radius >= paddle.y - paddle.h / 2 &&
        ball.y + ball.radius <= paddle.y + paddle.h / 2 + 10 &&
        ball.x >= paddle.x - paddle.w / 2 &&
        ball.x <= paddle.x + paddle.w / 2) {
      const hitPos = (ball.x - paddle.x) / (paddle.w / 2); // -1 to 1
      const angle = hitPos * Math.PI / 3; // -60 to 60 degrees
      const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
      ball.dx = Math.sin(angle) * speed;
      ball.dy = -Math.cos(angle) * speed;
      ball.y = paddle.y - paddle.h / 2 - ball.radius;
      sndPaddle();
    }

    // Brick collision
    for (let j = 0; j < bricks.length; j++) {
      const br = bricks[j];
      if (!br.alive) continue;
      if (ball.x + ball.radius > br.x && ball.x - ball.radius < br.x + br.w &&
          ball.y + ball.radius > br.y && ball.y - ball.radius < br.y + br.h) {
        // Determine collision side
        const overlapLeft = (ball.x + ball.radius) - br.x;
        const overlapRight = (br.x + br.w) - (ball.x - ball.radius);
        const overlapTop = (ball.y + ball.radius) - br.y;
        const overlapBottom = (br.y + br.h) - (ball.y - ball.radius);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

        if (minOverlap === overlapLeft || minOverlap === overlapRight) {
          ball.dx = -ball.dx;
        } else {
          ball.dy = -ball.dy;
        }

        br.hp--;
        if (br.hp <= 0) {
          br.alive = false;
          score += br.points;
          spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 12);
          sndBrick();
          if (Math.random() < 0.15) spawnPowerup(br.x + br.w / 2, br.y + br.h / 2);
        } else {
          spawnParticles(ball.x, ball.y, br.color, 4);
          sndBrick();
        }
        break;
      }
    }
  }

  // Update powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += pu.dy;
    if (pu.y > H) { powerups.splice(i, 1); continue; }
    if (pu.y + pu.h >= paddle.y - paddle.h / 2 && pu.y <= paddle.y + paddle.h / 2 &&
        pu.x + pu.w / 2 >= paddle.x - paddle.w / 2 && pu.x - pu.w / 2 <= paddle.x + paddle.w / 2) {
      applyPowerup(pu.type);
      powerups.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Check level complete
  if (bricks.every(b => !b.alive)) {
    nextLevel();
  }
}

// Draw
function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  if (state === 'start') {
    drawStartScreen();
    return;
  }

  if (state === 'gameover') {
    drawGameOver();
    return;
  }

  if (state === 'levelup') {
    drawGameElements();
    drawLevelUp();
    return;
  }

  drawGameElements();

  if (state === 'paused') {
    drawPause();
  }
}

function drawGameElements() {
  // Bricks
  for (const br of bricks) {
    if (!br.alive) continue;
    ctx.fillStyle = br.color;
    ctx.fillRect(br.x, br.y, br.w, br.h);
    ctx.strokeStyle = br.stroke;
    ctx.lineWidth = 1;
    ctx.strokeRect(br.x, br.y, br.w, br.h);
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(br.x + 2, br.y + 2, br.w - 4, br.h / 3);
    if (br.hp > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(br.hp, br.x + br.w / 2, br.y + br.h / 2 + 4);
    }
  }

  // Powerups
  for (const pu of powerups) {
    ctx.fillStyle = pu.color;
    ctx.beginPath();
    ctx.roundRect(pu.x - pu.w / 2, pu.y - pu.h / 2, pu.w, pu.h, 4);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.label, pu.x, pu.y);
  }

  // Lasers
  for (const l of lasers) {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 8;
    ctx.fillRect(l.x - 2, l.y - 6, 4, 12);
    ctx.shadowBlur = 0;
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Paddle
  const pw = paddle.w;
  const ph = paddle.h;
  const px = paddle.x - pw / 2;
  const py = paddle.y - ph / 2;
  const grad = ctx.createLinearGradient(px, py, px, py + ph);
  grad.addColorStop(0, '#66aaff');
  grad.addColorStop(1, '#2244aa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 7);
  ctx.fill();
  ctx.strokeStyle = '#88ccff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 7);
  ctx.stroke();

  // Laser indicators on paddle
  if (powerupTimers.laser > 0) {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(paddle.x - pw / 2 + 8, paddle.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(paddle.x + pw / 2 - 8, paddle.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Balls
  for (const ball of balls) {
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 15, 25);
  ctx.textAlign = 'center';
  ctx.fillText(`Level ${level}`, W / 2, 25);
  ctx.textAlign = 'right';
  ctx.fillText('Lives:', W - 70, 25);
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(W - 55 + i * 20, 22, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Powerup timers
  let ty = 45;
  ctx.textAlign = 'left';
  ctx.font = '12px Arial';
  if (powerupTimers.laser > 0) {
    ctx.fillStyle = '#ff4444';
    ctx.fillText(`LASER: ${Math.ceil(powerupTimers.laser / 60)}s`, 15, ty);
    ty += 16;
  }
  if (powerupTimers.widepaddle > 0) {
    ctx.fillStyle = '#44dd44';
    ctx.fillText(`WIDE: ${Math.ceil(powerupTimers.widepaddle / 60)}s`, 15, ty);
    ty += 16;
  }
  if (powerupTimers.slowball > 0) {
    ctx.fillStyle = '#4488ff';
    ctx.fillText(`SLOW: ${Math.ceil(powerupTimers.slowball / 60)}s`, 15, ty);
  }
}

function drawStartScreen() {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('BREAKOUT', W / 2, 150);

  ctx.font = '18px Arial';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Destroy all bricks to advance!', W / 2, 200);

  ctx.font = '15px Arial';
  ctx.fillStyle = '#888';
  const instructions = [
    '🖱️  Mouse or ← → Arrow Keys to move paddle',
    '🏓  Ball bounces off walls, bricks & paddle',
    '⚡  Catch power-ups for special abilities:',
    '',
    '  M = Multi-Ball    W = Wide Paddle',
    '  L = Laser Shots   S = Slow Ball',
    '',
    '🔫  Press SPACE to fire lasers (with L power-up)',
    '⏸️  Press ESC to pause',
    '',
    '  3 lives • Clear all bricks to level up',
  ];
  instructions.forEach((line, i) => {
    ctx.fillText(line, W / 2, 240 + i * 24);
  });

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 22px Arial';
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillText('Click or press ENTER to start', W / 2, 560);
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, 220);

  ctx.fillStyle = '#fff';
  ctx.font = '24px Arial';
  ctx.fillText(`Final Score: ${score}`, W / 2, 290);
  ctx.fillText(`Level Reached: ${level}`, W / 2, 330);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 20px Arial';
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillText('Click or press ENTER to restart', W / 2, 430);
  ctx.globalAlpha = 1;
}

function drawLevelUp() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 44px Arial';
  ctx.textAlign = 'center';
  const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
  ctx.globalAlpha = pulse;
  ctx.fillText(`LEVEL ${level}!`, W / 2, H / 2 - 20);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#aaa';
  ctx.font = '20px Arial';
  ctx.fillText('Get ready...', W / 2, H / 2 + 30);
}

function drawPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2 - 10);
  ctx.font = '18px Arial';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Press ESC to resume', W / 2, H / 2 + 30);
}

// Game loop
function gameLoop() {
  update();
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

gameLoop();
</script>

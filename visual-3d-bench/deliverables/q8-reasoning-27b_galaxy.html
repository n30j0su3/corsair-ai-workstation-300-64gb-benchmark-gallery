<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiral Galaxy</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #ui {
        position: fixed;
        top: 30px;
        left: 30px;
        z-index: 10;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        pointer-events: none;
    }
    #ui h1 {
        color: #b8d4ff;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(100, 160, 255, 0.6), 0 0 40px rgba(100, 160, 255, 0.3);
        margin-bottom: 8px;
    }
    #ui p {
        color: rgba(180, 200, 240, 0.6);
        font-size: 13px;
        letter-spacing: 2px;
    }
</style>
</head>
<body>
<div id="ui">
    <h1>Nebula-7</h1>
    <p>50,000 particles</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    const PARTICLE_COUNT = 50000;
    const STAR_COUNT = 8000;
    const ARMS = 3;
    const ARM_SPREAD = 0.6;

    // Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000008);
    document.body.appendChild(renderer.domElement);

    // Glow texture
    function createGlowTexture() {
        const size = 64;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.15, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(0.4, 'rgba(255,255,255,0.2)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);
        const tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;
        return tex;
    }

    // Galaxy particles
    const galaxyPositions = new Float32Array(PARTICLE_COUNT * 3);
    const galaxyColors = new Float32Array(PARTICLE_COUNT * 3);
    const galaxySizes = new Float32Array(PARTICLE_COUNT);

    const armAngle = (Math.PI * 2) / ARMS;
    const maxRadius = 60;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const arm = Math.floor(Math.random() * ARMS);
        const armOffset = arm * armAngle;

        // Exponential spiral with distance distribution favoring center
        const t = Math.random();
        const dist = t * t * maxRadius;

        // Spiral angle
        const angle = armOffset + (dist / maxRadius) * Math.PI * 2.5 + (Math.random() - 0.5) * ARM_SPREAD;

        // Scatter perpendicular to arm
        const scatter = (Math.random() - 0.5) * (1.5 + dist * 0.02);
        const scatterAngle = angle + Math.PI / 2;

        const x = Math.cos(angle) * dist + Math.cos(scatterAngle) * scatter;
        const z = Math.sin(angle) * dist + Math.sin(scatterAngle) * scatter;
        const y = (Math.random() - 0.5) * (1.2 - dist * 0.008) * (1 + (1 - dist/maxRadius) * 0.5);

        galaxyPositions[i * 3] = x;
        galaxyPositions[i * 3 + 1] = y;
        galaxyPositions[i * 3 + 2] = z;

        // Color: blue center -> purple mid -> yellow edge
        const distRatio = dist / maxRadius;
        let r, g, b;
        if (distRatio < 0.3) {
            // Blue to purple
            const t2 = distRatio / 0.3;
            r = 0.1 + t2 * 0.3;
            g = 0.1 + t2 * 0.2;
            b = 0.9 + t2 * 0.1;
        } else if (distRatio < 0.65) {
            // Purple to orange
            const t2 = (distRatio - 0.3) / 0.35;
            r = 0.4 + t2 * 0.5;
            g = 0.3 + t2 * 0.35;
            b = 1.0 - t2 * 0.6;
        } else {
            // Orange to yellow
            const t2 = (distRatio - 0.65) / 0.35;
            r = 0.9 + t2 * 0.1;
            g = 0.65 + t2 * 0.35;
            b = 0.4 - t2 * 0.3;
        }
        // Add some brightness variation
        const brightness = 0.7 + Math.random() * 0.3;
        galaxyColors[i * 3] = r * brightness;
        galaxyColors[i * 3 + 1] = g * brightness;
        galaxyColors[i * 3 + 2] = b * brightness;

        // Size variation
        galaxySizes[i] = (0.3 + Math.random() * 0.7) * (1.5 - distRatio * 0.8);
    }

    const galaxyGeometry = new THREE.BufferGeometry();
    galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
    galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));
    galaxyGeometry.setAttribute('size', new THREE.BufferAttribute(galaxySizes, 1));

    // Custom shader material for size attenuation and glow
    const galaxyMaterial = new THREE.ShaderMaterial({
        uniforms: {
            uTexture: { value: createGlowTexture() },
            uPixelRatio: { value: renderer.getPixelRatio() }
        },
        vertexShader: `
            attribute float size;
            varying vec3 vColor;
            varying float vAlpha;
            uniform float uPixelRatio;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                float dist = length(mvPosition.xyz);
                vAlpha = smoothstep(200.0, 20.0, dist) * 0.85;
                gl_PointSize = size * uPixelRatio * (180.0 / -mvPosition.z);
                gl_PointSize = max(gl_PointSize, 1.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D uTexture;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                vec4 texel = texture2D(uTexture, gl_PointCoord);
                gl_FragColor = vec4(vColor, vAlpha * texel.a);
            }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
    });

    const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
    scene.add(galaxy);

    // Core glow
    const coreGeo = new THREE.BufferGeometry();
    const coreCount = 3000;
    const corePos = new Float32Array(coreCount * 3);
    const coreCol = new Float32Array(coreCount * 3);
    const coreSizes = new Float32Array(coreCount);

    for (let i = 0; i < coreCount; i++) {
        const r = Math.random() * 5;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        corePos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        corePos[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.3;
        corePos[i*3+2] = r * Math.cos(phi);
        const brightness = 0.8 + Math.random() * 0.2;
        coreCol[i*3] = 0.6 * brightness;
        coreCol[i*3+1] = 0.7 * brightness;
        coreCol[i*3+2] = 1.0 * brightness;
        coreSizes[i] = 1.5 + Math.random() * 2.0;
    }
    coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
    coreGeo.setAttribute('color', new THREE.BufferAttribute(coreCol, 3));
    coreGeo.setAttribute('size', new THREE.BufferAttribute(coreSizes, 1));
    const coreMat = new THREE.ShaderMaterial({
        uniforms: {
            uTexture: { value: createGlowTexture() },
            uPixelRatio: { value: renderer.getPixelRatio() }
        },
        vertexShader: `
            attribute float size;
            varying vec3 vColor;
            varying float vAlpha;
            uniform float uPixelRatio;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vAlpha = 0.9;
                gl_PointSize = size * uPixelRatio * (200.0 / -mvPosition.z);
                gl_PointSize = max(gl_PointSize, 2.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D uTexture;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                vec4 texel = texture2D(uTexture, gl_PointCoord);
                gl_FragColor = vec4(vColor * 1.5, vAlpha * texel.a);
            }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
    });
    const core = new THREE.Points(coreGeo, coreMat);
    scene.add(core);

    // Background stars
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(STAR_COUNT * 3);
    const starsCol = new Float32Array(STAR_COUNT * 3);
    const starsSizes = new Float32Array(STAR_COUNT);

    for (let i = 0; i < STAR_COUNT; i++) {
        const r = 300 + Math.random() * 700;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        starsPos[i*3+2] = r * Math.cos(phi);
        const brightness = 0.3 + Math.random() * 0.7;
        starsCol[i*3] = brightness * (0.8 + Math.random() * 0.2);
        starsCol[i*3+1] = brightness * (0.8 + Math.random() * 0.2);
        starsCol[i*3+2] = brightness;
        starsSizes[i] = 0.5 + Math.random() * 1.5;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    starsGeo.setAttribute('color', new THREE.BufferAttribute(starsCol, 3));
    starsGeo.setAttribute('size', new THREE.BufferAttribute(starsSizes, 1));

    const starsMat = new THREE.ShaderMaterial({
        uniforms: {
            uPixelRatio: { value: renderer.getPixelRatio() }
        },
        vertexShader: `
            attribute float size;
            varying vec3 vColor;
            uniform float uPixelRatio;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * uPixelRatio * (100.0 / -mvPosition.z);
                gl_PointSize = max(gl_PointSize, 0.5);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            void main() {
                float d = length(gl_PointCoord - vec2(0.5));
                float alpha = 1.0 - smoothstep(0.0, 0.5, d);
                gl_FragColor = vec4(vColor, alpha * 0.8);
            }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
    });
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);

    // Camera setup
    camera.position.set(0, 45, 80);
    camera.lookAt(0, 0, 0);

    // Animation
    let time = 0;
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        time += delta;

        // Slow galaxy rotation
        galaxy.rotation.y += delta * 0.03;
        core.rotation.y += delta * 0.03;

        // Auto-rotate camera
        const camDist = Math.sqrt(80 * 80 + 45 * 45);
        const camAngle = time * 0.05;
        camera.position.x = Math.cos(camAngle) * camDist;
        camera.position.z = Math.sin(camAngle) * camDist;
        camera.position.y = 45 + Math.sin(time * 0.03) * 5;
        camera.lookAt(0, 0, 0);

        // Subtle star twinkle via slow rotation
        stars.rotation.y += delta * 0.002;

        renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        galaxyMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
        coreMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
        starsMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    });
})();
</script>
</body>
</html>

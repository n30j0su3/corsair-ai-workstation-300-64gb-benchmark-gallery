<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; border: 2px solid #222; cursor: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, volume = 0.3) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}
function sndBounce() { playSound(440, 'square', 0.08, 0.15); }
function sndBrick() { playSound(600 + Math.random() * 400, 'square', 0.12, 0.15); }
function sndPowerup() { playSound(880, 'sine', 0.3, 0.2); playSound(1100, 'sine', 0.2, 0.15); }
function sndLose() { playSound(200, 'sawtooth', 0.4, 0.2); playSound(150, 'sawtooth', 0.5, 0.15); }
function sndWin() { playSound(523, 'sine', 0.15, 0.2); setTimeout(() => playSound(659, 'sine', 0.15, 0.2), 150); setTimeout(() => playSound(784, 'sine', 0.3, 0.2), 300); }
function sndLaser() { playSound(1200, 'sawtooth', 0.06, 0.08); }

// Game state
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEVELUP: 4 };
let state = STATE.MENU;
let score = 0;
let lives = 3;
let level = 1;
let combo = 0;
let comboTimer = 0;

// Paddle
const paddle = {
    x: W / 2 - 60, y: H - 40, w: 120, h: 14,
    baseW: 120, speed: 8, color: '#00e5ff',
    wideTimer: 0, laserTimer: 0
};

// Balls
let balls = [];
function createBall(x, y, dx, dy) {
    const speed = 4 + (level - 1) * 0.6;
    const angle = dx ? Math.atan2(dy, dx) : -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
    return {
        x: x || W / 2, y: y || H - 60,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
        r: 7, speed: speed,
        launched: !dx,
        slowTimer: 0,
        color: '#fff'
    };
}

// Particles
let particles = [];
function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x, y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

// Powerups
let powerups = [];
const POWER_TYPES = ['multiball', 'wide', 'laser', 'slow'];
const POWER_COLORS = { multiball: '#ff4444', wide: '#44ff44', laser: '#ffff44', slow: '#4444ff' };
const POWER_LABELS = { multiball: '2x', wide: 'W', laser: 'L', slow: 'S' };
let activePowerups = { wide: false, laser: false, slow: false };

// Lasers
let lasers = [];

// Bricks
let bricks = [];
const BRICK_ROWS = 6;
const BRICK_COLS = 12;
const BRICK_W = 60;
const BRICK_H = 22;
const BRICK_PAD = 4;
const BRICK_TOP = 60;

const ROW_COLORS = ['#ff4444', '#ff8800', '#ffcc00', '#44cc44', '#4488ff', '#cc44ff'];
const ROW_POINTS = [60, 50, 40, 30, 20, 10];

function buildLevel(lvl) {
    bricks = [];
    const rows = Math.min(BRICK_ROWS, 3 + Math.min(lvl, 4));
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            let hp = 1;
            if (lvl >= 3 && Math.random() < 0.15) hp = 2;
            if (lvl >= 5 && Math.random() < 0.1) hp = 3;
            const x = BRICK_PAD + c * (BRICK_W + BRICK_PAD);
            const y = BRICK_TOP + r * (BRICK_H + BRICK_PAD);
            bricks.push({ x, y, w: BRICK_W, h: BRICK_H, color: ROW_COLORS[r], points: ROW_POINTS[r], hp, maxHp: hp });
        }
    }
}

function initGame() {
    score = 0; lives = 3; level = 1; combo = 0; comboTimer = 0;
    paddle.w = paddle.baseW;
    paddle.x = W / 2 - paddle.w / 2;
    paddle.wideTimer = 0;
    paddle.laserTimer = 0;
    activePowerups = { wide: false, laser: false, slow: false };
    balls = [createBall()];
    powerups = [];
    particles = [];
    lasers = [];
    buildLevel(level);
}

function resetBall() {
    balls = [createBall()];
    lasers = [];
}

// Input
let mouseX = W / 2;
let keys = {};
let spacePressed = false;

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
});

canvas.addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (state === STATE.MENU) { state = STATE.PLAYING; initGame(); }
    else if (state === STATE.GAMEOVER) { state = STATE.PLAYING; initGame(); }
    else if (state === STATE.LEVELUP) { state = STATE.PLAYING; nextLevel(); }
    else if (state === STATE.PLAYING) {
        balls.forEach(b => { if (b.launched) b.launched = false; });
    }
});

document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Escape') {
        if (state === STATE.PLAYING) state = STATE.PAUSED;
        else if (state === STATE.PAUSED) state = STATE.PLAYING;
    }
    if (e.code === 'Space') {
        e.preventDefault();
        spacePressed = true;
        if (state === STATE.PLAYING) {
            balls.forEach(b => { if (b.launched) b.launched = false; });
        }
    }
    if (e.code === 'KeyR' && state === STATE.GAMEOVER) { state = STATE.PLAYING; initGame(); }
});

document.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'Space') spacePressed = false;
});

// Collision
function rectBallCollision(rx, ry, rw, rh, bx, by, br) {
    const closestX = Math.max(rx, Math.min(bx, rx + rw));
    const closestY = Math.max(ry, Math.min(by, ry + rh));
    const distX = bx - closestX;
    const distY = by - closestY;
    return (distX * distX + distY * distY) <= (br * br);
}

// Update
function update() {
    if (state !== STATE.PLAYING) return;

    // Paddle movement
    if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= paddle.speed;
    if (keys['ArrowRight'] || keys['KeyD']) paddle.x += paddle.speed;
    // Mouse control
    paddle.x = mouseX - paddle.w / 2;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    // Timers
    if (paddle.wideTimer > 0) { paddle.wideTimer--; if (paddle.wideTimer <= 0) { paddle.w = paddle.baseW; activePowerups.wide = false; } }
    if (paddle.laserTimer > 0) { paddle.laserTimer--; if (paddle.laserTimer <= 0) { activePowerups.laser = false; } }
    if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }

    // Laser firing
    if (activePowerups.laser && spacePressed) {
        if (lasers.length < 10) {
            lasers.push({ x: paddle.x + 5, y: paddle.y - 5, dy: -8, w: 3, h: 12 });
            lasers.push({ x: paddle.x + paddle.w - 8, y: paddle.y - 5, dy: -8, w: 3, h: 12 });
            sndLaser();
        }
    }

    // Update lasers
    for (let i = lasers.length - 1; i >= 0; i--) {
        lasers[i].y += lasers[i].dy;
        if (lasers[i].y < -20) { lasers.splice(i, 1); continue; }
        // Laser-brick collision
        for (let j = bricks.length - 1; j >= 0; j--) {
            const b = bricks[j];
            if (rectBallCollision(b.x, b.y, b.w, b.h, lasers[i].x, lasers[i].y, 2)) {
                b.hp--;
                if (b.hp <= 0) {
                    score += b.points * (1 + combo * 0.1);
                    combo++;
                    comboTimer = 120;
                    spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 15);
                    dropPowerup(b.x + b.w / 2, b.y + b.h / 2);
                    bricks.splice(j, 1);
                    sndBrick();
                } else {
                    sndBounce();
                    spawnParticles(lasers[i].x, lasers[i].y, '#fff', 4);
                }
                lasers.splice(i, 1);
                break;
            }
        }
    }

    // Update balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
        const ball = balls[bi];
        if (ball.launched) {
            const speedMult = (activePowerups.slow && ball.slowTimer > 0) ? 0.5 : 1;
            ball.x += ball.dx * speedMult;
            ball.y += ball.dy * speedMult;

            // Wall collisions
            if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); sndBounce(); }
            if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); sndBounce(); }
            if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); sndBounce(); }

            // Bottom - lose ball
            if (ball.y + ball.r > H) {
                balls.splice(bi, 1);
                sndLose();
                if (balls.length === 0) {
                    lives--;
                    if (lives <= 0) {
                        state = STATE.GAMEOVER;
                    } else {
                        resetBall();
                    }
                }
                continue;
            }

            // Paddle collision
            if (ball.dy > 0 && rectBallCollision(paddle.x, paddle.y, paddle.w, paddle.h, ball.x, ball.y, ball.r)) {
                const hitPos = (ball.x - paddle.x) / paddle.w; // 0 to 1
                const angle = -Math.PI / 2 + (hitPos - 0.5) * Math.PI * 0.7;
                const speed = ball.speed;
                ball.dx = Math.cos(angle) * speed;
                ball.dy = Math.sin(angle) * speed;
                ball.y = paddle.y - ball.r;
                sndBounce();
                combo = 0;
                spawnParticles(ball.x, ball.y, '#00e5ff', 5);
            }

            // Brick collision
            for (let j = bricks.length - 1; j >= 0; j--) {
                const brick = bricks[j];
                if (rectBallCollision(brick.x, brick.y, brick.w, brick.h, ball.x, ball.y, ball.r)) {
                    // Determine bounce direction
                    const ballCenterX = ball.x;
                    const ballCenterY = ball.y;
                    const brickCenterX = brick.x + brick.w / 2;
                    const brickCenterY = brick.y + brick.h / 2;
                    const overlapX = (brick.w / 2 + ball.r) - Math.abs(ballCenterX - brickCenterX);
                    const overlapY = (brick.h / 2 + ball.r) - Math.abs(ballCenterY - brickCenterY);

                    if (overlapX < overlapY) {
                        ball.dx = -ball.dx;
                    } else {
                        ball.dy = -ball.dy;
                    }

                    brick.hp--;
                    if (brick.hp <= 0) {
                        score += brick.points * (1 + combo * 0.1);
                        combo++;
                        comboTimer = 120;
                        spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 15);
                        dropPowerup(brick.x + brick.w / 2, brick.y + brick.h / 2);
                        bricks.splice(j, 1);
                        sndBrick();
                    } else {
                        sndBounce();
                    }
                    break;
                }
            }
        }
    }

    // Update powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.dy;
        p.wobble += 0.05;
        if (p.y > H + 20) { powerups.splice(i, 1); continue; }
        // Paddle catch
        if (p.y + 15 > paddle.y && p.y < paddle.y + paddle.h && p.x > paddle.x && p.x < paddle.x + paddle.w) {
            activatePowerup(p.type);
            sndPowerup();
            spawnParticles(p.x, p.y, POWER_COLORS[p.type], 10);
            powerups.splice(i, 1);
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.05;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Level complete
    if (bricks.length === 0) {
        state = STATE.LEVELUP;
        sndWin();
    }
}

function dropPowerup(x, y) {
    if (Math.random() < 0.22) {
        const type = POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)];
        powerups.push({ x, y, dy: 2, wobble: 0, type, color: POWER_COLORS[type] });
    }
}

function activatePowerup(type) {
    switch (type) {
        case 'multiball':
            const newBalls = [];
            balls.forEach(b => {
                if (!b.launched) return;
                const speed = b.speed;
                newBalls.push(createBall(b.x, b.y, Math.cos(-Math.PI / 2 + 0.3) * speed, Math.sin(-Math.PI / 2 + 0.3) * speed));
                newBalls.push(createBall(b.x, b.y, Math.cos(-Math.PI / 2 - 0.3) * speed, Math.sin(-Math.PI / 2 - 0.3) * speed));
            });
            balls = balls.concat(newBalls);
            break;
        case 'wide':
            paddle.w = paddle.baseW * 1.6;
            paddle.wideTimer = 600;
            activePowerups.wide = true;
            break;
        case 'laser':
            paddle.laserTimer = 500;
            activePowerups.laser = true;
            break;
        case 'slow':
            balls.forEach(b => b.slowTimer = 300);
            activePowerups.slow = true;
            break;
    }
}

function nextLevel() {
    level++;
    buildLevel(level);
    paddle.w = paddle.baseW;
    paddle.wideTimer = 0;
    paddle.laserTimer = 0;
    activePowerups = { wide: false, laser: false, slow: false };
    powerups = [];
    lasers = [];
    resetBall();
}

// Draw
function draw() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Background grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    if (state === STATE.MENU) {
        drawMenu();
        return;
    }

    // Draw bricks
    bricks.forEach(b => {
        const alpha = b.hp / b.maxHp;
        ctx.fillStyle = b.color;
        ctx.globalAlpha = 0.3 + alpha * 0.7;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.globalAlpha = 1;
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(b.x, b.y, b.w, b.h / 3);
        // Border
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        // HP indicator for multi-hit bricks
        if (b.maxHp > 1) {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2);
        }
    });

    // Draw powerups
    powerups.forEach(p => {
        const wobble = Math.sin(p.wobble) * 2;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(p.x - 12, p.y - 8 + wobble, 24, 16, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(POWER_LABELS[p.type], p.x, p.y + wobble);
    });

    // Draw lasers
    lasers.forEach(l => {
        ctx.fillStyle = '#ff4444';
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 8;
        ctx.fillRect(l.x, l.y, l.w, l.h);
        ctx.shadowBlur = 0;
    });

    // Draw particles
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Draw paddle
    const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    paddleGrad.addColorStop(0, '#00ffff');
    paddleGrad.addColorStop(1, '#0066aa');
    ctx.fillStyle = paddleGrad;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = activePowerups.laser ? 15 : 8;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Laser indicators on paddle
    if (activePowerups.laser) {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(paddle.x + 2, paddle.y - 4, 4, 6);
        ctx.fillRect(paddle.x + paddle.w - 6, paddle.y - 4, 4, 6);
    }

    // Draw balls
    balls.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Trail
        if (!b.launched) {
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(b.x - b.dx * 0.5, b.y - b.dy * 0.5, b.r * 0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    });

    // HUD
    drawHUD();

    if (state === STATE.PAUSED) drawPause();
    if (state === STATE.GAMEOVER) drawGameOver();
    if (state === STATE.LEVELUP) drawLevelUp();
}

function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '16px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${Math.floor(score)}`, 15, 25);
    ctx.textAlign = 'center';
    ctx.fillText(`Level ${level}`, W / 2, 25);
    ctx.textAlign = 'right';
    // Lives
    for (let i = 0; i < lives; i++) {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(W - 20 - i * 22, 22, 7, 0, Math.PI * 2);
        ctx.fill();
    }
    // Combo
    if (combo > 1) {
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(`Combo x${combo}`, W / 2, 48);
    }
    // Powerup timers
    let ty = H - 15;
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    if (activePowerups.wide) { ctx.fillStyle = '#44ff44'; ctx.fillText(`Wide: ${Math.ceil(paddle.wideTimer / 60)}s`, 10, ty); ty -= 16; }
    if (activePowerups.laser) { ctx.fillStyle = '#ffff44'; ctx.fillText(`Laser: ${Math.ceil(paddle.laserTimer / 60)}s`, 10, ty); ty -= 16; }
}

function drawMenu() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 52px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 20;
    ctx.fillText('BREAKOUT', W / 2, 160);
    ctx.shadowBlur = 0;

    ctx.font = '18px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('A Classic Brick-Breaking Game', W / 2, 200);

    ctx.font = '16px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#888';
    const instructions = [
        '🖱️  Move paddle with mouse or ← → arrow keys',
        '🖱️  Click or press Space to launch the ball',
        '💥  Break all bricks to advance to next level',
        '⚡  Collect power-ups: 2x (multi-ball), W (wide), L (laser), S (slow)',
        '⏸️  Press Escape to pause',
        '💀  You have 3 lives — don\'t let the ball fall!'
    ];
    instructions.forEach((text, i) => {
        ctx.fillText(text, W / 2, 260 + i * 30);
    });

    // Blinking start text
    if (Math.floor(Date.now() / 500) % 2) {
        ctx.fillStyle = '#00e5ff';
        ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
        ctx.fillText('CLICK TO START', W / 2, 480);
    }
}

function drawPause() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W / 2, H / 2 - 20);
    ctx.font = '18px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Press Escape to resume', W / 2, H / 2 + 25);
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 52px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '24px "Segoe UI", Arial, sans-serif';
    ctx.fillText(`Final Score: ${Math.floor(score)}`, W / 2, H / 2);
    ctx.fillText(`Level Reached: ${level}`, W / 2, H / 2 + 35);
    ctx.font = '18px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Click or press R to restart', W / 2, H / 2 + 80);
}

function drawLevelUp() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#44ff44';
    ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#44ff44';
    ctx.shadowBlur = 20;
    ctx.fillText(`LEVEL ${level} COMPLETE!`, W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '22px "Segoe UI", Arial, sans-serif';
    ctx.fillText(`Score: ${Math.floor(score)}`, W / 2, H / 2 + 20);
    ctx.font = '16px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Click to continue', W / 2, H / 2 + 60);
}

// Game loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        this.moveTo(x + r[0], y);
        this.lineTo(x + w - r[1], y);
        this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
        this.lineTo(x + w, y + h - r[2]);
        this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
        this.lineTo(x + r[3], y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
        this.lineTo(x, y + r[0]);
        this.quadraticCurveTo(x, y, x + r[0], y);
        this.closePath();
    };
}

gameLoop();
</script>

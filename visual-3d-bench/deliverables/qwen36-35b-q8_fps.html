<body>
<canvas id="game"></canvas>
<canvas id="minimap" width="160" height="160"></canvas>
<div id="ui">
<div id="crosshair">+</div>

<div id="overlay">
<h1>RAYCAST FPS</h1>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const mctx = minimapCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type='square', vol=0.15) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}
function shootSound() { playSound(150, 0.1, 'sawtooth', 0.2); playSound(80, 0.15, 'square', 0.15); }
function hitSound() { playSound(300, 0.1, 'square', 0.15); }
function enemyDieSound() { playSound(100, 0.3, 'sawtooth', 0.2); playSound(60, 0.4, 'square', 0.15); }
function pickupSound() { playSound(600, 0.1, 'sine', 0.15); playSound(800, 0.1, 'sine', 0.1); }
function reloadSound() { playSound(400, 0.05, 'square', 0.1); setTimeout(() => playSound(350, 0.05, 'square', 0.1), 100); }
function hurtSound() { playSound(200, 0.15, 'sawtooth', 0.15); }
function doorSound() { playSound(250, 0.2, 'sine', 0.1); }

// Map definitions
const TILE = 64;
const MAP_W = 32;
const MAP_H = 32;

const map = [];
const rooms = [];

function generateMap() {
    for (let y = 0; y < MAP_H; y++) {
        map[y] = [];
        for (let x = 0; x < MAP_W; x++) {
            map[y][x] = 1;
        }
    }

    // Generate rooms
    const roomCount = 8 + Math.floor(Math.random() * 5);
    for (let i = 0; i < roomCount; i++) {
        let rw = 3 + Math.floor(Math.random() * 5);
        let rh = 3 + Math.floor(Math.random() * 5);
        let rx = 2 + Math.floor(Math.random() * (MAP_W - rw - 4));
        let ry = 2 + Math.floor(Math.random() * (MAP_H - rh - 4));

        let overlap = false;
        for (const rm of rooms) {
            if (rx < rm.x + rm.w + 2 && rx + rw + 2 > rm.x && ry < rm.y + rm.h + 2 && ry + rh + 2 > rm.y) {
                overlap = true;
                break;
            }
        }
        if (overlap) continue;

        rooms.push({ x: rx, y: ry, w: rw, h: rh });
        for (let dy = 0; dy < rh; dy++) {
            for (let dx = 0; dx < rw; dx++) {
                map[ry + dy][rx + dx] = 0;
            }
        }
    }

    // Connect rooms with corridors
    for (let i = 1; i < rooms.length; i++) {
        const a = rooms[i - 1];
        const b = rooms[i];
        const ax = Math.floor(a.x + a.w / 2);
        const ay = Math.floor(a.y + a.h / 2);
        const bx = Math.floor(b.x + b.w / 2);
        const by = Math.floor(b.y + b.h / 2);

        let cx = ax, cy = ay;
        while (cx !== bx) {
            if (cy >= 0 && cy < MAP_H && cx >= 0 && cx < MAP_W) map[cy][cx] = 0;
            cx += cx < bx ? 1 : -1;
        }
        while (cy !== by) {
            if (cy >= 0 && cy < MAP_H && cx >= 0 && cx < MAP_W) map[cy][cx] = 0;
            cy += cy < by ? 1 : -1;
        }
    }

    // Add some extra corridors for non-linear paths
    for (let i = 0; i < 3; i++) {
        const a = rooms[Math.floor(Math.random() * rooms.length)];
        const b = rooms[Math.floor(Math.random() * rooms.length)];
        if (a === b) continue;
        const ax = Math.floor(a.x + a.w / 2);
        const ay = Math.floor(a.y + a.h / 2);
        const bx = Math.floor(b.x + b.w / 2);
        const by = Math.floor(b.y + b.h / 2);
        let cx = ax, cy = ay;
        while (cx !== bx) {
            if (cy >= 0 && cy < MAP_H && cx >= 0 && cx < MAP_W) map[cy][cx] = 0;
            cx += cx < bx ? 1 : -1;
        }
        while (cy !== by) {
            if (cy >= 0 && cy < MAP_H && cx >= 0 && cx < MAP_W) map[cy][cx] = 0;
            cy += cy < by ? 1 : -1;
        }
    }

    // Ensure player start area is clear
    const startRoom = rooms[0];
    map[startRoom.y][startRoom.x] = 0;
    map[startRoom.y][startRoom.x + 1] = 0;
    map[startRoom.y + 1][startRoom.x] = 0;
    map[startRoom.y + 1][startRoom.x + 1] = 0;

    // Place exit in last room
    const exitRoom = rooms[rooms.length - 1];
    const exitX = Math.floor(exitRoom.x + exitRoom.w / 2);
    const exitY = Math.floor(exitRoom.y + exitRoom.h / 2);
    map[exitY][exitX] = 9; // Exit door

    // Place some wall decorations (type 2 = different shade)
    for (let i = 0; i < 30; i++) {
        const rx = Math.floor(Math.random() * MAP_W);
        const ry = Math.floor(Math.random() * MAP_H);
        if (map[ry][rx] === 1) {
            map[ry][rx] = 2;
        }
    }
}

generateMap();

// Player
let player = {
    x: 0, y: 0, angle: 0, pitch: 0,
    health: 100, maxHealth: 100,
    ammo: 30, maxAmmo: 30,
    score: 0, kills: 0,
    speed: 3.0, sprintSpeed: 5.0,
    shooting: false, shootingTimer: 0, fireRate: 0.15,
    reloading: false, reloadTime: 1.5, reloadTimer: 0,
    bobPhase: 0, bobAmount: 0,
    hurtTimer: 0,
    alive: true
};

// Weapons
const weapons = [{
    name: 'Pistol', ammo: 30, maxAmmo: 30, damage: 25, fireRate: 0.2,
    reloadTime: 1.5, spread: 0.03, auto: false
}];
let currentWeapon = 0;

// Entities
let enemies = [];
let projectiles = [];
let pickups = [];
let particles = [];
let muzzleFlash = 0;
let screenShake = 0;

// Game state
let gameState = 'menu'; // menu, playing, paused, dead, won
let showMinimap = true;
let lastTime = 0;
let killFeed = [];

// Input
const keys = {};
let mouseDX = 0, mouseDY = 0;
let mouseDown = false;

// Player spawn
function spawnPlayer() {
    const sr = rooms[0];
    player.x = (sr.x + 1) * TILE + TILE / 2;
    player.y = (sr.y + 1) * TILE + TILE / 2;
    player.angle = 0;
    player.pitch = 0;
    player.health = 100;
    player.ammo = 30;
    player.reloading = false;
    player.alive = true;
    player.shooting = false;
    player.shootingTimer = 0;
    player.hurtTimer = 0;
    player.score = 0;
    player.kills = 0;
}

function spawnEntities() {
    enemies = [];
    pickups = [];

    // Spawn enemies in various rooms
    const enemyRooms = rooms.slice(1, rooms.length - 1);
    for (let i = 0; i < enemyRooms.length; i++) {
        const r = enemyRooms[i];
        if (Math.random() < 0.7) {
            const ex = (r.x + 1 + Math.random() * (r.w - 2)) * TILE + TILE / 2;
            const ey = (r.y + 1 + Math.random() * (r.h - 2)) * TILE + TILE / 2;
            const type = Math.random() < 0.3 ? 'heavy' : (Math.random() < 0.5 ? 'fast' : 'normal');
            enemies.push(createEnemy(ex, ey, type));
        }
    }

    // Spawn pickups
    for (let i = 1; i < rooms.length - 1; i++) {
        const r = rooms[i];
        if (Math.random() < 0.5) {
            const px = (r.x + 1 + Math.random() * (r.w - 2)) * TILE + TILE / 2;
            const py = (r.y + 1 + Math.random() * (r.h - 2)) * TILE + TILE / 2;
            pickups.push({ x: px, y: py, type: 'health', amount: 25, active: true, bobPhase: Math.random() * Math.PI * 2 });
        }
        if (Math.random() < 0.5) {
            const px = (r.x + 1 + Math.random() * (r.w - 2)) * TILE + TILE / 2;
            const py = (r.y + 1 + Math.random() * (r.h - 2)) * TILE + TILE / 2;
            pickups.push({ x: px, y: py, type: 'ammo', amount: 15, active: true, bobPhase: Math.random() * Math.PI * 2 });
        }
    }
}

function createEnemy(x, y, type) {
    const configs = {
        normal: { health: 50, speed: 1.5, damage: 10, fireRate: 1.5, color: '#f44', size: 0.3, score: 100 },
        fast: { health: 30, speed: 3.0, damage: 8, fireRate: 0.8, color: '#ff0', size: 0.25, score: 150 },
        heavy: { health: 120, speed: 0.8, damage: 20, fireRate: 2.0, color: '#f80', size: 0.4, score: 200 }
    };
    const c = configs[type];
    return {
        x, y, health: c.health, maxHealth: c.health,
        speed: c.speed, damage: c.damage, fireRate: c.fireRate,
        color: c.color, size: c.size, score: c.score,
        type,
        state: 'idle', // idle, alert, chase, attack, dead
        alertTimer: 0, attackTimer: 0,
        moveAngle: Math.random() * Math.PI * 2,
        moveTimer: 0,
        deadTimer: 0,
        lastSeenPlayer: null
    };
}

// Raycasting
function castRay(ox, oy, angle) {
    const sin = Math.sin(angle);
    const cos = Math.cos(angle);
    const dx = cos;
    const dy = sin;

    let mapX = Math.floor(ox / TILE);
    let mapY = Math.floor(oy / TILE);

    const deltaDistX = Math.abs(1 / (dx || 0.0001));
    const deltaDistY = Math.abs(1 / (dy || 0.0001));

    let stepX, stepY, sideDistX, sideDistY;

    if (dx < 0) { stepX = -1; sideDistX = (ox / TILE - mapX) * deltaDistX; }
    else { stepX = 1; sideDistX = (mapX + 1 - ox / TILE) * deltaDistX; }

    if (dy < 0) { stepY = -1; sideDistY = (oy / TILE - mapY) * deltaDistY; }
    else { stepY = 1; sideDistY = (mapY + 1 - oy / TILE) * deltaDistY; }

    let side = 0;
    let hit = false;
    let dist = 0;
    let wallType = 1;

    for (let i = 0; i < 64; i++) {
        if (sideDistX < sideDistY) {
            sideDistX += deltaDistX;
            mapX += stepX;
            side = 0;
        } else {
            sideDistY += deltaDistY;
            mapY += stepY;
            side = 1;
        }

        if (mapY >= 0 && mapY < MAP_H && mapX >= 0 && mapX < MAP_W) {
            if (map[mapY][mapX] > 0) {
                hit = true;
                wallType = map[mapY][mapX];
                break;
            }
        } else {
            hit = true;
            break;
        }
    }

    if (side === 0) {
        dist = (mapX - ox / TILE + (1 - stepX) / 2) / (dx || 0.0001);
    } else {
        dist = (mapY - oy / TILE + (1 - stepY) / 2) / (dy || 0.0001);
    }

    // Calculate exact hit position for texture coord
    let wallX;
    if (side === 0) wallX = oy / TILE + dist * dy;
    else wallX = ox / TILE + dist * dx;
    wallX -= Math.floor(wallX);

    return { dist: dist * TILE, side, wallType, wallX, mapX, mapY };
}

// Rendering
function renderGame(dt) {
    const fov = Math.PI / 3;
    const numRays = W;
    const halfFov = fov / 2;

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H / 2);
    skyGrad.addColorStop(0, '#001');
    skyGrad.addColorStop(1, '#113');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H / 2);

    // Floor gradient
    const floorGrad = ctx.createLinearGradient(0, H / 2, 0, H);
    floorGrad.addColorStop(0, '#222');
    floorGrad.addColorStop(1, '#111');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, H / 2, W, H / 2);

    // Z-buffer for sprite rendering
    const zBuffer = new Float32Array(numRays);

    // Cast rays and draw walls
    const pitchOffset = player.pitch * H * 0.5;

    for (let i = 0; i < numRays; i++) {
        const rayAngle = player.angle - halfFov + (i / numRays) * fov;
        const ray = castRay(player.x, player.y, rayAngle);

        // Fix fisheye
        const perpDist = ray.dist * Math.cos(rayAngle - player.angle);
        zBuffer[i] = perpDist;

        const lineHeight = Math.min(H * 2, TILE * TILE / perpDist);
        const drawStart = (H - lineHeight) / 2 + pitchOffset;
        const drawEnd = drawStart + lineHeight;

        // Wall colors based on type and side
        let baseColor;
        if (ray.wallType === 9) {
            // Exit door
            baseColor = ray.side === 1 ? '#0a0' : '#0d0';
        } else if (ray.wallType === 2) {
            baseColor = ray.side === 1 ? '#654' : '#765';
        } else {
            baseColor = ray.side === 1 ? '#556' : '#667';
        }

        // Distance shading
        const fogFactor = Math.min(1, perpDist / (800));
        const fogR = Math.floor(0 * fogFactor);
        const fogG = Math.floor(0 * fogFactor);
        const fogB = Math.floor(0 * fogFactor);

        const wr = Math.floor(parseInt(baseColor.slice(1, 2) || baseColor.slice(1, 3), 16) * (1 - fogFactor * 0.7));
        const wg = Math.floor(parseInt(baseColor.slice(2, 3) || baseColor.slice(3, 5), 16) * (1 - fogFactor * 0.7));
        const wb = Math.floor(parseInt(baseColor.slice(3, 4) || baseColor.slice(5, 7), 16) * (1 - fogFactor * 0.7));

        ctx.fillStyle = `rgb(${wr},${wg},${wb})`;
        ctx.fillRect(i, drawStart, 1, lineHeight);

        // Wall edge lines
        if (lineHeight > 10) {
            ctx.fillStyle = `rgba(0,0,0,${fogFactor * 0.3})`;
            ctx.fillRect(i, drawStart, 1, 2);
            ctx.fillRect(i, drawEnd - 2, 1, 2);
        }
    }

    // Render sprites (enemies, pickups)
    const sprites = [];

    for (const e of enemies) {
        if (e.health <= 0 && e.deadTimer > 3) continue;
        const dx = e.x - player.x;
        const dy = e.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        sprites.push({ x: e.x, y: e.y, dist, angle, type: 'enemy', ref: e });
    }

    for (const p of pickups) {
        if (!p.active) continue;
        const dx = p.x - player.x;
        const dy = p.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        sprites.push({ x: p.x, y: p.y, dist, angle, type: 'pickup', ref: p });
    }

    // Sort back to front
    sprites.sort((a, b) => b.dist - a.dist);

    for (const sprite of sprites) {
        let angleDiff = sprite.angle - player.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

        if (Math.abs(angleDiff) > halfFov + 0.3) continue;

        const screenX = W / 2 + (angleDiff / halfFov) * (W / 2);
        const perpDist = sprite.dist * Math.cos(angleDiff);

        if (perpDist < 5) continue;

        const spriteHeight = Math.min(H * 1.5, TILE * 1.5 / perpDist);
        const spriteWidth = spriteHeight * 0.6;
        const drawY = (H - spriteHeight) / 2 + pitchOffset;

        // Check z-buffer
        const startCol = Math.max(0, Math.floor(screenX - spriteWidth / 2));
        const endCol = Math.min(W - 1, Math.floor(screenX + spriteWidth / 2));

        let visible = false;
        for (let col = startCol; col <= endCol; col++) {
            if (zBuffer[col] > perpDist) { visible = true; break; }
        }
        if (!visible) continue;

        if (sprite.type === 'enemy') {
            const e = sprite.ref;
            const fogFactor = Math.min(1, perpDist / 800);

            if (e.health <= 0) {
                // Dead enemy
                const deadAlpha = Math.max(0, 1 - e.deadTimer / 3);
                const deadHeight = spriteHeight * 0.3;
                const deadY = drawY + spriteHeight * 0.7;
                ctx.fillStyle = `rgba(100,20,20,${deadAlpha})`;
                ctx.fillRect(screenX - spriteWidth / 2, deadY, spriteWidth, deadHeight);
                continue;
            }

            // Body
            const bodyColor = e.color;
            ctx.fillStyle = bodyColor;
            ctx.globalAlpha = 1 - fogFactor * 0.5;

            // Torso
            ctx.fillRect(screenX - spriteWidth * 0.3, drawY + spriteHeight * 0.2, spriteWidth * 0.6, spriteHeight * 0.5);

            // Head
            ctx.fillStyle = '#faa';
            ctx.beginPath();
            ctx.arc(screenX, drawY + spriteHeight * 0.15, spriteWidth * 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            ctx.fillStyle = bodyColor;
            ctx.fillRect(screenX - spriteWidth * 0.25, drawY + spriteHeight * 0.7, spriteWidth * 0.15, spriteHeight * 0.3);
            ctx.fillRect(screenX + spriteWidth * 0.1, drawY + spriteHeight * 0.7, spriteWidth * 0.15, spriteHeight * 0.3);

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(screenX - spriteWidth * 0.08, drawY + spriteHeight * 0.12, spriteWidth * 0.05, spriteWidth * 0.05);
            ctx.fillRect(screenX + spriteWidth * 0.03, drawY + spriteHeight * 0.12, spriteWidth * 0.05, spriteWidth * 0.05);

            // Health bar
            if (e.health < e.maxHealth) {
                const barW = spriteWidth * 0.8;
                const barH = 4;
                const barX = screenX - barW / 2;
                const barY = drawY - 8;
                ctx.fillStyle = '#300';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.fillStyle = '#f00';
                ctx.fillRect(barX, barY, barW * (e.health / e.maxHealth), barH);
            }

            ctx.globalAlpha = 1;
        } else if (sprite.type === 'pickup') {
            const p = sprite.ref;
            const fogFactor = Math.min(1, perpDist / 800);
            const bob = Math.sin(p.bobPhase) * 5;
            const size = spriteHeight * 0.3;
            const drawY2 = drawY + spriteHeight * 0.5 + bob;

            ctx.globalAlpha = 1 - fogFactor * 0.3;

            if (p.type === 'health') {
                ctx.fillStyle = '#0f0';
                ctx.fillRect(screenX - size / 2, drawY2 - size / 2, size, size);
                ctx.fillStyle = '#000';
                ctx.fillRect(screenX - size * 0.1, drawY2 - size * 0.3, size * 0.2, size * 0.6);
                ctx.fillRect(screenX - size * 0.3, drawY2 - size * 0.1, size * 0.6, size * 0.2);
            } else {
                ctx.fillStyle = '#ff0';
                ctx.fillRect(screenX - size / 2, drawY2 - size / 2, size, size);
                ctx.fillStyle = '#000';
                ctx.font = `${size * 0.7}px monospace`;
                ctx.textAlign = 'center';
                ctx.fillText('A', screenX, drawY2 + size * 0.25);
            }

            ctx.globalAlpha = 1;
        }
    }

    // Render particles
    for (const p of particles) {
        const dx = p.x - player.x;
        const dy = p.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        let angleDiff = angle - player.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

        if (Math.abs(angleDiff) > halfFov) continue;

        const screenX = W / 2 + (angleDiff / halfFov) * (W / 2);
        const perpDist = dist * Math.cos(angleDiff);
        if (perpDist < 5) continue;

        const size = Math.max(1, 4 / perpDist * TILE);
        const drawY = H / 2 + pitchOffset;

        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(screenX - size / 2, drawY - size / 2, size, size);
        ctx.globalAlpha = 1;
    }

    // Weapon rendering
    renderWeapon(dt);

    // Muzzle flash
    if (muzzleFlash > 0) {
        ctx.fillStyle = `rgba(255,200,50,${muzzleFlash})`;
        const flashSize = 60 * muzzleFlash;
        ctx.beginPath();
        ctx.arc(W / 2, H * 0.65, flashSize, 0, Math.PI * 2);
        ctx.fill();
    }

    // Screen shake
    if (screenShake > 0) {
        ctx.save();
        ctx.translate(
            (Math.random() - 0.5) * screenShake * 10,
            (Math.random() - 0.5) * screenShake * 10
        );
        ctx.restore();
    }

    // Damage overlay
    if (player.hurtTimer > 0) {
        document.getElementById('damage-overlay').style.opacity = player.hurtTimer * 2;
    } else {
        document.getElementById('damage-overlay').style.opacity = 0;
    }
}

function renderWeapon(dt) {
    const bobX = Math.sin(player.bobPhase) * player.bobAmount * 15;
    const bobY = Math.abs(Math.cos(player.bobPhase)) * player.bobAmount * 10;

    const baseX = W / 2 + bobX;
    const baseY = H - 50 + bobY;

    // Recoil
    let recoilY = 0;
    if (player.shootingTimer > player.fireRate - 0.05) {
        recoilY = (player.shootingTimer - (player.fireRate - 0.05)) / 0.05 * 20;
    }

    ctx.save();
    ctx.translate(baseX, baseY + recoilY);

    // Gun body
    ctx.fillStyle = '#444';
    ctx.fillRect(-15, -80, 30, 80);

    // Barrel
    ctx.fillStyle = '#333';
    ctx.fillRect(-8, -130, 16, 60);

    // Grip
    ctx.fillStyle = '#553';
    ctx.fillRect(-10, 0, 20, 40);

    // Details
    ctx.fillStyle = '#55

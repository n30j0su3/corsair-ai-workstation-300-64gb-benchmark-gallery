<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Spiral Galaxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000}
canvas{display:block}
#ui{position:fixed;top:24px;left:24px;color:#fff;font-family:'Segoe UI',Arial,sans-serif;z-index:10;pointer-events:none}
#ui h1{font-size:26px;font-weight:300;letter-spacing:3px;margin-bottom:6px;text-shadow:0 0 20px rgba(120,160,255,0.6)}
#ui p{font-size:13px;opacity:0.55;letter-spacing:1px}
</style>
</head>
<body>
<div id="ui">
<h1>NGC 1232</h1>
<p>50,000 particles</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
var PARTICLE_COUNT=50000;
var STAR_COUNT=8000;
var GALAXY_RADIUS=35;
var ARM_COUNT=3;
var ARM_SPREAD=0.4;
var DISK_SCALE=1.0;
var SCALE=1.0;

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,25,45);
camera.lookAt(0,0,0);

var renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// Galaxy particles
var galaxyGeo=new THREE.BufferGeometry();
var galaxyPositions=new Float32Array(PARTICLE_COUNT*3);
var galaxyColors=new Float32Array(PARTICLE_COUNT*3);
var galaxySizes=new Float32Array(PARTICLE_COUNT);

var armIndices=[];
var armCount=ARM_COUNT;
var particlesPerArm=Math.floor(PARTICLE_COUNT/armCount);
var extra=PARTICLE_COUNT-particlesPerArm*armCount;

var spiralAngle=0;
var armOffset=0;

for(var i=0;i<PARTICLE_COUNT;i++){
var arm=i%armCount;
var dist=Math.pow(Math.random(),0.5)*GALAXY_RADIUS*DISK_SCALE;
var armAngle=arm*(Math.PI*2/armCount);
var randomAngle=dist*ARM_SPREAD*Math.random()*0.02;
var angle=armAngle+armOffset+randomAngle+spiralAngle*dist*0.01;

var x=Math.cos(angle)*dist;
var z=Math.sin(angle)*dist;

var height=Math.random()*0.8;
var heightDecay=Math.pow(dist/GALAXY_RADIUS,2);
var y=(Math.random()-0.5)*height*(1-heightDecay*0.8);

var bulgeFactor=1-Math.pow(dist/GALAXY_RADIUS,3);
y+=(Math.random()-0.5)*bulgeFactor*1.5;

galaxyPositions[i*3]=x*SCALE;
galaxyPositions[i*3+1]=y*SCALE;
galaxyPositions[i*3+2]=z*SCALE;

var t=dist/GALAXY_RADIUS;
var colorR, colorG, colorB;

if(t<0.15){
colorR=0.6+0.4*t*5;
colorG=0.7+0.3*t*5;
colorB=1.0;
}else if(t<0.4){
var s=(t-0.15)/0.25;
colorR=0.6+0.4*s;
colorG=0.7+0.3*s-0.15*s;
colorB=1.0-0.3*s;
}else if(t<0.7){
var s2=(t-0.4)/0.3;
colorR=1.0;
colorG=0.75-0.15*s2;
colorB=0.7-0.5*s2;
}else{
var s3=(t-0.7)/0.3;
colorR=1.0-0.2*s3;
colorG=0.6-0.15*s3;
colorB=0.2-0.15*s3;
}

var brightness=0.5+0.5*Math.random();
galaxyColors[i*3]=colorR*brightness;
galaxyColors[i*3+1]=colorG*brightness;
galaxyColors[i*3+2]=colorB*brightness;

galaxySizes[i]=0.3+Math.random()*0.6+bulgeFactor*0.5;
}

galaxyGeo.setAttribute('position',new THREE.BufferAttribute(galaxyPositions,3));
galaxyGeo.setAttribute('color',new THREE.BufferAttribute(galaxyColors,3));
galaxyGeo.setAttribute('size',new THREE.BufferAttribute(galaxySizes,1));

var galaxyMat=new THREE.ShaderMaterial({
uniforms:{
uTime:{value:0},
uPixelRatio:{value:renderer.getPixelRatio()}
},
vertexShader:`
attribute float size;
attribute vec3 color;
varying vec3 vColor;
varying float vAlpha;
uniform float uTime;
uniform float uPixelRatio;
void main(){
vColor=color;
vec4 mvPosition=modelViewMatrix*vec4(position,1.0);
float dist=length(position);
float glow=1.0/(1.0+dist*0.03);
vAlpha=0.4+0.6*glow;
gl_PointSize=size*uPixelRatio*(200.0/(-mvPosition.z))*glow;
gl_PointSize=max(gl_PointSize,1.0);
gl_Position=projectionMatrix*mvPosition;
}
`,
fragmentShader:`
varying vec3 vColor;
varying float vAlpha;
void main(){
vec2 center=gl_PointCoord-0.5;
float d=length(center);
float alpha=smoothstep(0.5,0.0,d);
alpha*=vAlpha;
float core=smoothstep(0.15,0.0,d);
vec3 col=vColor+core*0.3;
gl_FragColor=vec4(col,alpha);
}
`,
transparent:true,
blending:THREE.AdditiveBlending,
depthWrite:false,
vertexColors:true
});

var galaxy=new THREE.Points(galaxyGeo,galaxyMat);
scene.add(galaxy);

// Star background
var starGeo=new THREE.BufferGeometry();
var starPositions=new Float32Array(STAR_COUNT*3);
var starSizes=new Float32Array(STAR_COUNT);

for(var i=0;i<STAR_COUNT;i++){
var r=200+Math.random()*400;
var theta=Math.random()*Math.PI*2;
var phi=Math.acos(2*Math.random()-1);
starPositions[i*3]=r*Math.sin(phi)*Math.cos(theta);
starPositions[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
starPositions[i*3+2]=r*Math.cos(phi);
starSizes[i]=Math.random()*1.5+0.5;
}

starGeo.setAttribute('position',new THREE.BufferAttribute(starPositions,3));
starGeo.setAttribute('size',new THREE.BufferAttribute(starSizes,1));

var starMat=new THREE.ShaderMaterial({
uniforms:{
uPixelRatio:{value:renderer.getPixelRatio()}
},
vertexShader:`
attribute float size;
uniform float uPixelRatio;
varying float vAlpha;
void main(){
vec4 mvPosition=modelViewMatrix*vec4(position,1.0);
float dist=length(position);
vAlpha=0.3+0.7*smoothstep(600.0,200.0,dist);
gl_PointSize=size*uPixelRatio*(150.0/(-mvPosition.z));
gl_PointSize=max(gl_PointSize,0.5);
gl_Position=projectionMatrix*mvPosition;
}
`,
fragmentShader:`
varying float vAlpha;
void main(){
vec2 center=gl_PointCoord-0.5;
float d=length(center);
float alpha=smoothstep(0.5,0.0,d)*vAlpha;
gl_FragColor=vec4(0.9,0.92,1.0,alpha);
}
`,
transparent:true,
blending:THREE.AdditiveBlending,
depthWrite:false
});

var stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

var clock=new THREE.Clock();

function animate(){
requestAnimationFrame(animate);
var elapsed=clock.getElapsedTime();

galaxyMat.uniforms.uTime.value=elapsed;

galaxy.rotation.y=elapsed*0.015;
stars.rotation.y=elapsed*0.002;

var camRadius=45+Math.sin(elapsed*0.1)*5;
var camHeight=25+Math.sin(elapsed*0.15)*8;
var camAngle=elapsed*0.08;
camera.position.x=Math.cos(camAngle)*camRadius;
camera.position.z=Math.sin(camAngle)*camRadius;
camera.position.y=camHeight;
camera.lookAt(0,0,0);

renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',function(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
galaxyMat.uniforms.uPixelRatio.value=renderer.getPixelRatio();
starMat.uniforms.uPixelRatio.value=renderer.getPixelRatio();
});
})();
</script>
</body>
</html>

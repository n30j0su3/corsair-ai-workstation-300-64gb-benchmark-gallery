<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flight Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 32px; text-align: center; text-shadow: 2px 2px 8px #000; display: none; }
#controls { position: absolute; bottom: 10px; left: 10px; color: #0f0; font-size: 11px; opacity: 0.7; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="hud"></canvas>
<div id="msg"></div>
<div id="controls">W/S: Pitch | A/D: Roll | Q/E: Yaw | Shift/Ctrl: Throttle | C: Camera | R: Restart | Space: Brake</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hudCanvas = document.getElementById('hud');
const hudCtx = hudCanvas.getContext('2d');
const msgEl = document.getElementById('msg');

let W, H;
function resize() {
    W = canvas.width = hudCanvas.width = window.innerWidth;
    H = canvas.height = hudCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Math utilities
const PI = Math.PI, TAU = PI * 2;
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function dist3D(x1,y1,z1,x2,y2,z2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2+(z2-z1)**2); }
function radToDeg(r) { return r * 180 / PI; }
function degToRad(d) { return d * PI / 180; }

// Vector3
class V3 {
    constructor(x=0,y=0,z=0){this.x=x;this.y=y;this.z=z;}
    add(v){return new V3(this.x+v.x,this.y+v.y,this.z+v.z);}
    sub(v){return new V3(this.x-v.x,this.y-v.y,this.z-v.z);}
    mul(s){return new V3(this.x*s,this.y*s,this.z*s);}
    dot(v){return this.x*v.x+this.y*v.y+this.z*v.z;}
    cross(v){return new V3(this.y*v.z-this.z*v.y,this.z*v.x-this.x*v.z,this.x*v.y-this.y*v.x);}
    len(){return Math.sqrt(this.x*this.x+this.y*this.y+this.z*this.z);}
    norm(){const l=this.len();return l>0?new V3(this.x/l,this.y/l,this.z/l):new V3();}
    rotY(a){const c=Math.cos(a),s=Math.sin(a);return new V3(this.x*c+this.z*s,this.y,-this.x*s+this.z*c);}
    rotX(a){const c=Math.cos(a),s=Math.sin(a);return new V3(this.x,this.y*c-this.z*s,this.y*s+this.z*c);}
}

// Input
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// Camera mode
let camMode = 0; // 0 = chase, 1 = cockpit

// Aircraft state
const plane = {
    pos: new V3(0, 200, 0),
    vel: new V3(0, 0, 0),
    heading: 0, // radians
    pitch: 0,
    roll: 0,
    throttle: 0.5,
    speed: 0,
    angularVel: { pitch: 0, roll: 0, yaw: 0 },
    alive: true,
    checkpointsPassed: 0,
    totalCheckpoints: 10,
    landed: false,
    crashTimer: 0,
    wingspan: 6,
    length: 8,
    mass: 1000
};

// Terrain generation
const terrainSize = 8000;
const terrainRes = 120;
let terrainHeights = [];
let trees = [];
let towers = [];
let checkpoints = [];
let hazards = [];
let runway = null;

function generateTerrain() {
    terrainHeights = [];
    for (let i = 0; i < terrainRes; i++) {
        terrainHeights[i] = [];
        for (let j = 0; j < terrainRes; j++) {
            const nx = i / terrainRes;
            const nz = j / terrainRes;
            let h = Math.sin(nx * 12) * Math.cos(nz * 8) * 80;
            h += Math.sin(nx * 25 + 1) * Math.cos(nz * 22 + 2) * 30;
            h += Math.sin(nx * 40) * Math.sin(nz * 35) * 10;
            h += Math.cos(nx * 6 + nz * 4) * 50;
            // Flatten near runway
            const rnx = nx - 0.5, rnz = nz - 0.5;
            const rdist = Math.sqrt(rnx * rnx * 4 + rnz * rnz * 25);
            if (rdist < 0.15) h *= rdist / 0.15;
            // Add mountains
            const mx = Math.sin(nx * 3 + 0.5) * 0.3;
            const mz = Math.cos(nz * 3 + 0.7) * 0.3;
            const md = Math.sqrt((mx - nx + 0.5) ** 2 + (mz - nz + 0.5) ** 2);
            if (md < 0.2) h += (0.2 - md) * 300;
            terrainHeights[i][j] = Math.max(-20, h);
        }
    }

    // Runway
    runway = {
        x: 0, z: 0, length: 600, width: 40,
        heading: 0
    };

    // Trees
    trees = [];
    for (let i = 0; i < 300; i++) {
        const tx = (Math.random() - 0.5) * terrainSize * 0.8;
        const tz = (Math.random() - 0.5) * terrainSize * 0.8;
        const th = getTerrainHeight(tx, tz);
        if (th > -10 && th < 100) {
            trees.push({ x: tx, z: tz, height: 15 + Math.random() * 25, radius: 3 + Math.random() * 4, type: Math.floor(Math.random() * 3) });
        }
    }

    // Towers
    towers = [];
    for (let i = 0; i < 15; i++) {
        const tx = (Math.random() - 0.5) * terrainSize * 0.6;
        const tz = (Math.random() - 0.5) * terrainSize * 0.6;
        const th = getTerrainHeight(tx, tz);
        towers.push({ x: tx, z: tz, height: 80 + Math.random() * 120, width: 8 + Math.random() * 8, baseH: Math.max(th, 0) });
    }
}

function getTerrainHeight(x, z) {
    const scale = terrainSize;
    const ti = ((x / scale + 0.5) * terrainRes) % terrainRes;
    const tj = ((z / scale + 0.5) * terrainRes) % terrainRes;
    const i = Math.floor(ti) % terrainRes;
    const j = Math.floor(tj) % terrainRes;
    const fi = ti - Math.floor(ti);
    const fj = tj - Math.floor(tj);
    const i1 = ((i + 1) % terrainRes);
    const j1 = ((j + 1) % terrainRes);
    return terrainHeights[((i % terrainRes) + terrainRes) % terrainRes][((j % terrainRes) + terrainRes) % terrainRes] * (1 - fi) * (1 - fj) +
        terrainHeights[i1][((j % terrainRes) + terrainRes) % terrainRes] * fi * (1 - fj) +
        terrainHeights[((i % terrainRes) + terrainRes) % terrainRes][j1] * (1 - fi) * fj +
        terrainHeights[i1][j1] * fi * fj;
}

function generateCheckpoints() {
    checkpoints = [];
    const startAngle = 0;
    for (let i = 0; i < 10; i++) {
        const angle = startAngle + (i / 10) * TAU * 1.5 - PI * 0.3;
        const radius = 800 + i * 200 + Math.sin(i * 2) * 300;
        const cx = Math.cos(angle) * radius;
        const cz = Math.sin(angle) * radius - 1000;
        const cy = 100 + i * 30 + Math.sin(i * 1.5) * 50;
        checkpoints.push({
            x: cx, y: cy, z: cz,
            radius: 35,
            passed: false,
            index: i,
            color: `hsl(${(i * 36) % 360}, 80%, 60%)`
        });
    }
    // Landing zone at end
    checkpoints.push({
        x: 0, y: 15, z: -500,
        radius: 50,
        passed: false,
        index: 10,
        color: '#00ff00',
        isLanding: true
    });
    plane.totalCheckpoints = checkpoints.length;
}

function generateHazards() {
    hazards = [];
    // Storm clouds
    for (let i = 0; i < 8; i++) {
        hazards.push({
            type: 'storm',
            x: (Math.random() - 0.5) * 4000,
            y: 200 + Math.random() * 200,
            z: -500 + (Math.random() - 0.5) * 4000,
            radius: 100 + Math.random() * 100,
            damage: 0.3
        });
    }
    // Missile towers
    for (let i = 0; i < 5; i++) {
        hazards.push({
            type: 'missile',
            x: (Math.random() - 0.5) * 3000,
            y: 50,
            z: -500 + (Math.random() - 0.5) * 3000,
            radius: 20,
            damage: 1.0,
            angle: Math.random() * TAU,
            fireTimer: Math.random() * 3
        });
    }
    // Wind shear zones
    for (let i = 0; i < 4; i++) {
        hazards.push({
            type: 'wind',
            x: (Math.random() - 0.5) * 3000,
            y: 100 + Math.random() * 150,
            z: -500 + (Math.random() - 0.5) * 3000,
            radius: 80,
            damage: 0.1,
            strength: 2 + Math.random() * 3
        });
    }
}

// 3D Projection
const FOV = 70;
const NEAR = 1;
const FAR = 5000;

function project(point, camPos, camHeading, camPitch, camRoll) {
    // Translate relative to camera
    let p = point.sub(camPos);
    // Rotate camera
    p = p.rotY(-camHeading);
    p = p.rotX(-camPitch);
    p = p.rotY(-camRoll);

    if (p.z < NEAR) return null;
    if (p.z > FAR) return null;

    const f = W / (2 * Math.tan(FOV * PI / 360));
    const sx = W / 2 + (p.x / p.z) * f;
    const sy = H / 2 - (p.y / p.z) * f;

    return { x: sx, y: sy, z: p.z, depth: p.z };
}

function projectWorld(point, camPos, camHeading, camPitch) {
    let p = point.sub(camPos);
    p = p.rotY(-camHeading);
    p = p.rotX(-camPitch);
    if (p.z < NEAR) return null;
    const f = W / (2 * Math.tan(FOV * PI / 360));
    return { x: W / 2 + (p.x / p.z) * f, y: H / 2 - (p.y / p.z) * f, z: p.z, depth: p.z };
}

// Aircraft model vertices
function getAircraftMesh() {
    const wings = 6, bodyW = 1.2, bodyH = 1.2, bodyL = 7, tailW = 3, tailH = 0.8, tailL = 2.5;
    return [
        // Body (fuselage)
        { verts: [[-bodyW/2, 0, -bodyL/2], [bodyW/2, 0, -bodyL/2], [bodyW/2, bodyH, -bodyL/2], [-bodyW/2, bodyH, -bodyL/2]], color: '#556' },
        { verts: [[-bodyW/2, 0, bodyL/2], [bodyW/2, 0, bodyL/2], [bodyW/2, bodyH, bodyL/2], [-bodyW/2, bodyH, bodyL/2]], color: '#667' },
        { verts: [[-bodyW/2, 0, -bodyL/2], [-bodyW/2, 0, bodyL/2], [-bodyW/2, bodyH, bodyL/2], [-bodyW/2, bodyH, -bodyL/2]], color: '#445' },
        { verts: [[bodyW/2, 0, -bodyL/2], [bodyW/2, 0, bodyL/2], [bodyW/2, bodyH, bodyL/2], [bodyW/2, bodyH, -bodyL/2]], color: '#556' },
        // Wings
        { verts: [[-wings/2, 0, -1], [-bodyW/2, 0, 1], [-bodyW/2, 0.2, 1], [-wings/2, 0.2, -1]], color: '#778' },
        { verts: [[bodyW/2, 0, 1], [wings/2, 0, -1], [wings/2, 0.2, -1], [bodyW/2, 0.2, 1]], color: '#889' },
        // Tail wings
        { verts: [[-tailW/2, 0, bodyL/2 - 1], [-bodyW/2, 0, bodyL/2], [-bodyW/2, 0.2, bodyL/2], [-tailW/2, 0.2, bodyL/2 - 1]], color: '#667' },
        { verts: [[bodyW/2, 0, bodyL/2], [tailW/2, 0, bodyL/2 - 1], [tailW/2, 0.2, bodyL/2 - 1], [bodyW/2, 0.2, bodyL/2]], color: '#778' },
        // Tail fin
        { verts: [[-0.3, 0, bodyL/2 - 0.5], [0.3, 0, bodyL/2 - 0.5], [0.3, tailH, bodyL/2 - 0.5], [-0.3, tailH, bodyL/2 - 0.5]], color: '#889' },
        // Nose cone
        { verts: [[-bodyW/2, 0, -bodyL/2], [bodyW/2, 0, -bodyL/2], [bodyW/2, bodyH/2, -bodyL/2 - 1.5], [-bodyW/2, bodyH/2, -bodyL/2 - 1.5]], color: '#99a' },
    ];
}

const aircraftMesh = getAircraftMesh();

// Transform 3D points by aircraft orientation
function transformPoint(p, pos, heading, pitch, roll) {
    let v = p.sub(pos);
    v = v.rotY(heading);
    v = v.rotX(pitch);
    v = v.rotY(roll);
    return pos.add(v);
}

// Camera
function getCamera() {
    const speed = plane.speed;
    const forward = new V3(0, 0, -1).rotY(plane.heading).rotX(plane.pitch);

    if (camMode === 0) {
        // Chase camera
        const dist = 30 + speed * 0.15;
        const height = 10 + speed * 0.05;
        const camPos = plane.pos.add(forward.mul(dist)).add(new V3(0, height, 0));
        let lookTarget = plane.pos.add(forward.mul(20));
        return { pos: camPos, target: lookTarget, heading: plane.heading, pitch: plane.pitch, roll: plane.roll };
    } else {
        // Cockpit camera
        const cockpitPos = plane.pos.add(new V3(0, 2.5, -2)).rotY(plane.heading).rotX(plane.pitch);
        const camPos = plane.pos.add(forward.mul(2));
        return { pos: camPos, target: plane.pos.add(forward.mul(50)), heading: plane.heading, pitch: plane.pitch, roll: plane.roll };
    }
}

// Physics
let physicsTime = 0;
function updatePhysics(dt) {
    if (!plane.alive) {
        plane.crashTimer += dt;
        if (plane.crashTimer > 3) resetGame();
        return;
    }

    physicsTime += dt;
    const throttleInput = keys['ShiftLeft'] || keys['ShiftRight'] ? 1 : 0;
    const throttleDecay = keys['ControlLeft'] || keys['ControlRight'] ? 1 : 0;

    // Throttle control
    if (throttleInput) plane.throttle = Math.min(1, plane.throttle + dt * 0.4);
    if (throttleDecay) plane.throttle = Math.max(0, plane.throttle - dt * 0.4);
    // Auto throttle decay
    plane.throttle = Math.max(0, plane.throttle - dt * 0.01);

    // Pitch control
    const pitchRate = 1.5;
    if (keys['KeyS']) plane.angularVel.pitch += pitchRate * dt;
    if (keys['KeyW']) plane.angularVel.pitch -= pitchRate * dt;

    // Roll control
    const rollRate = 2.0;
    if (keys['KeyD']) plane.angularVel.roll += rollRate * dt;
    if (keys['KeyA']) plane.angularVel.roll -= rollRate * dt;

    // Yaw control
    const yawRate = 0.8;
    if (keys['KeyE']) plane.angularVel.yaw += yawRate * dt;
    if (keys['KeyQ']) plane.angularVel.yaw -= yawRate * dt;

    // Auto-leveling (gentle)
    plane.angularVel.pitch *= (1 - dt * 2);
    plane.angularVel.roll *= (1 - dt * 3);
    plane.angularVel.yaw *= (1 - dt * 2);

    // Apply angular velocities
    plane.pitch += plane.angularVel.pitch * dt;
    plane.roll += plane.angularVel.roll * dt;
    plane.heading += plane.angularVel.yaw * dt;

    // Bank-to-turn: banking causes heading change
    const bankTurnRate = Math.sin(plane.roll) * 1.2;
    plane.heading += bankTurnRate * dt;

    // Clamp pitch and roll
    plane.pitch = clamp(plane.pitch, -PI * 0.45, PI * 0.45);
    plane.roll = clamp(plane.roll, -PI * 0.5, PI * 0.5);

    // Engine thrust
    const thrust = plane.throttle * 50;
    const thrustVec = new V3(0, 0, -thrust).rotY(plane.heading).rotX(plane.pitch);

    // Gravity
    const gravity = new V3(0, -9.81, 0);

    // Velocity direction
    const velDir = plane.vel.len() > 0.1 ? plane.vel.mul(1 / plane.vel.len()) : new V3(0, 0, -1);

    // Drag (proportional to speed squared)
    const dragCoeff = 0.02;
    const dragMag = dragCoeff * plane.speed * plane.speed;
    const drag = velDir.mul(-dragMag);

    // Lift (perpendicular to velocity, depends on angle of attack and speed)
    const aoa = Math.sin(plane.pitch) * 0.5;
    const liftCoeff = aoa * 0.3 + 0.1;
    const liftMag = liftCoeff * plane.speed * plane.speed;
    const liftDir = new V3(0, 1, 0).rotY(plane.heading).rotX(plane.pitch);
    const lift = liftDir.mul(liftMag);

    // Total force
    const totalForce = gravity.add(thrustVec).add(drag).add(lift);

    // Brake
    if (keys['Space']) {
        const brakeForce = plane.vel.mul(-0.5 * dt);
        plane.vel = plane.vel.add(brakeForce);
    }

    // Acceleration
    const accel = totalForce.mul(1 / plane.mass);
    plane.vel = plane.vel.add(accel.mul(dt));

    // Update position
    plane.pos = plane.pos.add(plane.vel.mul(dt));

    // Speed
    plane.speed = plane.vel.len();

    // Terrain collision
    const groundH = getTerrainHeight(plane.pos.x, plane.pos.z);
    const planeBottom = plane.pos.y - 2;

    if (planeBottom < groundH) {
        // Crash
        plane.pos.y = groundH + 2;
        if (plane.speed > 30 || Math.abs(plane.pitch) > 0.5) {
            crashPlane();
        } else {
            // Bounce
            plane.vel.y = Math.abs(plane.vel.y) * 0.3;
            plane.vel = plane.vel.mul(0.7);
            plane.pitch *= 0.5;
        }
    }

    // Ocean collision (below sea level)
    if (plane.pos.y < -30) {
        crashPlane();
    }

    // Checkpoint collision
    checkCheckpoints();

    // Hazard collision
    checkHazards(dt);

    // Landing check
    if (plane.landed) {
        checkLanding();
    }
}

function crashPlane() {
    plane.alive = false;
    plane.crashTimer = 0;
    plane.vel = new V3(0, -5, 0);
}

function checkCheckpoints() {
    for (let cp of checkpoints) {
        if (cp.passed) continue;
        const d = dist3D(plane.pos.x, plane.pos.y, plane.pos.z, cp.x, cp.y, cp.z);
        if (d < cp.radius) {
            cp.passed = true;
            plane.checkpointsPassed++;
            if (cp.isLanding) {
                plane.landed = true;
                showMsg('MISSION COMPLETE - LANDING SUCCESSFUL!', '#00ff00');
            }
        }
    }
}

function checkHazards(dt) {
    for (let h of hazards) {
        if (h.type === 'storm') {
            const d = dist3D(plane.pos.x, plane.pos.y, plane.pos.z, h.x, h.y, h.z);
            if (d < h.radius) {
                // Turbulence
                plane.roll += (Math.random() - 0.5) * h.damage * dt * 5;
                plane.pitch += (Math.random() - 0.5) * h.damage * dt * 3;
                plane.speed *= (1 - dt * h.damage * 0.1);
            }
        } else if (h.type === 'missile') {
            h.fireTimer += dt;
            if (h.fireTimer > 2) {
                h.fireTimer = 0;
                h.angle += 0.5;
                const d = dist3D(plane.pos.x, plane.pos.y, plane.pos.z, h.x, h.y, h.z);
                if (d < 50) {
                    crashPlane();
                    showMsg('HIT BY MISSILE!', '#ff0000');
                }
            }
        } else if (h.type === 'wind') {
            const d = dist3D(plane.pos.x, plane.pos.y, plane.pos.z, h.x, h.y, h.z);
            if (d < h.radius) {
                const windDir = new V3(Math.cos(h.angle + physicsTime), 0, Math.sin(h.angle + physicsTime));
                plane.vel = plane.vel.add(windDir.mul(h.strength * dt));
                plane.speed *= (1 - dt * h.damage * 0.05);
            }
        }
    }

    // Tower collision
    for (let t of towers) {
        const d = dist3D(plane.pos.x, plane.pos.y, plane.pos.z, t.x, t.baseH + t.height / 2, t.z);
        if (d < t.width + 5) {
            crashPlane();
            showMsg('HIT TOWER!', '#ff0000');
        }
    }

    // Tree collision
    for (let tr of trees) {
        const d = dist3D(plane.pos.x, plane.pos.y, plane.pos.z, tr.x, tr.height / 2, tr.z);
        if (d < tr.radius + 3) {
            crashPlane();
            showMsg('HIT TREE!', '#ff0000');
        }
    }
}

function checkLanding() {
    if (plane.pos.y < 20 && plane.speed < 40 && Math.abs(plane.pitch) < 0.2 && plane.pos.y > 2) {
        plane.vel.y = 0;
        plane.vel = plane.vel.mul(0.95);
        plane.pitch *= 0.9;
        if (plane.pos.y <= 3) {
            plane.pos.y = 3;
            plane.vel = new V3(0, 0, 0);
            showMsg('PERFECT LANDING!', '#00ff00');
        }
    }
}

function showMsg(text, color) {
    msgEl.textContent = text;
    msgEl.style.color = color || '#fff';
    msgEl.style.display = 'block';
    setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
}

function resetGame() {
    plane.pos = new V3(0, 200, 0);
    plane.vel = new V3(0, 0, -80);
    plane.heading = 0;
    plane.pitch = 0;
    plane.roll = 0;
    plane.throttle = 0.5;
    plane.speed = 80;
    plane.angularVel = { pitch: 0, roll: 0, yaw: 0 };
    plane.alive = true;
    plane.checkpointsPassed = 0;
    plane.landed = false;
    plane.crashTimer = 0;
    generateCheckpoints();
    generateHazards();
    msgEl.style.display = 'none';
}

// Rendering
function drawSky(camPos, camHeading, camPitch) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    const skyBright = Math.max(0, Math.min(1, camPitch / PI * 2 + 0.5));
    grad.addColorStop(0, `rgb(${Math.floor(10 + skyBright * 30)},${Math.floor(15 + skyBright * 40)},${Math.floor(80 + skyBright * 100)})`);
    grad.addColorStop(0.5, `rgb(${Math.floor(60 + skyBright * 80)},${Math.floor(120 + skyBright * 60)},${Math.floor(180 + skyBright * 40)})`);
    grad.addColorStop(1, `rgb(${Math.floor(140 + skyBright * 60)},${Math.floor(160 + skyBright * 50)},${Math.floor(120 + skyBright * 40)})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Sun
    const sunAngle = 0.5;
    const sunPos = new V3(Math.cos(sunAngle) * 2000, Math.sin(sunAngle) * 2000, -1000);
    const sp = project(sunPos, camPos, camHeading, camPitch, 0);
    if (sp && sp.x > -100 && sp.x < W + 100 && sp.y > -100 && sp.y < H + 100) {
        const sunGrad = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, 80);
        sunGrad.addColorStop(0, 'rgba(255,255,200,1)');
        sunGrad.addColorStop(0.3, 'rgba(255,200,100,0.5)');
        sunGrad.addColorStop(1, 'rgba(255,150,50,0)');
        ctx.fillStyle = sunGrad;
        ctx.fillRect(sp.x - 80, sp.y - 80, 160, 160);
    }

    // Clouds
    const cloudTime = physicsTime * 0.01;
    for (let i = 0; i < 30; i++) {
        const cx = ((i * 317 + cloudTime * (50 + i * 10)) % terrainSize) - terrainSize * 0.5;
        const cz = ((i * 521 + cloudTime * (30 + i * 5)) % terrainSize) - terrainSize * 0.5;
        const cy = 300 + (i % 5) * 50;
        const cp = project(new V3(cx, cy, cz), camPos, camHeading, camPitch, 0);
        if (cp && cp.z < FAR) {
            const size = 60 + (i % 3) * 30;
            const alpha = Math.min(0.6, 200 / cp.z);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.beginPath();
            ctx.ellipse(cp.x, cp.y, size * (cp.z > 0 ? 1 : 0.5), size * 0.3 * (cp.z > 0 ? 1 : 0.5), 0, 0, TAU);
            ctx.fill();
        }
    }
}

function drawTerrain(camPos, camHeading, camPitch) {
    const scale = terrainSize;
    const cellSize = scale / terrainRes;

    // Draw terrain grid
    const maxDist = 3000;

    for (let i = 0; i < terrainRes - 1; i++) {
        for (let j = 0; j < terrainRes - 1; j++) {
            const x0 = (i / terrainRes - 0.5) * scale;
            const z0 = (j / terrainRes - 0.5) * scale;
            const x1 = x0 + cellSize;
            const z1 = z0 + cellSize;

            const h00 = terrainHeights[i][j];
            const h10 = terrainHeights[i + 1][j];
            const h01 = terrainHeights[i][j + 1];
            const h11 = terrainHeights[i + 1][j + 1];

            const p00 = project(new V3(x0, h00, z0), camPos, camHeading, camPitch);
            const p10 = project(new V3(x1, h10, z0), camPos, camHeading, camPitch);
            const p01 = project(new V3(x0, h00, z1), camPos, camHeading, camPitch);
            const p11 = project(new V3(x1, h11, z1), camPos, camHeading, camPitch);

            if (!p00 || !p10 || !p01 || !p11) continue;
            if (p00.z > maxDist || p10.z > maxDist || p01.z > maxDist || p11.z > maxDist) continue;

            const avgH = (h00 + h10 + h01 + h11) / 4;
            const avgDepth = (p00.z + p10.z + p01.z + p11.z) / 4;
            const fogFactor = Math.max(0, Math.min(1, 1 - avgDepth / maxDist));

            // Color based on height
            let r, g, b;
            if (avgH < -10) {
                r = 20; g = 40 + avgH * 2; b = 120;
            } else if (avgH < 10) {
                r = 60 + avgH; g = 120 + avgH; b = 40;
            } else if (avgH < 60) {
                r = 80 + avgH; g = 100 + avgH * 0.5; b = 40;
            } else {
                r = 140 + avgH * 0.3; g = 130 + avgH * 0.2; b = 120;
            }

            r = Math.floor(lerp(r, 180, fogFactor));
            g = Math.floor(lerp(g, 180, fogFactor));
            b = Math.floor(lerp(b, 200, fogFactor));

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath();
            ctx.moveTo(p00.x, p00.y);
            ctx.lineTo(p10.x, p10.y);
            ctx.lineTo(p11.x, p11.y);
            ctx.lineTo(p01.x, p01.y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = `rgba(0,0,0,0.1)`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }
    }
}

function drawRunway(camPos, camHeading, camPitch) {
    if (!runway) return;
    const r = runway;
    const corners = [
        new V3(-r.width / 2, 0, -r.length / 2),
        new V3(r.width / 2, 0, -r.length / 2),
        new V3(r.width / 2, 0, r.length / 2),
        new V3(-r.width / 2, 0, r.length / 2)
    ];

    const projected = corners.map(c => {
        const p = project(c.add(r.x, 0, r.z), camPos, camHeading, camPitch);
        return p;
    });

    if (projected.every(p => p !== null)) {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(projected[0].x, projected[0].y);
        for (let i = 1; i < projected.length; i++) ctx.lineTo(projected[i].x, projected[i].y);
        ctx.closePath();
        ctx.fill();

        // Center line
        const p1 = project(new V3(0, 0.1, -r.length / 2), camPos, camHeading, camPitch);
        const p2 = project(new V3(0, 0.1, r.length / 2), camPos, camHeading, camPitch);
        if (p1 && p2) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Threshold markings
        for (let i = -3; i <= 3; i++) {
            const p = project(new V3(i * 3, 0.1, -r.length / 2 + 10), camPos, camHeading, camPitch);
            if (p) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x - 2, p.y - 5, 4, 10);
            }
        }
    }
}

function drawTowers(camPos, camHeading, camPitch) {
    for (let t of towers) {
        const base = project(new V3(t.x, t.baseH, t.z), camPos, camHeading, camPitch);
        const top = project(new V3(t.x, t.baseH + t.height, t.z), camPos, camHeading, camPitch);
        if (!base || !top) continue;

        const w = 60 / top.z;
        ctx.fillStyle = '#666';
        ctx.fillRect(base.x - w, base.y, w * 2, top.y - base.y);

        // Antenna
        const antTop = project(new V3(t.x, t.baseH + t.height + 15, t.z), camPos, camHeading, camPitch);
        if (antTop) {
            ctx.strokeStyle = '#f00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(base.x, base.y);
            ctx.lineTo(antTop.x, antTop.y);
            ctx.stroke();

            // Blinking light
            if (Math.sin(physicsTime * 3) > 0) {
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(antTop.x, antTop.y, 3, 0, TAU);
                ctx.fill();
            }
        }
    }
}

function drawTrees(camPos, camHeading, camPitch) {
    for (let tr of trees) {
        const base = project(new V3(tr.x, 0, tr.z), camPos, camHeading, camPitch);
        const top = project(new V3(tr.x, tr.height, tr.z), camPos, camHeading, camPitch);
        if (!base || !top) continue;

        const size = Math.max(2, 40 / top.z);
        ctx.fillStyle = '#2a5a1a';
        ctx.beginPath();
        ctx.moveTo(top.x, top.y);
        ctx.lineTo(base.x - size, base.y);
        ctx.lineTo(base.x + size, base.y);
        ctx.closePath();
        ctx.fill();

        // Trunk
        ctx.fillStyle = '#4a3020';
        ctx.fillRect(base.x - size * 0.15, base.y, size * 0.3, (base.y - top.y) * 0.3);
    }
}

function drawCheckpoints(camPos, camHeading, camPitch) {
    for (let cp of checkpoints) {
        const center = project(new V3(cp.x, cp.y, cp.z), camPos, camHeading, camPitch);
        if (!center || center.z > FAR) continue;

        const ringRadius = cp.radius * 2;
        const segments = 32;

        for (let s = 0; s < segments; s++) {
            const a1 = (s / segments) * TAU;
            const a2 = ((s + 1) / segments) * TAU;

            const p1 = project(new V3(cp.x + Math.cos(a1) * ringRadius, cp.y, cp.z + Math.sin(a1) * ringRadius), camPos, camHeading, camPitch);
            const p2 = project(new V3(cp.x + Math.cos(a2) * ringRadius, cp.y, cp.z + Math.sin(a2) * ringRadius), camPos, camHeading, camPitch);

            if (!p1 || !p2) continue;

            const alpha = cp.passed ? 0.3 : 0.9;
            const fogFactor = Math.max(0.2, 1 - center.z / FAR);

            ctx.strokeStyle = cp.passed ? `rgba(100,100,100,${alpha * fogFactor})` : cp.color.replace(')', `,${alpha * fogFactor})`).replace('hsl', 'hsla').replace('rgb', 'rgba');

            // Parse color for alpha
            if (cp.color.startsWith('#')) {
                ctx.strokeStyle = cp.color;
                ctx.globalAlpha = alpha * fogFactor;
            } else {
                ctx.globalAlpha = 1;
            }

            ctx.lineWidth = Math.max(1, 40 / center.z);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();

            // Inner glow
            if (!cp.passed) {
                const mid = project(new V3(cp.x + Math.cos((a1 + a2) / 2) * ringRadius * 0.8, cp.y, cp.z + Math.sin((a1 + a2) / 2) * ringRadius * 0.8), camPos, camHeading, camPitch);
                if (mid) {
                    ctx.fillStyle = cp.color;
                    ctx.globalAlpha = 0.15 * fogFactor;
                    ctx.beginPath();
                    ctx.arc(mid.x, mid.y, Math.max(2, 20 / mid.z), 0, TAU);
                    ctx.fill();
                }
            }
        }
        ctx.globalAlpha = 1;

        // Center marker
        if (center && center.z < 2000) {
            const markerSize = Math.max(3, 15 / center.z);
            ctx.fillStyle = cp.passed ? '#888' : cp.color;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.arc(center.x, center.y, markerSize, 0, TAU);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // Number label
        if (center && center.z < 1500) {
            const labelSize = Math.max(8, Math.min(24, 200 / center.z));
            ctx.fillStyle = cp.passed ? '#888' : '#fff';
            ctx.font = `bold ${labelSize}px monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(cp.index + 1, center.x, center.y - 20 / center.z * 100);
        }
    }
}

function drawHazards(camPos, camHeading, camPitch) {
    for (let h of hazards) {
        const center = project(new V3(h.x, h.y, h.z), camPos, camHeading, camPitch);
        if (!center || center.z > FAR) continue;

        if (h.type === 'storm') {
            const r = h.radius * 2;
            const segments = 20;
            ctx.fillStyle = 'rgba(80,80,120,0.3)';
            ctx.beginPath();
            for (let s = 0; s <= segments; s++) {
                const a = (s / segments) * TAU;
                const p = project(new V3(h.x + Math.cos(a) * r, h.y + Math.sin(a) * r * 0.3, h.z + Math.sin(a) * r), camPos, camHeading, camPitch);
                if (p) {
                    if (s === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
            }
            ctx.closePath();
            ctx.fill();

            // Lightning flash
            if (Math.random() < 0.005) {
                ctx.strokeStyle = 'rgba(255,255,200,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                let lx = h.x, ly = h.y;
                for (let s = 0; s < 5; s++) {
                    lx += (Math.random() - 0.5) * 30;
                    ly += Math.random() * 20;
                    const lp = project(new V3(lx, ly, h.z), camPos, camHeading, camPitch);
                    if (lp) {
                        if (s === 0) ctx.moveTo(lp.x, lp.y);
                        else ctx.lineTo(lp.x, lp.y);
                    }
                }
                ctx.stroke();
            }
        } else if (h.type === 'missile') {
            const base = project(new V3(h.x, h.y, h.z), camPos, camHeading, camPitch);
            if (!base) continue;
            const size = Math.max(3, 20 / center.z);

            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(base.x, base.y, size, 0, TAU);
            ctx.fill();

            // Rotating beam
            const beamEnd = project(new V3(h.x + Math.cos(h.angle) * 50, h.y, h.z + Math.sin(h.angle) * 50), camPos, camHeading, camPitch);
            if (beamEnd) {
                ctx.strokeStyle = 'rgba(255,0,0,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(base.x, base.y);
                ctx.lineTo(beamEnd.x, beamEnd.y);
                ctx.stroke();
            }
        } else if (h.type === 'wind') {
            const r = h.radius * 2;
            ctx.strokeStyle = 'rgba(150,200,255,0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * TAU + physicsTime;
                const p1 = project(new V3(h.x + Math.cos(a) * r * 0.5, h.y, h.z + Math.sin(a) * r * 0.5), camPos, camHeading, camPitch);
                const p2 = project(new V3(h.x + Math.cos(a) * r, h.y, h.z + Math.sin(a) * r), camPos, camHeading, camPitch);
                if (p1 && p2) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        }
    }
}

function drawAircraft(camPos, camHeading, camPitch) {
    if (!plane.alive) {
        // Explosion effect
        const expPos = project(plane.pos, camPos, camHeading, camPitch);
        if (expPos) {
            const expSize = Math.min(200, plane.crashTimer * 1000 / expPos.z);
            const grad = ctx.createRadialGradient(expPos.x, expPos.y, 0, expPos.x, expPos.y, expSize);
            grad.addColorStop(0, 'rgba(255,200,50,0.8)');
            grad.addColorStop(0.5, 'rgba(255,100,20,0.4)');
            grad.addColorStop(1, 'rgba(255,50,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(expPos.x - expSize, expPos.y - expSize, expSize * 2, expSize * 2);
        }
        return;
    }

    // Project aircraft vertices
    const faces = [];
    for (let face of aircraftMesh) {
        const projectedVerts = [];
        for (let v of face.verts) {
            const worldPos = transformPoint(v, plane.pos, plane.heading, plane.pitch, plane.roll);
            const p = project(worldPos, camPos, camHeading, camPitch);
            if (!p) { projectedVerts.push(null); continue; }
            projectedVerts.push(p);
        }

        if (projectedVerts.some(v => v === null)) continue;

        // Backface culling
        const v0 = projectedVerts[0], v1 = projectedVerts[1], v2 = projectedVerts[2];
        const edge1x = v1.x - v0.x, edge1y = v1.y - v0.y;
        const edge2x = v2.x - v0.x, edge2y = v2.y - v0.y;
        const cross = edge1x * edge2y - edge1y * edge2x;

        faces.push({ verts: projectedVerts, color: face.color, depth: projectedVerts[0].z, culling: cross > 0 });
    }

    // Sort by depth (painter's algorithm)
    faces.sort((a, b) => b.depth - a.depth);

    for (let face of faces) {
        if (!face.culling) continue;
        ctx.fillStyle = face.color;
        ctx.beginPath();
        ctx.moveTo(face.verts[0].x, face.verts[0].y);
        for (let i = 1; i < face.verts.length; i++) {
            ctx.lineTo(face.verts[i].x, face.verts[i].y);
        }
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Engine exhaust
    if (plane.throttle > 0.1) {
        const exhaustPos = transformPoint(new V3(0, 0, plane.length / 2 + 1), plane.pos, plane.heading, plane.pitch, plane.roll);
        const ep = project(exhaustPos, camPos, camHeading, camPitch);
        if (ep) {
            const exhaustSize = Math.max(2, plane.throttle * 30 / ep.z);
            const grad = ctx.createRadialGradient(ep.x, ep.y, 0, ep.x, ep.y, exhaustSize);
            grad.addColorStop(0, `rgba(255,${Math.floor(150 * plane.throttle)},0,${plane.throttle * 0.6})`);
            grad.addColorStop(1, 'rgba(255,100,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(ep.x, ep.y, exhaustSize, 0, TAU);
            ctx.fill();
        }
    }
}

function drawHUD() {
    hudCtx.clearRect(0, 0, W, H);

    const airspeed = Math.round(plane.speed * 1.944); // knots
    const altitude = Math.round(Math.max(0, plane.pos.y));
    const heading = ((radToDeg(plane.heading) % 360) + 360) % 360;
    const throttlePct = Math.round(plane.throttle * 100);
    const aoa = radToDeg(plane.pitch);

    // Top bar - flight data
    hudCtx.fillStyle = 'rgba(0,0,0,0.5)';
    hudCtx.fillRect(0, 0, W, 60);

    hudCtx.font = 'bold 16px monospace';
    hudCtx.textAlign = 'left';

    // Airspeed
    hudCtx.fillStyle = '#0f0';
    hudCtx.fillText(`SPD: ${airspeed} kts`, 20, 25);
    hudCtx.fillStyle = '#0a0';
    hudCtx.fillRect(20, 32, Math.min(200, airspeed * 0.5), 8);
    hudCtx.fillStyle = '#0f0';
    hudCtx.fillRect(20, 32, Math.min(200, airspeed * 0.5), 8);

    // Altitude
    hudCtx.fillStyle = '#0f0';
    hudCtx.fillText(`ALT: ${altitude} ft`, 250, 25);
    hudCtx.fillStyle = '#0a0';
    hudCtx.fillRect(250, 32, Math.min(200, altitude * 0.15), 8);
    hudCtx.fillStyle = '#0f0';
    hudCtx.fillRect(250, 32, Math.min(200, altitude * 0.15), 8);

    // Throttle
    hudCtx.fillStyle = '#0f0';
    hudCtx.fillText(`THR: ${throttlePct}%`, 480, 25);
    hudCtx.fillStyle = '#0a0';
    hudCtx.fillRect(480, 32, throttlePct * 1.5, 8);
    hudCtx.fillStyle = throttlePct > 80 ? '#f00' : '#0f0';
    hudCtx.fillRect(480, 32, throttlePct * 1.5, 8);

    // Heading
    hudCtx.fillStyle = '#0f0';
    hudCtx.fillText(`HDG: ${Math.round(heading)}°`, 720, 25);

    // Artificial horizon
    const horizonX = W / 2;
    const horizonY = H / 2;
    const horizonSize = 120;

    hudCtx.save();
    hudCtx.beginPath();
    hudCtx.arc(horizonX, horizonY, horizonSize, 0, TAU);
    hudCtx.clip();

    // Rotate for pitch and roll
    hudCtx.translate(horizonX, horizonY);
    hudCtx.rotate(-plane.roll);
    hudCtx.translate(0, aoa * 50);

    // Sky
    const skyGrad = hudCtx.createLinearGradient(0, -horizonSize, 0, horizonSize);
    skyGrad.addColorStop(0, '#1a3a6a');
    skyGrad.addColorStop(0.5, '#4a8abf');
    skyGrad.addColorStop(0.5, '#5a4a2a');
    skyGrad.addColorStop(1, '#3a2a1a');
    hudCtx.fillStyle = skyGrad;
    hudCtx.fillRect(-horizonSize * 2, -horizonSize * 2, horizonSize * 4, horizonSize * 4);

    // Horizon line
    hudCtx.strokeStyle = '#fff';
    hudCtx.lineWidth = 2;
    hudCtx.beginPath();
    hudCtx.moveTo(-horizonSize * 2, 0);
    hudCtx.lineTo(horizonSize * 2, 0);
    hudCtx.stroke();

    // Pitch lines
    hudCtx.strokeStyle = 'rgba(255,255,255,0.5)';
    hudCtx.lineWidth = 1;
    for (let p = -30; p <= 30; p += 10) {
        if (p === 0) continue;
        const y = -p * 50 / 30;
        const w = Math.abs(p) % 30 === 0 ? 40 : 20;
        hudCtx.beginPath();
        hudCtx.moveTo(-w, y);
        hudCtx.lineTo(w, y);
        hudCtx.stroke();
        hudCtx.fillStyle = '#fff';
        hudCtx.font = '10px monospace';
        hudCtx.textAlign = 'right';
        hudCtx.fillText(`${p}°`, -w - 3, y + 3);
    }

    hudCtx.restore();

    // Horizon border
    hudCtx.strokeStyle = '#0f0';
    hudCtx.lineWidth = 2;
    hudCtx.beginPath();
    hudCtx.arc(horizonX, horizonY, horizonSize, 0, TAU);
    hudCtx.stroke();

    // Center crosshair
    hudCtx.strokeStyle = '#0f0';
    hudCtx.lineWidth = 2;
    hudCtx.beginPath();
    hudCtx.moveTo(horizonX - 30, horizonY);
    hudCtx.lineTo(horizonX - 10, horizonY);
    hudCtx.moveTo(horizonX + 10, horizonY);
    hudCtx.lineTo(horizonX + 30, horizonY);
    hudCtx.moveTo(horizonX, horizonY - 5);
    hudCtx.lineTo(horizonX, horizonY + 5);
    hudCtx.stroke();

    // Roll indicator
    hudCtx.save();
    hudCtx.translate(horizonX, horizonY);
    hudCtx.rotate(-plane.roll);
    hudCtx.fillStyle = '#0f0';
    hudCtx.beginPath();
    hudCtx.moveTo(0, -horizonSize + 5);
    hudCtx.lineTo(-8, -horizonSize + 15);
    hudCtx.lineTo(8, -horizonSize + 15);
    hudCtx.closePath();
    hudCtx.fill();
    hudCtx.restore();

    // Bank angle pointer
    hudCtx.strokeStyle = '#ff0';
    hudCtx.lineWidth = 2;
    hudCtx.beginPath();
    hudCtx.arc(horizonX, horizonY, horizonSize - 3, -PI / 2 - plane.roll, -PI / 2 + plane.roll);
    hudCtx.stroke();

    // Right side - heading compass
    const compassX = W - 80;
    const compassY = 100;
    const compassR = 40;

    hudCtx.strokeStyle = '#0f0';
    hudCtx.lineWidth = 1;
    hudCtx.beginPath();
    hudCtx.arc(compassX, compassY, compassR, 0, TAU);
    hudCtx.stroke();

    // Compass markings
    for (let d = 0; d < 360; d += 30) {
        const a = degToRad(d - heading) - PI / 2;
        const inner = d % 90 === 0 ? compassR - 12 : compassR - 7;
        hudCtx.strokeStyle = d % 90 === 0 ? '#0f0' : '#0a0';
        hudCtx.lineWidth = d % 90 === 0 ? 2 : 1;
        hudCtx.beginPath();
        hudCtx.moveTo(compassX + Math.cos(a) * inner, compassY + Math.sin(a) * inner);
        hudCtx.lineTo(compassX + Math.cos(a) * compassR, compassY + Math.sin(a) * compassR);
        hudCtx.stroke();

        if (d % 90 === 0) {
            hudCtx.fillStyle = '#0f0';
            hudCtx.font = 'bold 10px monospace';
            hudCtx.textAlign = 'center';
            const labels = { 0: 'N', 90: 'E', 180: 'S', 270: 'W' };
            hudCtx.fillText(labels[d] || d.toString(), compassX + Math.cos(a) * (inner - 8), compassY + Math.sin(a) * (inner - 8) + 3);
        }
    }

    // Heading bug
    const bugA = -PI / 2;
    hudCtx.fillStyle = '#ff0';
    hudCtx.beginPath();
    hudCtx.moveTo(compassX + Math.cos(bugA) * (compassR + 5), compassY + Math.sin(bugA) * (compassR + 5));
    hudCtx.lineTo(compassX + Math.cos(bugA - 0.05) * (compassR - 5), compassY + Math.sin(bugA - 0.05) * (compassR - 5));

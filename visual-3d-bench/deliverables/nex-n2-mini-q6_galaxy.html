<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Particle Galaxy</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #galaxy-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      touch-action: none;
    }

    #galaxy-canvas:active {
      cursor: grabbing;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.32);
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      backdrop-filter: blur(8px);
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="galaxy-canvas" aria-label="Interactive Three.js particle galaxy"></canvas>
  <div class="hint">Drag to rotate the galaxy</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const canvas = document.getElementById("galaxy-canvas");
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 42);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      powerPreference: "high-performance"
    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    const galaxy = new THREE.Group();
    scene.add(galaxy);

    const PARTICLE_COUNT = 50000;
    const GALAXY_RADIUS = 18;
    const ARM_COUNT = 5;

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const color = new THREE.Color();

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      const radius = Math.pow(Math.random(), 0.58) * GALAXY_RADIUS;
      const arm = i % ARM_COUNT;
      const spin = radius * 0.58;
      const armAngle = (arm / ARM_COUNT) * Math.PI * 2 + spin;
      const spread = (Math.random() - 0.5) * (0.55 + radius * 0.025);
      const heightSpread = (Math.random() - 0.5) * (0.25 + radius * 0.035);
      const coreBoost = Math.exp(-radius / 3.2);

      const x = Math.cos(armAngle + spread) * radius + (Math.random() - 0.5) * 0.08 * coreBoost;
      const z = Math.sin(armAngle + spread) * radius + (Math.random() - 0.5) * 0.08 * coreBoost;
      const y = Math.sin(armAngle * 0.7 + radius) * 0.12 + (Math.random() - 0.5) * heightSpread;

      positions[i3] = x;
      positions[i3 + 1] = y;
      positions[i3 + 2] = z;

      const t = radius / GALAXY_RADIUS;
      const hue = 0.58 + 0.10 * t;
      const saturation = 1.0 - 0.25 * t;
      const lightness = 0.96 - 0.58 * t;

      color.setHSL(hue, saturation, lightness);
      colors[i3] = color.r;
      colors[i3 + 1] = color.g;
      colors[i3 + 2] = color.b;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.075,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const points = new THREE.Points(geometry, material);
    galaxy.add(points);

    const glowCanvas = document.createElement("canvas");
    glowCanvas.width = 256;
    glowCanvas.height = 256;

    const glowContext = glowCanvas.getContext("2d");
    const glow = glowContext.createRadialGradient(128, 128, 0, 128, 128, 128);
    glow.addColorStop(0.0, "rgba(255,255,255,1)");
    glow.addColorStop(0.12, "rgba(255,245,210,0.95)");
    glow.addColorStop(0.35, "rgba(120,200,255,0.35)");
    glow.addColorStop(1.0, "rgba(0,0,0,0)");

    glowContext.fillStyle = glow;
    glowContext.fillRect(0, 0, 256, 256);

    const glowTexture = new THREE.CanvasTexture(glowCanvas);
    glowTexture.colorSpace = THREE.SRGBColorSpace;

    const coreGlow = new THREE.Sprite(
      new THREE.SpriteMaterial({
        map: glowTexture,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    coreGlow.scale.set(5.2, 5.2, 1);
    scene.add(coreGlow);

    const DUST_COUNT = 1200;
    const dustPositions = new Float32Array(DUST_COUNT * 3);
    const dustColors = new Float32Array(DUST_COUNT * 3);
    const dustColor = new THREE.Color();

    for (let i = 0; i < DUST_COUNT; i++) {
      const i3 = i * 3;
      const radius = Math.pow(Math.random(), 0.9) * 28;
      const angle = Math.random() * Math.PI * 2;
      const wobble = (Math.random() - 0.5) * 1.2;

      dustPositions[i3] = Math.cos(angle + wobble) * radius;
      dustPositions[i3 + 1] = (Math.random() - 0.5) * 2.2;
      dustPositions[i3 + 2] = Math.sin(angle + wobble) * radius;

      dustColor.setHSL(0.58 + Math.random() * 0.12, 0.75, 0.22 + Math.random() * 0.12);
      dustColors[i3] = dustColor.r;
      dustColors[i3 + 1] = dustColor.g;
      dustColors[i3 + 2] = dustColor.b;
    }

    const dustGeometry = new THREE.BufferGeometry();
    dustGeometry.setAttribute("position", new THREE.BufferAttribute(dustPositions, 3));
    dustGeometry.setAttribute("color", new THREE.BufferAttribute(dustColors, 3));

    const dustMaterial = new THREE.PointsMaterial({
      size: 0.12,
      vertexColors: true,
      transparent: true,
      opacity: 0.22,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const dust = new THREE.Points(dustGeometry, dustMaterial);
    scene.add(dust);

    let targetRotationX = 0.08;
    let targetRotationY = 0;
    let isPointerDown = false;
    let lastPointerX = 0;
    let lastPointerY = 0;

    canvas.addEventListener("pointerdown", (event) => {
      isPointerDown = true;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (isPointerDown) {
        const dx = event.clientX - lastPointerX;
        const dy = event.clientY - lastPointerY;

        targetRotationY += dx * 0.006;
        targetRotationX += dy * 0.004;
        targetRotationX = Math.max(-0.8, Math.min(0.8, targetRotationX));

        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
      } else {
        const x = (event.clientX / window.innerWidth) * 2 - 1;
        const y = (event.clientY / window.innerHeight) * 2 - 1;

        targetRotationY = x * 0.45;
        targetRotationX = y * 0.22;
      }
    });

    canvas.addEventListener("pointerup", (event) => {
      isPointerDown = false;
      try {
        canvas.releasePointerCapture(event.pointerId);
      } catch (error) {
        // Pointer may already be released by the browser.
      }
    });

    canvas.addEventListener("pointercancel", () => {
      isPointerDown = false;
    });

    canvas.addEventListener("pointerleave", () => {
      isPointerDown = false;
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    });

    const clock = new THREE.Clock();

    function animate() {
      const elapsed = clock.getElapsedTime();

      galaxy.rotation.y += 0.0012 + targetRotationY * 0.002;
      galaxy.rotation.x += (targetRotationX - galaxy.rotation.x) * 0.045;
      galaxy.rotation.z += Math.sin(elapsed * 0.12) * 0.00025;

      points.rotation.y = elapsed * 0.012;
      points.rotation.x = Math.sin(elapsed * 0.18) * 0.025;

      dust.rotation.y = -elapsed * 0.0025;
      dust.rotation.x = Math.sin(elapsed * 0.08) * 0.015;

      coreGlow.material.opacity = 0.78 + Math.sin(elapsed * 1.4) * 0.08;
      coreGlow.scale.setScalar(5.2 + Math.sin(elapsed * 1.1) * 0.25);

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>

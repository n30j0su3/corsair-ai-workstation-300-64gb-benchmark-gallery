<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout - Arkanoid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a1a;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
border: 2px solid #333;
border-radius: 4px;
box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
cursor: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 600;
canvas.width = W;
canvas.height = H;

// Audio context
let audioCtx = null;
function initAudio() {
if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, duration, type = 'square', volume = 0.15) {
if (!audioCtx) return;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
gain.gain.setValueAtTime(volume, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime + duration);
}

function playHitBrick(pitch = 1) {
playSound(440 * pitch, 0.1, 'square', 0.12);
playSound(880 * pitch, 0.08, 'sine', 0.06);
}

function playHitPaddle() {
playSound(220, 0.15, 'triangle', 0.15);
}

function playHitWall() {
playSound(300, 0.08, 'triangle', 0.1);
}

function playPowerUp() {
playSound(523, 0.1, 'sine', 0.12);
setTimeout(() => playSound(659, 0.1, 'sine', 0.12), 80);
setTimeout(() => playSound(784, 0.15, 'sine', 0.12), 160);
}

function playLoseLife() {
playSound(200, 0.3, 'sawtooth', 0.15);
setTimeout(() => playSound(150, 0.3, 'sawtooth', 0.15), 200);
setTimeout(() => playSound(100, 0.5, 'sawtooth', 0.15), 400);
}

function playLevelUp() {
[523, 659, 784, 1047].forEach((f, i) => {
setTimeout(() => playSound(f, 0.2, 'sine', 0.12), i * 120);
});
}

function playGameOver() {
[400, 350, 300, 200].forEach((f, i) => {
setTimeout(() => playSound(f, 0.4, 'sawtooth', 0.12), i * 250);
});
}

function playLaser() {
playSound(1200, 0.08, 'square', 0.08);
playSound(600, 0.06, 'sawtooth', 0.05);
}

// Game state
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEVELCOMPLETE: 4 };
let gameState = STATE.MENU;
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;

// Paddle
const paddle = {
x: W / 2,
y: H - 40,
w: 100,
h: 14,
speed: 8,
baseW: 100,
color: '#00ccff',
glowColor: 'rgba(0, 200, 255, 0.4)'
};

// Ball
let balls = [];
let lasers = [];
let powerUps = [];
let particles = [];
let bricks = [];
let combo = 0;
let comboTimer = 0;

function createBall(x, y, dx, dy, speed) {
return {
x: x || W / 2,
y: y || paddle.y - 12,
r: 8,
dx: dx || speed * (Math.random() > 0.5 ? 1 : -1) * 0.6,
dy: dy || -speed,
speed: speed || 5,
trails: []
};
}

function getBallSpeed() {
return 5 + (level - 1) * 0.5;
}

// Brick colors and rows
const brickRows = 7;
const brickCols = 10;
const brickW = 68;
const brickH = 22;
const brickPad = 4;
const brickOffsetX = (W - (brickCols * (brickW + brickPad) - brickPad)) / 2;
const brickOffsetY = 50;

const rowColors = [
{ fill: '#ff4444', glow: 'rgba(255, 68, 68, 0.5)', points: 70, hp: 3 },
{ fill: '#ff8844', glow: 'rgba(255, 136, 68, 0.5)', points: 60, hp: 3 },
{ fill: '#ffcc00', glow: 'rgba(255, 204, 0, 0.5)', points: 50, hp: 2 },
{ fill: '#44ff44', glow: 'rgba(68, 255, 68, 0.5)', points: 40, hp: 2 },
{ fill: '#44ccff', glow: 'rgba(68, 204, 255, 0.5)', points: 30, hp: 1 },
{ fill: '#aa44ff', glow: 'rgba(170, 68, 255, 0.5)', points: 25, hp: 1 },
{ fill: '#ff44aa', glow: 'rgba(255, 68, 170, 0.5)', points: 20, hp: 1 }
];

function generateBricks() {
bricks = [];
let rows = Math.min(brickRows + Math.floor((level - 1) / 2), 10);
for (let r = 0; r < rows; r++) {
for (let c = 0; c < brickCols; c++) {
let rowInfo = rowColors[r % rowColors.length];
let hp = rowInfo.hp + (level > 3 ? Math.floor((level - 3) / 2) : 0);
if (level > 6 && Math.random() < 0.3) hp += 1;
bricks.push({
x: brickOffsetX + c * (brickW + brickPad),
y: brickOffsetY + r * (brickH + brickPad),
w: brickW,
h: brickH,
color: rowInfo.fill,
glow: rowInfo.glow,
points: rowInfo.points * (1 + Math.floor((level - 1) / 2)),
hp: hp,
maxHp: hp,
alive: true
});
}
}
}

// Power-up types
const POWER_TYPES = {
MULTI: 0,
WIDE: 1,
LASER: 2,
SLOW: 3
};

const POWER_NAMES = ['Multi-Ball', 'Wide Paddle', 'Laser Shots', 'Slow Ball'];
const POWER_COLORS = ['#00ff88', '#ffcc00', '#ff4444', '#44aaff'];
const POWER_SYMBOLS = ['×3', '⟷', '↑', '↓'];

function spawnPowerUp(x, y) {
if (Math.random() > 0.2) return;
let type = Math.floor(Math.random() * 4);
powerUps.push({
x: x,
y: y,
w: 36,
h: 18,
dy: 2,
type: type,
alive: true,
time: 0
});
}

function applyPowerUp(type) {
playPowerUp();
switch (type) {
case POWER_TYPES.MULTI:
let newBalls = [];
balls.forEach(b => {
if (balls.length + newBalls.length < 12) {
newBalls.push(createBall(b.x, b.y, b.dx * 0.8 + (Math.random() - 0.5) * 3, b.dy * 0.8 - 1, b.speed));
}
});
balls.push(...newBalls);
break;
case POWER_TYPES.WIDE:
paddle.w = Math.min(paddle.w + 50, 200);
paddle.baseW = paddle.w;
setTimeout(() => {
paddle.w = paddle.baseW;
}, 8000);
break;
case POWER_TYPES.LASER:
setTimeout(() => {
let active = true;
let interval = setInterval(() => {
if (!active || gameState !== STATE.PLAYING) { clearInterval(interval); return; }
lasers.push({ x: paddle.x - paddle.w / 2 + 5, y: paddle.y, w: 4, h: 12, dy: -7 });
lasers.push({ x: paddle.x + paddle.w / 2 - 5 - 4, y: paddle.y, w: 4, h: 12, dy: -7 });
playLaser();
}, 250);
setTimeout(() => clearInterval(interval), 6000);
break;
case POWER_TYPES.SLOW:
balls.forEach(b => {
b.speed = Math.max(b.speed * 0.6, 3);
let angle = Math.atan2(b.dy, b.dx);
b.dx = Math.cos(angle) * b.speed;
b.dy = Math.sin(angle) * b.speed;
});
setTimeout(() => {
balls.forEach(b => {
b.speed = getBallSpeed();
let angle = Math.atan2(b.dy, b.dx);
b.dx = Math.cos(angle) * b.speed;
b.dy = Math.sin(angle) * b.speed;
});
}, 6000);
break;
}
}

// Particles
function spawnParticles(x, y, color, count = 12) {
for (let i = 0; i < count; i++) {
let angle = Math.random() * Math.PI * 2;
let speed = Math.random() * 4 + 1;
particles.push({
x: x,
y: y,
dx: Math.cos(angle) * speed,
dy: Math.sin(angle) * speed,
life: 1,
decay: Math.random() * 0.03 + 0.015,
size: Math.random() * 4 + 2,
color: color
});
}
}

// Input
let keys = {};
let mouseX = W / 2;
let mouseActive = false;

document.addEventListener('keydown', e => {
keys[e.code] = true;
if (e.code === 'Escape') {
if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
}
if (e.code === 'Space' || e.code === 'Enter') {
if (gameState === STATE.MENU) {
initAudio();
startGame();
} else if (gameState === STATE.GAMEOVER || gameState === STATE.LEVELCOMPLETE) {
if (gameState === STATE.LEVELCOMPLETE) {
level++;
startGame();
} else {
startGame();
}
}
}
e.preventDefault();
});

document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
let rect = canvas.getBoundingClientRect();
mouseX = (e.clientX - rect.left) * (W / rect.width);
mouseActive = true;
});

canvas.addEventListener('click', e => {
initAudio();
if (gameState === STATE.MENU) startGame();
else if (gameState === STATE.GAMEOVER || gameState === STATE.LEVELCOMPLETE) {
if (gameState === STATE.LEVELCOMPLETE) {
level++;
startGame();
} else {
startGame();
}
}
});

function startGame() {
initAudio();
score = 0;
lives = 3;
level = 1;
resetLevel();
gameState = STATE.PLAYING;
}

function resetLevel() {
paddle.w = paddle.baseW;
paddle.x = W / 2;
balls = [createBall(null, null, null, null, getBallSpeed())];
lasers = [];
powerUps = [];
particles = [];
combo = 0;
comboTimer = 0;
generateBricks();
}

// Collision detection
function rectCollision(cx, cy, cr, rx, ry, rw, rh) {
let closestX = Math.max(rx, Math.min(cx, rx + rw));
let closestY = Math.max(ry, Math.min(cy, ry + rh));
let dx = cx - closestX;
let dy = cy - closestY;
return (dx * dx + dy * dy) < (cr * cr);
}

function update() {
if (gameState !== STATE.PLAYING) return;

// Paddle movement
if (mouseActive) {
paddle.x = mouseX;
}
if (keys['ArrowLeft'] || keys['KeyA']) {
paddle.x -= paddle.speed;
mouseActive = false;
}
if (keys['ArrowRight'] || keys['KeyD']) {
paddle.x += paddle.speed;
mouseActive = false;
}
paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));

// Combo timer
if (comboTimer > 0) {
comboTimer--;
if (comboTimer <= 0) combo = 0;
}

// Update balls
for (let bi = balls.length - 1; bi >= 0; bi--) {
let b = balls[bi];

// Trail
b.trails.push({ x: b.x, y: b.y });
if (b.trails.length > 8) b.trails.shift();

b.x += b.dx;
b.y += b.dy;

// Wall collisions
if (b.x - b.r < 0) { b.x = b.r; b.dx = Math.abs(b.dx); playHitWall(); }
if (b.x + b.r > W) { b.x = W - b.r; b.dx = -Math.abs(b.dx); playHitWall(); }
if (b.y - b.r < 0) { b.y = b.r; b.dy = Math.abs(b.dy); playHitWall(); }

// Bottom - lose ball
if (b.y + b.r > H) {
balls.splice(bi, 1);
if (balls.length === 0) {
lives--;
playLoseLife();
if (lives <= 0) {
gameState = STATE.GAMEOVER;
if (score > highScore) {
highScore = score;
localStorage.setItem('breakoutHighScore', highScore);
}
} else {
balls = [createBall(null, null, null, null, getBallSpeed())];
combo = 0;
}
}
continue;
}

// Paddle collision
if (rectCollision(b.x, b.y, b.r, paddle.x - paddle.w / 2, paddle.y, paddle.w, paddle.h) && b.dy > 0) {
let hitPos = (b.x - paddle.x) / (paddle.w / 2);
hitPos = Math.max(-1, Math.min(1, hitPos));
let angle = hitPos * (Math.PI / 3);
b.dx = Math.sin(angle) * b.speed;
b.dy = -Math.cos(angle) * b.speed;
b.y = paddle.y - b.r;
playHitPaddle();
spawnParticles(b.x, b.y, '#00ccff', 5);
}

// Brick collision
for (let brick of bricks) {
if (!brick.alive) continue;
if (rectCollision(b.x, b.y, b.r, brick.x, brick.y, brick.w, brick.h)) {
brick.hp--;
if (brick.hp <= 0) {
brick.alive = false;
combo++;
comboTimer = 120;
let multiplier = Math.min(combo, 10);
score += brick.points * multiplier;
spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 15);
spawnPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
playHitBrick(1 + combo * 0.1);
} else {
playHitBrick(0.7);
spawnParticles(b.x, b.y, brick.color, 5);
}

// Determine collision side
let overlapLeft = (b.x + b.r) - brick.x;
let overlapRight = (brick.x + brick.w) - (b.x - b.r);
let overlapTop = (b.y + b.r) - brick.y;
let overlapBottom = (brick.y + brick.h) - (b.y - b.r);

let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
if (minOverlap === overlapLeft || minOverlap === overlapRight) {
b.dx = -b.dx;
} else {
b.dy = -b.dy;
}
break;
}
}

// Laser collision with bricks
for (let li = lasers.length - 1; li >= 0; li--) {
let laser = lasers[li];
laser.y += laser.dy;
if (laser.y < 0) { lasers.splice(li, 1); continue; }

for (let brick of bricks) {
if (!brick.alive) continue;
if (laser.x < brick.x + brick.w && laser.x + laser.w > brick.x &&
laser.y < brick.y + brick.h && laser.y + laser.h > brick.y) {
brick.hp--;
if (brick.hp <= 0) {
brick.alive = false;
score += brick.points;
spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 15);
spawnPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
}
playHitBrick(0.5);
lasers.splice(li, 1);
break;
}
}
}

// Power-up collision
for (let pu of powerUps) {
if (!pu.alive) continue;
pu.y += pu.dy;
pu.time++;
if (pu.y > H) { pu.alive = false; continue; }
if (rectCollision(paddle.x, paddle.y, 1, pu.x - pu.w / 2, pu.y, pu.w, pu.h)) {
pu.alive = false;
applyPowerUp(pu.type);
}
}
}

// Update particles
for (let i = particles.length - 1; i >= 0; i--) {
let p = particles[i];
p.x += p.dx;
p.y += p.dy;
p.dy += 0.1;
p.life -= p.decay;
if (p.life <= 0) particles.splice(i, 1);
}

// Check level complete
if (bricks.length > 0 && bricks.every(b => !b.alive)) {
gameState = STATE.LEVELCOMPLETE;
playLevelUp();
score += 1000 * level;
}
}

function drawRoundedRect(x, y, w, h, r) {
ctx.beginPath();
ctx.moveTo(x + r, y);
ctx.lineTo(x + w - r, y);
ctx.quadraticCurveTo(x + w, y, x + w, y + r);
ctx.lineTo(x + w, y + h - r);
ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
ctx.lineTo(x + r, y + h);
ctx.quadraticCurveTo(x, y + h, x, y + h - r);
ctx.lineTo(x, y + r);
ctx.quadraticCurveTo(x, y, x + r, y);
ctx.closePath();
}

function draw() {
// Background
let grad = ctx.createLinearGradient(0, 0, 0, H);
grad.addColorStop(0, '#0a0a2e');
grad.addColorStop(1, '#0a0a1a');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

// Grid lines (subtle)
ctx.strokeStyle = 'rgba(50, 50, 100, 0.15)';
ctx.lineWidth = 1;
for (let x = 0; x < W; x += 40) {
ctx.beginPath();
ctx.moveTo(x, 0);
ctx.lineTo(x, H);
ctx.stroke();
}
for (let y = 0; y < H; y += 40) {
ctx.beginPath();
ctx.moveTo(0, y);
ctx.lineTo(W, y);
ctx.stroke();
}

if (gameState === STATE.MENU) {
drawMenu();
return;
}

// Draw bricks
for (let brick of bricks) {
if (!brick.alive) continue;
let alpha = 0.5 + (brick.hp / brick.maxHp) * 0.5;
ctx.globalAlpha = alpha;

// Glow
ctx.shadowColor = brick.glow;
ctx.shadowBlur = 10;

// Brick body
ctx.fillStyle = brick.color;
drawRoundedRect(brick.x, brick.y, brick.w, brick.h, 4);
ctx.fill();

// Shine
ctx.shadowBlur = 0;
let shineGrad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
shineGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
shineGrad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
shineGrad.addColorStop(1, 'rgba(0,0,0,0.1)');
ctx.fillStyle = shineGrad;
drawRoundedRect(brick.x, brick.y, brick.w, brick.h, 4);
ctx.fill();

// HP indicator for multi-hp bricks
if (brick.maxHp > 1) {
ctx.fillStyle = 'rgba(255,255,255,0.8)';
ctx.font = 'bold 12px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(brick.hp, brick.x + brick.w / 2, brick.y + brick.h / 2);
}

ctx.globalAlpha = 1;
ctx.shadowBlur = 0;
}

// Draw power-ups
for (let pu of powerUps) {
if (!pu.alive) continue;
let bobY = Math.sin(pu.time * 0.1) * 3;
ctx.shadowColor = POWER_COLORS[pu.type];
ctx.shadowBlur = 12;
ctx.fillStyle = POWER_COLORS[pu.type];
drawRoundedRect(pu.x - pu.w / 2, pu.y - pu.h / 2 + bobY, pu.w, pu.h, 6);
ctx.fill();
ctx.shadowBlur = 0;

ctx.fillStyle = '#000';
ctx.font = 'bold 11px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(POWER_SYMBOLS[pu.type], pu.x, pu.y + bobY);
}

// Draw paddle
ctx.shadowColor = paddle.glowColor;
ctx.shadowBlur = 15;
let paddleGrad = ctx.createLinearGradient(paddle.x - paddle.w / 2, paddle.y, paddle.x + paddle.w / 2, paddle.y);
paddleGrad.addColorStop(0, '#0066aa');
paddleGrad.addColorStop(0.5, '#00ccff');
paddleGrad.addColorStop(1, '#0066aa');
ctx.fillStyle = paddleGrad;
drawRoundedRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2, paddle.w, paddle.h, 7);
ctx.fill();
ctx.shadowBlur = 0;

// Paddle shine
ctx.fillStyle = 'rgba(255,255,255,0.2)';
drawRoundedRect(paddle.x - paddle.w / 2 + 4, paddle.y - paddle.h / 2 + 2, paddle.w - 8, paddle.h / 2 - 1, 4);
ctx.fill();

// Draw balls
for (let b of balls) {
// Trails
for (let i = 0; i < b.trails.length; i++) {
let t = b.trails[i];
let alpha = (i / b.trails.length) * 0.3;
ctx.beginPath();
ctx.arc(t.x, t.y, b.r * (i / b.trails.length), 0, Math.PI * 2);
ctx.fillStyle = `rgba(0, 200, 255, ${alpha})`;
ctx.fill();
}

// Ball
ctx.shadowColor = 'rgba(0, 200, 255, 0.8)';
ctx.shadowBlur = 15;
ctx.beginPath();
ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
let ballGrad = ctx.createRadialGradient(b.x - 2, b.y - 2, 0, b.x, b.y, b.r);
ballGrad.addColorStop(0, '#ffffff');
ballGrad.addColorStop(0.3, '#88eeff');
ballGrad.addColorStop(1, '#0088cc');
ctx.fillStyle = ballGrad;
ctx.fill();
ctx.shadowBlur = 0;
}

// Draw lasers
for (let laser of lasers) {
ctx.shadowColor = '#ff4444';
ctx.shadowBlur = 8;
ctx.fillStyle = '#ff6644';
ctx.fillRect(laser.x, laser.y, laser.w, laser.h);
ctx.shadowBlur = 0;
}

// Draw particles
for (let p of particles) {
ctx.globalAlpha = p.life;
ctx.fillStyle = p.color;
ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
}
ctx.globalAlpha = 1;

// HUD
drawHUD();

// Paused overlay
if (gameState === STATE.PAUSED) {
ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 48px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('PAUSED', W / 2, H / 2 - 20);
ctx.font = '18px monospace';
ctx.fillStyle = '#aaaacc';
ctx.fillText('Press ESC to resume', W / 2, H / 2 + 30);
}

// Game Over
if (gameState === STATE.GAMEOVER) {
drawGameOver();
}

// Level Complete
if (gameState === STATE.LEVELCOMPLETE) {
ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#ffcc00';
ctx.font = 'bold 48px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(`LEVEL ${level} COMPLETE!`, W / 2, H / 2 - 40);
ctx.fillStyle = '#ffffff';
ctx.font = '24px monospace';
ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 10);
ctx.fillStyle = '#aaaacc';
ctx.font = '18px monospace';
ctx.fillText('Click or press SPACE for next level', W / 2, H / 2 + 50);
}
}

function drawHUD() {
// Score
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 20px monospace';
ctx.textAlign = 'left';
ctx.textBaseline = 'top';
ctx.fillText(`SCORE: ${score}`, 15, 10);

// High Score
ctx.fillStyle = '#8888aa';
ctx.font = '14px monospace';
ctx.fillText(`HI: ${highScore}`, 15, 36);

// Level
ctx.fillStyle = '#ffcc00';
ctx.font = 'bold 18px monospace';
ctx.textAlign = 'center';
ctx.fillText(`LEVEL ${level}`, W / 2, 10);

// Lives
ctx.textAlign = 'right';
ctx.fillStyle = '#ff4466';
ctx.font = 'bold 18px monospace';
let livesText = '';
for (let i = 0; i < lives; i++) livesText += '♥ ';
ctx.fillText(livesText, W - 15, 10);

// Combo
if (combo > 1 && comboTimer > 0) {
let alpha = comboTimer / 120;
ctx.globalAlpha = alpha;
ctx.fillStyle = '#ffcc00';
ctx.font = `bold ${20 + combo * 2}px monospace`;
ctx.textAlign = 'center';
ctx.fillText(`COMBO ×${combo}!`, W / 2, 80);
ctx.globalAlpha = 1;
}
}

function drawMenu() {
// Title
ctx.shadowColor = 'rgba(0, 200, 255, 0.5)';
ctx.shadowBlur = 30;
ctx.fillStyle = '#00ccff';
ctx.font = 'bold 64px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('BREAKOUT', W / 2, 140);
ctx.shadowBlur = 0;

// Subtitle
ctx.fillStyle = '#ffcc00';
ctx.font = 'bold 20px monospace';
ctx.fillText('★ ARKANOID ★', W / 2, 190);

// Instructions
ctx.fillStyle = '#ccccdd';
ctx.font = '16px monospace';
let instructions = [
'Mouse or Arrow Keys to move paddle',
'Break all bricks to advance levels',
'Ball gets faster each level',
'',
'Power-Ups:',
'  ×3 Multi-Ball     ⟷ Wide Paddle',
'  ↑ Laser Shots     ↓ Slow Ball'
];
instructions.forEach((line, i) => {
ctx.fillText(line, W / 2, 260 + i * 28);
});

// Start prompt
let pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
ctx.globalAlpha = pulse;
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 22px monospace';
ctx.fillText('Click or press SPACE to Start', W / 2, 480);
ctx.globalAlpha = 1;

// High score
ctx.fillStyle = '#8888aa';
ctx.font = '16px monospace';
ctx.fillText(`High Score: ${highScore}`, W / 2, 530);
}

function drawGameOver() {
ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
ctx.fillRect(0, 0, W, H);

ctx.shadowColor = 'rgba(255, 50, 50, 0.5)';
ctx.shadowBlur = 20;
ctx.fillStyle = '#ff4466';
ctx.font = 'bold 56px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
ctx.shadowBlur = 0;

ctx.fillStyle = '#ffffff';
ctx.font = 'bold 28px monospace';
ctx.fillText(`Final Score: ${score}`, W / 2, H / 2);

ctx.fillStyle = '#ffcc00';
ctx.font = '22px monospace';
ctx.fillText(`Level Reached: ${level}`, W / 2, H / 2 + 40);

if (score >= highScore && score > 0) {
ctx.fillStyle = '#ffcc00';
ctx.font = 'bold 20px monospace';
ctx.fillText('★ NEW HIGH SCORE! ★', W / 2, H / 2 + 80);
}

let pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
ctx.globalAlpha = pulse;
ctx.fillStyle = '#aaaacc';
ctx.font = '18px monospace';
ctx.fillText('Click or press SPACE to Restart', W / 2, H / 2 + 130);
ctx.globalAlpha = 1;
}

// Game loop
function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout - Arkanoid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a1a;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
border: 2px solid #333;
border-radius: 4px;
box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
cursor: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 600;

// Audio Context
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    switch(type) {
        case 'hit':
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
            break;
        case 'brick':
            osc.type = 'square';
            osc.frequency.setValueAtTime(523, now);
            osc.frequency.exponentialRampToValueAtTime(1047, now + 0.08);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            break;
        case 'powerup':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
            break;
        case 'lose':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
            break;
        case 'paddle':
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(500, now + 0.05);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
            break;
        case 'laser':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            break;
        case 'levelup':
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554, now + 0.1);
            osc.frequency.setValueAtTime(659, now + 0.2);
            osc.frequency.setValueAtTime(880, now + 0.3);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
            break;
        case 'gameover':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(350, now + 0.2);
            osc.frequency.setValueAtTime(300, now + 0.4);
            osc.frequency.setValueAtTime(200, now + 0.6);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
            break;
    }
}

// Game State
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEVELUP: 4 };
let gameState = STATE.MENU;
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;

// Paddle
const paddle = {
    x: canvas.width / 2 - 50,
    y: canvas.height - 30,
    width: 100,
    height: 14,
    speed: 8,
    baseWidth: 100,
    color: '#00aaff',
    glowColor: 'rgba(0, 170, 255, 0.5)'
};

// Ball
let balls = [];
function createBall(x, y, dx, dy, speed) {
    return {
        x: x || canvas.width / 2,
        y: y || canvas.height - 50,
        dx: dx || speed * (Math.random() > 0.5 ? 1 : -1) * 0.7,
        dy: dy || -speed,
        radius: 7,
        speed: speed || 5,
        attached: !dx && !dy,
        trail: []
    };
}

// Bricks
let bricks = [];
const BRICK_ROWS = 6;
const BRICK_COLS = 10;
const BRICK_WIDTH = 70;
const BRICK_HEIGHT = 20;
const BRICK_PADDING = 4;
const BRICK_OFFSET_TOP = 50;
const BRICK_OFFSET_LEFT = (canvas.width - (BRICK_COLS * (BRICK_WIDTH + BRICK_PADDING) - BRICK_PADDING)) / 2;

const brickColors = [
    { fill: '#ff4444', stroke: '#ff6666', points: 10, row: 1 },
    { fill: '#ff8844', stroke: '#ffaa66', points: 15, row: 2 },
    { fill: '#ffcc00', stroke: '#ffdd44', points: 20, row: 3 },
    { fill: '#44cc44', stroke: '#66ee66', points: 25, row: 4 },
    { fill: '#4488ff', stroke: '#66aaff', points: 30, row: 5 },
    { fill: '#aa44ff', stroke: '#cc66ff', points: 35, row: 6 },
];

function createBricks() {
    bricks = [];
    const rows = Math.min(BRICK_ROWS + Math.floor((level - 1) / 2), 8);
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            let hp = 1;
            if (level >= 3 && r < 2) hp = 2;
            if (level >= 5 && r < 1) hp = 3;

            const colorIdx = Math.min(r, brickColors.length - 1);
            bricks.push({
                x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + BRICK_PADDING),
                y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + BRICK_PADDING),
                width: BRICK_WIDTH,
                height: BRICK_HEIGHT,
                color: brickColors[colorIdx].fill,
                stroke: brickColors[colorIdx].stroke,
                points: brickColors[colorIdx].points + (level - 1) * 2,
                alive: true,
                hp: hp,
                maxHp: hp,
                row: r
            });
        }
    }
}

// Power-ups
let powerups = [];
const POWERUP_TYPES = ['multi', 'wide', 'laser', 'slow'];
const POWERUP_COLORS = {
    multi: '#ff66ff',
    wide: '#66ff66',
    laser: '#ffff44',
    slow: '#44ffff'
};
const POWERUP_SYMBOLS = {
    multi: '×3',
    wide: '↔',
    laser: '↑',
    slow: '⏱'
};

let activePowerups = {
    wide: 0,
    laser: 0,
    slow: 0
};

// Lasers
let lasers = [];

// Particles
let particles = [];

// Input
const keys = {};
let mouseX = canvas.width / 2;
let mouseActive = false;

document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Escape') {
        if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
        else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
    }
    if (e.code === 'Space' || e.code === 'Enter') {
        if (gameState === STATE.MENU) {
            initAudio();
            startGame();
        } else if (gameState === STATE.GAMEOVER) {
            resetGame();
            startGame();
        } else if (gameState === STATE.PLAYING) {
            balls.forEach(b => { if (b.attached) b.attached = false; });
        }
    }
    e.preventDefault();
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouseActive = true;
});

canvas.addEventListener('click', () => {
    initAudio();
    if (gameState === STATE.MENU) {
        startGame();
    } else if (gameState === STATE.GAMEOVER) {
        resetGame();
        startGame();
    } else if (gameState === STATE.PLAYING) {
        balls.forEach(b => { if (b.attached) b.attached = false; });
    }
});

function startGame() {
    gameState = STATE.PLAYING;
    createBricks();
    balls = [createBall(null, null, null, null, getBallSpeed())];
    powerups = [];
    lasers = [];
    particles = [];
    activePowerups = { wide: 0, laser: 0, slow: 0 };
    paddle.width = paddle.baseWidth;
    paddle.x = canvas.width / 2 - paddle.width / 2;
}

function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
}

function getBallSpeed() {
    return 4.5 + level * 0.5;
}

function spawnPowerup(x, y) {
    if (Math.random() > 0.25) return;
    const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    powerups.push({
        x: x,
        y: y,
        width: 30,
        height: 16,
        dy: 2,
        type: type,
        color: POWERUP_COLORS[type],
        symbol: POWERUP_SYMBOLS[type],
        time: 0
    });
}

function applyPowerup(type) {
    playSound('powerup');
    switch(type) {
        case 'multi':
            const currentBalls = balls.filter(b => !b.attached);
            if (currentBalls.length > 0) {
                const src = currentBalls[0];
                for (let i = 0; i < 2; i++) {
                    const angle = Math.random() * Math.PI * 0.4 + Math.PI * 0.8;
                    balls.push(createBall(
                        src.x, src.y,
                        Math.cos(angle) * src.speed,
                        Math.sin(angle) * src.speed,
                        src.speed
                    ));
                }
            }
            showFloatingText('MULTI BALL!', canvas.width / 2, canvas.height / 2, '#ff66ff');
            break;
        case 'wide':
            paddle.width = paddle.baseWidth * 1.8;
            activePowerups.wide = 600;
            showFloatingText('WIDE PADDLE!', canvas.width / 2, canvas.height / 2, '#66ff66');
            break;
        case 'laser':
            activePowerups.laser = 480;
            showFloatingText('LASER!', canvas.width / 2, canvas.height / 2, '#ffff44');
            break;
        case 'slow':
            balls.forEach(b => {
                const mag = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                if (mag > 0) {
                    b.dx = (b.dx / mag) * b.speed * 0.6;
                    b.dy = (b.dy / mag) * b.speed * 0.6;
                }
            });
            activePowerups.slow = 360;
            showFloatingText('SLOW BALL!', canvas.width / 2, canvas.height / 2, '#44ffff');
            break;
    }
}

let floatingTexts = [];
function showFloatingText(text, x, y, color) {
    floatingTexts.push({ text, x, y, color, alpha: 1, dy: -1.5, life: 60 });
}

// Particle system
function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
            x: x,
            y: y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            radius: Math.random() * 3 + 1,
            color: color,
            alpha: 1,
            life: 30 + Math.random() * 20
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.05;
        p.life--;
        p.alpha = p.life / 50;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

// Collision detection
function rectCollision(bx, by, br, rx, ry, rw, rh) {
    const closestX = Math.max(rx, Math.min(bx, rx + rw));
    const closestY = Math.max(ry, Math.min(by, ry + rh));
    const dx = bx - closestX;
    const dy = by - closestY;
    return (dx * dx + dy * dy) < (br * br);
}

function update() {
    if (gameState !== STATE.PLAYING) return;

    // Paddle movement
    if (mouseActive) {
        paddle.x = mouseX - paddle.width / 2;
    }
    if (keys['ArrowLeft'] || keys['KeyA']) {
        paddle.x -= paddle.speed;
        mouseActive = false;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        paddle.x += paddle.speed;
        mouseActive = false;
    }
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

    // Laser powerup
    if (activePowerups.laser > 0) {
        activePowerups.laser--;
        if (activePowerups.laser === 0) {
            lasers = [];
        }
        if (activePowerups.laser % 12 === 0 || lasers.length === 0) {
            lasers.push({
                x: paddle.x + paddle.width / 2 - 2,
                y: paddle.y - 5,
                width: 4,
                height: 12,
                dy: -7
            });
        }
    }

    // Update lasers
    for (let i = lasers.length - 1; i >= 0; i--) {
        const l = lasers[i];
        l.y += l.dy;
        if (l.y < -20) { lasers.splice(i, 1); continue; }

        for (let j = bricks.length - 1; j >= 0; j--) {
            const b = bricks[j];
            if (b.alive && rectCollision(l.x + l.width/2, l.y, 3, b.x, b.y, b.width, b.height)) {
                b.hp--;
                if (b.hp <= 0) {
                    b.alive = false;
                    score += b.points;
                    createParticles(b.x + b.width/2, b.y + b.height/2, b.color, 12);
                    spawnPowerup(b.x + b.width/2, b.y + b.height/2);
                } else {
                    createParticles(b.x + b.width/2, b.y + b.height/2, '#ffffff', 4);
                }
                playSound('brick');
                lasers.splice(i, 1);
                break;
            }
        }
    }

    // Update balls
    for (let i = balls.length - 1; i >= 0; i--) {
        const ball = balls[i];

        if (ball.attached) {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius - 1;
            continue;
        }

        // Trail
        ball.trail.push({ x: ball.x, y: ball.y });
        if (ball.trail.length > 8) ball.trail.shift();

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collisions
        if (ball.x - ball.radius <= 0) {
            ball.x = ball.radius;
            ball.dx = Math.abs(ball.dx);
            playSound('hit');
        }
        if (ball.x + ball.radius >= canvas.width) {
            ball.x = canvas.width - ball.radius;
            ball.dx = -Math.abs(ball.dx);
            playSound('hit');
        }
        if (ball.y - ball.radius <= 0) {
            ball.y = ball.radius;
            ball.dy = Math.abs(ball.dy);
            playSound('hit');
        }

        // Bottom - lose ball
        if (ball.y + ball.radius > canvas.height) {
            balls.splice(i, 1);
            if (balls.length === 0) {
                lives--;
                playSound('lose');
                if (lives <= 0) {
                    gameState = STATE.GAMEOVER;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('breakoutHighScore', highScore);
                    }
                    playSound('gameover');
                } else {
                    balls = [createBall(null, null, null, null, getBallSpeed())];
                }
            }
            continue;
        }

        // Paddle collision
        if (rectCollision(ball.x, ball.y, ball.radius, paddle.x, paddle.y, paddle.width, paddle.height)) {
            if (ball.dy > 0) {
                const hitPos = (ball.x - paddle.x) / paddle.width;
                const angle = (hitPos - 0.5) * Math.PI * 0.7;
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                ball.dx = Math.sin(angle) * speed;
                ball.dy = -Math.cos(angle) * speed;
                ball.y = paddle.y - ball.radius - 1;
                playSound('paddle');
            }
        }

        // Brick collision
        for (let j = bricks.length - 1; j >= 0; j--) {
            const brick = bricks[j];
            if (!brick.alive) continue;

            if (rectCollision(ball.x, ball.y, ball.radius, brick.x, brick.y, brick.width, brick.height)) {
                brick.hp--;

                // Determine bounce direction
                const overlapLeft = (ball.x + ball.radius) - brick.x;
                const overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
                const overlapTop = (ball.y + ball.radius) - brick.y;
                const overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);

                const minOverlapX = Math.min(overlapLeft, overlapRight);
                const minOverlapY = Math.min(overlapTop, overlapBottom);

                if (minOverlapX < minOverlapY) {
                    ball.dx = -ball.dx;
                } else {
                    ball.dy = -ball.dy;
                }

                if (brick.hp <= 0) {
                    brick.alive = false;
                    score += brick.points;
                    createParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color, 15);
                    spawnPowerup(brick.x + brick.width/2, brick.y + brick.height/2);
                } else {
                    createParticles(brick.x + brick.width/2, brick.y + brick.height/2, '#ffffff', 5);
                }

                playSound('brick');
                break;
            }
        }
    }

    // Update powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
        const pu = powerups[i];
        pu.y += pu.dy;
        pu.time++;

        if (pu.y > canvas.height + 20) {
            powerups.splice(i, 1);
            continue;
        }

        if (rectCollision(pu.x, pu.y, pu.width/2, paddle.x, paddle.y, paddle.width, paddle.height)) {
            applyPowerup(pu.type);
            powerups.splice(i, 1);
        }
    }

    // Update floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y += ft.dy;
        ft.life--;
        ft.alpha = ft.life / 60;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }

    updateParticles();

    // Check level complete
    if (bricks.every(b => !b.alive)) {
        level++;
        playSound('levelup');
        showFloatingText('LEVEL ' + level + '!', canvas.width / 2, canvas.height / 2, '#ffffff');
        createBricks();
        balls = [createBall(null, null, null, null, getBallSpeed())];
        powerups = [];
        lasers = [];
    }
}

function draw() {
    // Background
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#0a0a2e');
    gradient.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    if (gameState === STATE.MENU) {
        drawMenu();
        return;
    }

    if (gameState === STATE.GAMEOVER) {
        drawGameElements();
        drawGameOver();
        return;
    }

    if (gameState === STATE.PAUSED) {
        drawGameElements();
        drawPause();
        return;
    }

    if (gameState === STATE.LEVELUP) {
        drawGameElements();
        return;
    }

    drawGameElements();
}

function drawGameElements() {
    // Bricks
    bricks.forEach(brick => {
        if (!brick.alive) return;
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);

        // Highlight
        const hlGrad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
        hlGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
        hlGrad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
        hlGrad.addColorStop(1, 'rgba(0,0,0,0.2)');
        ctx.fillStyle = hlGrad;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);

        ctx.strokeStyle = brick.stroke;
        ctx.lineWidth = 1;
        ctx.strokeRect(brick.x + 0.5, brick.y + 0.5, brick.width - 1, brick.height - 1);

        // HP indicator for multi-hit bricks
        if (brick.maxHp > 1) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(brick.hp, brick.x + brick.width/2, brick.y + brick.height/2);
        }
    });

    // Powerups
    powerups.forEach(pu => {
        const bob = Math.sin(pu.time * 0.1) * 2;
        ctx.fillStyle = pu.color;
        ctx.shadowColor = pu.color;
        ctx.shadowBlur = 10;
        ctx.fillRect(pu.x - pu.width/2, pu.y - pu.height/2 + bob, pu.width, pu.height);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pu.symbol, pu.x, pu.y + bob);
    });

    // Lasers
    lasers.forEach(l => {
        ctx.fillStyle = '#ffff44';
        ctx.shadowColor = '#ffff44';
        ctx.shadowBlur = 8;
        ctx.fillRect(l.x, l.y, l.width, l.height);
        ctx.shadowBlur = 0;
    });

    // Balls
    balls.forEach(ball => {
        // Trail
        ball.trail.forEach((t, idx) => {
            const alpha = (idx / ball.trail.length) * 0.3;
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, ball.radius * (idx / ball.trail.length), 0, Math.PI * 2);
            ctx.fill();
        });

        // Ball glow
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout - Arkanoid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Courier New', monospace;
}
canvas {
border: 2px solid #333;
cursor: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// Audio context
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(frequency, duration, type = 'square', volume = 0.15) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playHitBrick(score) {
    playSound(400 + score * 50, 0.1, 'square', 0.12);
}
function playHitPaddle() {
    playSound(300, 0.15, 'triangle', 0.15);
}
function playLoseLife() {
    playSound(150, 0.5, 'sawtooth', 0.2);
    setTimeout(() => playSound(100, 0.5, 'sawtooth', 0.15), 200);
}
function playPowerUp() {
    playSound(600, 0.1, 'sine', 0.12);
    setTimeout(() => playSound(800, 0.1, 'sine', 0.12), 100);
    setTimeout(() => playSound(1000, 0.15, 'sine', 0.12), 200);
}
function playLevelUp() {
    playSound(500, 0.15, 'square', 0.12);
    setTimeout(() => playSound(700, 0.15, 'square', 0.12), 150);
    setTimeout(() => playSound(900, 0.15, 'square', 0.12), 300);
    setTimeout(() => playSound(1200, 0.3, 'square', 0.12), 450);
}
function playGameOver() {
    playSound(400, 0.3, 'sawtooth', 0.15);
    setTimeout(() => playSound(300, 0.3, 'sawtooth', 0.15), 300);
    setTimeout(() => playSound(200, 0.3, 'sawtooth', 0.15), 600);
    setTimeout(() => playSound(100, 0.8, 'sawtooth', 0.2), 900);
}
function playLaser() {
    playSound(1200, 0.08, 'square', 0.08);
}

// Game state
const STATE = { START: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEVELCOMPLETE: 4 };
let gameState = STATE.START;
let score = 0;
let lives = 3;
let level = 1;
let combo = 0;
let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;

// Paddle
const paddle = {
    width: 100,
    height: 15,
    x: 350,
    y: canvas.height - 40,
    speed: 8,
    targetX: 350,
    color: '#00ffcc',
    wideTimer: 0
};

// Ball
let balls = [];
let lasers = [];
let ballSpeed = 5;
const BASE_BALL_SPEED = 5;
const MAX_BALL_SPEED = 12;

function createBall(x, y, dx, dy, speed) {
    return {
        x: x || canvas.width / 2,
        y: y || canvas.height / 2,
        dx: dx || speed,
        dy: dy || -speed,
        radius: 7,
        speed: speed || BASE_BALL_SPEED,
        slowTimer: 0
    };
}

// Bricks
let bricks = [];
const BRICK_ROWS = 7;
const BRICK_COLS = 12;
const BRICK_WIDTH = 60;
const BRICK_HEIGHT = 22;
const BRICK_PADDING = 4;
const BRICK_OFFSET_TOP = 60;
const BRICK_OFFSET_LEFT = 20;

const BRICK_COLORS = [
    { fill: '#ff0044', points: 70 },
    { fill: '#ff4400', points: 60 },
    { fill: '#ff8800', points: 50 },
    { fill: '#ffcc00', points: 40 },
    { fill: '#44ff00', points: 30 },
    { fill: '#00ff88', points: 20 },
    { fill: '#00ccff', points: 10 }
];

// Power-ups
let powerUps = [];
const POWERUP_TYPES = ['multi-ball', 'wide-paddle', 'laser', 'slow'];
const POWERUP_COLORS = {
    'multi-ball': '#ff00ff',
    'wide-paddle': '#00ff88',
    'laser': '#ff0000',
    'slow': '#0088ff'
};
const POWERUP_LABELS = {
    'multi-ball': 'M',
    'wide-paddle': 'W',
    'laser': 'L',
    'slow': 'S'
};

// Particles
let particles = [];

// Input
let keys = {};
let mouseX = canvas.width / 2;
let useMouseControl = true;

document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Escape') {
        if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
        else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
    }
    if (e.code === 'Space') {
        if (gameState === STATE.START) { initAudio(); startGame(); }
        else if (gameState === STATE.GAMEOVER) { initAudio(); startGame(); }
        else if (gameState === STATE.LEVELCOMPLETE) { nextLevel(); }
    }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') useMouseControl = false;
});
document.addEventListener('keyup', (e) => { keys[e.code] = false; });
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    useMouseControl = true;
});
canvas.addEventListener('click', () => {
    initAudio();
    if (gameState === STATE.START) startGame();
    else if (gameState === STATE.GAMEOVER) startGame();
    else if (gameState === STATE.LEVELCOMPLETE) nextLevel();
});

// Initialize bricks for current level
function initBricks() {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            let hp = 1;
            // Higher levels: some bricks need multiple hits
            if (level > 1 && r < 2 && Math.random() < 0.3) hp = 2;
            if (level > 2 && r < 1 && Math.random() < 0.2) hp = 3;

            bricks.push({
                x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + BRICK_PADDING),
                y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + BRICK_PADDING),
                width: BRICK_WIDTH,
                height: BRICK_HEIGHT,
                hp: hp,
                maxHp: hp,
                row: r,
                color: BRICK_COLORS[r].fill,
                points: BRICK_COLORS[r].points,
                alive: true
            });
        }
    }
}

function startGame() {
    gameState = STATE.PLAYING;
    score = 0;
    lives = 3;
    level = 1;
    combo = 0;
    ballSpeed = BASE_BALL_SPEED;
    initBricks();
    resetPaddle();
    spawnBall();
    powerUps = [];
    lasers = [];
    particles = [];
    paddle.wideTimer = 0;
}

function resetPaddle() {
    paddle.width = 100;
    paddle.x = canvas.width / 2 - paddle.width / 2;
    paddle.y = canvas.height - 40;
    paddle.wideTimer = 0;
}

function spawnBall() {
    balls = [createBall(canvas.width / 2, canvas.height - 60, (Math.random() - 0.5) * 4, -ballSpeed, ballSpeed)];
    lasers = [];
}

function nextLevel() {
    level++;
    ballSpeed = Math.min(BASE_BALL_SPEED + (level - 1) * 0.5, MAX_BALL_SPEED);
    initBricks();
    resetPaddle();
    spawnBall();
    powerUps = [];
    lasers = [];
    particles = [];
    paddle.wideTimer = 0;
    gameState = STATE.PLAYING;
    playLevelUp();
}

// Power-up spawning
const POWERUP_CHANCE = 0.15;
function maybeDropPowerUp(x, y) {
    if (Math.random() < POWERUP_CHANCE) {
        const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        powerUps.push({
            x: x,
            y: y,
            width: 28,
            height: 28,
            dy: 2,
            type: type,
            timer: 0
        });
    }
}

function applyPowerUp(type) {
    playPowerUp();
    switch (type) {
        case 'multi-ball':
            if (balls.length > 0) {
                const b = balls[0];
                balls.push(createBall(b.x, b.y, b.dx + 2, b.dy, b.speed));
                balls.push(createBall(b.x, b.y, b.dx - 2, b.dy, b.speed));
            }
            break;
        case 'wide-paddle':
            paddle.width = 160;
            paddle.wideTimer = 600;
            break;
        case 'laser':
            paddle.lasers = 3;
            break;
        case 'slow':
            balls.forEach(b => { b.slowTimer = 300; });
            break;
    }
}

// Particles
function createParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
            x: x,
            y: y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            size: 2 + Math.random() * 3,
            color: color,
            alpha: 1
        });
    }
}

function createExplosionParticles(x, y, color) {
    for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 5;
        particles.push({
            x: x,
            y: y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 20 + Math.random() * 30,
            maxLife: 50,
            size: 1 + Math.random() * 4,
            color: color,
            alpha: 1
        });
    }
}

// Shooting
function shootLaser() {
    if (paddle.lasers > 0) {
        paddle.lasers--;
        lasers.push({ x: paddle.x + paddle.width / 2 - 2, y: paddle.y, width: 4, height: 12, speed: 8 });
        lasers.push({ x: paddle.x + paddle.width / 4 - 2, y: paddle.y, width: 4, height: 12, speed: 8 });
        playLaser();
    }
}

// Collision detection
function rectCollision(bx, by, br, rx, ry, rw, rh) {
    return bx + br > rx && bx - br < rx + rw && by + br > ry && by - br < ry + rh;
}

function ballBrickCollision(ball, brick) {
    if (!brick.alive) return false;
    const closestX = Math.max(brick.x, Math.min(ball.x, brick.x + brick.width));
    const closestY = Math.max(brick.y, Math.min(ball.y, brick.y + brick.height));
    const dx = ball.x - closestX;
    const dy = ball.y - closestY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < ball.radius;
}

// Update
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60;
let frameCount = 0;

function update() {
    frameCount++;

    // Paddle movement
    if (useMouseControl) {
        paddle.targetX = mouseX - paddle.width / 2;
        paddle.x += (paddle.targetX - paddle.x) * 0.35;
    } else {
        if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= paddle.speed;
        if (keys['ArrowRight'] || keys['KeyD']) paddle.x += paddle.speed;
    }
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

    // Paddle timers
    if (paddle.wideTimer > 0) {
        paddle.wideTimer--;
        if (paddle.wideTimer <= 0) paddle.width = 100;
    }
    if (paddle.lasers > 0) paddle.lasers -= 0; // handled in shoot

    // Balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
        const ball = balls[bi];

        if (ball.slowTimer > 0) {
            ball.slowTimer--;
            if (ball.slowTimer <= 0) {
                // Restore speed
                const currentSpeed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                if (currentSpeed < ball.speed) {
                    const ratio = ball.speed / currentSpeed;
                    ball.dx *= ratio;
                    ball.dy *= ratio;
                }
            }
        }

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collisions
        if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.dx = Math.abs(ball.dx); playHitPaddle(); }
        if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.dx = -Math.abs(ball.dx); playHitPaddle(); }
        if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.dy = Math.abs(ball.dy); playHitPaddle(); }

        // Bottom - lose ball
        if (ball.y + ball.radius > canvas.height) {
            balls.splice(bi, 1);
            if (balls.length === 0) {
                lives--;
                combo = 0;
                if (lives <= 0) {
                    gameState = STATE.GAMEOVER;
                    playGameOver();
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('breakoutHighScore', highScore);
                    }
                } else {
                    playLoseLife();
                    spawnBall();
                }
            }
            continue;
        }

        // Paddle collision
        if (ball.dy > 0 &&
            ball.y + ball.radius > paddle.y &&
            ball.y + ball.radius < paddle.y + paddle.height + 10 &&
            ball.x > paddle.x &&
            ball.x < paddle.x + paddle.width) {

            // Calculate bounce angle based on hit position
            const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
            const clampedHit = Math.max(-1, Math.min(1, hitPos));
            const maxAngle = Math.PI / 3; // 60 degrees
            const angle = clampedHit * maxAngle;

            const currentSpeed = ball.speed;
            ball.dx = Math.sin(angle) * currentSpeed;
            ball.dy = -Math.cos(angle) * currentSpeed;
            ball.y = paddle.y - ball.radius;

            playHitPaddle();
            createParticles(ball.x, ball.y, '#00ffcc', 5);
            combo = 0;
        }

        // Brick collision
        for (let brick of bricks) {
            if (!brick.alive) continue;
            if (ballBrickCollision(ball, brick)) {
                brick.hp--;
                if (brick.hp <= 0) {
                    brick.alive = false;
                    combo++;
                    const comboMultiplier = Math.min(combo, 10);
                    score += brick.points * comboMultiplier;
                    createExplosionParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);
                    maybeDropPowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2);
                    playHitBrick(brick.points);
                } else {
                    createParticles(ball.x, ball.y, brick.color, 6);
                    playSound(200, 0.05, 'square', 0.08);
                }

                // Determine collision side
                const bcx = brick.x + brick.width / 2;
                const bcy = brick.y + brick.height / 2;
                const ballDx = ball.x - bcx;
                const ballDy = ball.y - bcy;

                if (Math.abs(ballDx / brick.width) > Math.abs(ballDy / brick.height)) {
                    ball.dx = Math.abs(ball.dx) * Math.sign(ballDx);
                } else {
                    ball.dy = Math.abs(ball.dy) * Math.sign(ballDy);
                }
                break;
            }
        }
    }

    // Lasers
    for (let li = lasers.length - 1; li >= 0; li--) {
        const laser = lasers[li];
        laser.y -= laser.speed;
        if (laser.y < 0) { lasers.splice(li, 1); continue; }

        for (let brick of bricks) {
            if (!brick.alive) continue;
            if (laser.x < brick.x + brick.width &&
                laser.x + laser.width > brick.x &&
                laser.y < brick.y + brick.height &&
                laser.y + laser.height > brick.y) {
                brick.hp--;
                if (brick.hp <= 0) {
                    brick.alive = false;
                    score += brick.points;
                    createExplosionParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);
                    maybeDropPowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2);
                    playHitBrick(brick.points);
                }
                createParticles(laser.x, laser.y, '#ff0000', 5);
                lasers.splice(li, 1);
                break;
            }
        }
    }

    // Power-ups
    for (let pi = powerUps.length - 1; pi >= 0; pi--) {
        const pu = powerUps[pi];
        pu.y += pu.dy;
        pu.timer++;

        if (pu.y > canvas.height) {
            powerUps.splice(pi, 1);
            continue;
        }

        // Paddle catch
        if (pu.y + pu.height > paddle.y &&
            pu.y < paddle.y + paddle.height &&
            pu.x + pu.width / 2 > paddle.x &&
            pu.x - pu.width / 2 < paddle.x + paddle.width) {
            applyPowerUp(pu.type);
            createParticles(pu.x, pu.y, POWERUP_COLORS[pu.type], 10);
            powerUps.splice(pi, 1);
            continue;
        }
    }

    // Particles
    for (let pi = particles.length - 1; pi >= 0; pi--) {
        const p = particles[pi];
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.08; // gravity
        p.life--;
        p.alpha = p.life / p.maxLife;
        if (p.life <= 0) particles.splice(pi, 1);
    }

    // Check level complete
    if (bricks.every(b => !b.alive)) {
        gameState = STATE.LEVELCOMPLETE;
        playLevelUp();
    }
}

// Draw
function draw() {
    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    if (gameState === STATE.START) {
        drawStartScreen();
        return;
    }

    // Bricks
    for (let brick of bricks) {
        if (!brick.alive) continue;
        const alpha = brick.hp > 1 ? 0.6 + (brick.hp / brick.maxHp) * 0.4 : 1;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);

        // Brick highlight
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height / 3);

        // Border
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);

        // HP indicator for multi-hit bricks
        if (brick.maxHp > 1) {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(brick.hp, brick.x + brick.width / 2, brick.y + brick.height / 2);
        }
        ctx.globalAlpha = 1;
    }

    // Paddle
    const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
    paddleGrad.addColorStop(0, '#00ffdd');
    paddleGrad.addColorStop(1, '#0088aa');
    ctx.fillStyle = paddleGrad;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();

    // Paddle glow
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 10;
    ctx.fillStyle = 'rgba(0,255,200,0.1)';
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.shadowBlur = 0;

    // Paddle laser indicator
    if (paddle.lasers > 0) {
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 11px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('⚡×' + paddle.lasers, paddle.x + paddle.width / 2, paddle.y - 5);
    }

    // Balls
    for (let ball of balls) {
        // Ball trail
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.radius);
        ballGrad.addColorStop(0, '#ffffff');
        ballGrad.addColorStop(0.5, ball.slowTimer > 0 ? '#4488ff' : '#ffcc00');
        ballGrad.addColorStop(1, ball.slowTimer > 0 ? '#0044aa' : '#ff8800');
        ctx.fillStyle = ballGrad;
        ctx.fill();

        // Ball glow
        ctx.shadowColor = ball.slowTimer > 0 ? '#0088ff' : '#ffcc00';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Lasers
    for (let laser of lasers) {
        const laserGrad = ctx.createLinearGradient(laser.x, laser.y, laser.x, laser.y + laser.height);
        laserGrad.addColorStop(0, '#ff0044');
        laserGrad.addColorStop(1, '#ff0000');
        ctx.fillStyle = laserGrad;
        ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Power-ups
    for (let pu of powerUps) {
        const pulse = 1 + Math.sin(pu.timer * 0.1) * 0.1;
        ctx.save();
        ctx.translate(pu.x, pu.y);
        ctx.scale(pulse, pulse);

        // Glow
        ctx.shadowColor = POWERUP_COLORS[pu.type];
        ctx.shadowBlur = 12;

        // Background
        ctx.fillStyle = POWERUP_COLORS[pu.type];
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(0, 0, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Icon
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Courier New';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(POWERUP_LABELS[pu.type], 0, 0);

        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // Particles
    for (let p of particles) {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // HUD
    drawHUD();

    // Overlays
    if (gameState === STATE.PAUSED) drawPauseScreen();
    if (gameState === STATE.GAMEOVER) drawGameOverScreen();
    if (gameState === STATE.LEVELCOMPLETE) drawLevelCompleteScreen();
}

function drawHUD() {
    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE: ' + score, 15, 28);

    // High score
    ctx.fillStyle = '#888';
    ctx.font = '12px Courier New';
    ctx.fillText('HI: ' + highScore, 15, 45);

    // Level
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + level, canvas.width / 2, 28);

    // Lives
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ff4444';
    ctx.font = '16px Courier New';
    let livesText = '';
    for (let i = 0; i < lives; i++) livesText += '♥ ';
    ctx.fillText(livesText, canvas.width - 15, 28);

    // Combo
    if (combo > 1) {
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 14px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('COMBO x' + Math.min(combo, 10), canvas.width / 2, 48);
    }
}

function drawStartScreen() {
    // Title
    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('BREAKOUT', canvas.width / 2, 160);

    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 24px Courier New';
    ctx.fillText('ARKANOID', canvas.width / 2, 195);

    // Decorative bricks
    const demoColors = ['#ff0044', '#ff8800', '#ffcc00', '#44ff00', '#00ff88', '#00ccff', '#8844ff'];
    for (let i = 0; i < 7; i++) {
        ctx.fillStyle = demoColors[i];
        ctx.fillRect(canvas.width / 2 - 210 + i * 60, 220, 50, 20);
    }

    // Instructions
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Courier New';
    const instructions = [
        'MOUSE or ARROW KEYS to move paddle',
        'CLICK or SPACE to start',
        '',
        'POWER-UPS:',
        '  M = Multi-Ball   W = Wide Paddle',
        '  L = Laser Shots  S = Slow Ball',
        '',
        'ESC to pause',
        'Clear all bricks to advance!'
    ];
    instructions.forEach((line, i) => {
        ctx.fillStyle = line.includes('POWER') ? '#ffcc00' : '#cccccc';
        ctx.fillText(line, canvas.width / 2, 290 + i * 24);
    });

    // High score
    if (highScore > 0) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 16px Courier New';
        ctx.fillText('HIGH SCORE: ' + highScore, canvas.width / 2, 520);
    }

    // Blinking start text
    if (Math.sin(Date.now() / 300) > 0) {
        ctx.fillStyle = '#00ffcc';
        ctx.font = 'bold 20px Courier New';
        ctx.fillText('CLICK OR PRESS SPACE TO START', canvas.width / 2, 570);
    }
}

function drawPauseScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 42px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 20);

    ctx.fillStyle = '#cccccc';
    ctx.font = '16px Courier New';
    ctx.fillText('Press ESC to resume', canvas.width / 2, canvas.height / 2 + 20);
}

function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ff0044';
    ctx.font = 'bold 52px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);

    ctx.fillStyle = '#ffffff';
    ctx.font = '22px Courier New';
    ctx.fillText('FINAL SCORE: ' + score, canvas.width / 2, canvas.height / 2 + 10);

    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 18px Courier New';
        ctx.fillText('★ NEW HIGH SCORE! ★', canvas.width / 2, canvas.height / 2 + 45);
    }

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout - Arkanoid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Segoe UI', Arial, sans-serif;
}
canvas {
display: block;
border: 2px solid #333;
cursor: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 600;

// Audio Context
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, type, duration, volume = 0.3) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playSoundMulti(freqs, type, duration) {
    if (!audioCtx) return;
    freqs.forEach((f, i) => setTimeout(() => playSound(f, type, duration, 0.2), i * 50));
}

function soundBrickBreak() { playSound(520, 'square', 0.1, 0.2); playSound(780, 'square', 0.15, 0.15); }
function soundPaddleHit() { playSound(220, 'triangle', 0.1, 0.3); }
function soundWallHit() { playSound(180, 'sine', 0.08, 0.2); }
function soundLoseLife() { playSound(150, 'sawtooth', 0.3, 0.3); playSound(100, 'sawtooth', 0.5, 0.2); }
function soundPowerUp() { playSoundMulti([400, 600, 800], 'sine', 0.3); }
function soundLevelUp() { playSoundMulti([523, 659, 784, 1047], 'square', 0.2); }
function soundGameOver() { playSoundMulti([300, 250, 200, 150], 'sawtooth', 0.4); }
function soundVictory() { playSoundMulti([523, 659, 784, 1047, 1319], 'square', 0.25); }
function soundLaser() { playSound(900, 'sawtooth', 0.15, 0.15); }

// Game State
const STATE = { START: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEVELCOMPLETE: 4, WIN: 5 };
let gameState = STATE.START;
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;

// Paddle
const paddle = {
    width: 100,
    height: 15,
    x: 350,
    y: canvas.height - 40,
    speed: 7,
    baseWidth: 100,
    color: '#00ffcc',
    glowColor: 'rgba(0,255,204,0.4)',
    wideTimer: 0
};

// Ball
let balls = [];
let lasers = [];
let particles = [];
let powerUps = [];
let bricks = [];
let screenShake = 0;
let comboCount = 0;
let comboTimer = 0;

function createBall(x, y, dx, dy) {
    return {
        x: x || canvas.width / 2,
        y: y || paddle.y - 12,
        radius: 7,
        dx: dx || 4 * (Math.random() > 0.5 ? 1 : -1),
        dy: dy || -4,
        speed: 5,
        attached: dx === undefined && dy === undefined,
        color: '#ffffff',
        trail: []
    };
}

function initBalls() {
    balls = [createBall()];
}

// Bricks
const BRICK_ROWS = 7;
const BRICK_COLS = 12;
const BRICK_WIDTH = 60;
const BRICK_HEIGHT = 22;
const BRICK_PADDING = 4;
const BRICK_OFFSET_TOP = 60;
const BRICK_OFFSET_LEFT = (canvas.width - (BRICK_COLS * (BRICK_WIDTH + BRICK_PADDING) - BRICK_PADDING)) / 2;

const BRICK_COLORS = [
    { fill: '#ff4444', glow: '#ff444466', points: 70 },
    { fill: '#ff8844', glow: '#ff884466', points: 60 },
    { fill: '#ffcc00', glow: '#ffcc0066', points: 50 },
    { fill: '#44ff44', glow: '#44ff4466', points: 40 },
    { fill: '#4488ff', glow: '#4488ff66', points: 30 },
    { fill: '#8844ff', glow: '#8844ff66', points: 20 },
    { fill: '#ff44aa', glow: '#ff44aa66', points: 10 },
    { fill: '#ff4444', glow: '#ff444466', points: 70 },
];

const BRICK_SHAPES = { NORMAL: 0, HARD: 1, UNBREAKABLE: 2 };

function createBricks() {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS + level - 1; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            let hp = 1;
            if (r < 2 && level > 1) hp = 2;
            let shape = BRICK_SHAPES.NORMAL;
            if (r === 0 && level > 2) shape = BRICK_SHAPES.HARD;
            if (r < 2 && c % 5 === 2 && level > 1) { hp = 3; shape = BRICK_SHAPES.UNBREAKABLE; }

            bricks.push({
                x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + BRICK_PADDING),
                y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + BRICK_PADDING),
                width: BRICK_WIDTH,
                height: BRICK_HEIGHT,
                color: BRICK_COLORS[r % BRICK_COLORS.length].fill,
                glow: BRICK_COLORS[r % BRICK_COLORS.length].glow,
                points: BRICK_COLORS[r % BRICK_COLORS.length].points,
                hp: hp,
                maxHp: hp,
                shape: shape,
                alive: true,
                shakeX: 0,
                shakeY: 0
            });
        }
    }
}

// Power-ups
const POWERUP_TYPES = {
    MULTI: { color: '#00ff88', symbol: '×', desc: 'Multi-Ball' },
    WIDE: { color: '#ffaa00', symbol: '↔', desc: 'Wide Paddle' },
    LASER: { color: '#ff4444', symbol: '↑', desc: 'Laser Shots' },
    SLOW: { color: '#4488ff', symbol: '⏱', desc: 'Slow Ball' },
    FIRE: { color: '#ff8800', symbol: '🔥', desc: 'Fire Ball' },
    LIFE: { color: '#ff44aa', symbol: '♥', desc: 'Extra Life' }
};

let activePowerUps = { laser: false, fire: false };
let laserTimer = 0;

function spawnPowerUp(x, y) {
    if (Math.random() > 0.20) return;
    const types = Object.keys(POWERUP_TYPES);
    const weights = [25, 25, 15, 20, 10, 5];
    let total = weights.reduce((a, b) => a + b, 0);
    let rand = Math.random() * total;
    let type = types[0];
    for (let i = 0; i < types.length; i++) {
        rand -= weights[i];
        if (rand <= 0) { type = types[i]; break; }
    }
    powerUps.push({
        x: x,
        y: y,
        width: 30,
        height: 18,
        dy: 2,
        type: type,
        time: 0
    });
}

function applyPowerUp(pu) {
    soundPowerUp();
    switch (pu.type) {
        case 'MULTI':
            let extraBalls = balls.filter(b => !b.attached).length;
            if (extraBalls > 0) {
                let b = balls.find(b => !b.attached);
                balls.push(createBall(b.x, b.y, -b.dx, b.dy));
                balls.push(createBall(b.x, b.y, b.dx, -b.dy));
            }
            break;
        case 'WIDE':
            paddle.width = paddle.baseWidth * 1.8;
            paddle.wideTimer = 600;
            break;
        case 'LASER':
            activePowerUps.laser = true;
            laserTimer = 600;
            break;
        case 'SLOW':
            balls.forEach(b => {
                let spd = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                b.dx *= 0.6;
                b.dy *= 0.6;
            });
            break;
        case 'FIRE':
            activePowerUps.fire = true;
            balls.forEach(b => b.color = '#ff6600');
            break;
        case 'LIFE':
            lives = Math.min(lives + 1, 5);
            break;
    }
}

// Particles
function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = 1 + Math.random() * 4;
        particles.push({
            x: x,
            y: y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.015 + Math.random() * 0.025,
            color: color,
            size: 2 + Math.random() * 4
        });
    }
}

function spawnBrickBreakParticles(brick) {
    for (let i = 0; i < 18; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = 1 + Math.random() * 5;
        particles.push({
            x: brick.x + brick.width / 2,
            y: brick.y + brick.height / 2,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.01 + Math.random() * 0.02,
            color: brick.color,
            size: 3 + Math.random() * 5,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
}

// Input
let mouseX = canvas.width / 2;
let keys = {};

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});

document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'Escape') {
        if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
        else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
    }
    if (e.key === ' ' || e.key === 'Enter') {
        if (gameState === STATE.START) { initAudio(); startGame(); }
        else if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) { resetGame(); }
        else if (gameState === STATE.LEVELCOMPLETE) { nextLevel(); }
        else if (gameState === STATE.PLAYING) {
            balls.forEach(b => { if (b.attached) { b.attached = false; b.dy = -b.speed; } });
        }
    }
    if (gameState === STATE.PLAYING && e.key === ' ') {
        balls.forEach(b => { if (b.attached) { b.attached = false; b.dy = -b.speed; } });
    }
});

document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Game Functions
function startGame() {
    gameState = STATE.PLAYING;
    score = 0;
    lives = 3;
    level = 1;
    initLevel();
}

function resetGame() {
    gameState = STATE.START;
    score = 0;
    lives = 3;
    level = 1;
    particles = [];
    powerUps = [];
    lasers = [];
    bricks = [];
    balls = [];
}

function initLevel() {
    paddle.width = paddle.baseWidth;
    paddle.wideTimer = 0;
    activePowerUps = { laser: false, fire: false };
    laserTimer = 0;
    powerUps = [];
    lasers = [];
    createBricks();
    initBalls();
    balls[0].attached = true;
    comboCount = 0;
    comboTimer = 0;
}

function nextLevel() {
    level++;
    initLevel();
    gameState = STATE.PLAYING;
    soundLevelUp();
}

function getBallSpeed() {
    return 4.5 + (level - 1) * 0.4;
}

// Update
function update() {
    if (gameState !== STATE.PLAYING) return;

    // Paddle movement
    if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
    if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;

    // Mouse control
    let targetX = mouseX - paddle.width / 2;
    paddle.x += (targetX - paddle.x) * 0.3;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

    // Timers
    if (paddle.wideTimer > 0) {
        paddle.wideTimer--;
        if (paddle.wideTimer === 0) paddle.width = paddle.baseWidth;
    }
    if (laserTimer > 0) {
        laserTimer--;
        if (laserTimer === 0) activePowerUps.laser = false;
    }
    if (comboTimer > 0) comboTimer--;
    else comboCount = 0;
    if (screenShake > 0) screenShake--;

    // Laser shooting
    if (activePowerUps.laser && keys[' ']) {
        if (lasers.length < 3 && Math.random() < 0.15) {
            balls.forEach(b => {
                if (!b.attached) {
                    lasers.push({ x: b.x, y: b.y, dy: -8, width: 3, height: 10, color: '#ff4444' });
                    soundLaser();
                }
            });
        }
    }

    // Balls
    let speed = getBallSpeed();
    let allAttached = true;

    balls.forEach(ball => {
        if (ball.attached) {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius;
            return;
        }
        allAttached = false;

        // Trail
        ball.trail.push({ x: ball.x, y: ball.y });
        if (ball.trail.length > 8) ball.trail.shift();

        let currentSpeed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        if (currentSpeed > 0) {
            let factor = speed / currentSpeed;
            ball.dx *= factor;
            ball.dy *= factor;
        }

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collisions
        if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.dx = Math.abs(ball.dx); soundWallHit(); }
        if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.dx = -Math.abs(ball.dx); soundWallHit(); }
        if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.dy = Math.abs(ball.dy); soundWallHit(); }

        // Paddle collision
        if (ball.dy > 0 &&
            ball.y + ball.radius >= paddle.y &&
            ball.y + ball.radius <= paddle.y + paddle.height + 5 &&
            ball.x >= paddle.x &&
            ball.x <= paddle.x + paddle.width) {

            let hitPos = (ball.x - paddle.x) / paddle.width;
            let angle = (hitPos - 0.5) * Math.PI * 0.7;
            let newSpeed = speed;
            ball.dx = newSpeed * Math.sin(angle);
            ball.dy = -newSpeed * Math.cos(angle);
            ball.y = paddle.y - ball.radius;
            soundPaddleHit();
            spawnParticles(ball.x, ball.y, '#00ffcc', 5);
        }

        // Bottom - lose ball
        if (ball.y - ball.radius > canvas.height) {
            ball.dead = true;
        }

        // Brick collisions
        bricks.forEach(brick => {
            if (!brick.alive) return;
            if (ball.x + ball.radius > brick.x &&
                ball.x - ball.radius < brick.x + brick.width &&
                ball.y + ball.radius > brick.y &&
                ball.y - ball.radius < brick.y + brick.height) {

                // Determine collision side
                let overlapLeft = (ball.x + ball.radius) - brick.x;
                let overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
                let overlapTop = (ball.y + ball.radius) - brick.y;
                let overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);

                let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                if (activePowerUps.fire && brick.shape !== BRICK_SHAPES.UNBREAKABLE) {
                    brick.hp = 0;
                    brick.alive = false;
                } else {
                    if (minOverlap === overlapTop || minOverlap === overlapBottom) ball.dy = -ball.dy;
                    else ball.dx = -ball.dx;
                }

                brick.hp--;
                if (brick.hp <= 0) {
                    brick.alive = false;
                    comboCount++;
                    comboTimer = 90;
                    let comboMult = Math.min(comboCount, 10);
                    let pts = brick.points * comboMult;
                    score += pts;
                    spawnBrickBreakParticles(brick);
                    soundBrickBreak();
                    spawnPowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2);
                    screenShake = 3;
                } else {
                    soundPaddleHit();
                    brick.shakeX = 3;
                    brick.shakeY = 3;
                }
            }
        });

        // Laser collisions
        lasers.forEach((laser, li) => {
            bricks.forEach(brick => {
                if (!brick.alive) return;
                if (laser.x > brick.x && laser.x < brick.x + brick.width &&
                    laser.y > brick.y && laser.y < brick.y + brick.height) {
                    brick.hp--;
                    if (brick.hp <= 0) {
                        brick.alive = false;
                        score += brick.points;
                        spawnBrickBreakParticles(brick);
                        soundBrickBreak();
                        spawnPowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2);
                    } else {
                        brick.shakeX = 3;
                    }
                    laser.dead = true;
                }
            });
        });
    });

    // Remove dead balls
    balls = balls.filter(b => !b.dead);
    if (balls.length === 0) {
        lives--;
        soundLoseLife();
        screenShake = 10;
        if (lives <= 0) {
            gameState = STATE.GAMEOVER;
            soundGameOver();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('breakoutHighScore', highScore);
            }
        } else {
            initBalls();
            balls[0].attached = true;
        }
    }

    // Update lasers
    lasers = lasers.filter(l => !l.dead);
    lasers.forEach(l => { l.y += l.dy; });
    lasers = lasers.filter(l => l.y > 0);

    // Update particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.1;
        p.life -= p.decay;
        if (p.rotation !== undefined) p.rotation += p.rotSpeed;
    });

    // Update power-ups
    powerUps = powerUps.filter(p => p.y < canvas.height);
    powerUps.forEach(pu => {
        pu.y += pu.dy;
        pu.time++;

        if (pu.y + pu.height >= paddle.y &&
            pu.y <= paddle.y + paddle.height &&
            pu.x + pu.width / 2 >= paddle.x &&
            pu.x - pu.width / 2 <= paddle.x + paddle.width) {
            applyPowerUp(pu);
            pu.dead = true;
        }
    });
    powerUps = powerUps.filter(p => !p.dead);

    // Update brick shakes
    bricks.forEach(b => {
        if (b.shakeX > 0) b.shakeX *= 0.5;
        if (b.shakeY > 0) b.shakeY *= 0.5;
    });

    // Level complete check
    if (bricks.every(b => !b.alive)) {
        if (level >= 5) {
            gameState = STATE.WIN;
            soundVictory();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('breakoutHighScore', highScore);
            }
        } else {
            gameState = STATE.LEVELCOMPLETE;
            soundLevelUp();
        }
    }
}

// Drawing
function drawPaddle() {
    ctx.save();
    let gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
    gradient.addColorStop(0, '#00ffcc');
    gradient.addColorStop(1, '#008877');
    ctx.fillStyle = gradient;
    ctx.shadowColor = activePowerUps.laser ? '#ff4444' : paddle.glowColor;
    ctx.shadowBlur = activePowerUps.laser ? 15 : 10;

    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();

    if (activePowerUps.laser) {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(paddle.x + 5, paddle.y - 5, 4, 8);
        ctx.fillRect(paddle.x + paddle.width - 9, paddle.y - 5, 4, 8);
    }
    ctx.restore();
}

function drawBall(ball) {
    // Trail
    ball.trail.forEach((t, i) => {
        let alpha = (i / ball.trail.length) * 0.3;
        ctx.fillStyle = ball.color === '#ff6600' ? `rgba(255,102,0,${alpha})` : `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.radius * (i / ball.trail.length), 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.save();
    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = ball.color;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(ball.x - 2, ball.y - 2, ball.radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawBricks() {
    bricks.forEach(brick => {
        if (!brick.alive) return;
        let x = brick.x + (brick.shakeX || 0);
        let y = brick.y + (brick.shakeY || 0);

        ctx.save();
        ctx.shadowColor = brick.glow;
        ctx.shadowBlur = 6;

        let gradient = ctx.createLinearGradient(x, y, x, y + brick.height);
        gradient.addColorStop(0, brick.color);
        gradient.addColorStop(1, shadeColor(brick.color, -30));
        ctx.fillStyle = gradient;

        if (brick.shape === BRICK_SHAPES.UNBREAKABLE) {
            ctx.fillStyle = '#888';
            ctx.shadowColor = '#888';
        }

        ctx.beginPath();
        ctx.roundRect(x, y, brick.width, brick.height, 4);
        ctx.fill();

        if (brick.shape === BRICK_SHAPES.UNBREAKABLE) {
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = '#aaa';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('★', x + brick.width / 2, y + brick.height / 2 + 4);
        }

        if (brick.hp > 1 && brick.shape !== BRICK_SHAPES.UNBREAKABLE) {
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(brick.hp, x + brick.width / 2, y + brick.height / 2 + 4);
        }

        ctx.restore();
    });
}

function drawParticles() {
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        if (p.rotation !== undefined) {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    });
}

function drawPowerUps() {
    powerUps.forEach(pu => {
        let info = POWERUP_TYPES[pu.type];
        ctx.save();
        ctx.shadowColor = info.color;
        ctx.shadowBlur = 8;

        let bob = Math.sin(pu.time * 0.1) * 3;

        ctx.fillStyle = info.color;
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.roundRect(pu.x - pu.width / 2, pu.y - pu.height / 2 + bob, pu.width, pu.height, 5);
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.fillStyle = info.color;
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(info.symbol, pu.x, pu.y + bob);

        ctx.restore();
    });
}

function drawLasers() {
    lasers.forEach(laser => {
        ctx.save();
        ctx.shadowColor = laser.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = laser.color;
        ctx.fillRect(laser.x - laser.width / 2, laser.y, laser.width, laser.height);
        ctx.fillStyle = '#fff';
        ctx.fillRect(laser.x - 1, laser.y, 2, laser.height);
        ctx.restore();
    });
}

function drawHUD() {
    ctx.save();

    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px "Segoe UI", Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score.toLocaleString()}`, 15, 30);

    // High Score
    ctx.fillStyle = '#888';
    ctx.font = '13px Arial';
    ctx.fillText(`Best: ${highScore.toLocaleString()}`, 15, 48);

    // Lives
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff44aa';
    ctx.font = '20px Arial';
    let livesText = '';
    for (let i = 0; i < lives; i++) livesText += '♥ ';
    ctx.fillText(livesText, canvas.width / 2, 30);

    // Level
    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 16px Arial';
    ctx.fillText(`Level ${level}`, canvas.width - 70, 30);

    // Combo
    if (comboCount > 1 && comboTimer > 0) {
        ctx.save();
        ctx.globalAlpha = comboTimer / 90;
        ctx.fillStyle = '#ffcc00';
        ctx.font = `bold ${20 + comboCount}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(`${comboCount}x COMBO!`, canvas.width / 2, 70);
        ctx.restore();
    }

    // Active power-up indicators
    let indicatorX = 15;
    if (activePowerUps.laser) {
        ctx.fillStyle = POWERUP_TYPES.LASER.color;
        ctx.font = '12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`🔫 Laser: ${Math.ceil(laserTimer / 60)}s`, indicatorX, canvas.height - 15);
        indicatorX += 120;
    }
    if (paddle.wideTimer > 0) {
        ctx.fillStyle = POWERUP_TYPES.WIDE.color;
        ctx.font = '12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`↔ Wide: ${Math.ceil(paddle.wideTimer / 60)}s`, indicatorX, canvas.height - 15);
    }

    ctx.restore();
}

function drawAttachedBall() {
    let ball = balls.find(b => b.attached);
    if (ball) {
        ctx.save();
        let pulse = Math.sin(Date.now() * 0.005) * 0.2 + 0.8;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// Screen overlays
function drawStartScreen() {
    ctx.save();

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Title
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 56px "Segoe UI", Arial';
    ctx.fillText('BREAKOUT', canvas.width / 2, 160);

    ctx.shadowBlur = 10;
    ctx.font = '18px Arial';
    ctx.fillStyle = '#88ffdd';
    ctx.fillText('An Arkanoid-Style Game', canvas.width / 2, 195);

    // Instructions
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Arial';
    let instructions = [
        '🖱️  Mouse or ← → Arrow Keys to move paddle',
        '🏓  Ball bounces based on where it hits the paddle',
        '🧱  Break all bricks to advance to the next level',
        '⚡  Collect power-ups for special abilities',
        '⏸️  Press ESC to pause',
        '🚀  Each level gets faster!'
    ];
    instructions.forEach((text, i) => {
        ctx.fillStyle = i < 2 ? '#cccccc' : '#999999';
        ctx.fillText(text, canvas.width / 2, 260 + i * 32);
    });

    // Power-up guide
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 16px Arial';
    ctx.fillText('⚡ Power-Ups ⚡', canvas.width / 2, 430);

    let puInfo = [
        ['× Multi-Ball', '#00ff88'],
        ['↔ Wide Paddle', '#ffaa00'],
        ['↑ Laser Shots', '#ff4444'],
        ['⏱ Slow Ball', '#4488ff'],
        ['♥ Extra Life', '#ff44aa']
    ];
    puInfo.forEach((info, i) => {
        ctx.fillStyle = info[1];
        ctx.font = '14px Arial';
        ctx.fillText(info[0], canvas.width / 2, 455 + i * 22);
    });

    // Start prompt
    let blink = Math.sin(Date.now() * 0.004) * 0.4 + 0.6;
    ctx.globalAlpha = blink;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px Arial';
    ctx.fillText('Press SPACE or ENTER to Start', canvas.width / 2, 570);

    if (highScore > 0) {
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#ffcc00';
        ctx.font = '14px Arial';
        ctx.fillText(`High Score: ${highScore.toLocaleString()}`, canvas.width / 2, 595);
    }

    ctx.restore();
}

function drawPauseScreen() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 15;
    ctx.font = 'bold 48px Arial';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 20);

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = '18px Arial';
    ctx.fillText('Press ESC to Resume', canvas.width / 2, canvas.height / 2 + 25);
    ctx.restore();
}

function drawGameOverScreen() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 52px Arial';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = '22px Arial';
    ctx.fillText(`Final Score: ${score.toLocaleString()}`, canvas.width / 2, canvas.height / 2 + 10);
    ctx.fillText(`Level Reached: ${level}`, canvas.width / 2, canvas.height / 2 + 40);

    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('★ NEW HIGH SCORE! ★', canvas.width / 2, canvas.height / 2 + 75);
    }

    let blink = Math.sin(Date.now() * 0.004) * 0.4 + 0.6;
    ctx.globalAlpha = blink;
    ctx.fillStyle = '#cccccc';
    ctx.font = '18px Arial';
    ctx.fillText('Press SPACE or ENTER to Restart', canvas.width / 2, canvas.height / 2 + 120);

    ctx.restore();
}

function drawLevelCompleteScreen() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 15;
    ctx.font = 'bold 48px Arial';
    ctx.fillText(`LEVEL ${level} COMPLETE!`, canvas.width / 2, canvas.height / 2 - 30);

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px Arial';
    ctx.fillText(`Score: ${score.toLocaleString()}`, canvas.width / 2, canvas.height / 2 + 20);

    let blink = Math.sin(Date.now() * 0.004) * 0.4 + 0.6;
    ctx.globalAlpha = blink;
    ctx.fillStyle = '#88ffdd';
    ctx.font = '18px Arial';
    ctx.fillText('Press SPACE or ENTER for Next Level', canvas.width / 2, canvas.height / 2 + 65);

    ctx.restore();
}

function drawWinScreen() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc00';
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 25;
    ctx.font = 'bold 52px Arial';
    ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2 - 50);

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = '22px Arial';
    ctx.fillText(`Final Score: ${score.toLocaleString()}`, canvas.width / 2, canvas.height / 2 + 10);
    ctx.fillStyle = '#00ffcc';
    ctx.fillText(`All ${level} Levels Completed!`, canvas.width / 2, canvas.height / 2 + 45);

    let blink = Math.sin(Date.now() * 0.004) * 0.4 + 0.6;
    ctx.globalAlpha = blink;
    ctx.fillStyle = '#cccccc';
    ctx.font = '18px Arial';
    ctx.fillText('Press SPACE or ENTER to Play Again', canvas.width / 2, canvas.height / 2 + 100);

    ctx.restore();
}

// Utility
function shadeColor(color, percent) {
    let num = parseInt(color.replace('#', ''), 16);
    let r = Math.min(255, Math.max(0, (num >> 16) + percent));
    let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
    let b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
    return `rgb(${r},${g},${b})`;
}

// Main loop
function gameLoop() {
    update();

    ctx.save();
    if (screenShake > 0) {
        let sx = (Math.random() - 0.5) * screenShake * 2;
        let sy = (Math.random() - 0.5) * screenShake * 2;
        ctx.translate(sx, sy);
    }

    // Clear
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

    // Background grid
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    if (gameState === STATE.PLAYING) {
        drawBricks();
        drawPowerUps();
        drawLasers();
        balls.forEach(b => drawBall(b));
        drawAttachedBall();
        drawPaddle();
        drawParticles();
        drawHUD();
    } else if (gameState === STATE.PAUSED) {
        drawBricks();
        balls.forEach(b => drawBall(b));
        drawPaddle();
        drawHUD();
        drawPauseScreen();
    } else if (gameState === STATE.START) {
        drawStartScreen();
    } else if (gameState === STATE.GAMEOVER) {
        drawBricks();
        drawParticles();
        drawGameOverScreen();
    } else if (gameState === STATE.LEVELCOMPLETE) {
        drawBricks();
        drawParticles();
        drawLevelCompleteScreen();
    } else if (gameState === STATE.WIN) {
        drawWinScreen();
    }

    // Draw cursor on start
    if (gameState === STATE.START) {
        ctx.restore();
        requestAnimationFrame(gameLoop);
        return;
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

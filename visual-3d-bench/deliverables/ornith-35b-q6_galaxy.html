<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Galaxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            color: #fff;
            pointer-events: none;
        }

        #ui-overlay h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.6), 0 0 40px rgba(100, 150, 255, 0.3);
        }

        #ui-overlay p {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
        }

        #ui-overlay .particle-count {
            font-size: 18px;
            color: rgba(255, 200, 100, 0.8);
            margin-top: 4px;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, rgba(100, 150, 255, 0.8), transparent);
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h1>Andromeda</h1>
        <div class="divider"></div>
        <p>Spiral Galaxy</p>
        <p class="particle-count">50,000 Stars</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (function () {
            const PARTICLE_COUNT = 50000;
            const ARM_COUNT = 4;
            const ARM_SPREAD = 0.8;
            const GALAXY_RADIUS = 120;
            const CENTER_BULK = 15;
            const SPREAD_POWER = 2.2;
            const ROTATION_SPEED = 0.02;
            const BULK_SPEED = 0.0003;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 80, 180);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            // --- Background Stars ---
            const bgStarsGeo = new THREE.BufferGeometry();
            const bgStarsCount = 8000;
            const bgStarsPos = new Float32Array(bgStarsCount * 3);
            const bgStarsSizes = new Float32Array(bgStarsCount);

            for (let i = 0; i < bgStarsCount; i++) {
                const r = 400 + Math.random() * 600;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                bgStarsPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                bgStarsPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                bgStarsPos[i * 3 + 2] = r * Math.cos(phi);
                bgStarsSizes[i] = Math.random() * 1.5 + 0.3;
            }

            bgStarsGeo.setAttribute('position', new THREE.BufferAttribute(bgStarsPos, 3));
            bgStarsGeo.setAttribute('size', new THREE.BufferAttribute(bgStarsSizes, 1));

            const bgStarsMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.8,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.6
            });

            scene.add(new THREE.Points(bgStarsGeo, bgStarsMat));

            // --- Galaxy Particles ---
            const galaxyGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);
            const alphas = new Float32Array(PARTICLE_COUNT);
            const randoms = new Float32Array(PARTICLE_COUNT);

            const colorCenter = new THREE.Color(0.4, 0.6, 1.0);
            const colorMid = new THREE.Color(0.9, 0.85, 0.4);
            const colorEdge = new THREE.Color(1.0, 0.7, 0.2);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const armIndex = i % ARM_COUNT;
                const armAngle = (armIndex / ARM_COUNT) * Math.PI * 2;

                const t = Math.pow(Math.random(), 0.6);
                const distance = t * GALAXY_RADIUS;

                const spread = (Math.random() - 0.5) * ARM_SPREAD * (1 + distance / CENTER_BULK) * 0.3;
                const verticalSpread = (Math.random() - 0.5) * 4 * (1 - t * 0.7);

                const spiralAngle = armAngle + (distance / GALAXY_RADIUS) * 3.5 + spread;

                const radialNoise = (Math.random() - 0.5) * (1 + distance * 0.02);

                const x = Math.cos(spiralAngle) * (distance + radialNoise);
                const z = Math.sin(spiralAngle) * (distance + radialNoise);
                const y = verticalSpread + Math.exp(-distance / (CENTER_BULK * 2)) * (Math.random() - 0.5) * 3;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                const distRatio = Math.min(distance / GALAXY_RADIUS, 1);
                const color = new THREE.Color();

                if (distRatio < 0.3) {
                    color.copy(colorCenter).lerp(colorMid, distRatio / 0.3);
                } else {
                    color.copy(colorMid).lerp(colorEdge, (distRatio - 0.3) / 0.7);
                }

                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                const baseSize = (1 - distRatio * 0.5) * (2.5 + Math.random() * 2.5);
                sizes[i] = baseSize;

                alphas[i] = 0.4 + Math.random() * 0.6;

                randoms[i] = Math.random();
            }

            galaxyGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            galaxyGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            galaxyGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            galaxyGeo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
            galaxyGeo.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

            const galaxyMat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
                },
                vertexShader: `
                    attribute float size;
                    attribute float alpha;
                    attribute vec3 color;
                    attribute float aRandom;

                    uniform float uTime;
                    uniform float uPixelRatio;

                    varying vec3 vColor;
                    varying float vAlpha;

                    void main() {
                        vColor = color;
                        vAlpha = alpha;

                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float dist = length(position.xz);

                        float twinkle = 0.7 + 0.3 * sin(uTime * 1.5 + aRandom * 6.28);
                        float sizeMod = size * twinkle;

                        gl_PointSize = sizeMod * uPixelRatio * (200.0 / -mvPosition.z);
                        gl_PointSize = max(gl_PointSize, 1.0);

                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;

                    void main() {
                        vec2 center = gl_PointCoord - 0.5;
                        float dist = length(center);

                        if (dist > 0.5) discard;

                        float core = exp(-dist * 6.0);
                        float glow = exp(-dist * 3.0) * 0.6;
                        float alpha = (core + glow) * vAlpha;

                        vec3 finalColor = vColor * (core + 0.3);

                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });

            const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
            scene.add(galaxy);

            // --- Central Glow Sprite ---
            const glowCanvas = document.createElement('canvas');
            glowCanvas.width = 256;
            glowCanvas.height = 256;
            const ctx = glowCanvas.getContext('2d');
            const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            gradient.addColorStop(0, 'rgba(150, 180, 255, 0.4)');
            gradient.addColorStop(0.3, 'rgba(120, 160, 255, 0.15)');
            gradient.addColorStop(0.6, 'rgba(100, 140, 255, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 256);

            const glowTexture = new THREE.CanvasTexture(glowCanvas);
            const glowSpriteMat = new THREE.SpriteMaterial({
                map: glowTexture,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8,
                depthWrite: false
            });
            const glowSprite = new THREE.Sprite(glowSpriteMat);
            glowSprite.scale.set(30, 30, 1);
            scene.add(glowSprite);

            // --- Camera Animation ---
            let camAngle = 0;
            let camAngleSpeed = 0.0008;
            let camHeight = 80;
            let camRadius = 180;

            function animate() {
                requestAnimationFrame(animate);

                const elapsed = performance.now() * 0.001;

                galaxy.rotation.y += BULK_SPEED;

                camAngle += camAngleSpeed;
                camera.position.x = Math.cos(camAngle) * camRadius;
                camera.position.z = Math.sin(camAngle) * camRadius;
                camera.position.y = camHeight + Math.sin(camAngle * 0.5) * 15;
                camera.lookAt(0, 0, 0);

                galaxyMat.uniforms.uTime.value = elapsed;

                renderer.render(scene, camera);
            }

            animate();

            // --- Resize ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                galaxyMat.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiral Galaxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#ui-overlay {
position: fixed;
top: 30px;
left: 30px;
z-index: 10;
font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
color: rgba(255, 255, 255, 0.85);
pointer-events: none;
}
#ui-overlay h1 {
font-size: 28px;
font-weight: 300;
letter-spacing: 6px;
text-transform: uppercase;
margin-bottom: 8px;
background: linear-gradient(90deg, #6af, #fc6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
#ui-overlay p {
font-size: 13px;
letter-spacing: 2px;
opacity: 0.5;
font-weight: 300;
}
#ui-overlay .divider {
width: 60px;
height: 1px;
background: linear-gradient(90deg, rgba(100,170,255,0.6), transparent);
margin: 12px 0;
}
</style>
</head>
<body>
<div id="ui-overlay">
<h1>Andromeda</h1>
<div class="divider"></div>
<p id="particle-count">Loading particles...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
const PARTICLE_COUNT = 50000;
const ARMS = 4;
const ARM_SPREAD = 0.6;
const GALAXY_RADIUS = 80;
const ROTATION_SPEED = 0.0003;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 35, 55);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

document.getElementById('particle-count').textContent = PARTICLE_COUNT.toLocaleString() + ' particles';

function generateGalaxy() {
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const randoms = new Float32Array(PARTICLE_COUNT * 3);

const blue = new THREE.Color(0.2, 0.5, 1.0);
const cyan = new THREE.Color(0.3, 0.8, 1.0);
const white = new THREE.Color(1.0, 1.0, 0.95);
const gold = new THREE.Color(1.0, 0.85, 0.3);
const orange = new THREE.Color(1.0, 0.6, 0.15);

for (let i = 0; i < PARTICLE_COUNT; i++) {
const armIndex = i % ARMS;
const armAngle = (armIndex / ARMS) * Math.PI * 2;

const baseDistance = Math.pow(Math.random(), 0.7) * GALAXY_RADIUS;
const armWidth = ARM_SPREAD * (1 + baseDistance * 0.04);

const spiralAngle = armAngle + (baseDistance / GALAXY_RADIUS) * 3.5;

const spreadX = (Math.random() - 0.5) * armWidth * 2;
const spreadZ = (Math.random() - 0.5) * armWidth * 2;

const bulgeFactor = Math.pow(1 - baseDistance / GALAXY_RADIUS, 2) * 8;

positions[i * 3] = Math.cos(spiralAngle) * baseDistance + spreadX + (Math.random() - 0.5) * bulgeFactor * 0.3;
positions[i * 3 + 1] = (Math.random() - 0.5) * (2.5 - baseDistance / GALAXY_RADIUS * 1.5) + (Math.random() - 0.5) * 0.5;
positions[i * 3 + 2] = Math.sin(spiralAngle) * baseDistance + spreadZ + (Math.random() - 0.5) * bulgeFactor * 0.3;

const t = baseDistance / GALAXY_RADIUS;
let color;
if (t < 0.15) {
color = blue.clone().lerp(cyan, t / 0.15);
} else if (t < 0.4) {
color = cyan.clone().lerp(white, (t - 0.15) / 0.25);
} else if (t < 0.7) {
color = white.clone().lerp(gold, (t - 0.4) / 0.3);
} else {
color = gold.clone().lerp(orange, (t - 0.7) / 0.3);
}

colors[i * 3] = color.r;
colors[i * 3 + 1] = color.g;
colors[i * 3 + 2] = color.b;

const sizeBase = 1.5 + Math.random() * 2.5;
const sizeFactor = 1.0 - t * 0.5;
sizes[i] = sizeBase * sizeFactor * (0.8 + Math.random() * 0.4);

randoms[i * 3] = Math.random();
randoms[i * 3 + 1] = Math.random();
randoms[i * 3 + 2] = Math.random();
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));

const vertexShader = `
attribute float aSize;
attribute vec3 aRandom;
varying vec3 vColor;
varying float vAlpha;
void main() {
vColor = color;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
float dist = length(position);
float size = aSize * (200.0 / -mvPosition.z);
size *= (0.7 + 0.3 * aRandom.x);
gl_PointSize = max(size, 1.0);
gl_Position = projectionMatrix * mvPosition;
vAlpha = smoothstep(80.0, 5.0, dist) * 0.85 + 0.15;
}
`;

const fragmentShader = `
varying vec3 vColor;
varying float vAlpha;
void main() {
float d = length(gl_PointCoord - vec2(0.5));
if (d > 0.5) discard;
float glow = exp(-d * 6.0) * 0.8 + smoothstep(0.5, 0.1, d) * 0.5;
gl_FragColor = vec4(vColor * glow, vAlpha * glow);
}
`;

const material = new THREE.ShaderMaterial({
vertexShader,
fragmentShader,
vertexColors: true,
transparent: true,
depthWrite: false,
blending: THREE.AdditiveBlending,
});

return new THREE.Points(geometry, material);
}

const galaxy = generateGalaxy();
scene.add(galaxy);

function generateStars() {
const starCount = 3000;
const positions = new Float32Array(starCount * 3);
const sizes = new Float32Array(starCount);

for (let i = 0; i < starCount; i++) {
const theta = Math.random() * Math.PI * 2;
const phi = Math.acos(2 * Math.random() - 1);
const r = 300 + Math.random() * 700;
positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
positions[i * 3 + 2] = r * Math.cos(phi);
sizes[i] = Math.random() * 2;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

const material = new THREE.ShaderMaterial({
vertexShader: `
attribute float aSize;
varying float vBrightness;
void main() {
vBrightness = 0.4 + 0.6 * aSize / 2.0;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
gl_PointSize = aSize * (150.0 / -mvPosition.z);
gl_Position = projectionMatrix * mvPosition;
}
`,
fragmentShader: `
varying float vBrightness;
void main() {
float d = length(gl_PointCoord - vec2(0.5));
if (d > 0.5) discard;
float glow = exp(-d * 8.0);
gl_FragColor = vec4(vec3(0.8, 0.85, 1.0) * vBrightness, glow * 0.9);
}
`,
transparent: true,
depthWrite: false,
blending: THREE.AdditiveBlending,
});

return new THREE.Points(geometry, material);
}

const stars = generateStars();
scene.add(stars);

const clock = new THREE.Clock();

function animate() {
requestAnimationFrame(animate);

const elapsed = clock.getElapsedTime();

galaxy.rotation.y += ROTATION_SPEED;

camera.position.x = Math.sin(elapsed * 0.08) * 55;
camera.position.z = Math.cos(elapsed * 0.08) * 55;
camera.position.y = 30 + Math.sin(elapsed * 0.05) * 8;
camera.lookAt(0, 0, 0);

renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
})();
</script>
</body>
</html>

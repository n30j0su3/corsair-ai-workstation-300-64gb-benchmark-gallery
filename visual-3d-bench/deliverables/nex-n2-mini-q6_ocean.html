<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Three.js Gerstner Ocean Shader</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06111f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .hud {
      position: fixed;
      left: 16px;
      top: 16px;
      padding: 10px 12px;
      color: rgba(255, 255, 255, 0.86);
      background: rgba(0, 12, 24, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      line-height: 1.35;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">Gerstner ocean shader<br>Drag to orbit · Wheel to zoom</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const container = document.getElementById("app");

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x071525, 0.0045);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 12000);
    camera.position.set(0, 82, 170);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    container.appendChild(renderer.domElement);

    const controls = {
      enabled: true,
      target: new THREE.Vector3(0, 0, 0),
      radius: camera.position.length(),
      theta: Math.atan2(camera.position.x, camera.position.z),
      phi: Math.acos(THREE.MathUtils.clamp(camera.position.y / camera.position.length(), -1, 1)),
      minDistance: 45,
      maxDistance: 520,
      minPolarAngle: 0.08,
      maxPolarAngle: Math.PI * 0.49,
      pointerX: 0,
      pointerY: 0,
      dragging: false,
      lastX: 0,
      lastY: 0,
      update() {
        if (!this.enabled) return;

        const phi = THREE.MathUtils.clamp(this.phi, this.minPolarAngle, this.maxPolarAngle);
        const radius = THREE.MathUtils.clamp(this.radius, this.minDistance, this.maxDistance);

        const sinPhi = Math.sin(phi);

        camera.position.x = this.target.x + radius * sinPhi * Math.sin(this.theta);
        camera.position.y = this.target.y + radius * Math.cos(phi);
        camera.position.z = this.target.z + radius * sinPhi * Math.cos(this.theta);
        camera.lookAt(this.target);
      },
      onPointerDown(event) {
        this.enabled = true;
        this.dragging = true;
        this.lastX = event.clientX;
        this.lastY = event.clientY;
        renderer.domElement.setPointerCapture(event.pointerId);
      },
      onPointerMove(event) {
        if (!this.dragging) return;

        const dx = event.clientX - this.lastX;
        const dy = event.clientY - this.lastY;

        this.theta -= dx * 0.005;
        this.phi -= dy * 0.005;

        this.lastX = event.clientX;
        this.lastY = event.clientY;
        this.update();
      },
      onPointerUp(event) {
        this.dragging = false;
        try {
          renderer.domElement.releasePointerCapture(event.pointerId);
        } catch (error) {}
      },
      onWheel(event) {
        event.preventDefault();
        this.radius *= Math.exp(event.deltaY * 0.001);
        this.update();
      }
    };

    renderer.domElement.addEventListener("pointerdown", controls.onPointerDown.bind(controls));
    renderer.domElement.addEventListener("pointermove", controls.onPointerMove.bind(controls));
    renderer.domElement.addEventListener("pointerup", controls.onPointerUp.bind(controls));
    renderer.domElement.addEventListener("wheel", controls.onWheel.bind(controls), { passive: false });

    const clock = new THREE.Clock();

    const waveDirection = [
      new THREE.Vector3(0.92, 0.39, 0.0),
      new THREE.Vector3(-0.35, 0.94, 0.0),
      new THREE.Vector3(0.72, -0.69, 0.0),
      new THREE.Vector3(-0.82, -0.57, 0.0)
    ];

    const waveAmplitude = [
      new THREE.Vector3(7.2, 0.0, 0.0),
      new THREE.Vector3(4.4, 0.0, 0.0),
      new THREE.Vector3(2.6, 0.0, 0.0),
      new THREE.Vector3(1.45, 0.0, 0.0)
    ];

    const waveSpeed = [
      new THREE.Vector3(0.72, 0.0, 0.0),
      new THREE.Vector3(-0.58, 0.0, 0.0),
      new THREE.Vector3(0.42, 0.0, 0.0),
      new THREE.Vector3(-0.31, 0.0, 0.0)
    ];

    const waveLength = [
      new THREE.Vector3(72.0, 0.0, 0.0),
      new THREE.Vector3(43.0, 0.0, 0.0),
      new THREE.Vector3(25.0, 0.0, 0.0),
      new THREE.Vector3(14.0, 0.0, 0.0)
    ];

    const waveHeight = [
      new THREE.Vector3(5.2, 0.0, 0.0),
      new THREE.Vector3(3.1, 0.0, 0.0),
      new THREE.Vector3(1.8, 0.0, 0.0),
      new THREE.Vector3(0.95, 0.0, 0.0)
    ];

    const waterVertexShader = `
      precision highp float;

      uniform float uTime;

      uniform vec3 uCameraPosition;

      uniform vec3 uWaveDirection[4];
      uniform vec3 uWaveAmplitude[4];
      uniform vec3 uWaveSpeed[4];
      uniform vec3 uWaveLength[4];
      uniform vec3 uWaveHeight[4];

      varying vec3 vWorldPosition;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      varying float vHeight;
      varying float vFoam;
      varying float vSunDot;
      varying float vFresnel;

      void main() {
        vec3 p = position;

        vec3 disp = vec3(0.0);
        vec3 grad = vec3(0.0);

        const int MAX_WAVES = 4;
        for (int i = 0; i < MAX_WAVES; i++) {
          vec2 dir2 = vec2(uWaveDirection[i].x, uWaveDirection[i].y);
          float amp = uWaveAmplitude[i].x;
          float speed = uWaveSpeed[i].x;
          float len = uWaveLength[i].x;
          float height = uWaveHeight[i].x;
          float wavenumber = 6.28318530718 / len;
          float steepness = height / len;

          float phase = dot(dir2, vec2(p.x, p.y)) * wavenumber + uTime * speed;
          float wave = sin(phase) * amp;
          float gradValue = -steepness * cos(phase);

          disp.x += dir2.x * gradValue;
          disp.y += wave;
          disp.z += dir2.y * gradValue;

          grad.x += gradValue;
          grad.z += gradValue;
        }

        vec3 transformed = vec3(p.x + disp.x, p.y + disp.y, p.z + disp.z);
        vec4 worldPosition = modelMatrix * vec4(transformed, 1.0);

        vec3 objectNormal = normalize(vec3(-grad.x, 1.0, -grad.z));
        vNormal = normalize(mat3(modelMatrix) * objectNormal);

        vWorldPosition = worldPosition.xyz;
        vHeight = worldPosition.y;
        vViewDir = normalize(uCameraPosition - worldPosition.xyz);
        vFresnel = pow(1.0 - max(dot(normalize(vNormal), vViewDir), 0.0), 3.0);
        vSunDot = max(dot(normalize(vNormal), normalize(vec3(0.38, 0.72, 0.58))), 0.0);

        float crest = smoothstep(0.42, 1.18, -grad.x - grad.z);
        float highWater = smoothstep(0.8, 6.2, vHeight);
        vFoam = clamp(crest * 0.72 + highWater * 0.28, 0.0, 1.0);

        gl_Position = projectionMatrix * viewMatrix * worldPosition;
      }
    `;

    const waterFragmentShader = `
      precision highp float;

      uniform float uTime;
      uniform float uFoamStrength;
      uniform float uReflectionStrength;
      uniform float uSunIntensity;

      uniform vec3 uCameraPosition;
      uniform vec3 uWaterColor;
      uniform vec3 uFoamColor;
      uniform vec3 uSkyTop;
      uniform vec3 uSkyBottom;
      uniform vec3 uSunDirection;
      uniform vec3 uSunColor;

      uniform sampler2D uReflectionMap;

      varying vec3 vWorldPosition;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      varying float vHeight;
      varying float vFoam;
      varying float vSunDot;
      varying float vFresnel;

      void main() {
        vec3 normal = normalize(vNormal);
        vec3 viewDir = normalize(vViewDir);
        vec3 sunDir = normalize(uSunDirection);
        vec3 halfDir = normalize(viewDir + sunDir);

        float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 3.0);
        float sunDot = max(dot(normal, sunDir), 0.0);
        float spec = pow(max(dot(normal, halfDir), 0.0), 150.0) * sunDot * uSunIntensity;

        vec3 sky = mix(uSkyBottom, uSkyTop, smoothstep(-0.2, 0.95, normal.y));
        vec3 reflection = mix(sky, uSunColor, 0.55) * fresnel * uReflectionStrength;

        vec3 refracted = mix(
          vec3(0.015, 0.105, 0.135),
          mix(uWaterColor, sky, 0.35),
          0.42
        );

        vec3 color = mix(refracted, sky, fresnel * 0.78);
        color += reflection;
        color += vec3(0.025, 0.065, 0.085) * (1.0 - fresnel) * smoothstep(-1.0, 5.0, vHeight);
        color += spec;

        float foam = vFoam * uFoamStrength;
        float crestLine = smoothstep(0.985, 1.0, sin(vHeight * 4.2 + vWorldPosition.x * 0.035 + vWorldPosition.z * 0.027));
        foam = max(foam, crestLine * 0.34);
        foam = smoothstep(0.0, 1.0, foam);

        color = mix(color, uFoamColor, foam);

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const skyVertexShader = `
      precision highp float;

      varying vec3 vWorldPosition;

      void main() {
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const skyFragmentShader = `
      precision highp float;

      uniform float uTime;
      uniform vec3 uSkyTop;
      uniform vec3 uSkyBottom;
      uniform vec3 uSunDirection;
      uniform vec3 uSunColor;

      varying vec3 vWorldPosition;

      void main() {
        vec3 dir = normalize(vWorldPosition);
        float h = dir.y;

        vec3 horizon = mix(uSkyBottom, uSkyTop, smoothstep(-0.12, 0.78, h));
        vec3 sunDir = normalize(uSunDirection);

        float sunDot = max(dot(dir, sunDir), 0.0);
        float sunGlow = pow(sunDot, 120.0);
        float sunHalo = pow(sunDot, 4.0);

        vec3 color = horizon;
        color += uSunColor * (sunHalo * 0.22 + sunGlow * 2.2);

        float horizonGlow = pow(max(1.0 - abs(h), 0.0), 2.0);
        color += vec3(0.08, 0.18, 0.22) * horizonGlow;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const waterUniforms = {
      uTime: { value: 0.0 },
      uCameraPosition: { value: camera.position },
      uWaveDirection: { value: waveDirection },
      uWaveAmplitude: { value: waveAmplitude },
      uWaveSpeed: { value: waveSpeed },
      uWaveLength: { value: waveLength },
      uWaveHeight: { value: waveHeight },
      uWaterColor: { value: new THREE.Color(0x063b55) },
      uFoamColor: { value: new THREE.Color(0xe8fbff) },
      uSkyTop: { value: new THREE.Color(0x1b6f9f) },
      uSkyBottom: { value: new THREE.Color(0x8cc8d8) },
      uSunDirection: { value: new THREE.Vector3(0.38, 0.72, 0.58).normalize() },
      uSunColor: { value: new THREE.Color(0xfff1b8) },
      uSunIntensity: { value: 2.25 },
      uFoamStrength: { value: 1.0 },
      uReflectionStrength: { value: 0.72 },
      uReflectionMap: { value: null }
    };

    const waterMaterial = new THREE.ShaderMaterial({
      uniforms: waterUniforms,
      vertexShader: waterVertexShader,
      fragmentShader: waterFragmentShader,
      side: THREE.DoubleSide,
      depthWrite: true
    });

    const waterGeometry = new THREE.PlaneGeometry(1100, 1100, 260, 260);
    const water = new THREE.Mesh(waterGeometry, waterMaterial);
    water.rotation.x = -Math.PI / 2;
    water.position.y = 0;
    scene.add(water);

    const skyUniforms = {
      uTime: { value: 0.0 },
      uSkyTop: { value: new THREE.Color(0x071426) },
      uSkyBottom: { value: new THREE.Color(0x9fd0d8) },
      uSunDirection: { value: new THREE.Vector3(0.38, 0.72, 0.58).normalize() },
      uSunColor: { value: new THREE.Color(0xfff1b8) }
    };

    const skyMaterial = new THREE.ShaderMaterial({
      uniforms: skyUniforms,
      vertexShader: skyVertexShader,
      fragmentShader: skyFragmentShader,
      side: THREE.BackSide,
      depthWrite: false
    });

    const sky = new THREE.Mesh(new THREE.SphereGeometry(4500, 48, 32), skyMaterial);
    scene.add(sky);

    const sunDirection = new THREE.Vector3(0.38, 0.72, 0.58).normalize();
    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(18, 32, 16),
      new THREE.MeshBasicMaterial({
        color: 0xfff1b8,
        transparent: true,
        opacity: 0.92
      })
    );
    sun.position.copy(sunDirection.clone().multiplyScalar(1800));
    scene.add(sun);

    const cubeCamera = new THREE.CubeCamera(0.1, 6000, new THREE.WebGLCubeRenderTarget(256, {
      format: THREE.RGBAFormat,
      type: THREE.UnsignedByteType,
      generateMipmaps: false,
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter
    }));
    cubeCamera.position.copy(camera.position);
    scene.add(cubeCamera);
    waterUniforms.uReflectionMap.value = cubeCamera.renderTarget.texture;

    const ambientLight = new THREE.AmbientLight(0x7fb8c8, 0.42);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff1b8, 2.1);
    sunLight.position.copy(sunDirection.clone().multiplyScalar(350));
    scene.add(sunLight);

    const rimLight = new THREE.DirectionalLight(0x7ec8ff, 0.55);
    rimLight.position.set(-220, 120, -260);
    scene.add(rimLight);

    const foamTextureCanvas = document.createElement("canvas");
    foamTextureCanvas.width = 256;
    foamTextureCanvas.height = 256;
    const foamCtx = foamTextureCanvas.getContext("2d");
    const foamGradient = foamCtx.createRadialGradient(128, 128, 8, 128, 128, 128);
    foamGradient.addColorStop(0.0, "rgba(255,255,255,0.95)");
    foamGradient.addColorStop(0.35, "rgba(255,255,255,0.55)");
    foamGradient.addColorStop(0.72, "rgba(255,255,255,0.12)");
    foamGradient.addColorStop(1.0, "rgba(255,255,255,0.0)");
    foamCtx.fillStyle = foamGradient;
    foamCtx.fillRect(0, 0, 256, 256);
    const foamTexture = new THREE.CanvasTexture(foamTextureCanvas);
    foamTexture.wrapS = THREE.RepeatWrapping;
    foamTexture.wrapT = THREE.RepeatWrapping;
    foamTexture.repeat.set(18, 18);

    const foamMaterial = new THREE.MeshBasicMaterial({
      map: foamTexture,
      color: 0xffffff,
      transparent: true,
      opacity: 0.18,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide
    });

    const foam = new THREE.Mesh(new THREE.PlaneGeometry(1100, 1100, 1, 1), foamMaterial);
    foam.rotation.x = -Math.PI / 2;
    foam.position.y = 0.03;
    scene.add(foam);

    const resize = () => {
      const width = window.innerWidth;
      const height = window.innerHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(width, height);
    };

    window.addEventListener("resize", resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      waterUniforms.uTime.value = elapsed;
      skyUniforms.uTime.value = elapsed;

      const sunAngle = elapsed * 0.018;
      sunDirection.set(
        Math.cos(sunAngle) * 0.55,
        0.62 + Math.sin(sunAngle * 0.7) * 0.08,
        Math.sin(sunAngle) * 0.55
      ).normalize();

      skyUniforms.uSunDirection.value.copy(sunDirection);
      waterUniforms.uSunDirection.value.copy(sunDirection);
      sun.position.copy(sunDirection.clone().multiplyScalar(1800));

      controls.update();

      cubeCamera.position.copy(camera.position);
      cubeCamera.update(renderer, scene);

      foam.material.opacity = 0.12 + 0.08 * Math.sin(elapsed * 1.35);
      foam.material.map.offset.x = elapsed * 0.006;
      foam.material.map.offset.y = elapsed * 0.004;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>

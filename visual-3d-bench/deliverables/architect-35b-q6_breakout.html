<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { border: 2px solid #333; box-shadow: 0 0 30px rgba(0,150,255,0.3); }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, volume = 0.3) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playBrickSound() { playSound(600 + Math.random() * 400, 'square', 0.1, 0.2); }
function playPaddleSound() { playSound(300, 'triangle', 0.15, 0.25); }
function playWallSound() { playSound(200, 'square', 0.08, 0.15); }
function playLoseLife() { playSound(150, 'sawtooth', 0.5, 0.3); playSound(100, 'sawtooth', 0.6, 0.2); }
function playPowerUp() { playSound(800, 'sine', 0.15, 0.2); setTimeout(() => playSound(1000, 'sine', 0.15, 0.2), 100); setTimeout(() => playSound(1200, 'sine', 0.2, 0.2), 200); }
function playLevelUp() { playSound(523, 'sine', 0.2, 0.3); setTimeout(() => playSound(659, 'sine', 0.2, 0.3), 150); setTimeout(() => playSound(784, 'sine', 0.3, 0.3), 300); }
function playLaser() { playSound(1200, 'sawtooth', 0.15, 0.2); }
function playBallHit() { playSound(400, 'triangle', 0.1, 0.2); }

// Game State
let gameState = 'start'; // start, playing, paused, gameover, levelComplete
let score = 0;
let lives = 3;
let level = 1;
let ballSpeed = 4;
let laserMode = false;
let laserTimer = 0;
let widerPaddle = false;
let widerPaddleTimer = 0;
let slowBall = false;
let slowBallTimer = 0;
let activePowerUps = 0;

// Paddle
const paddle = { x: canvas.width / 2 - 60, y: canvas.height - 40, width: 120, height: 14, speed: 8 };

// Balls
let balls = [];
let lasers = [];

// Bricks
let bricks = [];

// Power-ups
let powerUps = [];

// Particles
let particles = [];

// Input
const keys = {};
let mouseX = canvas.width / 2;

document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'Escape') {
        if (gameState === 'playing') gameState = 'paused';
        else if (gameState === 'paused') gameState = 'playing';
    }
    if (e.key === 'Enter' || e.key === ' ') {
        if (gameState === 'start') {
            audioCtx.resume();
            startGame();
        } else if (gameState === 'gameover') {
            startGame();
        } else if (gameState === 'levelComplete') {
            nextLevel();
        }
    }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});
canvas.addEventListener('click', e => {
    if (gameState === 'start') {
        audioCtx.resume();
        startGame();
    } else if (gameState === 'gameover') {
        startGame();
    } else if (gameState === 'levelComplete') {
        nextLevel();
    }
});

// Brick colors and point values
const brickColors = [
    { color: '#ff0044', points: 50, health: 1 },
    { color: '#ff6600', points: 40, health: 1 },
    { color: '#ffcc00', points: 30, health: 1 },
    { color: '#00cc00', points: 20, health: 1 },
    { color: '#0066ff', points: 15, health: 1 },
    { color: '#9900cc', points: 10, health: 1 },
    { color: '#00cccc', points: 10, health: 1 },
    { color: '#ff0088', points: 10, health: 1 },
    { color: '#444444', points: 5, health: 1 },
];

function createBricks() {
    bricks = [];
    const rows = Math.min(5 + level, 9);
    const cols = 10;
    const brickWidth = 70;
    const brickHeight = 22;
    const padding = 4;
    const offsetX = (canvas.width - cols * (brickWidth + padding) + padding) / 2;
    const offsetY = 60;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const colorIndex = r % brickColors.length;
            const health = level >= 3 && Math.random() < 0.3 ? 2 : 1;
            bricks.push({
                x: offsetX + c * (brickWidth + padding),
                y: offsetY + r * (brickHeight + padding),
                width: brickWidth,
                height: brickHeight,
                color: brickColors[colorIndex].color,
                points: brickColors[colorIndex].points,
                health: health,
                maxHealth: health
            });
        }
    }
}

function createBall(x, y, dx, dy) {
    return { x, y, dx: dx || ballSpeed * (Math.random() > 0.5 ? 1 : -1), dy: -ballSpeed, radius: 8, active: true };
}

function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    ballSpeed = 4;
    laserMode = false;
    widerPaddle = false;
    slowBall = false;
    activePowerUps = 0;
    lasers = [];
    powerUps = [];
    particles = [];
    paddle.width = 120;
    paddle.x = canvas.width / 2 - paddle.width / 2;
    createBall(canvas.width / 2, canvas.height - 60, 3, -ballSpeed);
    createBricks();
    gameState = 'playing';
}

function nextLevel() {
    level++;
    ballSpeed = 4 + (level - 1) * 0.5;
    laserMode = false;
    widerPaddle = false;
    slowBall = false;
    activePowerUps = 0;
    lasers = [];
    powerUps = [];
    particles = [];
    paddle.width = 120;
    paddle.x = canvas.width / 2 - paddle.width / 2;
    balls = [];
    createBall(canvas.width / 2, canvas.height - 60, 3, -ballSpeed);
    createBricks();
    gameState = 'playing';
    playLevelUp();
}

function spawnPowerUp(x, y) {
    if (Math.random() > 0.15) return; // 15% chance
    const types = ['multi-ball', 'wider-paddle', 'laser', 'slow-ball'];
    const type = types[Math.floor(Math.random() * types.length)];
    const colors = { 'multi-ball': '#ff00ff', 'wider-paddle': '#00ff00', 'laser': '#ff0000', 'slow-ball': '#00ccff' };
    const symbols = { 'multi-ball': '×3', 'wider-paddle': '↔', 'laser': '↑', 'slow-ball': '●' };
    powerUps.push({ x, y, width: 40, height: 20, type, color: colors[type], symbol: symbols[type], dy: 2, active: true });
}

function activatePowerUp(type) {
    playPowerUp();
    activePowerUps++;
    switch (type) {
        case 'multi-ball':
            if (balls.length > 0) {
                const src = balls[balls.length - 1];
                balls.push(createBall(src.x, src.y, src.dx * 0.7, src.dy * 0.7));
                balls.push(createBall(src.x, src.y, -src.dx * 0.7, src.dy * 0.7));
            }
            break;
        case 'wider-paddle':
            paddle.width = 200;
            widerPaddle = true;
            widerPaddleTimer = 600; // 10 seconds at 60fps
            break;
        case 'laser':
            laserMode = true;
            laserTimer = 600;
            break;
        case 'slow-ball':
            slowBall = true;
            slowBallTimer = 600;
            balls.forEach(b => {
                const angle = Math.atan2(b.dy, b.dx);
                const speed = ballSpeed * 0.7;
                b.dx = Math.cos(angle) * speed;
                b.dy = Math.sin(angle) * speed;
            });
            break;
    }
}

function createParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
            x, y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            radius: 1 + Math.random() * 3,
            color,
            life: 1,
            decay: 0.015 + Math.random() * 0.02
        });
    }
}

function update() {
    if (gameState !== 'playing') return;

    // Paddle movement
    if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
    if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;

    // Mouse control
    if (mouseX !== undefined) {
        const targetX = mouseX - paddle.width / 2;
        paddle.x += (targetX - paddle.x) * 0.15;
    }

    // Clamp paddle
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

    // Timer-based power-ups
    if (widerPaddle) {
        widerPaddleTimer--;
        if (widerPaddleTimer <= 0) {
            paddle.width = 120;
            widerPaddle = false;
        }
    }
    if (laserMode) {
        laserTimer--;
        if (laserTimer <= 0) laserMode = false;
    }
    if (slowBall) {
        slowBallTimer--;
        if (slowBallTimer <= 0) {
            slowBall = false;
            balls.forEach(b => {
                const angle = Math.atan2(b.dy, b.dx);
                const speed = ballSpeed;
                b.dx = Math.cos(angle) * speed;
                b.dy = Math.sin(angle) * speed;
            });
        }
    }

    // Lasers
    if (laserMode && Math.random() < 0.08) {
        lasers.push({ x: paddle.x + paddle.width / 2 - 2, y: paddle.y - 5, width: 4, height: 12, active: true });
    }

    // Update lasers
    lasers.forEach(l => {
        if (!l.active) return;
        l.y -= 8;
        // Check laser-brick collision
        for (let i = bricks.length - 1; i >= 0; i--) {
            const b = bricks[i];
            if (l.x > b.x && l.x < b.x + b.width && l.y > b.y && l.y < b.y + b.height) {
                b.health--;
                l.active = false;
                if (b.health <= 0) {
                    score += b.points;
                    createParticles(b.x + b.width / 2, b.y + b.height / 2, b.color, 12);
                    spawnPowerUp(b.x + b.width / 2, b.y + b.height / 2);
                    bricks.splice(i, 1);
                }
                playBrickSound();
                break;
            }
        }
        if (l.y < 0) l.active = false;
    });
    lasers = lasers.filter(l => l.active);

    // Update balls
    balls.forEach(ball => {
        if (!ball.active) return;

        const speedMult = slowBall ? 0.7 : 1;
        ball.x += ball.dx * speedMult;
        ball.y += ball.dy * speedMult;

        // Wall collisions
        if (ball.x - ball.radius < 0) {
            ball.x = ball.radius;
            ball.dx = Math.abs(ball.dx);
            playWallSound();
        }
        if (ball.x + ball.radius > canvas.width) {
            ball.x = canvas.width - ball.radius;
            ball.dx = -Math.abs(ball.dx);
            playWallSound();
        }
        if (ball.y - ball.radius < 0) {
            ball.y = ball.radius;
            ball.dy = Math.abs(ball.dy);
            playWallSound();
        }

        // Bottom - lose ball
        if (ball.y + ball.radius > canvas.height) {
            ball.active = false;
            return;
        }

        // Paddle collision
        if (ball.dy > 0 && ball.y + ball.radius >= paddle.y && ball.y + ball.radius <= paddle.y + paddle.height + 8 &&
            ball.x >= paddle.x - ball.radius && ball.x <= paddle.x + paddle.width + ball.radius) {
            ball.y = paddle.y - ball.radius;
            const hitPos = (ball.x - paddle.x) / paddle.width; // 0 to 1
            const angle = (hitPos - 0.5) * Math.PI * 0.7; // -63 to +63 degrees
            const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            ball.dx = Math.sin(angle) * speed;
            ball.dy = -Math.cos(angle) * speed;
            playPaddleSound();
        }

        // Brick collision
        for (let i = bricks.length - 1; i >= 0; i--) {
            const b = bricks[i];
            if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + b.width &&
                ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + b.height) {
                // Determine collision side
                const overlapLeft = (ball.x + ball.radius) - b.x;
                const overlapRight = (b.x + b.width) - (ball.x - ball.radius);
                const overlapTop = (ball.y + ball.radius) - b.y;
                const overlapBottom = (b.y + b.height) - (ball.y - ball.radius);
                const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                if (minOverlap === overlapTop || minOverlap === overlapBottom) {
                    ball.dy = -ball.dy;
                } else {
                    ball.dx = -ball.dx;
                }

                b.health--;
                if (b.health <= 0) {
                    score += b.points;
                    createParticles(b.x + b.width / 2, b.y + b.height / 2, b.color, 12);
                    spawnPowerUp(b.x + b.width / 2, b.y + b.height / 2);
                    bricks.splice(i, 1);
                }
                playBrickSound();
                break;
            }
        }
    });

    // Remove inactive balls
    balls = balls.filter(b => b.active);

    // Check lives
    if (balls.length === 0) {
        lives--;
        playLoseLife();
        if (lives <= 0) {
            gameState = 'gameover';
        } else {
            balls = [createBall(canvas.width / 2, canvas.height - 60, 3, -ballSpeed)];
        }
    }

    // Power-up collisions
    powerUps.forEach(p => {
        if (!p.active) return;
        p.y += p.dy;
        if (p.y > canvas.height) { p.active = false; return; }
        if (p.x + p.width > paddle.x && p.x < paddle.x + paddle.width && p.y + p.height > paddle.y && p.y < paddle.y + paddle.height) {
            p.active = false;
            activatePowerUp(p.type);
        }
    });
    powerUps = powerUps.filter(p => p.active);

    // Update particles
    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.05; // gravity
        p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);

    // Check level complete
    if (bricks.length === 0) {
        gameState = 'levelComplete';
        playLevelUp();
    }
}

function draw() {
    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(30,30,60,0.5)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // Bricks
    bricks.forEach(b => {
        const healthRatio = b.health / b.maxHealth;
        ctx.fillStyle = b.color;
        ctx.globalAlpha = 0.3 + healthRatio * 0.7;
        ctx.fillRect(b.x, b.y, b.width, b.height);
        ctx.globalAlpha = 1;

        // Brick shine
        const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height);
        grad.addColorStop(0, 'rgba(255,255,255,0.3)');
        grad.addColorStop(1, 'rgba(0,0,0,0.2)');
        ctx.fillStyle = grad;
        ctx.fillRect(b.x, b.y, b.width, b.height);

        // Brick border
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, b.y, b.width, b.height);

        // Health indicator for multi-hit bricks
        if (b.maxHealth > 1) {
            ctx.fillStyle = '#fff';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(b.health, b.x + b.width / 2, b.y + b.height / 2 + 4);
        }
    });

    // Paddle
    const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
    paddleGrad.addColorStop(0, '#00aaff');
    paddleGrad.addColorStop(1, '#0066cc');
    ctx.fillStyle = paddleGrad;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();

    // Paddle glow
    ctx.shadowColor = '#00aaff';
    ctx.shadowBlur = 15;
    ctx.fillStyle = 'rgba(0,170,255,0.3)';
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Paddle edge highlights
    ctx.strokeStyle = 'rgba(100,200,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(paddle.x + 1, paddle.y + 1, paddle.width - 2, paddle.height - 2, 6);
    ctx.stroke();

    // Lasers
    lasers.forEach(l => {
        if (!l.active) return;
        ctx.fillStyle = '#ff0000';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 8;
        ctx.fillRect(l.x, l.y, l.width, l.height);
        ctx.shadowBlur = 0;
    });

    // Balls
    balls.forEach(ball => {
        if (!ball.active) return;
        // Ball glow
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 15;
        const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.radius);
        ballGrad.addColorStop(0, '#ffffff');
        ballGrad.addColorStop(0.5, '#aaddff');
        ballGrad.addColorStop(1, '#4488cc');
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Ball highlight
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(ball.x - 2, ball.y - 2, ball.radius * 0.4, 0, Math.PI * 2);
        ctx.fill();
    });

    // Power-ups
    powerUps.forEach(p => {
        if (!p.active) return;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(p.x, p.y, p.width, p.height, 5);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.symbol, p.x + p.width / 2, p.y + p.height / 2);
    });

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // HUD
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px "Segoe UI", Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 15, 25);
    ctx.textAlign = 'center';
    ctx.fillText(`Level: ${level}`, canvas.width / 2, 25);

    // Lives
    ctx.textAlign = 'right';
    for (let i = 0; i < lives; i++) {
        ctx.fillStyle = '#ff3344';
        ctx.beginPath();
        const lx = canvas.width - 15 - i * 30;
        const ly = 20;
        ctx.arc(lx, ly, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff6688';
        ctx.beginPath();
        ctx.arc(lx - 2, ly - 2, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Active power-up indicators
    let indicatorX = 15;
    const indicatorY = 45;
    if (laserMode) {
        ctx.fillStyle = '#ff0000';
        ctx.font = '11px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('LASER', indicatorX, indicatorY);
        indicatorX += 55;
    }
    if (widerPaddle) {
        ctx.fillStyle = '#00ff00';
        ctx.font = '11px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('WIDE', indicatorX, indicatorY);
        indicatorX += 45;
    }
    if (slowBall) {
        ctx.fillStyle = '#00ccff';
        ctx.font = '11px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('SLOW', indicatorX, indicatorY);
        indicatorX += 45;
    }

    // Timer bars for active power-ups
    if (laserMode) {
        const pct = laserTimer / 600;
        ctx.fillStyle = 'rgba(255,0,0,0.3)';
        ctx.fillRect(15, 50, 60, 4);
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(15, 50, 60 * pct, 4);
    }
    if (widerPaddle) {
        const pct = widerPaddleTimer / 600;
        ctx.fillStyle = 'rgba(0,255,0,0.3)';
        ctx.fillRect(75, 50, 60, 4);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(75, 50, 60 * pct, 4);
    }
    if (slowBall) {
        const pct = slowBallTimer / 600;
        ctx.fillStyle = 'rgba(0,204,255,0.3)';
        ctx.fillRect(135, 50, 60, 4);
        ctx.fillStyle = '#00ccff';
        ctx.fillRect(135, 50, 60 * pct, 4);
    }

    // Start Screen
    if (gameState === 'start') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#00aaff';
        ctx.font = 'bold 52px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('BREAKOUT', canvas.width / 2, 180);

        ctx.fillStyle = '#ffffff';
        ctx.font = '18px "Segoe UI", Arial';
        ctx.fillText('Destroy all bricks to advance!', canvas.width / 2, 230);

        ctx.fillStyle = '#aaaaaa';
        ctx.font = '15px "Segoe UI", Arial';
        ctx.fillText('Move: Mouse or Arrow Keys / A,D', canvas.width / 2, 280);
        ctx.fillText('Pause: Escape', canvas.width / 2, 305);

        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 16px "Segoe UI", Arial';
        ctx.fillText('Power-Ups:', canvas.width / 2, 355);

        ctx.fillStyle = '#ff00ff';
        ctx.fillText('×3  Multi-Ball', canvas.width / 2 - 100, 385);
        ctx.fillStyle = '#00ff00';
        ctx.fillText('↔  Wider Paddle', canvas.width / 2 + 100, 385);
        ctx.fillStyle = '#ff0000';
        ctx.fillText('↑  Laser', canvas.width / 2 - 100, 415);
        ctx.fillStyle = '#00ccff';
        ctx.fillText('●  Slow Ball', canvas.width / 2 + 100, 415);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px "Segoe UI", Arial';
        ctx.fillText('Press ENTER or Click to Start', canvas.width / 2, 480);
    }

    // Paused
    if (gameState === 'paused') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 48px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
        ctx.font = '18px "Segoe UI", Arial';
        ctx.fillText('Press ESCAPE to resume', canvas.width / 2, canvas.height / 2 + 40);
    }

    // Game Over
    if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ff3344';
        ctx.font = 'bold 56px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, 220);

        ctx.fillStyle = '#ffffff';
        ctx.font = '24px "Segoe UI", Arial';
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 290);
        ctx.fillText(`Level Reached: ${level}`, canvas.width / 2, 325);

        ctx.fillStyle = '#aaaaaa';
        ctx.font = '18px "Segoe UI", Arial';
        ctx.fillText('Press ENTER or Click to Restart', canvas.width / 2, 400);
    }

    // Level Complete
    if (gameState === 'levelComplete') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 48px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`LEVEL ${level} COMPLETE!`, canvas.width / 2, 230);

        ctx.fillStyle = '#ffffff';
        ctx.font = '22px "Segoe UI", Arial';
        ctx.fillText(`Score: ${score}`, canvas.width / 2, 290);

        ctx.fillStyle = '#aaaaaa';
        ctx.font = '18px "Segoe UI", Arial';
        ctx.fillText('Press ENTER or Click for Next Level', canvas.width / 2, 360);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>

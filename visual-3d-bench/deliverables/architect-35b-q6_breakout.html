<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a1a;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
border: 2px solid #333;
border-radius: 4px;
box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 600;
canvas.width = W;
canvas.height = H;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'square', volume = 0.15) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playBrickBreak() {
    playSound(600 + Math.random() * 400, 0.1, 'square', 0.12);
    playSound(800 + Math.random() * 300, 0.08, 'triangle', 0.08);
}

function playPaddleHit() {
    playSound(300, 0.08, 'square', 0.1);
}

function playWallHit() {
    playSound(200, 0.06, 'triangle', 0.08);
}

function playLoseLife() {
    playSound(200, 0.3, 'sawtooth', 0.15);
    setTimeout(() => playSound(150, 0.3, 'sawtooth', 0.12), 150);
}

function playPowerUp() {
    playSound(500, 0.1, 'sine', 0.12);
    setTimeout(() => playSound(700, 0.1, 'sine', 0.12), 80);
    setTimeout(() => playSound(900, 0.15, 'sine', 0.12), 160);
}

function playLevelUp() {
    playSound(400, 0.15, 'sine', 0.15);
    setTimeout(() => playSound(500, 0.15, 'sine', 0.15), 120);
    setTimeout(() => playSound(600, 0.15, 'sine', 0.15), 240);
    setTimeout(() => playSound(800, 0.25, 'sine', 0.18), 360);
}

function playGameOver() {
    playSound(400, 0.3, 'sawtooth', 0.15);
    setTimeout(() => playSound(300, 0.3, 'sawtooth', 0.12), 200);
    setTimeout(() => playSound(200, 0.5, 'sawtooth', 0.1), 400);
}

function playLaser() {
    playSound(1200, 0.05, 'square', 0.08);
    playSound(1400, 0.03, 'sawtooth', 0.05);
}

// Game state
let gameState = 'start'; // start, playing, paused, gameover, levelup
let score = 0;
let lives = 3;
let level = 1;

// Paddle
const paddle = {
    x: W / 2 - 60,
    y: H - 40,
    width: 120,
    height: 14,
    speed: 8,
    color: '#4488ff',
    glowColor: 'rgba(68, 136, 255, 0.5)',
    targetWidth: 120,
    widthTimer: 0
};

// Ball
let balls = [];
let lasers = [];

function createBall(x, y, dx, dy, speed) {
    return {
        x: x || W / 2,
        y: y || H - 60,
        radius: 8,
        dx: dx || (Math.random() - 0.5) * 4,
        dy: dy || -speed,
        speed: speed || 5,
        attached: !dx && !dy
    };
}

// Bricks
let bricks = [];
const BRICK_ROWS = 6;
const BRICK_COLS = 12;
const BRICK_W = 58;
const BRICK_H = 22;
const BRICK_PAD = 4;
const BRICK_TOP = 60;
const BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

const BRICK_COLORS = [
    { color: '#ff4444', points: 60, glow: 'rgba(255,68,68,0.5)' },
    { color: '#ff8844', points: 50, glow: 'rgba(255,136,68,0.5)' },
    { color: '#ffcc44', points: 40, glow: 'rgba(255,204,68,0.5)' },
    { color: '#44cc44', points: 30, glow: 'rgba(68,204,68,0.5)' },
    { color: '#4488ff', points: 20, glow: 'rgba(68,136,255,0.5)' },
    { color: '#8844ff', points: 10, glow: 'rgba(136,68,255,0.5)' },
    { color: '#ff44cc', points: 80, glow: 'rgba(255,68,204,0.5)' },
    { color: '#44cccc', points: 25, glow: 'rgba(68,204,204,0.5)' },
];

// Power-ups
let powerUps = [];
const POWERUP_TYPES = ['multi', 'wide', 'laser', 'slow'];
const POWERUP_COLORS = { multi: '#ff4444', wide: '#4488ff', laser: '#ffcc44', slow: '#44cc44' };
const POWERUP_SYMBOLS = { multi: '⊕', wide: '↔', laser: '⚡', slow: '⏱' };

// Particles
let particles = [];

// Keys
const keys = {};
let mouseX = W / 2;

// Level generation
function generateBricks() {
    bricks = [];
    for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
            const x = BRICK_LEFT + col * (BRICK_W + BRICK_PAD);
            const y = BRICK_TOP + row * (BRICK_H + BRICK_PAD);
            let colorIndex;
            if (row < 2) colorIndex = 0;
            else if (row < 3) colorIndex = 1;
            else if (row < 4) colorIndex = 2;
            else if (row < 5) colorIndex = 3;
            else if (row < 6) colorIndex = 4;
            else colorIndex = 5;

            // Add some variety based on level
            if (level > 1 && Math.random() < 0.15) {
                colorIndex = Math.min(colorIndex + 1, BRICK_COLORS.length - 1);
            }
            if (level > 2 && Math.random() < 0.08) {
                colorIndex = 6; // high value brick
            }

            const hp = level >= 3 && Math.random() < 0.2 ? 2 : 1;

            bricks.push({
                x, y, width: BRICK_W, height: BRICK_H,
                color: BRICK_COLORS[colorIndex].color,
                points: BRICK_COLORS[colorIndex].points,
                glow: BRICK_COLORS[colorIndex].glow,
                hp: hp,
                maxHp: hp,
                alive: true,
                row: row,
                col: col
            });
        }
    }
}

// Power-up drop
function tryDropPowerUp(brick) {
    const dropChance = 0.08 + (level - 1) * 0.01;
    if (Math.random() < dropChance) {
        const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        powerUps.push({
            x: brick.x + BRICK_W / 2,
            y: brick.y + BRICK_H,
            width: 28,
            height: 16,
            type: type,
            vy: 2,
            color: POWERUP_COLORS[type],
            symbol: POWERUP_SYMBOLS[type],
            glow: `rgba(${hexToRgb(POWERUP_COLORS[type])},0.5)`
        });
    }
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r},${g},${b}`;
}

// Apply power-up
function applyPowerUp(type) {
    playPowerUp();
    switch (type) {
        case 'multi':
            const newBalls = [];
            balls.forEach(ball => {
                if (!ball.attached) {
                    for (let i = 0; i < 2; i++) {
                        const angle = Math.atan2(ball.dy, ball.dx) + (i === 0 ? 0.4 : -0.4);
                        newBalls.push({
                            x: ball.x, y: ball.y,
                            radius: ball.radius,
                            dx: Math.cos(angle) * ball.speed,
                            dy: Math.sin(angle) * ball.speed,
                            speed: ball.speed,
                            attached: false
                        });
                    }
                }
            });
            balls.push(...newBalls);
            break;
        case 'wide':
            paddle.width = 200;
            paddle.targetWidth = 200;
            paddle.widthTimer = 600;
            break;
        case 'laser':
            paddle.hasLaser = true;
            paddle.laserTimer = 480;
            break;
        case 'slow':
            balls.forEach(ball => {
                if (!ball.attached) {
                    const currentSpeed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                    if (currentSpeed > 1) {
                        const newSpeed = Math.max(2, currentSpeed * 0.6);
                        ball.dx = (ball.dx / currentSpeed) * newSpeed;
                        ball.dy = (ball.dy / currentSpeed) * newSpeed;
                    }
                }
            });
            break;
    }
}

// Particles
function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x: x,
            y: y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.02 + Math.random() * 0.02,
            size: 2 + Math.random() * 4,
            color: color
        });
    }
}

// Init ball
function initBall() {
    balls = [createBall(null, null, null, null, 5 + level * 0.5)];
}

// Reset paddle
function resetPaddle() {
    paddle.x = W / 2 - paddle.width / 2;
    paddle.hasLaser = false;
    paddle.laserTimer = 0;
    paddle.widthTimer = 0;
    paddle.targetWidth = 120;
    paddle.width = 120;
}

// Start game
function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    powerUps = [];
    particles = [];
    lasers = [];
    paddle.hasLaser = false;
    paddle.laserTimer = 0;
    paddle.widthTimer = 0;
    paddle.targetWidth = 120;
    paddle.width = 120;
    paddle.x = W / 2 - paddle.width / 2;
    generateBricks();
    initBall();
    gameState = 'playing';
}

function nextLevel() {
    level++;
    powerUps = [];
    lasers = [];
    particles = [];
    playLevelUp();
    generateBricks();
    resetPaddle();
    initBall();
    gameState = 'playing';
}

// Input
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'Escape') {
        if (gameState === 'playing') gameState = 'paused';
        else if (gameState === 'paused') gameState = 'playing';
    }
    if (e.key === ' ' || e.key === 'Enter') {
        if (gameState === 'start') {
            startGame();
        } else if (gameState === 'gameover') {
            startGame();
        }
    }
    if (e.key === 'l' && gameState === 'playing' && paddle.hasLaser) {
        balls.forEach(ball => {
            if (!ball.attached) {
                lasers.push({
                    x: ball.x,
                    y: ball.y - ball.radius,
                    dx: 0,
                    dy: -8,
                    width: 4,
                    height: 12,
                    life: 1
                });
            }
        });
        playLaser();
    }
    if (e.key === ' ' && gameState === 'playing') {
        balls.forEach(ball => {
            if (ball.attached) {
                ball.attached = false;
                ball.dy = -ball.speed;
                ball.dx = (Math.random() - 0.5) * 3;
            }
        });
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
});

canvas.addEventListener('click', () => {
    audioCtx.resume();
    if (gameState === 'start') {
        startGame();
    } else if (gameState === 'gameover') {
        startGame();
    }
});

// Update
function update() {
    if (gameState !== 'playing') return;

    // Paddle movement - keyboard
    if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
    if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;

    // Paddle movement - mouse
    const paddleCenter = paddle.x + paddle.width / 2;
    const diff = mouseX - paddleCenter;
    if (Math.abs(diff) > 2) {
        paddle.x += Math.sign(diff) * Math.min(Math.abs(diff) * 0.3, paddle.speed);
    }

    // Clamp paddle
    paddle.x = Math.max(0, Math.min(W - paddle.width, paddle.x));

    // Width timer
    if (paddle.widthTimer > 0) {
        paddle.widthTimer--;
        if (paddle.widthTimer <= 0) {
            paddle.width = 120;
            paddle.targetWidth = 120;
        }
    }

    // Laser timer
    if (paddle.hasLaser) {
        paddle.laserTimer--;
        if (paddle.laserTimer <= 0) {
            paddle.hasLaser = false;
        }
    }

    // Update balls
    balls.forEach(ball => {
        if (ball.attached) {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius - 1;
            return;
        }

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collisions
        if (ball.x - ball.radius <= 0) {
            ball.x = ball.radius;
            ball.dx = Math.abs(ball.dx);
            playWallHit();
        }
        if (ball.x + ball.radius >= W) {
            ball.x = W - ball.radius;
            ball.dx = -Math.abs(ball.dx);
            playWallHit();
        }
        if (ball.y - ball.radius <= 0) {
            ball.y = ball.radius;
            ball.dy = Math.abs(ball.dy);
            playWallHit();
        }

        // Bottom - lose life
        if (ball.y + ball.radius > H) {
            ball.dead = true;
        }

        // Paddle collision
        if (ball.dy > 0 &&
            ball.y + ball.radius >= paddle.y &&
            ball.y + ball.radius <= paddle.y + paddle.height + 4 &&
            ball.x >= paddle.x - ball.radius &&
            ball.x <= paddle.x + paddle.width + ball.radius) {

            const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
            const clampedHit = Math.max(-1, Math.min(1, hitPos));
            const angle = clampedHit * Math.PI / 3;

            const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            ball.dx = Math.sin(angle) * speed;
            ball.dy = -Math.cos(angle) * speed;

            ball.y = paddle.y - ball.radius - 1;

            playPaddleHit();
        }

        // Brick collision
        bricks.forEach(brick => {
            if (!brick.alive) return;

            if (ball.x + ball.radius > brick.x &&
                ball.x - ball.radius < brick.x + brick.width &&
                ball.y + ball.radius > brick.y &&
                ball.y - ball.radius < brick.y + brick.height) {

                // Determine collision side
                const overlapLeft = (ball.x + ball.radius) - brick.x;
                const overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
                const overlapTop = (ball.y + ball.radius) - brick.y;
                const overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);

                const minOverlapX = Math.min(overlapLeft, overlapRight);
                const minOverlapY = Math.min(overlapTop, overlapBottom);

                if (minOverlapX < minOverlapY) {
                    ball.dx = -ball.dx;
                } else {
                    ball.dy = -ball.dy;
                }

                brick.hp--;
                if (brick.hp <= 0) {
                    brick.alive = false;
                    score += brick.points;
                    spawnParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);
                    playBrickBreak();
                    tryDropPowerUp(brick);
                } else {
                    playBrickBreak();
                    // Flash effect
                    brick.flashTimer = 6;
                }
            }
        });

        // Laser collision with bricks
        lasers.forEach(laser => {
            bricks.forEach(brick => {
                if (!brick.alive) return;
                if (laser.x + laser.width > brick.x &&
                    laser.x < brick.x + brick.width &&
                    laser.y + laser.height > brick.y &&
                    laser.y < brick.y + brick.height) {
                    brick.hp--;
                    if (brick.hp <= 0) {
                        brick.alive = false;
                        score += brick.points;
                        spawnParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color);
                        playBrickBreak();
                        tryDropPowerUp(brick);
                    }
                    laser.dead = true;
                }
            });
        });
    });

    // Remove dead balls
    balls = balls.filter(b => !b.dead && !b.attached || b.attached);

    // Remove dead lasers
    lasers = lasers.filter(l => !l.dead);

    // Update lasers
    lasers.forEach(l => {
        l.y += l.dy;
        if (l.y < 0) l.dead = true;
    });

    // Update power-ups
    powerUps.forEach(pu => {
        pu.y += pu.vy;

        // Check paddle collision
        if (pu.y + pu.height >= paddle.y &&
            pu.y <= paddle.y + paddle.height &&
            pu.x + pu.width / 2 >= paddle.x &&
            pu.x - pu.width / 2 <= paddle.x + paddle.width) {
            applyPowerUp(pu.type);
            pu.dead = true;
        }

        if (pu.y > H) pu.dead = true;
    });
    powerUps = powerUps.filter(p => !p.dead);

    // Update particles
    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.05;
        p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);

    // Check level complete
    if (bricks.every(b => !b.alive)) {
        gameState = 'levelup';
        setTimeout(() => nextLevel(), 2000);
    }

    // Check game over
    if (lives <= 0 && balls.length === 0) {
        gameState = 'gameover';
        playGameOver();
    }
}

// Draw
function draw() {
    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Background stars
    drawStars();

    if (gameState === 'start') {
        drawStartScreen();
        return;
    }

    if (gameState === 'gameover') {
        drawGameScreen();
        drawGameOver();
        return;
    }

    drawGameScreen();

    if (gameState === 'paused') {
        drawPauseScreen();
    }

    if (gameState === 'levelup') {
        drawLevelUp();
    }
}

let starPositions = [];
for (let i = 0; i < 50; i++) {
    starPositions.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 1.5 + 0.5,
        brightness: Math.random() * 0.5 + 0.2
    });
}

function drawStars() {
    starPositions.forEach(s => {
        const flicker = 0.5 + Math.sin(Date.now() * 0.003 + s.x) * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${s.brightness * flicker})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
}

function drawGameScreen() {
    // HUD
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 15, 30);
    ctx.textAlign = 'center';
    ctx.fillText(`Level: ${level}`, W / 2, 30);
    ctx.textAlign = 'right';

    // Lives
    for (let i = 0; i < lives; i++) {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        const lx = W - 30 - i * 28;
        const ly = 25;
        const ls = 8;
        // Heart shape
        ctx.moveTo(lx, ly + ls * 0.4);
        ctx.bezierCurveTo(lx, ly, lx - ls, ly, lx - ls, ly + ls * 0.4);
        ctx.bezierCurveTo(lx - ls, ly + ls * 0.8, lx, ly + ls * 1.1, lx, ly + ls * 1.3);
        ctx.bezierCurveTo(lx, ly + ls * 1.1, lx + ls, ly + ls * 0.8, lx + ls, ly + ls * 0.4);
        ctx.bezierCurveTo(lx + ls, ly, lx, ly, lx, ly + ls * 0.4);
        ctx.fill();
    }

    // Draw power-up active indicators
    if (paddle.widthTimer > 0) {
        ctx.fillStyle = '#4488ff';
        ctx.font = '14px "Segoe UI", sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`↔ Wide: ${Math.ceil(paddle.widthTimer / 60)}s`, 15, 52);
    }
    if (paddle.hasLaser) {
        ctx.fillStyle = '#ffcc44';
        ctx.textAlign = 'left';
        ctx.fillText(`⚡ Laser [L]: ${Math.ceil(paddle.laserTimer / 60)}s`, 15, 70);
    }

    // Draw bricks
    bricks.forEach(brick => {
        if (!brick.alive) return;

        const glowAlpha = brick.flashTimer ? 0.6 : 0.15;

        // Glow
        ctx.shadowColor = brick.glow;
        ctx.shadowBlur = 10;

        // Brick body
        const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
        gradient.addColorStop(0, lightenColor(brick.color, 30));
        gradient.addColorStop(1, brick.color);
        ctx.fillStyle = gradient;

        const radius = 3;
        ctx.beginPath();
        ctx.moveTo(brick.x + radius, brick.y);
        ctx.lineTo(brick.x + brick.width - radius, brick.y);
        ctx.quadraticCurveTo(brick.x + brick.width, brick.y, brick.x + brick.width, brick.y + radius);
        ctx.lineTo(brick.x + brick.width, brick.y + brick.height - radius);
        ctx.quadraticCurveTo(brick.x + brick.width, brick.y + brick.height, brick.x + brick.width - radius, brick.y + brick.height);
        ctx.lineTo(brick.x + radius, brick.y + brick.height);
        ctx.quadraticCurveTo(brick.x, brick.y + brick.height, brick.x, brick.y + brick.height - radius);
        ctx.lineTo(brick.x, brick.y + radius);
        ctx.quadraticCurveTo(brick.x, brick.y, brick.x + radius, brick.y);
        ctx.fill();

        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(brick.x + 2, brick.y + 2, brick.width - 4, brick.height / 3);

        // HP indicator for multi-hit bricks
        if (brick.maxHp > 1) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(brick.hp, brick.x + brick.width / 2, brick.y + brick.height / 2 + 4);
        }

        ctx.shadowBlur = 0;

        if (brick.flashTimer) brick.flashTimer--;
    });

    // Draw power-ups
    powerUps.forEach(pu => {
        ctx.shadowColor = pu.glow;
        ctx.shadowBlur = 8;

        ctx.fillStyle = pu.color;
        const radius = 8;
        ctx.beginPath();
        ctx.moveTo(pu.x - pu.width / 2 + radius, pu.y - pu.height / 2);
        ctx.lineTo(pu.x + pu.width / 2 - radius, pu.y - pu.height / 2);
        ctx.quadraticCurveTo(pu.x + pu.width / 2, pu.y - pu.height / 2, pu.x + pu.width / 2, pu.y - pu.height / 2 + radius);
        ctx.lineTo(pu.x + pu.width / 2, pu.y + pu.height / 2 - radius);
        ctx.quadraticCurveTo(pu.x + pu.width / 2, pu.y + pu.height / 2, pu.x + pu.width / 2 - radius, pu.y + pu.height / 2);
        ctx.lineTo(pu.x - pu.width / 2 + radius, pu.y + pu.height / 2);
        ctx.quadraticCurveTo(pu.x - pu.width / 2, pu.y + pu.height / 2, pu.x - pu.width / 2, pu.y + pu.height / 2 - radius);
        ctx.lineTo(pu.x - pu.width / 2, pu.y - pu.height / 2 + radius);

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Raycaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;cursor:none}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#fff}
#overlay h1{font-size:48px;color:#f44;margin-bottom:20px;text-shadow:0 0 20px #f44}
#overlay p{font-size:16px;margin:4px 0;color:#aaa}
#overlay .key{color:#ff0;font-weight:bold}
#overlay button{margin-top:30px;padding:12px 40px;font-size:20px;background:#f44;color:#fff;border:none;cursor:pointer;font-family:inherit}
#overlay button:hover{background:#c33}
#pauseMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:28px;z-index:5;display:none;text-shadow:0 0 10px #000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
<h1>☠ RAY CASTER ☠</h1>
<p><span class="key">WASD</span> Move &nbsp; <span class="key">Mouse</span> Aim &nbsp; <span class="key">LMB/Space</span> Shoot</p>
<p><span class="key">R</span> Reload &nbsp; <span class="key">Shift</span> Sprint &nbsp; <span class="key">M</span> Toggle Minimap</p>
<p><span class="key">P/Esc</span> Pause</p>
<p style="margin-top:15px;color:#f88">Find the exit — marked by a green glow in the maze!</p>
<button id="startBtn">CLICK TO START</button>
</div>
<div id="pauseMsg">PAUSED</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const pauseMsg=document.getElementById('pauseMsg');
const startBtn=document.getElementById('startBtn');

// --- Constants ---
const W=800,H=600,TILE=1;
const FOV=Math.PI/3;
const HALF_FOV=FOV/2;
const NUM_RAYS=W;
const MAX_DEPTH=20;
const WALL_COLORS={1:'#666',2:'#844',3:'#468',4:'#684'};
const WALL_SHADES={1:0.9,2:0.7,3:0.8,4:0.6};
const SPRITE_WALL=0,SPRITE_ENEMY=1,SPRITE_AMMO=2,SPRITE_HEALTH=3,SPRITE_EXIT=4;
const PLAYER_START={x:1.5,y:1.5};
const ENEMY_DAMAGE=10;
const ENEMY_ATTACK_RANGE=1.5;
const ENEMY_ATTACK_COOLDOWN=1200;
const ENEMY_SPEED=0.015;
const ENEMY_SPEED_SPRINT=0.025;
const ENEMY_HP=50;
const ENEMY_DAMAGE=15;
const ENEMY_HITBOX=0.3;
const PLAYER_SPEED=0.04;
const PLAYER_SPEED_SPRINT=0.07;
const PLAYER_HP_MAX=100;
const PLAYER_AMMO_MAX=30;
const PLAYER_AMMO_RESERVE=90;
const FIRE_RATE=150;
const RELOAD_TIME=1500;
const PROJECTILE_SPEED=0.3;
const PROJECTILE_DAMAGE=25;
const PROJECTILE_LIFETIME=120;
const PICKUP_RADIUS=0.5;
const EXIT_POS={x:14.5,y:14.5};

// --- Game State ---
let gameState='menu';
let paused=false;
let minimapVisible=false;
let lastTime=0;
let frameCount=0;

// --- Map ---
let map=[];
let mapW=0,mapH=0;

function generateMap(){
    const W=16,H=16;
    map=new Array(W*H).fill(0);
    for(let i=0;i<W;i++){map[i]=1;map[(H-1)*W+i]=1;}
    for(let j=0;j<H;j++){map[j*W]=1;map[j*W+W-1]=1;}
    // Rooms
    const rooms=[
        {x:2,y:2,w:4,h:4},{x:8,y:2,w:4,h:3},
        {x:2,y:8,w:3,h:4},{x:8,y:8,w:5,h:4},
        {x:12,y:11,w:3,h:3}
    ];
    rooms.forEach(r=>{
        for(let i=r.x;i<r.x+r.w;i++)for(let j=r.y;j<r.y+r.h;j++){
            if(i>0&&i<W-1&&j>0&&j<H-1)map[j*W+i]=0;
        }
    });
    // Corridors
    const corridors=[
        {x:2,y:2,wx:4,wy:5},{x:4,y:5,wx:6,wy:5},
        {x:6,y:5,wx:8,wy:5},{x:8,y:5,wx:10,wy:7},
        {x:10,y:7,wx:12,wy:7},{x:12,y:7,wx:12,wy:9},
        {x:2,y:8,wx:4,wy:10},{x:4,y:10,wx:6,wy:10},
        {x:6,y:10,wx:8,wy:10},{x:8,y:10,wx:10,wy:10},
        {x:10,y:10,wx:12,wy:10}
    ];
    corridors.forEach(c=>{
        let x1=Math.min(c.x,c.wx),x2=Math.max(c.x,c.wx);
        let y1=Math.min(c.y,c.wy),y2=Math.max(c.y,c.wy);
        for(let x=x1;x<=x2;x++)for(let y=y1;y<=y2;y++){
            if(x>0&&x<W-1&&y>0&&y<H-1)map[y*W+x]=1;
        }
    });
    // Set some walls inside rooms for variety
    const wallPositions=[
        [3,3],[3,4],[9,3],[10,3],[9,2],[10,2],
        [3,9],[3,10],[9,9],[10,9],[11,9],[12,9],
        [5,9],[13,12],[14,12],[15,12],[13,13],[14,13],[15,13]
    ];
    wallPositions.forEach(([x,y])=>{
        if(x>0&&x<W-1&&y>0&&y<H-1)map[y*W+x]=1;
    });
    mapW=W;mapH=H;
}

function isWall(x,y){
    const ix=Math.floor(x),iy=Math.floor(y);
    if(ix<0||iy<0||ix>=mapW||iy>=mapH)return true;
    return map[iy*mapW+ix]!==0;
}

function isSolid(x,y){
    return isWall(x,y);
}

// --- Entities ---
let enemies=[];
let pickups=[];
let projectiles=[];
let particles=[];
let flashTimer=0;
let muzzleFlash=0;

function spawnEnemies(){
    enemies=[];
    const positions=[
        {x:9.5,y:3.5},{x:13.5,y:12.5},{x:12.5,y:12.5},
        {x:3.5,y:9.5},{x:10.5,y:10.5},{x:6.5,y:9.5}
    ];
    positions.forEach(p=>{
        enemies.push({
            x:p.x,y:p.y,
            hp:ENEMY_HP,maxHp:ENEMY_HP,
            speed:ENEMY_SPEED,
            lastAttack:0,
            alert:false,
            alertTimer:0,
            type:Math.random()<0.3?1:0,
            hitTimer:0
        });
    });
}

function spawnPickups(){
    pickups=[];
    // Ammo pickups
    [{x:5.5,y:5.5},{x:11.5,y:1.5},{x:7.5,y:11.5}].forEach(p=>{
        pickups.push({x:p.x,y:p.y,type:SPRITE_AMMO,amount:15});
    });
    // Health pickups
    [{x:13.5,y:1.5},{x:3.5,y:12.5},{x:10.5,y:13.5}].forEach(p=>{
        pickups.push({x:p.x,y:p.y,type:SPRITE_HEALTH,amount:25});
    });
    // Exit
    pickups.push({x:EXIT_POS.x,y:EXIT_POS.y,type:SPRITE_EXIT});
}

function spawnParticles(x,y,color,count){
    for(let i=0;i<count;i++){
        particles.push({
            x,y,
            vx:(Math.random()-0.5)*0.03,
            vy:(Math.random()-0.5)*0.03,
            life:30+Math.random()*30,
            color
        });
    }
}

// --- Player ---
let player={
    x:PLAYER_START.x,y:PLAYER_START.y,
    angle:0,hp:PLAYER_HP_MAX,
    ammo:PLAYER_AMMO_MAX,reserve:PLAYER_AMMO_RESERVE,
    reloading:false,reloadTimer:0,
    lastShot:0,sprinting:false,
    bobTimer:0,bobAmount:0
};

// --- Input ---
const keys={};
let mouseDown=false;

document.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(e.code==='KeyP'||e.code==='Escape'){
        if(gameState==='playing')togglePause();
    }
    if(e.code==='KeyR'&&gameState==='playing'){
        reload();
    }
    if(e.code==='KeyM'&&gameState==='playing'){
        minimapVisible=!minimapVisible;
    }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('mousedown',e=>{
    if(gameState==='playing'){
        mouseDown=true;
        shoot();
    }
});
canvas.addEventListener('mouseup',()=>{mouseDown=false;});
canvas.addEventListener('mousemove',e=>{
    if(gameState==='playing'&&document.pointerLockElement===canvas){
        player.angle+=e.movementX*0.002;
    }
});

function togglePause(){
    paused=!paused;
    pauseMsg.style.display=paused?'block':'none';
    if(!paused)canvas.requestPointerLock();
    else document.exitPointerLock();
}

function reload(){
    if(player.reloading||player.ammo===PLAYER_AMMO_MAX||player.reserve<=0)return;
    player.reloading=true;
    player.reloadTimer=RELOAD_TIME;
}

function shoot(){
    if(player.reloading)return;
    const now=Date.now();
    if(now-player.lastShot<FIRE_RATE)return;
    if(player.ammo<=0){
        reload();
        return;
    }
    player.ammo--;
    player.lastShot=now;
    muzzleFlash=5;
    // Raycast for hit detection
    const cosA=Math.cos(player.angle),sinA=Math.sin(player.angle);
    const dx=cosA,dy=sinA;
    let closestEnemy=null,minDist=MAX_DEPTH;
    for(const e of enemies){
        const ex=e.x-player.x,ey=e.y-player.y;
        const dot=ex*dx+ey*dy;
        if(dot<=0)continue;
        const perpDist=Math.abs(ex*dy-ey*dx);
        if(perpDist<ENEMY_HITBOX&&dot<minDist){
            // Check wall occlusion
            let blocked=false;
            for(let d=0;d<dot;d+=0.1){
                if(isWall(player.x+dx*d,player.y+dy*d)){blocked=true;break;}
            }
            if(!blocked){
                minDist=dot;
                closestEnemy=e;
            }
        }
    }
    if(closestEnemy){
        closestEnemy.hp-=PROJECTILE_DAMAGE;
        closestEnemy.hitTimer=10;
        closestEnemy.alert=true;
        closestEnemy.alertTimer=300;
        spawnParticles(closestEnemy.x,closestEnemy.y,'#f44',8);
        if(closestEnemy.hp<=0){
            spawnParticles(closestEnemy.x,closestEnemy.y,'#ff0',15);
        }
    }
    // Muzzle projectile (also add visible projectile)
    projectiles.push({
        x:player.x+dx*0.5,y:player.y+dy*0.5,
        dx:dx*PROJECTILE_SPEED,dy:dy*PROJECTILE_SPEED,
        life:PROJECTILE_LIFETIME,owner:'player'
    });
}

// --- Collision ---
function moveEntity(entity,dx,dy){
    const margin=0.2;
    const nx=entity.x+dx,ny=entity.y+dy;
    if(!isSolid(nx-margin,entity.y-margin)&&!isSolid(nx+margin,entity.y-margin)&&
       !isSolid(nx-margin,entity.y+margin)&&!isSolid(nx+margin,entity.y+margin)){
        entity.x=nx;
    }
    if(!isSolid(entity.x-margin,ny-margin)&&!isSolid(entity.x+margin,ny-margin)&&
       !isSolid(entity.x-margin,ny+margin)&&!isSolid(entity.x+margin,ny+margin)){
        entity.y=ny;
    }
}

function movePlayer(){
    const speed=player.sprinting?PLAYER_SPEED_SPRINT:PLAYER_SPEED;
    const cosA=Math.cos(player.angle),sinA=Math.sin(player.angle);
    let mx=0,my=0;
    let moving=false;
    if(keys['KeyW']){mx+=cosA*speed;my+=sinA*speed;moving=true;}
    if(keys['KeyS']){mx-=cosA*speed;my-=sinA*speed;moving=true;}
    if(keys['KeyA']){mx+=sinA*speed;my-=cosA*speed;moving=true;}
    if(keys['KeyD']){mx-=sinA*speed;my+=cosA*speed;moving=true;}
    if(keys['ShiftLeft']||keys['ShiftRight'])player.sprinting=true;
    else player.sprinting=false;
    moveEntity(player,mx,my);
    if(moving){
        player.bobTimer+=player.sprinting?0.15:0.1;
        player.bobAmount=Math.sin(player.bobTimer)*3;
    }else{
        player.bobAmount*=0.9;
    }
    // Check exit
    const exitPickup=pickups.find(p=>p.type===SPRITE_EXIT);
    if(exitPickup){
        const dx=player.x-exitPickup.x,dy=player.y-exitPickup.y;
        if(Math.sqrt(dx*dx+dy*dy)<PICKUP_RADIUS){
            winGame();
        }
    }
}

// --- Update ---
function update(){
    if(paused)return;
    frameCount++;
    // Player movement
    movePlayer();
    // Auto-fire
    if(mouseDown&&gameState==='playing'){
        shoot();
    }
    // Reload
    if(player.reloading){
        player.reloadTimer-=16.67;
        if(player.reloadTimer<=0){
            const needed=PLAYER_AMMO_MAX-player.ammo;
            const available=Math.min(needed,player.reserve);
            player.ammo+=available;
            player.reserve-=available;
            player.reloading=false;
        }
    }
    // Update enemies
    for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        if(e.hp<=0){
            spawnParticles(e.x,e.y,'#888',12);
            enemies.splice(i,1);
            continue;
        }
        const dx=player.x-e.x,dy=player.y-e.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        // Alert behavior
        if(dist<ENEMY_ATTACK_RANGE*2){
            e.alert=true;
            e.alertTimer=300;
        }
        if(e.alertTimer>0){e.alertTimer--;if(e.alertTimer<=0)e.alert=false;}
        if(e.alert){
            // Move toward player
            if(dist>ENEMY_ATTACK_RANGE*0.8){
                const spd=e.type===1?ENEMY_SPEED_SPRINT:ENEMY_SPEED;
                const nx=dx/dist,ny=dy/dist;
                moveEntity(e,nx*spd,ny*spd);
            }
            // Attack
            if(dist<ENEMY_ATTACK_RANGE&&Date.now()-e.lastAttack>ENEMY_ATTACK_COOLDOWN){
                e.lastAttack=Date.now();
                // Attack player
                player.hp-=ENEMY_DAMAGE;
                flashTimer=10;
                spawnParticles(player.x,player.y,'#f00',5);
                if(player.hp<=0){
                    gameState='dead';
                    showOverlay('YOU DIED','Click to restart');
                }
            }
        }
        if(e.hitTimer>0)e.hitTimer--;
    }
    // Update projectiles
    for(let i=projectiles.length-1;i>=0;i--){
        const p=projectiles[i];
        p.x+=p.dx;p.y+=p.dy;p.life--;
        if(p.life<=0||isWall(p.x,p.y)){
            spawnParticles(p.x,p.y,'#ff0',3);
            projectiles.splice(i,1);
            continue;
        }
        // Check enemy hit
        if(p.owner==='player'){
            for(const e of enemies){
                const dx=p.x-e.x,dy=p.y-e.y;
                if(Math.sqrt(dx*dx+dy*dy)<ENEMY_HITBOX){
                    e.hp-=PROJECTILE_DAMAGE*0.3;
                    e.hitTimer=10;
                    e.alert=true;e.alertTimer=300;
                    spawnParticles(p.x,p.y,'#f44',5);
                    projectiles.splice(i,1);
                    break;
                }
            }
        }
    }
    // Update particles
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx;p.y+=p.vy;p.life--;
        if(p.life<=0)particles.splice(i,1);
    }
    // Pickups
    for(const p of pickups){
        if(p.type===SPRITE_AMMO||p.type===SPRITE_HEALTH){
            const dx=player.x-p.x,dy=player.y-p.y;
            if(Math.sqrt(dx*dx+dy*dy)<PICKUP_RADIUS){
                if(p.type===SPRITE_AMMO){
                    player.reserve+=p.amount;
                }else if(p.type===SPRITE_HEALTH&&player.hp<PLAYER_HP_MAX){
                    player.hp=Math.min(PLAYER_HP_MAX,player.hp+p.amount);
                }
                p.type=0; // collected
            }
        }
    }
    // Flash timer
    if(flashTimer>0)flashTimer--;
    if(muzzleFlash>0)muzzleFlash--;
}

function winGame(){
    gameState='won';
    showOverlay('YOU WON!','All enemies eliminated and exit reached!','Click to play again');
}

function showOverlay(title,subtitle,btnText){
    overlay.style.display='flex';
    overlay.querySelector('h1').textContent=title;
    overlay.querySelector('h1').style.color=gameState==='won'?'#0f0':'#f44';
    const p=overlay.querySelector('p:last-of-type');
    p.textContent=subtitle;
    startBtn.textContent=btnText||'PLAY AGAIN';
}

function resetGame(){
    generateMap();
    player.x=PLAYER_START.x;player.y=PLAYER_START.y;
    player.angle=0;player.hp=PLAYER_HP_MAX;
    player.ammo=PLAYER_AMMO_MAX;player.reserve=PLAYER_AMMO_RESERVE;
    player.reloading=false;player.reloadTimer=0;
    player.lastShot=0;player.sprinting=false;player.bobTimer=0;player.bobAmount=0;
    projectiles=[];particles=[];flashTimer=0;muzzleFlash=0;
    spawnEnemies();spawnPickups();
    gameState='playing';
    overlay.style.display='none';
    paused=false;pauseMsg.style.display='none';
    canvas.requestPointerLock();
}

// --- Rendering ---
function render(){
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);
    // Sky gradient
    const skyGrad=ctx.createLinearGradient(0,0,0,H/2);
    skyGrad.addColorStop(0,'#112');
    skyGrad.addColorStop(1,'#334');
    ctx.fillStyle=skyGrad;
    ctx.fillRect(0,0,W,H/2);
    // Floor gradient
    const floorGrad=ctx.createLinearGradient(0,H/2,0,H);
    floorGrad.addColorStop(0,'#333');
    floorGrad.addColorStop(1,'#111');
    ctx.fillStyle=floorGrad;
    ctx.fillRect(0,H/2,W,H/2);
    // Raycast walls
    const stripWidth=W/NUM_RAYS;
    const zBuffer=new Float32Array(NUM_RAYS);
    for(let i=0;i<NUM_RAYS;i++){
        const rayAngle=player.angle-HALF_FOV+(i/NUM_RAYS)*FOV;
        const cosA=Math.cos(rayAngle),sinA=Math.sin(rayAngle);
        // DDA
        let mapX=Math.floor(player.x),mapY=Math.floor(player.y);
        const stepX=Math.sign(cosA),stepY=Math.sign(sinA);
        let sideDistX,sideDistY;
        const deltaDistX=Math.abs(1/cosA),deltaDistY=Math.abs(1/sinA);
        if(cosA<0)sideDistX=(player.x-mapX)*deltaDistX;
        else sideDistX=(mapX+1-player.x)*deltaDistX;
        if(sinA<0)sideDistY=(player.y-mapY)*deltaDistY;
        else sideDistY=(mapY+1-player.y)*deltaDistY;
        let side=0,hit=false;
        while(!hit&&sideDistX<MAX_DEPTH&&sideDistY<MAX_DEPTH){
            if(sideDistX<sideDistY){
                sideDistX+=deltaDistX;mapX+=stepX;side=0;
            }else{
                sideDistY+=deltaDistY;mapY+=stepY;side=1;
            }
            if(mapY>=0&&mapY<mapH&&mapX>=0&&mapX<mapW&&map[mapY*mapW+mapX]>0){
                hit=true;
            }
        }
        let perpDist;
        if(side===0)perpDist=(mapX-player.x+(1-stepX)/2)/cosA;
        else perpDist=(mapY-player.y+(1-stepY)/2)/sinA;
        zBuffer[i]=perpDist;
        if(perpDist>0&&perpDist<MAX_DEPTH){
            const lineHeight=Math.min(H*1.5,H/perpDist);
            const drawStart=Math.max(0,(H-lineHeight)/2+player.bobAmount);
            const drawEnd=Math.min(H,drawStart+lineHeight);
            // Wall color
            const tileType=map[mapY*mapW+mapX]||1;
            let color=WALL_COLORS[tileType]||'#666';
            let shade=WALL_SHADES[tileType]||0.8;
            // Distance shading
            const distFrac=Math.max(0,1-perpDist/MAX_DEPTH);
            const fogFactor=0.15+0.85*distFrac;
            // Side shading
            if(side===1)shade*=0.7;
            // Parse color and apply shade
            const r=parseInt(color.slice(1,3),16);
            const g=parseInt(color.slice(3,5),16);
            const b=parseInt(color.slice(5,7),16);
            const fr=Math.floor(r*shade*fogFactor);
            const fg=Math.floor(g*shade*fogFactor);
            const fb=Math.floor(b*shade*fogFactor);
            ctx.fillStyle=`rgb(${fr},${fg},${fb})`;
            ctx.fillRect(i*stripWidth,drawStart,stripWidth+1,lineHeight);
            // Wall edge highlight
            if(drawEnd-drawStart>10){
                ctx.fillStyle=`rgba(255,255,255,${0.03*distFrac})`;
                ctx.fillRect(i*stripWidth,drawStart,stripWidth+1,1);
                ctx.fillStyle=`rgba(0,0,0,${0.15*distFrac})`;
                ctx.fillRect(i*stripWidth,drawEnd-1,stripWidth+1,1);
            }
        }
    }
    // Render sprites
    renderSprites(zBuffer);
    // Flash effect
    if(flashTimer>0){
        ctx.fillStyle=`rgba(255,0,0,${flashTimer*0.04})`;
        ctx.fillRect(0,0,W,H);
    }
    // Muzzle flash
    if(muzzleFlash>0){
        const cx=W/2,cy=H/2;
        const grad=ctx.createRadialGradient(cx,cy+H/2-20,0,cx,cy+H/2-20,40);
        grad.addColorStop(0,`rgba(255,255,100,${muzzleFlash*0.15})`);
        grad.addColorStop(1,'rgba(255,200,0,0)');
        ctx.fillStyle=grad;
        ctx.fillRect(cx-60,cy+H/2-80,120,100);
    }
    // Weapon
    drawWeapon();
    // Crosshair
    drawCrosshair();
    // HUD
    drawHUD();
    // Minimap
    if(minimapVisible)drawMinimap();
}

function renderSprites(zBuffer){
    // Collect all sprites with distance
    const sprites=[];
    for(const e of enemies){
        const dx=e.x-player.x,dy=e.y-player.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAX_DEPTH)sprites.push({x:e.x,y:e.y,dist,type:SPRITE_ENEMY,data:e});
    }
    for(const p of pickups){
        if(p.type===0)continue;
        const dx=p.x-player.x,dy=p.y-player.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAX_DEPTH)sprites.push({x:p.x,y:p.y,dist,type:p.type});

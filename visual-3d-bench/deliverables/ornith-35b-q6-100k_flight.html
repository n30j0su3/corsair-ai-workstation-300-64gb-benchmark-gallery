"use strict";

// ==================== MATH UTILITIES ====================
const PI = Math.PI, TAU = PI * 2;
const deg2rad = d => d * PI / 180;
const rad2deg = r => r * 180 / PI;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;
const smoothstep = (lo, hi, v) => { let t = clamp((v - lo) / (hi - lo), 0, 1); return t * t * (3 - 2 * t); };

class Vec3 {
    constructor(x=0,y=0,z=0){this.x=x;this.y=y;this.z=z;}
    set(x,y,z){this.x=x;this.y=y;this.z=z;return this;}
    copy(v){this.x=v.x;this.y=v.y;this.z=v.z;return this;}
    add(v){return new Vec3(this.x+v.x,this.y+v.y,this.z+v.z);}
    sub(v){return new Vec3(this.x-v.x,this.y-v.y,this.z-v.z);}
    scale(s){return new Vec3(this.x*s,this.y*s,this.z*s);}
    dot(v){return this.x*v.x+this.y*v.y+this.z*v.z;}
    cross(v){return new Vec3(this.y*v.z-this.z*v.y,this.z*v.x-this.x*v.z,this.x*v.y-this.y*v.x);}
    len(){return Math.sqrt(this.x*this.x+this.y*this.y+this.z*this.z);}
    norm(){let l=this.len();if(l<1e-8)return new Vec3();return new Vec3(this.x/l,this.y/l,this.z/l);}
    distTo(v){return this.sub(v).len();}
    addEq(v){this.x+=v.x;this.y+=v.y;this.z+=v.z;return this;}
    scaleEq(s){this.x*=s;this.y*=s;this.z*=s;return this;}
}

class Mat4 {
    constructor(){this.m=new Float32Array(16);this.m[0]=this.m[5]=this.m[10]=this.m[15]=1;}
    static identity(){return new Mat4();}
    static perspective(fov,aspect,near,far){
        let m=new Mat4();let f=1/Math.tan(fov/2);m.m[0]=f/aspect;m.m[5]=f;m.m[10]=(far+near)/(near-far);m.m[11]=-1;m.m[14]=2*far*near/(near-far);return m;
    }
    static lookAt(eye,center,up){
        let m=new Mat4();
        let zx=eye.x-center.x,zy=eye.y-center.y,zz=eye.z-center.z;
        let zlen=Math.sqrt(zx*zx+zy*zy+zz*zz);zx/=zlen;zy/=zlen;zz/=zlen;
        let xx=up.y*zz-up.z*zy,xy=up.z*zx-up.x*zz,xz=up.x*zy-up.y*zx;
        let xlen=Math.sqrt(xx*xx+xy*xy+xz*xz);xx/=xlen;xy/=xlen;xz/=xlen;
        let yx=zy*xz-zz*xy,yy=zz*xx-zx*xz,yz=zx*xy-zy*xx;
        m.m[0]=xx;m.m[1]=yx;m.m[2]=zy;m.m[3]=0;
        m.m[4]=xy;m.m[5]=yy;m.m[6]=yz;m.m[7]=0;
        m.m[8]=xz;m.m[9]=yz;m.m[10]=zz;m.m[11]=0;
        m.m[12]=-(xx*eye.x+xy*eye.y+xz*eye.z);
        m.m[13]=-(yx*eye.x+yy*eye.y+yz*eye.z);
        m.m[14]=-(zy*eye.x+yz*eye.y+zz*eye.z);
        m.m[15]=1;
        return m;
    }
    multiply(b){
        let a=this.m,bb=b.m,r=new Float32Array(16);
        for(let i=0;i<4;i++)for(let j=0;j<4;j++){
            r[j*4+i]=a[i]*bb[j*4]+a[4+i]*bb[j*4+1]+a[8+i]*bb[j*4+2]+a[12+i]*bb[j*4+3];
        }
        this.m=r;return this;
    }
    transformPoint(v){
        let m=this.m;
        let w=m[3]*v.x+m[7]*v.y+m[11]*v.z+m[15];
        return new Vec3((m[0]*v.x+m[4]*v.y+m[8]*v.z+m[12])/w,(m[1]*v.x+m[5]*v.y+m[9]*v.z+m[13])/w,(m[2]*v.x+m[6]*v.y+m[10]*v.z+m[14])/w);
    }
    getTranslation(){return new Vec3(this.m[12],this.m[13],this.m[14]);}
}

function compileShader(src, type) {
    let s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); }
    return s;
}
function createProgram(vs, fs) {
    let p = gl.createProgram();
    gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
    gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(p)); }
    return p;
}

function createBox(w,h,d){
    let p=[],n=[];
    let faces=[

        let v=faces[f];

        let hw=w*v[3]*0.5,hx=w*v[0]*0.5;
        // Simplified: generate box vertices
    }
    // Generate proper box
    let verts=[];
    let tris=[];
    let addVert=(x,y,z)=>{verts.push(x,y,z);return verts.length/3-1;};
    // 8 corners
    let v0=addVert(-w/2,-h/2,-d/2),v1=addVert(w/2,-h/2,-d/2);
    let v2=addVert(w/2,h/2,-d/2),v3=addVert(-w/2,h/2,-d/2);
    let v4=addVert(-w/2,-h/2,d/2),v5=addVert(w/2,-h/2,d/2);
    let v6=addVert(w/2,h/2,d/2),v7=addVert(-w/2,h/2,d/2);
    // 12 triangles (2 per face)
    let addTri=(a,b,c,nx,ny,nz)=>{
        tris.push(a,b,c,nx,ny,nz,nx,ny,nz,nx,ny,nz);
    };
    addTri(v0,v3,v2, 0,0,-1); addTri(v0,v2,v1, 0,0,-1);
    addTri(v4,v5,v6, 0,0,1); addTri(v4,v6,v7, 0,0,1);
    addTri(v0,v1,v5, 0,-1,0); addTri(v0,v5,v4, 0,-1,0);
    addTri(v2,v3,v7, 1,0,0); addTri(v2,v7,v6, 1,0,0);
    addTri(v1,v0,v4, -1,0,0); addTri(v1,v4,v5, -1,0,0);
    addTri(v3,v2,v6, 0,1,0); addTri(v3,v6,v7, 0,1,0);
    return {positions:new Float32Array(verts),normals:new Float32Array(tris),count:tris.length/3};
}

function createTorus(R,r,segments,radialSegs){
    let verts=[],norms=[];
    for(let i=0;i<=segments;i++){
        let theta=i/segments*TAU;
        for(let j=0;j<=radialSegs;j++){
            let phi=j/radialSegs*TAU;
            let x=(R+r*Math.cos(phi))*Math.cos(theta);
            let y=r*Math.sin(phi);
            let z=(R+r*Math.cos(phi))*Math.sin(theta);
            verts.push(x,y,z);
            let nx=Math.cos(phi)*Math.cos(theta);
            let ny=Math.sin(phi);
            let nz=Math.cos(phi)*Math.sin(theta);
            norms.push(nx,ny,nz);
        }
    }
    let idx=[];
    for(let i=0;i<segments;i++){
        for(let j=0;j<radialSegs;j++){
            let a=i*(radialSegs+1)+j,b=a+radialSegs+1;
            idx.push(a,b,a+1, a+1,b,b+1);
        }
    }
    return {positions:new Float32Array(verts),normals:new Float32Array(norms),indices:new Uint16Array(idx),count:idx.length};
}

function createPlane(w,h,segW,segH){
    let verts=[],colors=[],uvs=[],idx=[];
    for(let i=0;i<=segW;i++){
        for(let j=0;j<=segH;j++){
            let x=i/segW*w-w/2;
            let z=j/segH*h-h/2;
            verts.push(x,0,z);
            uvs.push(i/segW,j/segH);
        }
    }
    for(let i=0;i<segW;i++){
        for(let j=0;j<segH;j++){
            let a=i*(segH+1)+j,b=a+1,c=a+segH+1,d=c+1;
            idx.push(a,b,c,b,d,c);
        }
    }
    return {positions:new Float32Array(verts),uvs:new Float32Array(uvs),indices:new Uint16Array(idx),count:idx.length};
}

// ==================== TERRAIN HEIGHTMAP ====================
const TERRAIN_SIZE = 4000;
const TERRAIN_RES = 120;
let heightData = null;

function hash(x, z) {
    let h = (x * 374761393 + z * 668265263) & 0x7fffffff;
    h = ((h >> 13) ^ h) * 1274126177;
    return ((h >> 16) ^ h) / 2147483647.0;
}

function noise2D(x, z) {
    let ix = Math.floor(x), iz = Math.floor(z);
    let fx = x - ix, fz = z - iz;
    fx = fx * fx * (3 - 2 * fx);
    fz = fz * fz * (3 - 2 * fz);
    let a = hash(ix, iz), b = hash(ix + 1, iz);
    let c = hash(ix, iz + 1), d = hash(ix + 1, iz + 1);
    return a + (b - a) * fx + (c - a) * fz + (a - b - c + d) * fx * fz;
}

function fbm(x, z, octaves) {
    let val = 0, amp = 1, freq = 1, maxAmp = 0;
    for (let i = 0; i < octaves; i++) {
        val += noise2D(x * freq, z * freq) * amp;
        maxAmp += amp;
        amp *= 0.5;
        freq *= 2.0;
    }
    return val / maxAmp;
}

function getTerrainHeight(x, z) {
    let nx = x / TERRAIN_SIZE, nz = z / TERRAIN_SIZE;
    let h = fbm(nx * 4 + 10, nz * 4 + 10, 6) * 200;
    h += fbm(nx * 12 + 5, nz * 12 + 5, 4) * 50;
    // mountains
    let mt = fbm(nx * 3 + 20, nz * 3 + 20, 4);
    if (mt > 0.55) h += (mt - 0.55) * 600;
    // flatten start area
    let distFromCenter = Math.sqrt(x * x + z * z);
    if (distFromCenter < 300) h *= smoothstep(0, 300, distFromCenter);
    return h;
}

function generateTerrain() {
    heightData = new Float32Array((TERRAIN_RES + 1) * (TERRAIN_RES + 1));
    for (let i = 0; i <= TERRAIN_RES; i++) {
        for (let j = 0; j <= TERRAIN_RES; j++) {
            let x = (i / TERRAIN_RES - 0.5) * TERRAIN_SIZE;
            let z = (j / TERRAIN_RES - 0.5) * TERRAIN_SIZE;
            heightData[i * (TERRAIN_RES + 1) + j] = getTerrainHeight(x, z);
        }
    }
}

function generateTerrainMesh() {
    let verts = [], colors = [], idx = [];
    for (let i = 0; i <= TERRAIN_RES; i++) {
        for (let j = 0; j <= TERRAIN_RES; j++) {
            let x = (i / TERRAIN_RES - 0.5) * TERRAIN_SIZE;
            let z = (j / TERRAIN_RES - 0.5) * TERRAIN_SIZE;
            let h = heightData[i * (TERRAIN_RES + 1) + j];
            verts.push(x, h, z);
            // color based on height
            let r, g, b;
            if (h < 10) { r = 0.3; g = 0.6; b = 0.2; } // grass
            else if (h < 60) { r = 0.4; g = 0.55; b = 0.25; }
            else if (h < 120) { r = 0.5; g = 0.45; b = 0.3; }
            else if (h < 180) { r = 0.6; g = 0.55; b = 0.5; }
            else { r = 0.8; g = 0.8; b = 0.85; } // snow
            colors.push(r, g, b);
        }
    }
    for (let i = 0; i < TERRAIN_RES; i++) {
        for (let j = 0; j < TERRAIN_RES; j++) {
            let a = i * (TERRAIN_RES + 1) + j;
            let b = a + 1;
            let c = a + TERRAIN_RES + 1;
            let d = c + 1;
            idx.push(a, c, b, b, c, d);
        }
    }
    return { positions: new Float32Array(verts), colors: new Float32Array(colors), indices: new Uint16Array(idx), count: idx.length };
}

// ==================== SKY SPHERE ====================
function createSkySphere() {
    let seg = 32, ring = 16;
    let verts = [];
    for (let i = 0; i <= seg; i++) {
        for (let j = 0; j <= ring; j++) {
            let theta = i / seg * PI;
            let phi = j / ring * TAU;
            let x = Math.sin(theta) * Math.cos(phi);
            let y = Math.cos(theta);
            let z = Math.sin(theta) * Math.sin(phi);
            verts.push(x, y, z);
        }
    }
    let idx = [];
    for (let i = 0; i < seg; i++) {
        for (let j = 0; j < ring; j++) {
            let a = i * (ring + 1) + j;
            let b = a + ring + 1;
            idx.push(a, a + 1, b, b, a + 1, b + 1);
        }
    }
    return { positions: new Float32Array(verts), indices: new Uint16Array(idx), count: idx.length };
}

function createBuffer(data, type) {
    let buf = gl.createBuffer();
    gl.bindBuffer(type || gl.ARRAY_BUFFER, buf);
    gl.bufferData(type || gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
    return buf;
}

function setupMesh(geom) {
    let vao = {};
    vao.posBuf = createBuffer(geom.positions);
    vao.normBuf = geom.normals ? createBuffer(geom.normals) : null;
    vao.colBuf = geom.colors ? createBuffer(geom.colors) : null;
    vao.count = geom.count;
    if (geom.indices) {
        vao.idxBuf = createBuffer(geom.indices, gl.ELEMENT_ARRAY_BUFFER);
        vao.indexed = true;
    }
    return vao;
}

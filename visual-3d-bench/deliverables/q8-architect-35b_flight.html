<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flight Sim</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; transform: translate(-50%, -50%); border-radius: 50%; }
#crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; transform: translate(-50%, -50%); border-radius: 50%; }
.hud-text { position: absolute; color: #0f0; font-size: 16px; text-shadow: 1px 1px 2px #000; }
#airspeed { top: 20px; left: 20px; }
#altitude { top: 50px; left: 20px; }
#throttle { top: 80px; left: 20px; }
#heading { top: 110px; left: 20px; }
#checkpoint { top: 140px; left: 20px; }
#message { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; text-align: center; display: none; }
#controls { bottom: 20px; left: 20px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
<div id="crosshair"></div>
<div id="airspeed" class="hud-text">AIRSPEED: 0 m/s</div>
<div id="altitude" class="hud-text">ALTITUDE: 0 m</div>
<div id="throttle" class="hud-text">THROTTLE: 0%</div>
<div id="heading" class="hud-text">HEADING: 0°</div>
<div id="checkpoint" class="hud-text">CHECKPOINT: 0/8</div>
<div id="message"></div>
<div id="controls" class="hud-text">W/S: Pitch | A/D: Roll | Q/E: Yaw | Space: Throttle | Shift: Brake | C: Camera | R: Restart</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

class Vec3 {
    constructor(x=0, y=0, z=0) { this.x = x; this.y = y; this.z = z; }
    add(v) { return new Vec3(this.x+v.x, this.y+v.y, this.z+v.z); }
    sub(v) { return new Vec3(this.x-v.x, this.y-v.y, this.z-v.z); }
    scale(s) { return new Vec3(this.x*s, this.y*s, this.z*s); }
    dot(v) { return this.x*v.x + this.y*v.y + this.z*v.z; }
    cross(v) { return new Vec3(this.y*v.z - this.z*v.y, this.z*v.x - this.x*v.z, this.x*v.y - this.y*v.x); }
    length() { return Math.sqrt(this.x*this.x + this.y*this.y + this.z*this.z); }
    normalize() { let l = this.length(); return l > 0 ? new Vec3(this.x/l, this.y/l, this.z/l) : new Vec3(0,0,0); }
    clone() { return new Vec3(this.x, this.y, this.z); }
}

class Mat4 {
    constructor() { this.m = new Float32Array(16); this.identity(); }
    identity() { this.m.fill(0); this.m[0]=1; this.m[5]=1; this.m[10]=1; this.m[15]=1; return this; }
    perspective(fov, aspect, near, far) {
        const f = 1/Math.tan(fov/2);
        this.identity();
        this.m[0] = f/aspect; this.m[5] = f; this.m[10] = (far+near)/(near-far); this.m[11] = -1;
        this.m[14] = 2*far*near/(near-far);
        return this;
    }
    lookAt(eye, center, up) {
        const z = eye.sub(center).normalize();
        const x = up.cross(z).normalize();
        const y = z.cross(x).normalize();
        this.identity();
        this.m[0] = x.x; this.m[1] = x.y; this.m[2] = x.z;
        this.m[4] = y.x; this.m[5] = y.y; this.m[6] = y.z;
        this.m[8] = z.x; this.m[9] = z.y; this.m[10] = z.z;
        this.m[12] = -x.dot(eye); this.m[13] = -y.dot(eye); this.m[14] = -z.dot(eye);
        return this;
    }
    multiply(m) {
        const a = this.m, b = m.m, c = new Float32Array(16);
        for(let i=0; i<4; i++) for(let j=0; j<4; j++) {
            c[j*4+i] = 0;
            for(let k=0; k<4; k++) c[j*4+i] += a[k*4+i] * b[j*4+k];
        }
        this.m = c;
        return this;
    }
    transformPoint(p) {
        const v = this.m;
        const w = v[3]*p.x + v[7]*p.y + v[11]*p.z + v[15];
        return new Vec3(
            (v[0]*p.x + v[4]*p.y + v[8]*p.z + v[12])/w,
            (v[1]*p.x + v[5]*p.y + v[9]*p.z + v[13])/w,
            (v[2]*p.x + v[6]*p.y + v[10]*p.z + v[14])/w
        );
    }
}

const game = {
    aircraft: {
        pos: new Vec3(0, 100, 0),
        vel: new Vec3(0, 0, 0),
        pitch: 0,
        roll: 0,
        yaw: 0,
        throttle: 0,
        speed: 0,
        crashed: false,
        landed: false
    },
    camera: {
        isCockpit: false,
        offset: new Vec3(0, 5, 20)
    },
    checkpoints: [],
    obstacles: [],
    terrain: [],
    mountains: [],
    towers: [],
    runway: null,
    currentCheckpoint: 0,
    gameWon: false,
    gameOver: false,
    time: 0
};

function init() {
    game.aircraft.pos = new Vec3(0, 100, 0);
    game.aircraft.vel = new Vec3(0, 0, 0);
    game.aircraft.pitch = 0;
    game.aircraft.roll = 0;
    game.aircraft.yaw = 0;
    game.aircraft.throttle = 0;
    game.aircraft.crashed = false;
    game.aircraft.landed = false;
    game.camera.isCockpit = false;
    game.currentCheckpoint = 0;
    game.gameWon = false;
    game.gameOver = false;
    game.time = 0;
    generateLevel();
}

function generateLevel() {
    game.checkpoints = [];
    game.obstacles = [];
    game.terrain = [];
    game.mountains = [];
    game.towers = [];
    
    const pathLength = 3000;
    for(let i=0; i<8; i++) {
        const x = (i - 4) * 200;
        const z = pathLength/2 - i * (pathLength/8);
        const y = 100 + Math.sin(i) * 30;
        game.checkpoints.push({
            pos: new Vec3(x, y, z),
            radius: 40,
            passed: false
        });
    }
    
    for(let i=0; i<500; i++) {
        const x = (Math.random()-0.5) * 4000;
        const z = (Math.random()-0.5) * 4000;
        const y = -10 + Math.sin(x*0.01)*10 + Math.cos(z*0.01)*10;
        game.terrain.push({x, y, z, size: 50});
    }
    
    for(let i=0; i<20; i++) {
        const x = (Math.random()-0.5) * 3000;
        const z = (Math.random()-0.5) * 3000;
        const height = 100 + Math.random()*200;
        game.mountains.push({
            pos: new Vec3(x, -10 + Math.sin(x*0.01)*10 + Math.cos(z*0.01)*10, z),
            height: height,
            radius: 50 + Math.random()*50
        });
    }
    
    for(let i=0; i<10; i++) {
        const x = (Math.random()-0.5) * 3000;
        const z = (Math.random()-0.5) * 3000;
        game.towers.push({
            pos: new Vec3(x, -10 + Math.sin(x*0.01)*10 + Math.cos(z*0.01)*10, z),
            height: 50 + Math.random()*100,
            width: 20
        });
    }
    
    for(let i=0; i<15; i++) {
        const x = (Math.random()-0.5) * 2000;
        const z = (Math.random()-0.5) * 2000;
        const y = 50 + Math.random()*150;
        game.obstacles.push({
            pos: new Vec3(x, y, z),
            radius: 15,
            type: 'drone',
            speed: 2 + Math.random()*3,
            angle: Math.random()*Math.PI*2
        });
    }
    
    game.runway = {
        pos: new Vec3(0, -10, -1500),
        width: 60,
        length: 300
    };
}

function project(pos, viewMatrix, projMatrix) {
    const clip = projMatrix.multiply(viewMatrix).transformPoint(pos);
    if(clip.z < 0 || clip.z > 1) return null;
    return {
        x: (clip.x + 1) * canvas.width / 2,
        y: (1 - clip.y) * canvas.height / 2
    };
}

function renderSky() {
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#001133');
    gradient.addColorStop(0.5, '#002244');
    gradient.addColorStop(1, '#003355');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    for(let i=0; i<100; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height * 0.6;
        const size = Math.random() * 2;
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random()*0.7})`;
        ctx.fillRect(x, y, size, size);
    }
}

function renderTerrain(viewMatrix, projMatrix) {
    for(const t of game.terrain) {
        const p1 = project(new Vec3(t.x, t.y, t.z), viewMatrix, projMatrix);
        const p2 = project(new Vec3(t.x+t.size, t.y, t.z), viewMatrix, projMatrix);
        const p3 = project(new Vec3(t.x, t.y, t.z+t.size), viewMatrix, projMatrix);
        const p4 = project(new Vec3(t.x+t.size, t.y, t.z+t.size), viewMatrix, projMatrix);
        
        if(p1 && p2 && p3 && p4) {
            const height = Math.sin(t.x*0.01)*10 + Math.cos(t.z*0.01)*10;
            const brightness = Math.max(0.1, 0.3 + height*0.01);
            ctx.fillStyle = `rgb(${Math.floor(50*brightness)}, ${Math.floor(100*brightness)}, ${Math.floor(50*brightness)})`;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p4.x, p4.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.closePath();
            ctx.fill();
        }
    }
}

function renderMountains(viewMatrix, projMatrix) {
    for(const m of game.mountains) {
        const base = project(m.pos, viewMatrix, projMatrix);
        const top = project(new Vec3(m.pos.x, m.pos.y + m.height, m.pos.z), viewMatrix, projMatrix);
        
        if(base && top) {
            const width = m.radius * 0.5;
            const left = project(new Vec3(m.pos.x - width, m.pos.y, m.pos.z), viewMatrix, projMatrix);
            const right = project(new Vec3(m.pos.x + width, m.pos.y, m.pos.z), viewMatrix, projMatrix);
            
            if(left && right) {
                ctx.fillStyle = '#224433';
                ctx.beginPath();
                ctx.moveTo(top.x, top.y);
                ctx.lineTo(left.x, left.y);
                ctx.lineTo(right.x, right.y);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#335544';
                ctx.beginPath();
                ctx.moveTo(top.x, top.y);
                ctx.lineTo(right.x, right.y);
                ctx.lineTo(right.x + 20, left.y);
                ctx.closePath();
                ctx.fill();
            }
        }
    }
}

function renderTowers(viewMatrix, projMatrix) {
    for(const t of game.towers) {
        const base = project(t.pos, viewMatrix, projMatrix);
        const top = project(new Vec3(t.pos.x, t.pos.y + t.height, t.pos.z), viewMatrix, projMatrix);
        
        if(base && top) {
            const w = t.width * 0.5;
            const left = project(new Vec3(t.pos.x - w, t.pos.y, t.pos.z), viewMatrix, projMatrix);
            const right = project(new Vec3(t.pos.x + w, t.pos.y, t.pos.z), viewMatrix, projMatrix);
            const topL = project(new Vec3(t.pos.x - w, t.pos.y + t.height, t.pos.z), viewMatrix, projMatrix);
            const topR = project(new Vec3(t.pos.x + w, t.pos.y + t.height, t.pos.z), viewMatrix, projMatrix);
            
            if(left && right && topL && topR) {
                ctx.fillStyle = '#444444';
                ctx.beginPath();
                ctx.moveTo(base.x, base.y);
                ctx.lineTo(left.x, left.y);
                ctx.lineTo(topL.x, topL.y);
                ctx.lineTo(top.x, top.y);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#555555';
                ctx.beginPath();
                ctx.moveTo(base.x, base.y);
                ctx.lineTo(right.x, right.y);
                ctx.lineTo(topR.x, topR.y);
                ctx.lineTo(top.x, top.y);
                ctx.closePath();
                ctx.fill();
            }
        }
    }
}

function renderRunway(viewMatrix, projMatrix) {
    const r = game.runway;
    const corners = [
        project(new Vec3(r.pos.x - r.width/2, r.pos.y, r.pos.z - r.length/2), viewMatrix, projMatrix),
        project(new Vec3(r.pos.x + r.width/2, r.pos.y, r.pos.z - r.length/2), viewMatrix, projMatrix),
        project(new Vec3(r.pos.x + r.width/2, r.pos.y, r.pos.z + r.length/2), viewMatrix, projMatrix),
        project(new Vec3(r.pos.x - r.width/2, r.pos.y, r.pos.z + r.length/2), viewMatrix, projMatrix)
    ];
    
    if(corners.every(c => c)) {
        ctx.fillStyle = '#333333';
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);
        for(let i=1; i<4; i++) ctx.lineTo(corners[i].x, corners[i].y);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#666666';
        for(let i=0; i<5; i++) {
            const t = i/5;
            const x1 = corners[0].x + (corners[1].x - corners[0].x)*t;
            const y1 = corners[0].y + (corners[1].y - corners[0].y)*t;
            const x2 = corners[3].x + (corners[2].x - corners[3].x)*t;
            const y2 = corners[3].y + (corners[2].y - corners[3].y)*t;
            ctx.fillRect((x1+x2)/2 - 2, (y1+y2)/2 - 2, 4, 4);
        }
    }
}

function renderCheckpoints(viewMatrix, projMatrix) {
    for(const cp of game.checkpoints) {
        const center = project(cp.pos, viewMatrix, projMatrix);
        if(center) {
            const radius = project(new Vec3(cp.pos.x + cp.radius, cp.pos.y, cp.pos.z), viewMatrix, projMatrix);
            if(radius) {
                const dist = Math.abs(radius.x - center.x);
                ctx.strokeStyle = cp.passed ? '#00ff00' : '#ff0000';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(center.x, center.y, dist, 0, Math.PI*2);
                ctx.stroke();
                
                if(!cp.passed) {
                    ctx.fillStyle = 'rgba(255,0,0,0.1)';
                    ctx.fill();
                }
            }
        }
    }
}

function renderObstacles(viewMatrix, projMatrix) {
    for(const o of game.obstacles) {
        const center = project(o.pos, viewMatrix, projMatrix);
        if(center) {
            const radius = project(new Vec3(o.pos.x + o.radius, o.pos.y, o.pos.z), viewMatrix, projMatrix);
            if(radius) {
                const dist = Math.abs(radius.x - center.x);
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(center.x, center.y, dist, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(center.x, center.y, dist*0.3, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }
}

function renderAircraft(viewMatrix, projMatrix) {
    const ac = game.aircraft;
    const forward = new Vec3(Math.sin(ac.yaw)*Math.cos(ac.pitch), Math.sin(ac.pitch), Math.cos(ac.yaw)*Math.cos(ac.pitch));
    const right = new Vec3(Math.cos(ac.yaw), 0, -Math.sin(ac.yaw));
    const up = forward.cross(right);
    
    const points = [
        ac.pos.add(forward.scale(5)), // nose
        ac.pos.add(right.scale(3)),   // right wing
        ac.pos.add(right.scale(-3)),  // left wing
        ac.pos.add(up.scale(1)),      // top
        ac.pos.sub(forward.scale(5))  // tail
    ];
    
    const projected = points.map(p => project(p, viewMatrix, projMatrix));
    
    if(projected.every(p => p)) {
        ctx.fillStyle = '#444444';
        ctx.beginPath();
        ctx.moveTo(projected[0].x, projected[0].y);
        ctx.lineTo(projected[1].x, projected[1].y);
        ctx.lineTo(projected[2].x, projected[2].y);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#555555';
        ctx.beginPath();
        ctx.moveTo(projected[0].x, projected[0].y);
        ctx.lineTo(projected[1].x, projected[1].y);
        ctx.lineTo(projected[3].x, projected[3].y);
        ctx.closePath();
        ctx.fill();
    }
}

function renderHUD() {
    const ac = game.aircraft;
    const speed = ac.vel.length();
    const altitude = ac.pos.y;
    const heading = ((ac.yaw * 180 / Math.PI) % 360 + 360) % 360;
    
    document.getElementById('airspeed').textContent = `AIRSPEED: ${Math.floor(speed)} m/s`;
    document.getElementById('altitude').textContent = `ALTITUDE: ${Math.floor(altitude)} m`;
    document.getElementById('throttle').textContent = `THROTTLE: ${Math.floor(ac.throttle*100)}%`;
    document.getElementById('heading').textContent = `HEADING: ${Math.floor(heading)}°`;
    document.getElementById('checkpoint').textContent = `CHECKPOINT: ${game.currentCheckpoint}/8`;
    
    const message = document.getElementById('message');
    if(game.gameWon) {
        message.style.display = 'block';
        message.innerHTML = '<div>MISSION COMPLETE!</div><div style="font-size:16px">Press R to Restart</div>';
    } else if(game.gameOver) {
        message.style.display = 'block';
        message.innerHTML = '<div style="color:red">CRASHED!</div><div style="font-size:16px">Press R to Restart</div>';
    }
    
    const horizon = document.getElementById('crosshair');
    const pitchOffset = ac.pitch * 50;
    const rollOffset = ac.roll * 50;
    horizon.style.transform = `translate(-50%, -50%) rotate(${ac.roll}rad) translateY(${pitchOffset}px)`;
}

function updatePhysics(dt) {
    const ac = game.aircraft;
    if(ac.crashed || ac.landed) return;
    
    const forward = new Vec3(Math.sin(ac.yaw)*Math.cos(ac.pitch), Math.sin(ac.pitch), Math.cos(ac.yaw)*Math.cos(ac.pitch));
    const right = new Vec3(Math.cos(ac.yaw), 0, -Math.sin(ac.yaw));
    const up = forward.cross(right);
    
    const gravity = new Vec3(0, -9.81, 0);
    const thrust = forward.scale(ac.throttle * 200);
    const drag = ac.vel.scale(-ac.vel.length() * 0.01);
    const lift = up.scale(ac.vel.length() * 1.5 * Math.cos(ac.pitch));
    
    const totalForce = gravity.add(thrust).add(drag).add(lift);
    ac.vel = ac.vel.add(totalForce.scale(dt));
    
    ac.pos = ac.pos.add(ac.vel.scale(dt));
    
    if(keys['w']) ac.pitch += dt * 0.5;
    if(keys['s']) ac.pitch -= dt * 0.5;
    if(keys['a']) ac.roll += dt * 0.8;
    if(keys['d']) ac.roll -= dt * 0.8;
    if(keys['q']) ac.yaw += dt * 0.3;
    if(keys['e']) ac.yaw -= dt * 0.3;
    
    ac.roll *= 0.95;
    ac.pitch *= 0.95;
    
    if(keys[' ']) ac.throttle = Math.min(1, ac.throttle + dt * 0.5);
    if(keys['shift']) ac.throttle = Math.max(0, ac.throttle - dt * 0.5);
    
    ac.yaw += ac.roll * dt * 0.8;
    
    const speed = ac.vel.length();
    if(speed > 0) {
        ac.vel = ac.vel.normalize().scale(speed);
    }
    
    checkCollisions();
    checkCheckpoints();
}

function checkCollisions() {
    const ac = game.aircraft;
    
    if(ac.pos.y < -10) {
        ac.crashed = true;
        game.gameOver = true;
    }
    
    for(const t of game.towers) {
        const dist = ac.pos.sub(t.pos).length();
        if(dist < t.width + 5 && ac.pos.y < t.pos.y + t.height) {
            ac.crashed = true;
            game.gameOver = true;
        }
    }
    
    for(const o of game.obstacles) {
        const dist = ac.pos.sub(o.pos).length();
        if(dist < o.radius + 5) {
            ac.crashed = true;
            game.gameOver = true;
        }
    }
    
    if(ac.landed) {
        const runway = game.runway;
        if(ac.pos.x > runway.pos.x - runway.width/2 - 10 &&
           ac.pos.x < runway.pos.x + runway.width/2 + 10 &&
           ac.pos.z > runway.pos.z - runway.length/2 - 10 &&
           ac.pos.z < runway.pos.z + runway.length/2 + 10 &&
           ac.pos.y < -5 && ac.vel.length() < 20) {
            game.gameWon = true;
        }
    }
}

function checkCheckpoints() {
    const ac = game.aircraft;
    for(let i=0; i<game.checkpoints.length; i++) {
        const cp = game.checkpoints[i];
        if(!cp.passed) {
            const dist = ac.pos.sub(cp.pos).length();
            if(dist < cp.radius) {
                cp.passed = true;
                game.currentCheckpoint = i + 1;
            }
        }
    }
}

function updateObstacles(dt) {
    for(const o of game.obstacles) {
        o.angle += dt * o.speed * 0.5;
        o.pos.x += Math.cos(o.angle) * o.speed * dt;
        o.pos.z += Math.sin(o.angle) * o.speed * dt;
    }
}

function updateCamera() {
    const ac = game.aircraft;
    const forward = new Vec3(Math.sin(ac.yaw)*Math.cos(ac.pitch), Math.sin(ac.pitch), Math.cos(ac.yaw)*Math.cos(ac.pitch));
    const right = new Vec3(Math.cos(ac.yaw), 0, -Math.sin(ac.yaw));
    const up = forward.cross(right);
    
    if(game.camera.isCockpit) {
        game.camera.offset = forward.scale(2);
    } else {
        game.camera.offset = forward.scale(-20).add(up.scale(5)).add(right.scale(0));
    }
    
    game.camera.offset = game.camera.offset.add(ac.pos);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    renderSky();
    
    const ac = game.aircraft;
    const forward = new Vec3(Math.sin(ac.yaw)*Math.cos(ac.pitch), Math.sin(ac.pitch), Math.cos(ac.yaw)*Math.cos(ac.pitch));
    const right = new Vec3(Math.cos(ac.yaw), 0, -Math.sin(ac.yaw));
    const up = forward.cross(right);
    
    updateCamera();
    
    const viewMatrix = new Mat4().lookAt(game.camera.offset, ac.pos, up);
    const projMatrix = new Mat4().perspective(Math.PI/4, canvas.width/canvas.height, 0.1, 5000);
    
    renderTerrain(viewMatrix, projMatrix);
    renderMountains(viewMatrix, projMatrix);
    renderTowers(viewMatrix, projMatrix);
    renderRunway(viewMatrix, projMatrix);
    renderCheckpoints(viewMatrix, projMatrix);
    renderObstacles(viewMatrix, projMatrix);
    renderAircraft(viewMatrix, projMatrix);
    
    renderHUD();
}

let lastTime = 0;
function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    
    if(keys['c']) {
        game.camera.isCockpit = !game.camera.isCockpit;
        keys['c'] = false;
    }
    
    if(keys['r']) {
        init();
        keys['r'] = false;
    }
    
    updatePhysics(dt);
    updateObstacles(dt);
    render();
    
    requestAnimationFrame(gameLoop);
}

init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raycast FPS</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
    #gameCanvas { display: block; width: 100vw; height: 100vh; }
    #hud { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; }
    .hud-box { background: rgba(0,0,0,0.7); color: #0f0; padding: 10px 20px; border: 2px solid #0f0; border-radius: 5px; font-size: 24px; font-weight: bold; text-shadow: 0 0 5px #0f0; }
    #minimap { position: absolute; top: 20px; right: 20px; border: 2px solid #0f0; border-radius: 5px; display: none; }
    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 30px; pointer-events: none; text-shadow: 0 0 5px #0f0; }
    #pauseMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; color: #0f0; }
    #pauseMenu h1 { font-size: 48px; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
    #pauseMenu p { font-size: 20px; margin: 5px; }
    #message { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: #f00; font-size: 36px; font-weight: bold; text-shadow: 0 0 10px #f00; display: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="crosshair">+</div>
<div id="hud">
    <div class="hud-box" id="health">Health: 100</div>
    <div class="hud-box" id="ammo">Ammo: 30</div>
    <div class="hud-box" id="score">Score: 0</div>
</div>
<canvas id="minimap" width="150" height="150"></canvas>
<div id="pauseMenu">
    <h1>PAUSED</h1>
    <p>Press 'P' to Resume</p>
    <p>WASD: Move | Shift: Sprint | M: Minimap</p>
    <p>Mouse: Aim | Click: Shoot | R: Reload | P: Pause</p>
</div>
<div id="message"></div>

<script>
// --- Configuration ---
const SCREEN_WIDTH = 800;
const SCREEN_HEIGHT = 600;
const FOV = 60 * (Math.PI / 180);
const MOVE_SPEED = 0.08;
const SPRINT_SPEED = 0.15;
const ROT_SPEED = 0.004;
const MAP_SIZE = 32;
const TILE_SIZE = 1;

// --- Game State ---
let canvas = document.getElementById('gameCanvas');
let ctx = canvas.getContext('2d');
let minimapCanvas = document.getElementById('minimap');
let minimapCtx = minimapCanvas.getContext('2d');
let paused = false;
let gameOver = false;
let score = 0;

canvas.width = SCREEN_WIDTH;
canvas.height = SCREEN_HEIGHT;

// --- Player ---
let player = {
    x: 1.5, y: 1.5, angle: 0,
    health: 100, ammo: 30, maxAmmo: 30,
    reloading: false, lastShot: 0, fireRate: 200,
    bob: 0, bobDir: 1
};

// --- Input ---
let keys = {};
let mouseDown = false;
let pointerLocked = false;

// --- Map ---
let map = [];
let enemies = [];
let pickups = [];
let projectiles = [];

// --- Procedural Level Generation ---
function generateLevel() {
    map = [];
    for (let y = 0; y < MAP_SIZE; y++) {
        map[y] = [];
        for (let x = 0; x < MAP_SIZE; x++) {
            map[y][x] = 1; // Walls
        }
    }

    // Rooms
    let rooms = [];
    for (let i = 0; i < 10; i++) {
        let rw = 3 + Math.floor(Math.random() * 5);
        let rh = 3 + Math.floor(Math.random() * 5);
        let rx = 2 + Math.floor(Math.random() * (MAP_SIZE - rw - 4));
        let ry = 2 + Math.floor(Math.random() * (MAP_SIZE - rh - 4));
        rooms.push({x: rx, y: ry, w: rw, h: rh});
        
        for (let y = ry; y < ry + rh; y++) {
            for (let x = rx; x < rx + rw; x++) {
                map[y][x] = 0;
            }
        }
    }

    // Corridors
    for (let i = 1; i < rooms.length; i++) {
        let r1 = rooms[i-1], r2 = rooms[i];
        let cx = Math.min(r1.x + r1.w, r2.x);
        let cy = Math.min(r1.y + r1.h, r2.y);
        let ex = Math.max(r1.x + r1.w, r2.x + r2.w);
        let ey = Math.max(r1.y + r1.h, r2.y + r2.h);
        
        for (let y = cy; y < ey; y++) {
            for (let x = cx; x < ex; x++) {
                map[y][x] = 0;
            }
        }
    }

    // Place entities
    enemies = [];
    pickups = [];
    let emptyCells = [];
    for (let y = 1; y < MAP_SIZE - 1; y++) {
        for (let x = 1; x < MAP_SIZE - 1; x++) {
            if (map[y][x] === 0 && !(x < 3 && y < 3)) {
                emptyCells.push({x, y});
            }
        }
    }

    // Enemies
    for (let i = 0; i < 15; i++) {
        if (emptyCells.length === 0) break;
        let idx = Math.floor(Math.random() * emptyCells.length);
        let pos = emptyCells.splice(idx, 1)[0];
        enemies.push({
            x: pos.x + 0.5, y: pos.y + 0.5,
            health: 30, alive: true, lastAttack: 0,
            type: Math.random() > 0.7 ? 'heavy' : 'normal'
        });
    }

    // Pickups
    for (let i = 0; i < 8; i++) {
        if (emptyCells.length === 0) break;
        let idx = Math.floor(Math.random() * emptyCells.length);
        let pos = emptyCells.splice(idx, 1)[0];
        pickups.push({
            x: pos.x + 0.5, y: pos.y + 0.5,
            type: Math.random() > 0.5 ? 'health' : 'ammo',
            alive: true
        });
    }

    // Exit
    if (emptyCells.length > 0) {
        let pos = emptyCells[emptyCells.length - 1];
        map[pos.y][pos.x] = 3; // Exit
    }
}

// --- Raycasting Engine ---
function castRay(angle) {
    let sin = Math.sin(angle);
    let cos = Math.cos(angle);
    let x = player.x;
    let y = player.y;
    
    let step = 0.01;
    let dist = 0;
    
    while (dist < 20) {
        x += cos * step;
        y += sin * step;
        dist += step;
        
        let mapX = Math.floor(x);
        let mapY = Math.floor(y);
        
        if (mapY < 0 || mapY >= MAP_SIZE || mapX < 0 || mapX >= MAP_SIZE) return { dist: 20, type: 1 };
        
        let type = map[mapY][mapX];
        if (type === 1 || type === 3) {
            // Calculate exact wall hit for shading
            let side = (Math.abs(cos) < Math.abs(sin)) ? 'y' : 'x';
            let wallX = side === 'x' ? y + (x - Math.floor(x)) * sin : x + (y - Math.floor(y)) * cos;
            let texX = wallX % 1;
            return { dist, type, side, texX };
        }
    }
    return { dist: 20, type: 0 };
}

function render() {
    // Clear
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    
    // Ceiling & Floor
    for (let y = 0; y < SCREEN_HEIGHT / 2; y++) {
        let shade = 0.3 - (y / SCREEN_HEIGHT) * 0.2;
        ctx.fillStyle = `rgba(0,0,0,${shade})`;
        ctx.fillRect(0, y, SCREEN_WIDTH, 1);
    }
    for (let y = SCREEN_HEIGHT / 2; y < SCREEN_HEIGHT; y++) {
        let shade = 0.2 + (y / SCREEN_HEIGHT) * 0.3;
        ctx.fillStyle = `rgba(0,0,0,${shade})`;
        ctx.fillRect(0, y, SCREEN_WIDTH, 1);
    }

    // Z-buffer for sprites
    let zBuffer = new Float32Array(SCREEN_WIDTH);

    // Walls
    let startAngle = player.angle - FOV / 2;
    for (let i = 0; i < SCREEN_WIDTH; i++) {
        let rayAngle = startAngle + (i / SCREEN_WIDTH) * FOV;
        let ray = castRay(rayAngle);
        let perpDist = ray.dist * Math.cos(rayAngle - player.angle);
        
        if (ray.dist < 20) {
            let wallHeight = (TILE_SIZE / perpDist) * SCREEN_HEIGHT;
            let wallTop = (SCREEN_HEIGHT - wallHeight) / 2;
            
            // Shading based on distance and side
            let shade = 1 / (1 + perpDist * 0.5);
            if (ray.side === 'x') shade *= 0.7;
            
            let color = ray.type === 3 ? `rgba(255,255,0,${shade})` : `rgba(100,100,100,${shade})`;
            
            // Simple texture effect
            if (ray.type === 1 && ray.texX < 0.1) color = `rgba(80,80,80,${shade})`;
            
            ctx.fillStyle = color;
            ctx.fillRect(i, wallTop, 1, wallHeight);
        }
        zBuffer[i] = perpDist;
    }

    // Sprites (Enemies & Pickups)
    let sprites = [];
    enemies.forEach(e => { if (e.alive) sprites.push({x: e.x, y: e.y, type: 'enemy', ref: e}); });
    pickups.forEach(p => { if (p.alive) sprites.push({x: p.x, y: p.y, type: 'pickup', ref: p}); });
    
    // Sort sprites by distance
    sprites.sort((a, b) => {
        let da = (player.x - a.x) ** 2 + (player.y - a.y) ** 2;
        let db = (player.x - b.x) ** 2 + (player.y - b.y) ** 2;
        return db - da;
    });

    sprites.forEach(sprite => {
        let dx = sprite.x - player.x;
        let dy = sprite.y - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        let spriteAngle = Math.atan2(dy, dx) - player.angle;
        while (spriteAngle < -Math.PI) spriteAngle += 2 * Math.PI;
        while (spriteAngle > Math.PI) spriteAngle -= 2 * Math.PI;
        
        if (Math.abs(spriteAngle) < FOV / 2 + 0.2) {
            let screenX = (0.5 + spriteAngle / FOV) * SCREEN_WIDTH;
            let spriteHeight = (TILE_SIZE / dist) * SCREEN_HEIGHT;
            let spriteWidth = spriteHeight * 0.6;
            let spriteTop = (SCREEN_HEIGHT - spriteHeight) / 2;
            
            let shade = 1 / (1 + dist * 0.5);
            
            // Check Z-buffer to only draw if not behind wall
            let startCol = Math.max(0, Math.floor(screenX - spriteWidth / 2));
            let endCol = Math.min(SCREEN_WIDTH - 1, Math.floor(screenX + spriteWidth / 2));
            
            for (let col = startCol; col <= endCol; col++) {
                if (zBuffer[col] > dist) {
                    if (sprite.type === 'enemy') {
                        let color = sprite.ref.type === 'heavy' ? `rgba(200,50,50,${shade})` : `rgba(255,50,50,${shade})`;
                        ctx.fillStyle = color;
                        ctx.fillRect(col, spriteTop + spriteHeight * 0.3, 1, spriteHeight * 0.7);
                        // Eyes
                        ctx.fillStyle = `rgba(255,255,0,${shade})`;
                        ctx.fillRect(col, spriteTop + spriteHeight * 0.4, 1, spriteHeight * 0.1);
                    } else if (sprite.type === 'pickup') {
                        let color = sprite.ref.type === 'health' ? `rgba(50,255,50,${shade})` : `rgba(255,255,50,${shade})`;
                        ctx.fillStyle = color;
                        ctx.fillRect(col, spriteTop + spriteHeight * 0.6, 1, spriteHeight * 0.4);
                    }
                }
            }
        }
    });

    // Weapon
    drawWeapon();
    
    // Minimap
    drawMinimap();
}

function drawWeapon() {
    let bob = player.bob * 10;
    let recoil = Math.max(0, player.lastShot + 100 - Date.now()) * 2;
    
    ctx.save();
    ctx.translate(SCREEN_WIDTH / 2 + bob, SCREEN_HEIGHT - 150 + bob + recoil);
    
    // Gun body
    ctx.fillStyle = '#555';
    ctx.fillRect(-30, -100, 60, 150);
    ctx.fillStyle = '#333';
    ctx.fillRect(-25, -120, 50, 100);
    
    // Barrel
    ctx.fillStyle = '#222';
    ctx.fillRect(-10, -150, 20, 60);
    
    // Muzzle flash
    if (player.lastShot + 50 > Date.now()) {
        ctx.fillStyle = `rgba(255,200,50,${0.8 - (Date.now() - player.lastShot) / 100})`;
        ctx.beginPath();
        ctx.arc(0, -160, 25, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.restore();
}

function drawMinimap() {
    let display = document.getElementById('minimap');
    if (keys['m'] || keys['M']) {
        display.style.display = 'block';
        minimapCtx.fillStyle = '#000';
        minimapCtx.fillRect(0, 0, 150, 150);
        
        let scale = 150 / MAP_SIZE;
        
        for (let y = 0; y < MAP_SIZE; y++) {
            for (let x = 0; x < MAP_SIZE; x++) {
                if (map[y][x] === 1) minimapCtx.fillStyle = '#444';
                else if (map[y][x] === 3) minimapCtx.fillStyle = '#ff0';
                else minimapCtx.fillStyle = '#000';
                minimapCtx.fillRect(x * scale, y * scale, scale, scale);
            }
        }
        
        // Player
        minimapCtx.fillStyle = '#0f0';
        minimapCtx.beginPath();
        minimapCtx.arc(player.x * scale, player.y * scale, 3, 0, Math.PI * 2);
        minimapCtx.fill();
        
        // Enemies
        minimapCtx.fillStyle = '#f00';
        enemies.forEach(e => {
            if (e.alive) minimapCtx.fillRect(e.x * scale - 2, e.y * scale - 2, 4, 4);
        });
        
        // Pickups
        minimapCtx.fillStyle = '#0f0';
        pickups.forEach(p => {
            if (p.alive) minimapCtx.fillRect(p.x * scale - 2, p.y * scale - 2, 4, 4);
        });
    } else {
        display.style.display = 'none';
    }
}

// --- Game Logic ---
function update() {
    if (paused || gameOver) return;
    
    // Player movement
    let moveSpeed = keys['Shift'] ? SPRINT_SPEED : MOVE_SPEED;
    let newX = player.x;
    let newY = player.y;
    
    if (keys['w']) { newX += Math.cos(player.angle) * moveSpeed; newY += Math.sin(player.angle) * moveSpeed; }
    if (keys['s']) { newX -= Math.cos(player.angle) * moveSpeed; newY -= Math.sin(player.angle) * moveSpeed; }
    if (keys['a']) { newX += Math.cos(player.angle + Math.PI / 2) * moveSpeed; newY += Math.sin(player.angle + Math.PI / 2) * moveSpeed; }
    if (keys['d']) { newX -= Math.cos(player.angle + Math.PI / 2) * moveSpeed; newY -= Math.sin(player.angle + Math.PI / 2) * moveSpeed; }
    
    // Collision
    if (map[Math.floor(newY)][Math.floor(newX)] === 0) {
        player.x = newX;
        player.y = newY;
        player.bob += player.bobDir * 0.1;
        if (Math.abs(player.bob) > 1) player.bobDir *= -1;
    }
    
    // Mouse aim
    if (pointerLocked) {
        player.angle += mouseX * ROT_SPEED;
        mouseX = 0;
    }
    
    // Shooting
    if (mouseDown && !player.reloading && Date.now() - player.lastShot > player.fireRate) {
        player.lastShot = Date.now();
        if (player.ammo > 0) {
            player.ammo--;
            shoot();
        }
    }
    
    // Reload
    if (keys['r'] && !player.reloading && player.ammo < player.maxAmmo) {
        player.reloading = true;
        setTimeout(() => {
            player.ammo = player.maxAmmo;
            player.reloading = false;
        }, 1500);
    }
    
    // Update enemies
    enemies.forEach(e => {
        if (!e.alive) return;
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 8) {
            // Move towards player
            if (dist > 0.5) {
                let speed = e.type === 'heavy' ? 0.02 : 0.04;
                let nx = e.x + (dx / dist) * speed;
                let ny = e.y + (dy / dist) * speed;
                if (map[Math.floor(ny)][Math.floor(nx)] === 0) {
                    e.x = nx;
                    e.y = ny;
                }
            }
            
            // Attack
            if (dist < 1.5 && Date.now() - e.lastAttack > (e.type === 'heavy' ? 1500 : 800)) {
                e.lastAttack = Date.now();
                player.health -= e.type === 'heavy' ? 20 : 10;
                showMessage("Hit! -" + (e.type === 'heavy' ? 20 : 10) + " HP");
            }
        }
    });
    
    // Check pickups
    pickups.forEach(p => {
        if (!p.alive) return;
        let dx = player.x - p.x;
        let dy = player.y - p.y;
        if (dx*dx + dy*dy < 0.5) {
            p.alive = false;
            if (p.type === 'health') {
                player.health = Math.min(100, player.health + 25);
                showMessage("+25 HP");
            } else {
                player.ammo = player.maxAmmo;
                showMessage("Ammo Refilled");
            }
        }
    });
    
    // Check exit
    if (map[Math.floor(player.y)][Math.floor(player.x)] === 3) {
        gameOver = true;
        showMessage("LEVEL COMPLETE! Score: " + score);
    }
    
    // Update HUD
    document.getElementById('health').textContent = "Health: " + player.health;
    document.getElementById('ammo').textContent = "Ammo: " + player.ammo;
    document.getElementById('score').textContent = "Score: " + score;
    
    if (player.health <= 0) {
        gameOver = true;
        showMessage("GAME OVER");
    }
}

function shoot() {
    // Simple raycast for hit detection
    let ray = castRay(player.angle);
    if (ray.dist < 10) {
        // Check if enemy in line of sight
        enemies.forEach(e => {
            if (!e.alive) return;
            let dx = e.x - player.x;
            let dy = e.y - player.y;
            let eDist = Math.sqrt(dx*dx + dy*dy);
            let eAngle = Math.atan2(dy, dx) - player.angle;
            while (eAngle < -Math.PI) eAngle += 2 * Math.PI;
            while (eAngle > Math.PI) eAngle -= 2 * Math.PI;
            
            if (Math.abs(eAngle) < 0.1 && eDist < ray.dist) {
                e.health -= 25;
                if (e.health <= 0) {
                    e.alive = false;
                    score += 100;
                }
            }
        });
    }
}

function showMessage(msg) {
    let el = document.getElementById('message');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 1000);
}

// --- Input Handling ---
let mouseX = 0;

document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'p') {
        paused = !paused;
        document.getElementById('pauseMenu').style.display = paused ? 'flex' : 'none';
    }
});

document.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('click', () => {
    if (!paused && !gameOver) {
        canvas.requestPointerLock();
    }
});

document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
    if (pointerLocked) {
        mouseX += e.movementX;
    }
});

document.addEventListener('mousedown', e => {
    if (e.button === 0) mouseDown = true;
});

document.addEventListener('mouseup', e => {
    if (e.button === 0) mouseDown = false;
});

// --- Main Loop ---
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// --- Init ---
generateLevel();
gameLoop();
</script>
</body>
</html>

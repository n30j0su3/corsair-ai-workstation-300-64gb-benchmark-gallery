<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Spiral Galaxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#ui-overlay {
position: fixed;
top: 30px;
left: 30px;
z-index: 10;
pointer-events: none;
}
#ui-overlay h1 {
font-size: 28px;
font-weight: 300;
color: #c8d8ff;
letter-spacing: 4px;
text-transform: uppercase;
margin-bottom: 8px;
text-shadow: 0 0 20px rgba(100, 150, 255, 0.5), 0 0 40px rgba(80, 120, 255, 0.2);
}
#ui-overlay .subtitle {
font-size: 13px;
color: rgba(180, 200, 255, 0.5);
letter-spacing: 2px;
text-transform: uppercase;
}
#ui-overlay .stats {
margin-top: 16px;
display: flex;
gap: 30px;
}
#ui-overlay .stat-item {
display: flex;
flex-direction: column;
}
#ui-overlay .stat-label {
font-size: 10px;
color: rgba(140, 170, 255, 0.4);
letter-spacing: 2px;
text-transform: uppercase;
}
#ui-overlay .stat-value {
font-size: 18px;
color: rgba(200, 220, 255, 0.8);
font-weight: 300;
letter-spacing: 1px;
}
#info-bottom {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
color: rgba(140, 170, 255, 0.3);
font-size: 11px;
letter-spacing: 1px;
pointer-events: none;
z-index: 10;
}
</style>
</head>
<body>
<div id="ui-overlay">
<h1>Andromeda Galaxy</h1>
<div class="subtitle">Spiral Galaxy · Type SBc</div>
<div class="stats">
<div class="stat-item">
<span class="stat-label">Particles</span>
<span class="stat-value" id="particle-count">50,000</span>
</div>
<div class="stat-item">
<span class="stat-label">Spiral Arms</span>
<span class="stat-value">4</span>
</div>
<div class="stat-item">
<span class="stat-label">Diameter</span>
<span class="stat-value">~220 kly</span>
</div>
</div>
</div>
<div id="info-bottom">Drag to orbit · Scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
const PARTICLE_COUNT = 50000;
const SPIRAL_ARMS = 4;
const ARM_SPREAD = 0.8;
const GALAXY_RADIUS = 80;
const CORE_SIZE = 4;
const DISK_THICKNESS = 1.5;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 60, 100);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

function createGlowTexture() {
const canvas = document.createElement('canvas');
canvas.width = 64;
canvas.height = 64;
const ctx = canvas.getContext('2d');
const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
gradient.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
gradient.addColorStop(0.15, 'rgba(255, 255, 255, 0.8)');
gradient.addColorStop(0.4, 'rgba(255, 255, 255, 0.2)');
gradient.addColorStop(1, 'rgba(255, 255, 255, 0.0)');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 64, 64);
const texture = new THREE.CanvasTexture(canvas);
return texture;
}

const glowTexture = createGlowTexture();

function generateGalaxyParticles() {
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const randoms = new Float32Array(PARTICLE_COUNT);

const colorCore = new THREE.Color(0.4, 0.6, 1.0);
const colorMid = new THREE.Color(0.8, 0.85, 1.0);
const colorEdge = new THREE.Color(1.0, 0.95, 0.6);
const colorOuter = new THREE.Color(0.9, 0.5, 0.2);

const armAngleOffset = (Math.PI * 2) / SPIRAL_ARMS;

for (let i = 0; i < PARTICLE_COUNT; i++) {
const armIndex = i % SPIRAL_ARMS;
const armAngle = armIndex * armAngleOffset;

const t = Math.pow(Math.random(), 0.6);
const distance = t * GALAXY_RADIUS;

const spiralAngle = armAngle + (distance / GALAXY_RADIUS) * 3.5;

const spread = ARM_SPREAD * (0.3 + 0.7 * t);
const gaussian = (Math.random() + Math.random() + Math.random() + Math.random()) / 4;
const radialSpread = gaussian * spread * (1 + distance * 0.02);

const x = Math.cos(spiralAngle) * (distance + radialSpread * (Math.random() - 0.5));
const z = Math.sin(spiralAngle) * (distance + radialSpread * (Math.random() - 0.5));

const thicknessFactor = Math.exp(-Math.pow(distance / GALAXY_RADIUS, 2) * 4);
const y = (Math.random() - 0.5) * DISK_THICKNESS * thicknessFactor * (1 + distance * 0.01);

positions[i * 3] = x;
positions[i * 3 + 1] = y;
positions[i * 3 + 2] = z;

const normalizedDist = distance / GALAXY_RADIUS;
const colorMix = normalizedDist;

let color;
if (colorMix < 0.3) {
color = colorCore.clone().lerp(colorMid, colorMix / 0.3);
} else if (colorMix < 0.7) {
color = colorMid.clone().lerp(colorEdge, (colorMix - 0.3) / 0.4);
} else {
color = colorEdge.clone().lerp(colorOuter, (colorMix - 0.7) / 0.3);
}

const brightness = 0.6 + Math.random() * 0.4;
colors[i * 3] = color.r * brightness;
colors[i * 3 + 1] = color.g * brightness;
colors[i * 3 + 2] = color.b * brightness;

const sizeBase = (1 - normalizedDist * 0.5);
const size = (0.3 + Math.random() * 0.8) * sizeBase * (1.5 + (1 - normalizedDist) * 1.5);
sizes[i] = size;

randoms[i] = Math.random();
}

return { positions, colors, sizes, randoms };
}

const galaxyData = generateGalaxyParticles();

const galaxyGeometry = new THREE.BufferGeometry();
galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(galaxyData.positions, 3));
galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(galaxyData.colors, 3));
galaxyGeometry.setAttribute('size', new THREE.BufferAttribute(galaxyData.sizes, 1));
galaxyGeometry.setAttribute('aRandom', new THREE.BufferAttribute(galaxyData.randoms, 1));

const galaxyMaterial = new THREE.ShaderMaterial({
uniforms: {
uTime: { value: 0 },
uTexture: { value: glowTexture },
uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
},
vertexShader: `
attribute float size;
attribute float aRandom;
varying vec3 vColor;
varying float vAlpha;
uniform float uTime;
uniform float uPixelRatio;

void main() {
vColor = color;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

float twinkle = 0.85 + 0.15 * sin(uTime * 1.5 + aRandom * 6.2831);
float sizeAttenuation = (200.0 / -mvPosition.z);

gl_PointSize = size * sizeAttenuation * uPixelRatio * twinkle;
gl_PointSize = max(gl_PointSize, 1.0);

gl_Position = projectionMatrix * mvPosition;

float distFromCenter = length(position.xz);
float alphaFade = 1.0 - smoothstep(0.0, 80.0, distFromCenter);
vAlpha = 0.6 + 0.4 * twinkle;
}
`,
fragmentShader: `
varying vec3 vColor;
varying float vAlpha;
uniform sampler2D uTexture;

void main() {
vec4 texel = texture2D(uTexture, gl_PointCoord);
float alpha = texel.a * vAlpha;

if (alpha < 0.01) discard;

gl_FragColor = vec4(vColor * 1.5, alpha * 0.7);
}
`,
vertexColors: true,
transparent: true,
depthWrite: false,
blending: THREE.AdditiveBlending
});

const galaxyPoints = new THREE.Points(galaxyGeometry, galaxyMaterial);
scene.add(galaxyPoints);

const coreGeometry = new THREE.BufferGeometry();
const coreCount = 5000;
const corePositions = new Float32Array(coreCount * 3);
const coreColors = new Float32Array(coreCount * 3);
const coreSizes = new Float32Array(coreCount);

for (let i = 0; i < coreCount; i++) {
const r = Math.random() * CORE_SIZE;
const theta = Math.random() * Math.PI * 2;
const phi = (Math.random() - 0.5) * Math.PI * 0.5;

corePositions[i * 3] = r * Math.cos(theta) * Math.cos(phi);
corePositions[i * 3 + 1] = r * Math.sin(phi) * 0.5;
corePositions[i * 3 + 2] = r * Math.sin(theta) * Math.cos(phi);

const brightness = 0.8 + Math.random() * 0.2;
coreColors[i * 3] = 0.7 * brightness;
coreColors[i * 3 + 1] = 0.8 * brightness;
coreColors[i * 3 + 2] = 1.0 * brightness;

coreSizes[i] = 0.5 + Math.random() * 1.5;
}

coreGeometry.setAttribute('position', new THREE.BufferAttribute(corePositions, 3));
coreGeometry.setAttribute('color', new THREE.BufferAttribute(coreColors, 3));
coreGeometry.setAttribute('size', new THREE.BufferAttribute(coreSizes, 1));

const coreMaterial = new THREE.ShaderMaterial({
uniforms: {
uTime: { value: 0 },
uTexture: { value: glowTexture },
uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
},
vertexShader: `
attribute float size;
varying vec3 vColor;
uniform float uPixelRatio;

void main() {
vColor = color;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
float sizeAttenuation = (200.0 / -mvPosition.z);
gl_PointSize = size * sizeAttenuation * uPixelRatio;
gl_Position = projectionMatrix * mvPosition;
}
`,
fragmentShader: `
varying vec3 vColor;
uniform sampler2D uTexture;

void main() {
vec4 texel = texture2D(uTexture, gl_PointCoord);
float alpha = texel.a;
if (alpha < 0.01) discard;
gl_FragColor = vec4(vColor * 2.0, alpha * 0.9);
}
`,
vertexColors: true,
transparent: true,
depthWrite: false,
blending: THREE.AdditiveBlending
});

const corePoints = new THREE.Points(coreGeometry, coreMaterial);
scene.add(corePoints);

const bgGeometry = new THREE.BufferGeometry();
const bgCount = 3000;
const bgPositions = new Float32Array(bgCount * 3);
const bgSizes = new Float32Array(bgCount);

for (let i = 0; i < bgCount; i++) {
const theta = Math.random() * Math.PI * 2;
const phi = Math.acos(2 * Math.random() - 1);
const r = 400 + Math.random() * 600;

bgPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
bgPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
bgPositions[i * 3 + 2] = r * Math.cos(phi);

bgSizes[i] = 0.5 + Math.random() * 2.0;
}

bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
bgGeometry.setAttribute('size', new THREE.BufferAttribute(bgSizes, 1));

const bgMaterial = new THREE.ShaderMaterial({
uniforms: {
uTexture: { value: glowTexture }
},
vertexShader: `
attribute float size;
varying float vAlpha;
void main() {
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
float sizeAttenuation = (100.0 / -mvPosition.z);
gl_PointSize = size * sizeAttenuation;
gl_Position = projectionMatrix * mvPosition;
vAlpha = 0.3 + 0.7 * (1.0 - smoothstep(0.0, 1000.0, -mvPosition.z));
}
`,
fragmentShader: `
varying float vAlpha;
uniform sampler2D uTexture;
void main() {
vec4 texel = texture2D(uTexture, gl_PointCoord);
float alpha = texel.a * vAlpha * 0.5;
if (alpha < 0.01) discard;
gl_FragColor = vec4(0.8, 0.85, 1.0, alpha);
}
`,
transparent: true,
depthWrite: false,
blending: THREE.AdditiveBlending
});

const bgStars = new THREE.Points(bgGeometry, bgMaterial);
scene.add(bgStars);

let mouseX = 0, mouseY = 0;
let targetRotationX = 0, targetRotationY = 0;
let isDragging = false;
let previousMouseX = 0, previousMouseY = 0;
let cameraAngleX = 0.5;
let cameraAngleY = 0.3;
let cameraDistance = 120;
let targetCameraAngleX = 0.5;
let targetCameraAngleY = 0.3;
let targetCameraDistance = 120;

document.addEventListener('mousedown', (e) => {
isDragging = true;
previousMouseX = e.clientX;
previousMouseY = e.clientY;
});

document.addEventListener('mouseup', () => {
isDragging = false;
});

document.addEventListener('mousemove', (e) => {
if (isDragging) {
const deltaX = e.clientX - previousMouseX;
const deltaY = e.clientY - previousMouseY;
targetCameraAngleX += deltaX * 0.003;
targetCameraAngleY += deltaY * 0.003;
targetCameraAngleY = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, targetCameraAngleY));
previousMouseX = e.clientX;
previousMouseY = e.clientY;
}
});

document.addEventListener('wheel', (e) => {
targetCameraDistance += e.deltaY * 0.05;
targetCameraDistance = Math.max(30, Math.min(300, targetCameraDistance));
});

document.addEventListener('touchstart', (e) => {
if (e.touches.length === 1) {
isDragging = true;
previousMouseX = e.touches[0].clientX;
previousMouseY = e.touches[0].clientY;
}
});

document.addEventListener('touchmove', (e) => {
if (isDragging && e.touches.length === 1) {
const deltaX = e.touches[0].clientX - previousMouseX;
const deltaY = e.touches[0].clientY - previousMouseY;
targetCameraAngleX += deltaX * 0.003;
targetCameraAngleY += deltaY * 0.003;
targetCameraAngleY = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, targetCameraAngleY));
previousMouseX = e.touches[0].clientX;
previousMouseY = e.touches[0].clientY;
}
}, { passive: true });

document.addEventListener('touchend', () => {
isDragging = false;
});

const clock = new THREE.Clock();

function animate() {
requestAnimationFrame(animate);

const elapsed = clock.getElapsedTime();

cameraAngleX += (targetCameraAngleX - cameraAngleX) * 0.05;
cameraAngleY += (targetCameraAngleY - cameraAngleY) * 0.05;
cameraDistance += (targetCameraDistance - cameraDistance) * 0.05;

if (!isDragging) {
targetCameraAngleX += 0.0008;
}

camera.position.x = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
camera.position.y = Math.sin(cameraAngleY) * cameraDistance;
camera.position.z = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
camera.lookAt(0, 0, 0);

galaxyMaterial.uniforms.uTime.value = elapsed;
coreMaterial.uniforms.uTime.value = elapsed;

const rotationSpeed = 0.02;
galaxyPoints.rotation.y = elapsed * rotationSpeed;
corePoints.rotation.y = elapsed * rotationSpeed * 1.5;

renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
galaxyMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
coreMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
});
})();
</script>
</body>
</html>

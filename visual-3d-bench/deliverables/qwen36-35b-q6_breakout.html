<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { border: 2px solid #333; border-radius: 4px; box-shadow: 0 0 40px rgba(0,100,255,0.3); cursor: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 600;

// Audio Context
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    switch(type) {
        case 'brick':
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
            break;
        case 'paddle':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
            break;
        case 'wall':
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
            break;
        case 'life':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
            break;
        case 'powerup':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            break;
        case 'laser':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.12);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            osc.start(now);
            osc.stop(now + 0.12);
            break;
        case 'levelup':
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(500, now + 0.1);
            osc.frequency.setValueAtTime(600, now + 0.2);
            osc.frequency.setValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
            break;
        case 'gameover':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(80, now + 0.8);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
            break;
        case 'start':
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.setValueAtTime(400, now + 0.08);
            osc.frequency.setValueAtTime(500, now + 0.16);
            osc.frequency.setValueAtTime(600, now + 0.24);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
            break;
    }
}

// Game State
let gameState = 'start'; // start, playing, paused, gameover, levelup
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;

// Paddle
const paddle = {
    x: canvas.width / 2 - 60,
    y: canvas.height - 30,
    width: 120,
    height: 14,
    speed: 8,
    color: '#00aaff',
    glowColor: 'rgba(0,170,255,0.5)',
    baseWidth: 120
};

// Ball
let balls = [];
function createBall(x, y, dx, dy) {
    return { x: x || canvas.width / 2, y: y || canvas.height - 50, dx: dx || 4, dy: dy || -4, radius: 8, speed: 5, active: true };
}

let baseSpeed = 5;

// Bricks
let bricks = [];
const brickRows = 7;
const brickCols = 10;
const brickWidth = 70;
const brickHeight = 22;
const brickPadding = 4;
const brickOffsetTop = 50;
const brickOffsetLeft = (canvas.width - (brickCols * (brickWidth + brickPadding) - brickPadding)) / 2;

const brickColors = [
    { fill: '#ff4444', points: 70, glow: 'rgba(255,68,68,0.4)' },
    { fill: '#ff8844', points: 60, glow: 'rgba(255,136,68,0.4)' },
    { fill: '#ffcc44', points: 50, glow: 'rgba(255,204,68,0.4)' },
    { fill: '#44ff44', points: 40, glow: 'rgba(68,255,68,0.4)' },
    { fill: '#44aaff', points: 30, glow: 'rgba(68,170,255,0.4)' },
    { fill: '#aa44ff', points: 20, glow: 'rgba(170,68,255,0.4)' },
    { fill: '#ff44aa', points: 10, glow: 'rgba(255,68,170,0.4)' }
];

function createBricks() {
    bricks = [];
    for (let r = 0; r < brickRows; r++) {
        for (let c = 0; c < brickCols; c++) {
            let hp = 1;
            if (level >= 3 && r < 2) hp = 2;
            if (level >= 5 && r < 1) hp = 3;
            bricks.push({
                x: brickOffsetLeft + c * (brickWidth + brickPadding),
                y: brickOffsetTop + r * (brickHeight + brickPadding),
                width: brickWidth,
                height: brickHeight,
                color: brickColors[r % brickColors.length],
                alive: true,
                hp: hp,
                maxHp: hp,
                row: r
            });
        }
    }
}

// Power-ups
let powerups = [];
const POWERUP_TYPES = ['multi-ball', 'wider-paddle', 'laser', 'slow-ball'];
const POWERUP_COLORS = { 'multi-ball': '#ff44ff', 'wider-paddle': '#44ff44', 'laser': '#ffff44', 'slow-ball': '#44ffff' };
const POWERUP_SYMBOLS = { 'multi-ball': '×3', 'wider-paddle': '↔', 'laser': '↑', 'slow-ball': '◎' };

// Laser
let lasers = [];
let laserActive = false;
let laserTimer = 0;
const LASER_DURATION = 600; // frames

// Paddle effects
let widerPaddleActive = false;
let widerPaddleTimer = 0;
const WIDER_PADDLE_DURATION = 600;

let slowBallActive = false;
let slowBallTimer = 0;
const SLOW_BALL_DURATION = 480;

// Particles
let particles = [];

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
            x: x, y: y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.03 + 0.015,
            size: Math.random() * 4 + 2,
            color: color
        });
    }
}

// Input
const keys = {};
let mouseX = canvas.width / 2;
let mouseActive = false;

document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'Escape') {
        if (gameState === 'playing') gameState = 'paused';
        else if (gameState === 'paused') gameState = 'playing';
    }
    if (e.key === ' ' || e.key === 'Enter') {
        if (gameState === 'start') {
            initAudio();
            startGame();
        } else if (gameState === 'gameover' || gameState === 'levelup') {
            if (gameState === 'levelup') nextLevel();
            else startGame();
        }
    }
    if (e.key === 'z' && gameState === 'playing' && laserActive) {
        shootLaser();
    }
    e.preventDefault();
});

document.addEventListener('keyup', (e) => { keys[e.key] = false; });

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouseActive = true;
});

canvas.addEventListener('click', () => {
    initAudio();
    if (gameState === 'start') startGame();
    else if (gameState === 'gameover' || gameState === 'levelup') {
        if (gameState === 'levelup') nextLevel();
        else startGame();
    }
});

function shootLaser() {
    if (!laserActive || lasers.length >= 3) return;
    playSound('laser');
    lasers.push({ x: paddle.x + paddle.width / 2, y: paddle.y, dy: -8, width: 3, height: 12, active: true });
}

function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    baseSpeed = 5;
    resetLevel();
    gameState = 'playing';
    playSound('start');
}

function nextLevel() {
    level++;
    baseSpeed = 5 + (level - 1) * 0.6;
    resetLevel();
    gameState = 'playing';
    playSound('levelup');
}

function resetLevel() {
    paddle.width = paddle.baseWidth;
    widerPaddleActive = false;
    widerPaddleTimer = 0;
    laserActive = false;
    laserTimer = 0;
    lasers = [];
    slowBallActive = false;
    slowBallTimer = 0;
    powerups = [];
    particles = [];
    balls = [createBall()];
    balls[0].speed = baseSpeed;
    createBricks();
}

// Collision detection
function rectCollision(bx, by, br, rx, ry, rw, rh) {
    const closestX = Math.max(rx, Math.min(bx, rx + rw));
    const closestY = Math.max(ry, Math.min(by, ry + rh));
    const dx = bx - closestX;
    const dy = by - closestY;
    return (dx * dx + dy * dy) < (br * br);
}

// Update
function update() {
    if (gameState !== 'playing') return;

    // Paddle movement
    if (mouseActive) {
        const targetX = mouseX - paddle.width / 2;
        paddle.x += (targetX - paddle.x) * 0.3;
    }
    if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
    if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

    // Timers
    if (laserActive) {
        laserTimer--;
        if (laserTimer <= 0) laserActive = false;
    }
    if (widerPaddleActive) {
        widerPaddleTimer--;
        if (widerPaddleTimer <= 0) {
            widerPaddleActive = false;
            paddle.width = paddle.baseWidth;
        }
    }
    if (slowBallActive) {
        slowBallTimer--;
        if (slowBallTimer <= 0) slowBallActive = false;
    }

    // Update lasers
    for (let l of lasers) {
        if (!l.active) continue;
        l.y += l.dy;
        if (l.y < 0) { l.active = false; continue; }

        // Check brick collision
        for (let b of bricks) {
            if (!b.alive) continue;
            if (l.x >= b.x && l.x <= b.x + b.width && l.y >= b.y && l.y <= b.y + b.height) {
                l.active = false;
                b.hp--;
                if (b.hp <= 0) {
                    b.alive = false;
                    score += b.color.points;
                    createParticles(b.x + b.width / 2, b.y + b.height / 2, b.color.fill, 12);
                    playSound('brick');
                    spawnPowerup(b.x + b.width / 2, b.y + b.height / 2);
                } else {
                    createParticles(b.x + b.width / 2, b.y + b.height / 2, '#ffffff', 4);
                    playSound('brick');
                }
                break;
            }
        }
    }
    lasers = lasers.filter(l => l.active);

    // Update balls
    for (let ball of balls) {
        if (!ball.active) continue;

        const spd = slowBallActive ? ball.speed * 0.6 : ball.speed;
        const nx = ball.dx / Math.abs(ball.dx || 1);
        const ny = ball.dy / Math.abs(ball.dy || 1);
        const ndx = (ball.dx / spd) || 0;
        const ndy = (ball.dy / spd) || 0;

        ball.x += ndx * spd;
        ball.y += ndy * spd;

        // Wall collisions
        if (ball.x - ball.radius <= 0) {
            ball.x = ball.radius;
            ball.dx = Math.abs(ball.dx);
            playSound('wall');
        }
        if (ball.x + ball.radius >= canvas.width) {
            ball.x = canvas.width - ball.radius;
            ball.dx = -Math.abs(ball.dx);
            playSound('wall');
        }
        if (ball.y - ball.radius <= 0) {
            ball.y = ball.radius;
            ball.dy = Math.abs(ball.dy);
            playSound('wall');
        }

        // Bottom - lose life
        if (ball.y + ball.radius >= canvas.height) {
            ball.active = false;
            continue;
        }

        // Paddle collision
        if (ball.dy > 0 && ball.y + ball.radius >= paddle.y && ball.y + ball.radius <= paddle.y + paddle.height + 5 &&
            ball.x >= paddle.x - ball.radius && ball.x <= paddle.x + paddle.width + ball.radius) {

            ball.y = paddle.y - ball.radius;

            // Angle based on hit position
            const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
            const angle = hitPos * (Math.PI / 3); // max 60 degrees

            const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            ball.dx = Math.sin(angle) * speed;
            ball.dy = -Math.cos(angle) * speed;

            // Ensure minimum vertical speed
            if (Math.abs(ball.dy) < 1.5) {
                ball.dy = ball.dy < 0 ? -1.5 : 1.5;
                const totalSpeed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                ball.dx = (ball.dx / totalSpeed) * speed;
                ball.dy = (ball.dy / totalSpeed) * speed;
            }

            playSound('paddle');
            createParticles(ball.x, ball.y, '#00aaff', 6);
        }

        // Brick collision
        for (let brick of bricks) {
            if (!brick.alive) continue;
            if (rectCollision(ball.x, ball.y, ball.radius, brick.x, brick.y, brick.width, brick.height)) {

                // Determine collision side
                const ballCenterX = ball.x;
                const ballCenterY = ball.y;
                const brickCenterX = brick.x + brick.width / 2;
                const brickCenterY = brick.y + brick.height / 2;

                const overlapX = (brick.width / 2 + ball.radius) - Math.abs(ballCenterX - brickCenterX);
                const overlapY = (brick.height / 2 + ball.radius) - Math.abs(ballCenterY - brickCenterY);

                if (overlapX < overlapY) {
                    ball.dx = -ball.dx;
                } else {
                    ball.dy = -ball.dy;
                }

                brick.hp--;
                if (brick.hp <= 0) {
                    brick.alive = false;
                    score += brick.color.points;
                    createParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, brick.color.fill, 15);
                    playSound('brick');
                    spawnPowerup(brick.x + brick.width / 2, brick.y + brick.height / 2);
                } else {
                    createParticles(brick.x + brick.width / 2, brick.y + brick.height / 2, '#ffffff', 5);
                    playSound('brick');
                }
                break;
            }
        }
    }

    // Remove inactive balls
    balls = balls.filter(b => b.active);

    // Check if all balls lost
    if (balls.length === 0) {
        lives--;
        playSound('life');
        if (lives <= 0) {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('breakoutHighScore', highScore);
            }
            playSound('gameover');
        } else {
            balls = [createBall()];
            balls[0].speed = baseSpeed;
        }
    }

    // Update powerups
    for (let p of powerups) {
        if (!p.active) continue;
        p.y += p.speed;
        if (p.y > canvas.height) { p.active = false; continue; }

        // Check paddle collision
        if (p.y + p.size >= paddle.y && p.y <= paddle.y + paddle.height &&
            p.x + p.size >= paddle.x && p.x <= paddle.x + paddle.width) {
            p.active = false;
            applyPowerup(p.type);
            playSound('powerup');
            createParticles(p.x, p.y, POWERUP_COLORS[p.type], 10);
        }
    }
    powerups = powerups.filter(p => p.active);

    // Update particles
    for (let p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.05; // gravity
        p.life -= p.decay;
    }
    particles = particles.filter(p => p.life > 0);

    // Check level complete
    if (bricks.every(b => !b.alive)) {
        gameState = 'levelup';
        playSound('levelup');
    }

    // Update score display
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('breakoutHighScore', highScore);
    }
}

function spawnPowerup(x, y) {
    if (Math.random() > 0.2) return; // 20% chance
    const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    powerups.push({ x: x - 12, y: y, size: 24, speed: 2, type: type, active: true, pulse: 0 });
}

function applyPowerup(type) {
    switch(type) {
        case 'multi-ball':
            const newBalls = [];
            for (let b of balls) {
                if (b.active) {
                    newBalls.push(createBall(b.x, b.y, b.dx + 2, b.dy));
                    newBalls.push(createBall(b.x, b.y, b.dx - 2, b.dy));
                }
            }
            balls.push(...newBalls);
            break;
        case 'wider-paddle':
            paddle.width = paddle.baseWidth * 1.6;
            widerPaddleActive = true;
            widerPaddleTimer = WIDER_PADDLE_DURATION;
            break;
        case 'laser':
            laserActive = true;
            laserTimer = LASER_DURATION;
            break;
        case 'slow-ball':
            slowBallActive = true;
            slowBallTimer = SLOW_BALL_DURATION;
            break;
    }
}

// Draw
function draw() {
    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    if (gameState === 'start') {
        drawStartScreen();
        return;
    }

    // Draw bricks
    for (let brick of bricks) {
        if (!brick.alive) continue;
        const alpha = brick.hp / brick.maxHp;
        ctx.shadowColor = brick.color.glow;
        ctx.shadowBlur = 8;
        ctx.fillStyle = brick.color.fill;
        ctx.globalAlpha = 0.6 + alpha * 0.4;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);

        // Brick highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height / 3);

        // HP indicator for multi-hit bricks
        if (brick.maxHp > 1) {
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(brick.hp, brick.x + brick.width / 2, brick.y + brick.height / 2 + 4);
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }

    // Draw paddle
    ctx.shadowColor = paddle.glowColor;
    ctx.shadowBlur = 15;
    const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
    paddleGrad.addColorStop(0, '#44ccff');
    paddleGrad.addColorStop(1, '#0066aa');
    ctx.fillStyle = paddleGrad;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Laser indicator on paddle
    if (laserActive) {
        ctx.fillStyle = '#ffff44';
        ctx.shadowColor = '#ffff44';
        ctx.shadowBlur = 10;
        ctx.fillRect(paddle.x + paddle.width / 2 - 2, paddle.y - 6, 4, 6);
        ctx.shadowBlur = 0;
    }

    // Draw lasers
    for (let l of lasers) {
        if (!l.active) continue;
        ctx.fillStyle = '#ffff44';
        ctx.shadowColor = '#ffff44';
        ctx.shadowBlur = 8;
        ctx.fillRect(l.x - l.width / 2, l.y, l.width, l.height);
        ctx.shadowBlur = 0;
    }

    // Draw balls
    for (let ball of balls) {
        if (!ball.active) continue;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.radius);
        ballGrad.addColorStop(0, '#ffffff');
        ballGrad.addColorStop(0.5, '#88ccff');
        ballGrad.addColorStop(1, '#0066cc');
        ctx.fillStyle = ballGrad;
        ctx.shadowColor = '#4488ff';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Draw powerups
    for (let p of powerups) {
        if (!p.active) continue;
        p.pulse += 0.1;
        const pulseSize = Math.sin(p.pulse) * 2;
        ctx.shadowColor = POWERUP_COLORS[p.type];
        ctx.shadowBlur = 10;
        ctx.fillStyle = POWERUP_COLORS[p.type];
        ctx.beginPath();
        ctx.arc(p.x + p.size / 2, p.y + p.size / 2, p.size / 2 + pulseSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#000';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(POWERUP_SYMBOLS[p.type], p.x + p.size / 2, p.y + p.size / 2);
    }

    // Draw particles
    for (let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Draw HUD
    drawHUD();

    // Draw overlays
    if (gameState === 'paused') drawPauseScreen();
    if (gameState === 'gameover') drawGameOverScreen();
    if (gameState === 'levelup') drawLevelUpScreen();
}

function drawHUD() {
    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 15, 25);

    // High Score
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText(`HI: ${highScore}`, 15, 42);

    // Level
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}`, canvas.width / 2, 25);

    // Lives
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ff4466';
    ctx.font = 'bold 18px monospace';
    let livesText = '♥'.repeat(lives);
    ctx.fillText(livesText, canvas.width - 15, 25);

    // Active powerup indicators
    let indicatorY = 45;
    ctx.textAlign = 'right';
    ctx.font = '12px monospace';
    if (laserActive) {
        ctx.fillStyle = '#ffff44';
        ctx.fillText(`LASER ${Math.ceil(laserTimer / 60)}s`, canvas.width - 15, indicatorY);
        indicatorY += 16;
    }
    if (widerPaddleActive) {
        ctx.fillStyle = '#44ff44';
        ctx.fillText(`WIDE ${Math.ceil(widerPaddleTimer / 60)}s`, canvas.width - 15, indicatorY);
        indicatorY += 16;
    }
    if (slowBallActive) {
        ctx.fillStyle = '#44ffff';
        ctx.fillText(`SLOW ${Math.ceil(slowBallTimer / 60)}s`, canvas.width - 15, indicatorY);
    }
}

function drawStartScreen() {
    // Title
    ctx.fillStyle = '#00aaff';
    ctx.shadowColor = '#00aaff';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 56px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BREAKOUT', canvas.width / 2, 180);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.fillStyle = '#888';
    ctx.font = '16px monospace';
    ctx.fillText('ARCADE CLASSIC', canvas.width / 2, 215);

    // Instructions
    ctx.fillStyle = '#ccc';
    ctx.font = '15px monospace';
    const instructions = [
        '🏓 Mouse or Arrow Keys to move paddle',
        '🖱️ Click to shoot lasers (when active)',
        '⏸️  ESC to pause',
        '',
        '💎 Power-ups drop from bricks:',
        '   ×3 Multi-Ball   ↔ Wider Paddle',
        '   ↑ Laser Shots   ◎ Slow Ball'
    ];
    instructions.forEach((line, i) => {
        ctx.fillText(line, canvas.width / 2, 280 + i * 28);
    });

    // High score
    if (highScore > 0) {
        ctx.fillStyle = '#ffcc44';
        ctx.font = 'bold 16px monospace';
        ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width / 2, 510);
    }

    // Start prompt
    const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('[ CLICK OR PRESS ENTER TO START ]', canvas.width / 2, 560);
    ctx.globalAlpha = 1;
}

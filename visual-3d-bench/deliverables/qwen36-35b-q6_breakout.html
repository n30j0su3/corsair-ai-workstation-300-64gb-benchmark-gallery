<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout - Arkanoid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a1a;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
border: 2px solid #333;
border-radius: 4px;
box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
cursor: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 600;

// Audio context
let audioCtx = null;
function initAudio() {
if (!audioCtx) {
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
}

function playSound(type) {
if (!audioCtx) return;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
const now = audioCtx.currentTime;

switch(type) {
case 'hit':
osc.type = 'square';
osc.frequency.setValueAtTime(440, now);
osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
gain.gain.setValueAtTime(0.15, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
osc.start(now);
osc.stop(now + 0.1);
break;
case 'brick':
osc.type = 'square';
osc.frequency.setValueAtTime(523, now);
osc.frequency.exponentialRampToValueAtTime(1047, now + 0.08);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
osc.start(now);
osc.stop(now + 0.15);
break;
case 'powerup':
osc.type = 'sine';
osc.frequency.setValueAtTime(330, now);
osc.frequency.exponentialRampToValueAtTime(660, now + 0.15);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
osc.start(now);
osc.stop(now + 0.25);
break;
case 'lose':
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(440, now);
osc.frequency.exponentialRampToValueAtTime(110, now + 0.4);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
osc.start(now);
osc.stop(now + 0.5);
break;
case 'launch':
osc.type = 'sine';
osc.frequency.setValueAtTime(200, now);
osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
gain.gain.setValueAtTime(0.15, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
osc.start(now);
osc.stop(now + 0.25);
break;
case 'levelup':
osc.type = 'square';
osc.frequency.setValueAtTime(523, now);
osc.frequency.setValueAtTime(659, now + 0.1);
osc.frequency.setValueAtTime(784, now + 0.2);
osc.frequency.setValueAtTime(1047, now + 0.3);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
osc.start(now);
osc.stop(now + 0.5);
break;
case 'gameover':
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(440, now);
osc.frequency.setValueAtTime(349, now + 0.2);
osc.frequency.setValueAtTime(262, now + 0.4);
osc.frequency.setValueAtTime(196, now + 0.6);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
osc.start(now);
osc.stop(now + 0.9);
break;
case 'wall':
osc.type = 'triangle';
osc.frequency.setValueAtTime(300, now);
gain.gain.setValueAtTime(0.08, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
osc.start(now);
osc.stop(now + 0.05);
break;
case 'laser':
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(800, now);
osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
gain.gain.setValueAtTime(0.1, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
osc.start(now);
osc.stop(now + 0.12);
break;
}
}

// Game state
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, LEVEL_COMPLETE: 4, WIN: 5 };
let gameState = STATE.MENU;
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;

// Paddle
const paddle = {
x: canvas.width / 2 - 50,
y: canvas.height - 30,
width: 100,
height: 14,
speed: 8,
baseWidth: 100,
color: '#00aaff',
glowColor: 'rgba(0, 170, 255, 0.4)'
};

// Ball
let balls = [];
function createBall(x, y, speedMultiplier) {
return {
x: x || canvas.width / 2,
y: y || paddle.y - 10,
radius: 7,
dx: 4 * (Math.random() > 0.5 ? 1 : -1),
dy: -4,
speed: 4 * (speedMultiplier || 1),
active: true,
trails: []
};
}

// Bricks
let bricks = [];
const brickRows = 7;
const brickCols = 10;
const brickWidth = 70;
const brickHeight = 20;
const brickPadding = 4;
const brickOffsetTop = 50;
const brickOffsetLeft = (canvas.width - (brickCols * (brickWidth + brickPadding) - brickPadding)) / 2;

const brickColors = [
{ fill: '#ff4444', points: 60, glow: 'rgba(255,68,68,0.5)' },
{ fill: '#ff8844', points: 50, glow: 'rgba(255,136,68,0.5)' },
{ fill: '#ffcc44', points: 40, glow: 'rgba(255,204,68,0.5)' },
{ fill: '#44ff44', points: 30, glow: 'rgba(68,255,68,0.5)' },
{ fill: '#44ccff', points: 20, glow: 'rgba(68,204,255,0.5)' },
{ fill: '#8844ff', points: 15, glow: 'rgba(136,68,255,0.5)' },
{ fill: '#ff44cc', points: 10, glow: 'rgba(255,68,204,0.5)' }
];

// Power-ups
let powerUps = [];
const POWERUP_TYPES = {
MULTIBALL: { color: '#00ff88', symbol: 'M', label: 'Multi-Ball' },
WIDEPADDLE: { color: '#ff8800', symbol: 'W', label: 'Wide Paddle' },
LASER: { color: '#ff00ff', symbol: 'L', label: 'Laser' },
SLOWBALL: { color: '#0088ff', symbol: 'S', label: 'Slow Ball' }
};

let activePowerUps = {
widePaddle: { active: false, timer: 0 },
laser: { active: false, timer: 0 },
slowBall: { active: false, timer: 0 }
};

// Lasers
let lasers = [];
let laserCooldown = 0;

// Particles
let particles = [];

// Keys
const keys = {};
let mouseX = canvas.width / 2;

// Brick HP for multi-hit levels
let brickHP = [];

function generateBricks() {
bricks = [];
brickHP = [];
for (let r = 0; r < brickRows; r++) {
bricks[r] = [];
brickHP[r] = [];
for (let c = 0; c < brickCols; c++) {
let hp = 1;
if (level >= 3 && r < 2) hp = 2;
if (level >= 5 && r < 1) hp = 3;
bricks[r][c] = {
x: brickOffsetLeft + c * (brickWidth + brickPadding),
y: brickOffsetTop + r * (brickHeight + brickPadding),
alive: true,
row: r,
col: c
};
brickHP[r][c] = hp;
}
}
}

function resetBall() {
balls = [createBall()];
}

function resetGame() {
score = 0;
lives = 3;
level = 1;
paddle.width = paddle.baseWidth;
paddle.x = canvas.width / 2 - paddle.width / 2;
activePowerUps.widePaddle.active = false;
activePowerUps.laser.active = false;
activePowerUps.slowBall.active = false;
powerUps = [];
lasers = [];
particles = [];
generateBricks();
resetBall();
}

function nextLevel() {
level++;
paddle.width = paddle.baseWidth;
activePowerUps.widePaddle.active = false;
activePowerUps.laser.active = false;
activePowerUps.slowBall.active = false;
powerUps = [];
lasers = [];
particles = [];
generateBricks();
resetBall();
gameState = STATE.LEVEL_COMPLETE;
playSound('levelup');
setTimeout(() => {
if (gameState === STATE.LEVEL_COMPLETE) gameState = STATE.PLAYING;
}, 2000);
}

function spawnPowerUp(x, y) {
if (Math.random() > 0.25) return;
const types = Object.keys(POWERUP_TYPES);
const type = types[Math.floor(Math.random() * types.length)];
powerUps.push({
x: x,
y: y,
width: 30,
height: 16,
dy: 2,
type: type,
...POWERUP_TYPES[type]
});
}

function applyPowerUp(type) {
playSound('powerup');
switch(type) {
case 'MULTIBALL':
const currentBalls = balls.filter(b => b.active);
if (currentBalls.length > 0) {
const source = currentBalls[0];
for (let i = 0; i < 2; i++) {
const nb = createBall(source.x, source.y, 1);
nb.dx = source.dx + (Math.random() - 0.5) * 3;
nb.dy = Math.abs(source.dy) * (Math.random() * 0.5 + 0.5);
balls.push(nb);
}
}
break;
case 'WIDEPADDLE':
paddle.width = Math.min(paddle.baseWidth * 2, 200);
activePowerUps.widePaddle.active = true;
activePowerUps.widePaddle.timer = 600;
break;
case 'LASER':
activePowerUps.laser.active = true;
activePowerUps.laser.timer = 480;
break;
case 'SLOWBALL':
for (const b of balls) {
if (b.active) {
const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
const factor = 0.6;
b.dx *= factor;
b.dy *= factor;
}
}
activePowerUps.slowBall.active = true;
activePowerUps.slowBall.timer = 480;
break;
}
}

function createParticles(x, y, color, count) {
for (let i = 0; i < count; i++) {
particles.push({
x: x,
y: y,
dx: (Math.random() - 0.5) * 8,
dy: (Math.random() - 0.5) * 8,
radius: Math.random() * 3 + 1,
color: color,
life: 1,
decay: Math.random() * 0.03 + 0.02
});
}
}

function createScorePopup(x, y, points) {
particles.push({
x: x,
y: y,
dx: 0,
dy: -1.5,
radius: 0,
color: '#fff',
life: 1,
decay: 0.02,
text: '+' + points,
isText: true
});
}

// Input
canvas.addEventListener('mousemove', (e) => {
const rect = canvas.getBoundingClientRect();
mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});

canvas.addEventListener('click', () => {
initAudio();
if (gameState === STATE.MENU) {
resetGame();
gameState = STATE.PLAYING;
} else if (gameState === STATE.PLAYING) {
for (const b of balls) {
if (!b.active && !b.launched) {
b.active = true;
b.launched = false;
}
}
} else if (gameState === STATE.GAME_OVER || gameState === STATE.WIN) {
resetGame();
gameState = STATE.MENU;
}
});

document.addEventListener('keydown', (e) => {
initAudio();
keys[e.key] = true;
if (e.key === 'Escape') {
if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
}
if (e.key === ' ' && gameState === STATE.PLAYING) {
for (const b of balls) {
if (!b.launched) {
b.launched = true;
b.dy = -b.speed;
b.dx = 3 * (Math.random() > 0.5 ? 1 : -1);
}
}
}
if (e.key === 'l' && activePowerUps.laser.active && gameState === STATE.PLAYING) {
lasers.push({
x: paddle.x + 5,
y: paddle.y - 5,
dy: -7,
width: 3,
height: 12
});
lasers.push({
x: paddle.x + paddle.width - 5,
y: paddle.y - 5,
dy: -7,
width: 3,
height: 12
});
playSound('laser');
}
});

document.addEventListener('keyup', (e) => {
keys[e.key] = false;
});

// Collision
function rectCollision(ball, rect) {
return ball.x + ball.radius > rect.x &&
ball.x - ball.radius < rect.x + rect.width &&
ball.y + ball.radius > rect.y &&
ball.y - ball.radius < rect.y + rect.height;
}

function update() {
if (gameState !== STATE.PLAYING) return;

// Paddle movement
if (keys['ArrowLeft'] || keys['a']) {
paddle.x -= paddle.speed;
}
if (keys['ArrowRight'] || keys['d']) {
paddle.x += paddle.speed;
}

// Mouse control
const targetX = mouseX - paddle.width / 2;
paddle.x += (targetX - paddle.x) * 0.3;
paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

// Power-up timers
for (const key in activePowerUps) {
if (activePowerUps[key].active) {
activePowerUps[key].timer--;
if (activePowerUps[key].timer <= 0) {
activePowerUps[key].active = false;
if (key === 'widePaddle') {
paddle.width = paddle.baseWidth;
}
}
}
}

// Ball updates
for (const ball of balls) {
if (!ball.active) continue;

if (!ball.launched) {
ball.x = paddle.x + paddle.width / 2;
ball.y = paddle.y - ball.radius - 1;
continue;
}

// Trail
ball.trails.push({ x: ball.x, y: ball.y });
if (ball.trails.length > 8) ball.trails.shift();

ball.x += ball.dx;
ball.y += ball.dy;

// Wall collisions
if (ball.x - ball.radius <= 0) {
ball.x = ball.radius;
ball.dx = Math.abs(ball.dx);
playSound('wall');
}
if (ball.x + ball.radius >= canvas.width) {
ball.x = canvas.width - ball.radius;
ball.dx = -Math.abs(ball.dx);
playSound('wall');
}
if (ball.y - ball.radius <= 0) {
ball.y = ball.radius;
ball.dy = Math.abs(ball.dy);
playSound('wall');
}

// Bottom - lose ball
if (ball.y + ball.radius >= canvas.height) {
ball.active = false;
}

// Paddle collision
if (rectCollision(ball, paddle) && ball.dy > 0) {
const hitPos = (ball.x - paddle.x) / paddle.width;
const angle = (hitPos - 0.5) * Math.PI * 0.7;
const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
ball.dx = speed * Math.sin(angle);
ball.dy = -speed * Math.cos(angle);
ball.y = paddle.y - ball.radius - 1;
playSound('hit');
createParticles(ball.x, ball.y, '#00aaff', 5);
}

// Brick collision
for (let r = 0; r < brickRows; r++) {
for (let c = 0; c < brickCols; c++) {
const brick = bricks[r][c];
if (!brick.alive) continue;

if (rectCollision(ball, brick)) {
brickHP[r][c]--;
if (brickHP[r][c] <= 0) {
brick.alive = false;
const color = brickColors[r % brickColors.length];
score += color.points * level;
createParticles(brick.x + brickWidth / 2, brick.y + brickHeight / 2, color.fill, 15);
createScorePopup(brick.x + brickWidth / 2, brick.y, color.points * level);
spawnPowerUp(brick.x + brickWidth / 2, brick.y + brickHeight / 2);
playSound('brick');
} else {
createParticles(brick.x + brickWidth / 2, brick.y + brickHeight / 2, '#fff', 5);
playSound('hit');
}

// Reflect
const overlapLeft = (ball.x + ball.radius) - brick.x;
const overlapRight = (brick.x + brickWidth) - (ball.x - ball.radius);
const overlapTop = (ball.y + ball.radius) - brick.y;
const overlapBottom = (brick.y + brickHeight) - (ball.y - ball.radius);

const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

if (minOverlap === overlapTop || minOverlap === overlapBottom) {
ball.dy = -ball.dy;
} else {
ball.dx = -ball.dx;
}

if (brick.alive === false) break;
}
}
}

// Laser collision
for (const laser of lasers) {
for (let r = 0; r < brickRows; r++) {
for (let c = 0; c < brickCols; c++) {
const brick = bricks[r][c];
if (!brick.alive) continue;
if (laser.x > brick.x && laser.x < brick.x + brickWidth &&
laser.y > brick.y && laser.y < brick.y + brickHeight) {
brickHP[r][c]--;
if (brickHP[r][c] <= 0) {
brick.alive = false;
const color = brickColors[r % brickColors.length];
score += color.points * level;
createParticles(brick.x + brickWidth / 2, brick.y + brickHeight / 2, color.fill, 15);
createScorePopup(brick.x + brickWidth / 2, brick.y, color.points * level);
spawnPowerUp(brick.x + brickWidth / 2, brick.y + brickHeight / 2);
playSound('brick');
} else {
playSound('hit');
}
laser.dy = 0;
laser.hit = true;
}
}
}
}

// Check level complete
let allBricksDestroyed = true;
for (let r = 0; r < brickRows; r++) {
for (let c = 0; c < brickCols; c++) {
if (bricks[r][c].alive) {
allBricksDestroyed = false;
break;
}
}
}
if (allBricksDestroyed) {
nextLevel();
}

// Check game over
const activeBalls = balls.filter(b => b.active);
if (activeBalls.length === 0) {
lives--;
if (lives <= 0) {
if (score > highScore) {
highScore = score;
localStorage.setItem('breakoutHighScore', highScore);
}
gameState = STATE.GAME_OVER;
playSound('gameover');
} else {
playSound('lose');
resetBall();
}
}
}

// Update power-ups
for (let i = powerUps.length - 1; i >= 0; i--) {
const pu = powerUps[i];
pu.y += pu.dy;
if (pu.y > canvas.height) {
powerUps.splice(i, 1);
continue;
}

if (pu.y + pu.height > paddle.y && pu.y < paddle.y + paddle.height &&
pu.x + pu.width > paddle.x && pu.x < paddle.x + paddle.width) {
applyPowerUp(pu.type);
powerUps.splice(i, 1);
}
}

// Update lasers
for (let i = lasers.length - 1; i >= 0; i--) {
const laser = lasers[i];
laser.y += laser.dy;
if (laser.y < 0 || laser.hit) {
lasers.splice(i, 1);
}
}

// Update particles
for (let i = particles.length - 1; i >= 0; i--) {
const p = particles[i];
p.x += p.dx;
p.y += p.dy;
p.life -= p.decay;
if (p.life <= 0) {
particles.splice(i, 1);
}
}
}

function draw() {
// Background
ctx.fillStyle = '#0a0a1a';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Background grid
ctx.strokeStyle = 'rgba(30, 40, 80, 0.3)';
ctx.lineWidth = 0.5;
for (let x = 0; x < canvas.width; x += 40) {
ctx.beginPath();
ctx.moveTo(x, 0);
ctx.lineTo(x, canvas.height);
ctx.stroke();
}
for (let y = 0; y < canvas.height; y += 40) {
ctx.beginPath();
ctx.moveTo(0, y);
ctx.lineTo(canvas.width, y);
ctx.stroke();
}

if (gameState === STATE.MENU) {
drawMenu();
return;
}

// Bricks
for (let r = 0; r < brickRows; r++) {
for (let c = 0; c < brickCols; c++) {
const brick = bricks[r][c];
if (!brick.alive) continue;
const color = brickColors[r % brickColors.length];
const hp = brickHP[r][c];

ctx.save();
ctx.shadowColor = color.glow;
ctx.shadowBlur = 8;

// Brick body
const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brickHeight);
gradient.addColorStop(0, color.fill);
gradient.addColorStop(1, shadeColor(color.fill, -30));
ctx.fillStyle = gradient;
ctx.fillRect(brick.x, brick.y, brickWidth, brickHeight);

// Highlight
ctx.fillStyle = 'rgba(255,255,255,0.2)';
ctx.fillRect(brick.x, brick.y, brickWidth, brickHeight / 3);

// Border
ctx.strokeStyle = 'rgba(255,255,255,0.15)';
ctx.lineWidth = 1;
ctx.strokeRect(brick.x, brick.y, brickWidth, brickHeight);

// HP indicator for multi-hit bricks
if (hp > 1) {
ctx.fillStyle = '#fff';
ctx.font = 'bold 10px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(hp, brick.x + brickWidth / 2, brick.y + brickHeight / 2);
}
ctx.restore();
}
}

// Power-ups
for (const pu of powerUps) {
ctx.save();
ctx.shadowColor = pu.color;
ctx.shadowBlur = 10;
ctx.fillStyle = pu.color;
ctx.fillRect(pu.x, pu.y, pu.width, pu.height);
ctx.fillStyle = '#fff';
ctx.font = 'bold 11px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(pu.symbol, pu.x + pu.width / 2, pu.y + pu.height / 2);
ctx.restore();
}

// Lasers
for (const laser of lasers) {
ctx.save();
ctx.shadowColor = '#ff00ff';
ctx.shadowBlur = 8;
const gradient = ctx.createLinearGradient(laser.x, laser.y, laser.x, laser.y + laser.height);
gradient.addColorStop(0, '#ff00ff');
gradient.addColorStop(1, '#ff88ff');
ctx.fillStyle = gradient;
ctx.fillRect(laser.x - laser.width / 2, laser.y, laser.width, laser.height);
ctx.restore();
}

// Paddle
ctx.save();
ctx.shadowColor = paddle.glowColor;
ctx.shadowBlur = 15;
const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
paddleGrad.addColorStop(0, '#44ccff');
paddleGrad.addColorStop(0.5, '#0088cc');
paddleGrad.addColorStop(1, '#005588');
ctx.fillStyle = paddleGrad;
ctx.beginPath();
ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
ctx.fill();

// Paddle highlight
ctx.fillStyle = 'rgba(255,255,255,0.25)';
ctx.beginPath();
ctx.roundRect(paddle.x + 3, paddle.y + 2, paddle.width - 6, paddle.height / 2 - 1, 4);
ctx.fill();
ctx.restore();

// Wide paddle indicator
if (activePowerUps.widePaddle.active) {
ctx.fillStyle = 'rgba(255, 136, 0, 0.3)';
ctx.fillRect(paddle.x, paddle.y - 3, paddle.width, 3);
}

// Laser indicator
if (activePowerUps.laser.active) {
ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
ctx.fillRect(paddle.x, paddle.y - 3, 5, 3);
ctx.fillRect(paddle.x + paddle.width - 5, paddle.y - 3, 5, 3);
}

// Slow ball indicator
if (activePowerUps.slowBall.active) {
ctx.fillStyle = 'rgba(0, 136, 255, 0.3)';
ctx.fillRect(paddle.x, paddle.y - 3, paddle.width, 3);
}

// Balls
for (const ball of balls) {
// Trails
for (let i = 0; i < ball.trails.length; i++) {
const t = ball.trails[i];
const alpha = (i / ball.trails.length) * 0.3;
ctx.beginPath();
ctx.arc(t.x, t.y, ball.radius * (i / ball.trails.length), 0, Math.PI * 2);
ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
ctx.fill();
}

if (!ball.active) continue;

ctx.save();
ctx.shadowColor = '#ffffff';
ctx.shadowBlur = 12;
const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.radius);
ballGrad.addColorStop(0, '#ffffff');
ballGrad.addColorStop(0.7, '#aaddff');
ballGrad.addColorStop(1, '#4488cc');
ctx.fillStyle = ballGrad;
ctx.beginPath();
ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
ctx.fill();
ctx.restore();
}

// Particles
for (const p of particles) {
if (p.isText) {
ctx.save();
ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
ctx.font = 'bold 14px Arial';
ctx.textAlign = 'center';
ctx.fillText(p.text, p.x, p.y);
ctx.restore();
} else {
ctx.save();
ctx.globalAlpha = p.life;
ctx.fillStyle = p.color;
ctx.beginPath();
ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
ctx.fill();
ctx.restore();
}
}

// HUD
drawHUD();

// Paused overlay
if (gameState === STATE.PAUSED) {
drawOverlay('PAUSED', 'Press ESC to resume', '#ffcc00');
}

// Level complete
if (gameState === STATE.LEVEL_COMPLETE) {
drawOverlay('LEVEL ' + level + ' CLEAR!', 'Get ready for level ' + (level + 1), '#00ff88');
}

// Game over
if (gameState === STATE.GAME_OVER) {
drawOverlay('GAME OVER', 'Click to restart', '#ff4444');
}

// Win
if (gameState === STATE.WIN) {
drawOverlay('YOU WIN!', 'Final Score: ' + score, '#ffcc00');
}
}

function drawHUD() {
// Score
ctx.fillStyle = '#fff';
ctx.font = 'bold 18px Arial';
ctx.textAlign = 'left';
ctx.fillText('Score: ' + score, 15, 25);

// High Score
ctx.fillStyle = 'rgba(255,255,255,0.5)';
ctx.font = '12px Arial';
ctx.fillText('Best: ' + highScore, 15, 42);

// Level
ctx.fillStyle = '#fff';
ctx.font = 'bold 18px Arial';
ctx.textAlign = 'center';
ctx.fillText('Level ' + level, canvas.width / 2, 25);

// Lives
ctx.textAlign = 'right';
ctx.fillStyle = '#fff';
ctx.fillText('Lives:', canvas.width - 100, 25);
for (let i = 0; i < lives; i++) {
ctx.fillStyle = '#ff4466';
ctx.beginPath();
const lx = canvas.width - 85 + i * 22;
const ly = 20;
ctx.moveTo(lx, ly - 5);
ctx.bezierCurveTo(lx, ly - 10, lx - 7, ly - 10, lx - 7, ly - 5);
ctx.bezierCurveTo(lx - 7, ly, lx, ly + 5, lx, ly + 8);
ctx.bezierCurveTo(lx, ly + 5, lx + 7, ly, lx + 7, ly - 5);
ctx.bezierCurveTo(lx + 7, ly - 10, lx, ly - 10, lx, ly - 5);
ctx.fill();
}

// Active power-up indicators
let py = 50;
ctx.textAlign = 'right';
ctx.font = '11px Arial';
if (activePowerUps.widePaddle.active) {
ctx.fillStyle = '#ff8800';
ctx.fillText('⬛ Wide: ' + Math.ceil(activePowerUps.widePaddle.timer / 60) + 's', canvas.width - 15, py);
py += 16;
}
if (activePowerUps.laser.active) {
ctx.fillStyle = '#ff00ff';
ctx.fillText('⚡ Laser: ' + Math.ceil(activePowerUps.laser.timer / 60) + 's', canvas.width - 15, py);
py += 16;
}
if (activePowerUps.slowBall.active) {
ctx.fillStyle = '#0088ff';
ctx.fillText('🐢 Slow: ' + Math.ceil(activePowerUps.slowBall.timer / 60) + 's', canvas.width - 15, py);
}
}

function drawMenu() {
ctx.save();

// Title
ctx.shadowColor = '#00aaff';
ctx.shadowBlur = 20;
ctx.fillStyle = '#fff';
ctx.font = 'bold 52px Arial';
ctx.textAlign = 'center';
ctx.fillText('BREAKOUT', canvas.width / 2, 160);
ctx.shadowBlur = 0;

// Subtitle
ctx.fillStyle = '#00aaff';
ctx.font = '18px Arial';
ctx.fillText('★ ARKANOID EDITION ★', canvas.width / 2, 195);

// Instructions
ctx.fillStyle = '#aaa';
ctx.font = '15px Arial';
const instructions = [
'🖱️  Move mouse to control paddle',
'⌨️  Arrow keys / A,D to move',
'🚀  Click or press SPACE to launch ball',
'⏸️  Press ESC to pause',
'',
'🎯 Brick Colors: Red(60) → Orange(50) → Yellow(40) → Green(30) → Blue(20) → Purple(15) → Pink(10)',
'',
'⚡ Power-ups:',
'  🟢 M - Multi Ball    🟠 W - Wide Paddle',
'  🟣 L - Laser Shots  🔵 S - Slow Ball'
];

let iy = 240;
for (const line of instructions) {
ctx.fillText(line, canvas.width / 2, iy);
iy += 24;
}

// Start prompt
const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
ctx.globalAlpha = pulse;
ctx.fillStyle = '#ffcc00';
ctx.font = 'bold 22px Arial';
ctx.fillText('Click to Start', canvas.width / 2, 520);
ctx.globalAlpha = 1;

// High score
ctx.fillStyle = '#888';
ctx.font = '14px Arial';
ctx.fillText('High Score: ' + highScore, canvas.width / 2, 560);

ctx.restore();
}

function drawOverlay(title, subtitle, color) {
ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.save();
ctx.shadowColor = color;
ctx.shadowBlur = 20;
ctx.fillStyle = color;
ctx.font = 'bold 48px Arial';
ctx.textAlign = 'center';
ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
ctx.shadowBlur = 0;

ctx.fillStyle = '#fff';
ctx.font = '20px Arial';
ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);
ctx.restore();
}

function shadeColor(color, percent) {
const num = parseInt(color.replace('#', ''), 16);
const amt = Math.round(2.55 * percent);
const R = Math.max(0, Math.min(255, (num >> 16) + amt));
const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// Game loop
function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
if (typeof r === 'number') r = [r, r, r, r];
this.moveTo(x + r[0], y);
this.lineTo(x + w - r[1], y);
this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
this.lineTo(x + w, y + h - r[2]);
this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
this.lineTo(x + r[3], y + h);
this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
this.lineTo(x, y + r[0]);
this.quadraticCurveTo(x, y, x + r[0], y);
this.closePath();
};
}

gameLoop();
</script>

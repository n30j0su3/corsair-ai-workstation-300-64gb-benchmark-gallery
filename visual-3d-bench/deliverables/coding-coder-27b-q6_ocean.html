```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerstner Ocean</title>
<style>
*{margin:0;padding:0;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x88aacc,0.0018);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,25,50);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// ── Sky Dome ──
const skyVS=`
varying vec3 vWP;
void main(){
  vWP=(modelMatrix*vec4(position,1.0)).xyz;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
}`;
const skyFS=`
uniform vec3 uSunDir;
varying vec3 vWP;
void main(){
  vec3 dir=normalize(vWP);
  float y=dir.y*0.5+0.5;
  vec3 horizon=vec3(0.55,0.65,0.78);
  vec3 zenith=vec3(0.15,0.30,0.65);
  vec3 col=mix(horizon,zenith,y);
  float sd=max(dot(dir,uSunDir),0.0);
  col+=vec3(1.0,0.85,0.45)*pow(sd,128.0)*2.5;
  col+=vec3(1.0,0.6,0.3)*pow(sd,8.0)*0.35;
  col+=vec3(0.9,0.5,0.2)*pow(sd,2.0)*0.12;
  gl_FragColor=vec4(col,1.0);
}`;
const skyMat=new THREE.ShaderMaterial({
  vertexShader:skyVS,
  fragmentShader:skyFS,
  uniforms:{uSunDir:{value:new THREE.Vector3()}},
  side:THREE.BackSide,
  depthWrite:false
});
const skyMesh=new THREE.Mesh(new THREE.SphereGeometry(900,32,32),skyMat);
scene.add(skyMesh);

// ── Ocean ──
const oceanVS=`
uniform float uTime;
varying vec3 vWorldPos;
varying float vWaveH;
varying vec3 vViewDir;

vec3 gerstner(vec2 p,vec2 dir,float amp,float wl,float steep,float spd,float t){
  float k=6.2831853/wl;
  float w=k*spd;
  float ph=k*(dot(dir,p)-spd*t);
  return vec3(-steep*amp*dir.x*sin(ph),amp*cos(ph),-steep*amp*dir.y*sin(ph));
}

void main(){
  vec3 pos=position;
  vec3 off=vec3(0.0);

  off+=gerstner(pos.xz,normalize(vec2(1.0,0.3)),1.6,80.0,0.18,12.0,uTime);
  off+=gerstner(pos.xz,normalize(vec2(-0.7,0.7)),0.85,35.0,0.22,8.0,uTime);
  off+=gerstner(pos.xz,normalize(vec2(0.5,-0.8)),0.45,18.0,0.28,6.0,uTime);
  off+=gerstner(pos.xz,normalize(vec2(-0.3,-0.9)),0.22,8.0,0.32,4.0,uTime);

  pos+=off;
  vWaveH=off.y;
  vWorldPos=(modelMatrix*vec4(pos,1.0)).xyz;
  vec4 mv=modelViewMatrix*vec4(pos,1.0);
  vViewDir=normalize(-mv.xyz);
  gl_Position=projectionMatrix*mv;
}`;

const oceanFS=`
uniform float uTime;
uniform vec3 uSunDir;
uniform vec3 uCamPos;
varying vec3 vWorldPos;
varying float vWaveH;
varying vec3 vViewDir;

void main(){
  vec3 sunDir=uSunDir;
  vec3 viewDir=normalize(uCamPos-vWorldPos);
  vec3 N=normalize(cross(dFdx(vWorldPos),dFdy(vWorldPos)));

  // Fresnel
  float fres=pow(1.0-max(dot(viewDir,N),0.0),3.5);
  fres=clamp(fres,0.0,1.0);

  // Depth colour
  vec3 deep=vec3(0.0,0.04,0.14);
  vec3 shallow=vec3(0.0,0.38,0.52);
  float depth=smoothstep(-1.5,2.0,vWaveH);
  vec3 waterCol=mix(deep,shallow,depth);

  // Subsurface-like tint
  float sss=smoothstep(-1.0,1.5,vWaveH);
  waterCol+=vec3(0.0,0.12,0.18)*sss;

  // Sky reflection
  vec3 reflDir=reflect(-viewDir,N);
  float ry=reflDir.y*0.5+0.5;
  vec3 skyR=mix(vec3(0.55,0.65,0.78),vec3(0.15,0.30,0.65),ry);

  // Sun specular
  float sd=max(dot(viewDir,reflDir),0.0);
  vec3 sunSpec=vec3(1.0,0.9,0.6)*pow(sd,256.0)*5.0;
  sunSpec+=vec3(1.0,0.7,0.35)*pow(sd,16.0)*0.55;
  sunSpec+=vec3(0.95,0.55,0.25)*pow(sd,2.0)*0.10;

  // Combine
  vec3 col=mix(waterCol,skyR,fres);
  col+=sunSpec;

  // Foam on crests
  float foam=smoothstep(0.6,1.8,vWaveH);
  foam*=smoothstep(0.0,0.5,1.0-abs(dot(viewDir,N)));
  foam*=0.85;
  col=mix(col,vec3(0.88,0.92,0.95),foam);

  gl_FragColor=vec4(col,0.97);
}`;

const oceanMat=new THREE.ShaderMaterial({
  vertexShader:oceanVS,
  fragmentShader:oceanFS,
  uniforms:{
    uTime:{value:0},
    uSunDir:{value:new THREE.Vector3()},
    uCamPos:{value:new THREE.Vector3()}
  },
  transparent:true,
  side:THREE.DoubleSide
});

const oceanGeo=new THREE.PlaneGeometry(600,600,200,200);
oceanGeo.rotateX(-Math.PI/2);
const oceanMesh=new THREE.Mesh(oceanGeo,oceanMat);
scene.add(oceanMesh);

// ── Sun helper (visual marker) ──
const sunHelper=new THREE.Mesh(
  new THREE.SphereGeometry(4,16,16),
  new THREE.MeshBasicMaterial({color:0xffee88})
);
scene.add(sunHelper);

// ── Animation ──
const clock=new THREE.Clock();
const sunAngle=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const cycle=60;

  // Sun: orbits above horizon over 60 s
  const angle=t/cycle*Math.PI*2;
  const sunPos=new THREE.Vector3(
    Math.cos(angle)*300,
    Math.sin(angle)*150+80,
    100
  );
  skyMat.uniforms.uSunDir.value.copy(sunPos).normalize();
  oceanMat.uniforms.uSunDir.value.copy(sunPos).normalize();
  sunHelper.position.copy(sunPos);

  // Camera orbit
  const camR=60;
  const camAngle=t*0.08;
  camera.position.set(
    Math.sin(camAngle)*camR,
    20+Math.sin(camAngle*0.5)*8,
    Math.cos(camAngle)*camR
  );
  camera.lookAt(0,0,0);

  // Update uniforms
  oceanMat.uniforms.uTime.value=t;
  oceanMat.uniforms.uCamPos.value.copy(camera.position);

  renderer.render(scene,camera);
}
animate();

// ── Resize ──
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Ocean</title>

<script type="x-shader/x-vertex" id="oceanVertexShader">
precision highp float;

uniform float uTime;
uniform vec3 uSunPosition;

varying vec3 vWorldPosition;
varying vec3 vNormal;
varying float vWaveHeight;
varying vec3 vViewDirection;
varying float vFoam;

#define PI 3.14159265359

struct Wave {
    vec2 direction;
    float amplitude;
    float wavelength;
    float speed;
};

Wave waves[4];

void main() {
    waves[0] = Wave(vec2(1.0, 0.5) * PI * 0.5, 0.8, 80.0, 12.0);
    waves[1] = Wave(vec2(0.5, 1.0) * PI * 0.5, 0.6, 60.0, 10.0);
    waves[2] = Wave(vec2(-0.8, 0.6) * PI * 0.5, 0.4, 40.0, 8.0);
    waves[3] = Wave(vec2(0.6, -0.8) * PI * 0.5, 0.3, 30.0, 6.0);

    vec3 position = position;
    vec3 normal = vec3(0.0, 1.0, 0.0);
    float waveHeight = 0.0;

    for (int i = 0; i < 4; i++) {
        Wave w = waves[i];
        float k = 2.0 * PI / w.wavelength;
        float c = w.speed;
        float t = uTime;
        vec2 d = normalize(w.direction);

        float x = dot(d, position.xz);
        float phase = k * (x - c * t);

        float A = w.amplitude;
        float steepness = 0.02;

        // Gerstner wave displacement
        position.x += -A * steepness * d.x * cos(phase);
        position.z += -A * steepness * d.z * cos(phase);
        position.y += A * sin(phase);

        waveHeight += A * sin(phase);

        // Normal from Gerstner wave
        normal.x += A * k * d.x * steepness * cos(phase);
        normal.z += A * k * d.z * steepness * cos(phase);
    }

    vWaveHeight = waveHeight;

    // Compute proper normal
    float dx = 0.001;
    vec3 pL = position;
    vec3 pR = position;
    vec3 pU = position;
    vec3 pD = position;

    // Approximate tangent derivatives
    vec3 tangentX = vec3(
        0.0,
        -waves[0].amplitude * steepness * cos(waves[0].direction.x * dx * PI * 0.5) * waves[0].amplitude * 2.0 * PI / waves[0].wavelength * waves[0].direction.x,
        -waves[0].amplitude * steepness * cos(waves[0].direction.z * dx * PI * 0.5) * waves[0].amplitude * 2.0 * PI / waves[0].wavelength * waves[0].direction.z
    );

    // Use analytical normal from Gerstner
    normal = normalize(vec3(
        waves[0].amplitude * k * waves[0].direction.x * steepness * cos(2.0*PI/waves[0].wavelength * dot(waves[0].direction, position.xz) - waves[0].speed * uTime * 2.0*PI/waves[0].wavelength)
        + waves[1].amplitude * steepness * 2.0*PI/waves[1].wavelength * waves[1].direction.x * cos(2.0*PI/waves[1].wavelength * dot(waves[1].direction, position.xz) - waves[1].speed * uTime * 2.0*PI/waves[1].wavelength)
        + waves[2].amplitude * steepness * 2.0*PI/waves[2].wavelength * waves[2].direction.x * cos(2.0*PI/waves[2].wavelength * dot(waves[2].direction, position.xz) - waves[2].speed * uTime * 2.0*PI/waves[2].wavelength)
        + waves[3].amplitude * steepness * 2.0*PI/waves[3].wavelength * waves[3].direction.x * cos(2.0*PI/waves[3].wavelength * dot(waves[3].direction, position.xz) - waves[3].speed * uTime * 2.0*PI/waves[3].wavelength),
        1.0,
        waves[0].amplitude * steepness * 2.0*PI/waves[0].wavelength * waves[0].direction.z * cos(2.0*PI/waves[0].wavelength * dot(waves[0].direction, position.xz) - waves[0].speed * uTime * 2.0*PI/waves[0].wavelength)
        + waves[1].amplitude * steepness * 2.0*PI/waves[1].wavelength * waves[1].direction.z * cos(2.0*PI/waves[1].wavelength * dot(waves[1].direction, position.xz) - waves[1].speed * uTime * 2.0*PI/waves[1].wavelength)
        + waves[2].amplitude * steepness * 2.0*PI/waves[2].wavelength * waves[2].direction.z * cos(2.0*PI/waves[2].wavelength * dot(waves[2].direction, position.xz) - waves[2].speed * uTime * 2.0*PI/waves[2].wavelength)
        + waves[3].amplitude * steepness * 2.0*PI/waves[3].wavelength * waves[3].direction.z * cos(2.0*PI/waves[3].wavelength * dot(waves[3].direction, position.xz) - waves[3].speed * uTime * 2.0*PI/waves[3].wavelength)
    ));

    // Recompute with proper approach
    float steep = 0.02;
    vec3 N = vec3(0.0, 1.0, 0.0);
    vec3 T = vec3(1.0, 0.0, 0.0);
    vec3 B = vec3(0.0, 0.0, 1.0);

    for (int i = 0; i < 4; i++) {
        Wave w = waves[i];
        float k = 2.0 * PI / w.wavelength;
        float c = w.speed;
        float A = w.amplitude;
        vec2 d = normalize(w.direction);
        float phase = k * (dot(d, position.xz) - c * uTime);

        N.x += -A * k * steep * d.x * cos(phase);
        N.z += -A * k * steep * d.z * cos(phase);
    }
    N.y = 1.0;
    N = normalize(N);

    vNormal = normalize(normalMatrix * N);
    vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
    vViewDirection = normalize(cameraPosition - vWorldPosition);

    // Foam based on wave height (crests)
    float crestHeight = max(0.0, waveHeight - 0.4);
    vFoam = smoothstep(0.0, 0.3, crestHeight);

    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
</script>

<script type="x-shader/x-fragment" id="oceanFragmentShader">
precision highp float;

uniform vec3 uSunPosition;
uniform vec3 uSkyColor;
uniform vec3 uHorizonColor;
uniform vec3 uDeepColor;
uniform vec3 uShallowColor;
uniform float uTime;

varying vec3 vWorldPosition;
varying vec3 vNormal;
varying float vWaveHeight;
varying vec3 vViewDirection;
varying float vFoam;

void main() {
    vec3 normal = normalize(vNormal);
    vec3 viewDir = normalize(vViewDirection);
    vec3 sunDir = normalize(uSunPosition);

    // Fresnel effect
    float fresnel = pow(1.0 - max(dot(viewDir, normal), 0.0), 4.0);
    fresnel = mix(0.02, 1.0, fresnel);

    // Depth-based color
    float depthFactor = smoothstep(-1.0, 1.5, vWaveHeight);
    vec3 waterColor = mix(uDeepColor, uShallowColor, depthFactor);

    // Sky reflection color
    float sunAngle = max(dot(normal, sunDir), 0.0);
    vec3 skyReflection = mix(uHorizonColor, uSkyColor, smoothstep(0.0, 0.5, normal.y));

    // Specular highlight (sun reflection)
    vec3 halfVector = normalize(sunDir + viewDir);
    float NdotH = max(dot(normal, halfVector), 0.0);
    float specular = pow(NdotH, 200.0) * 2.0;

    // Sun reflection on water (Blinn-Phong style)
    float sunReflection = pow(max(dot(reflect(-sunDir, normal), viewDir), 0.0), 128.0) * 3.0;

    // Diffuse lighting
    float NdotL = max(dot(normal, sunDir), 0.0);
    vec3 diffuse = waterColor * NdotL * 0.5;

    // Combine
    vec3 color = waterColor * (1.0 - fresnel);
    color += skyReflection * fresnel;
    color += diffuse;
    color += specular * vec3(1.0, 0.95, 0.8);
    color += sunReflection * vec3(1.0, 0.95, 0.8);

    // Foam on crests
    vec3 foamColor = vec3(0.95, 0.95, 0.98);
    float foamAlpha = vFoam * 0.7;
    color = mix(color, foamColor, foamAlpha);

    // Subsurface scattering approximation
    float sss = pow(max(dot(viewDir, -sunDir + normal * 0.5), 0.0), 3.0) * 0.15;
    color += vec3(0.0, 0.6, 0.4) * sss;

    gl_FragColor = vec4(color, 1.0);
}
</script>

<script type="x-shader/x-vertex" id="skyVertexShader">
precision highp float;

varying vec3 vWorldDirection;

void main() {
    vWorldDirection = normalize((modelMatrix * vec4(position, 1.0)).xyz);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
</script>

<script type="x-shader/x-fragment" id="skyFragmentShader">
precision highp float;

uniform vec3 uSunPosition;
uniform vec3 uSkyTop;
uniform vec3 uSkyHorizon;
uniform vec3 uSunColor;

varying vec3 vWorldDirection;

void main() {
    vec3 dir = normalize(vWorldDirection);
    float y = dir.y * 0.5 + 0.5;

    // Sky gradient
    vec3 skyColor = mix(uSkyHorizon, uSkyTop, pow(y, 0.6));

    // Sun glow
    vec3 sunDir = normalize(uSunPosition);
    float sunDot = max(dot(dir, sunDir), 0.0);

    // Sun disk
    float sunDisk = smoothstep(0.998, 0.999, sunDot);

    // Sun glow (halo)
    float glow = pow(sunDot, 8.0) * 0.5;
    float glow2 = pow(sunDot, 32.0) * 0.3;
    float glow3 = pow(sunDot, 128.0) * 0.2;

    // Horizon glow
    float horizonGlow = pow(1.0 - abs(dir.y), 8.0) * 0.3;

    skyColor += uSunColor * (glow + glow2 + glow3);
    skyColor += uSunColor * sunDisk * 10.0;
    skyColor += uSunColor * horizonGlow * max(dir.y, 0.0);

    // Slight blue tint at zenith
    skyColor = mix(skyColor, vec3(0.1, 0.3, 0.6), pow(y, 2.0) * 0.15);

    gl_FragColor = vec4(skyColor, 1.0);
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.0015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
    camera.position.set(0, 40, 120);

    // Sky
    const skyGeo = new THREE.SphereGeometry(2000, 32, 32);
    const skyMat = new THREE.ShaderMaterial({
        vertexShader: document.getElementById('skyVertexShader').textContent,
        fragmentShader: document.getElementById('skyFragmentShader').textContent,
        uniforms: {
            uSunPosition: { value: new THREE.Vector3(100, 80, -100) },
            uSkyTop: { value: new THREE.Color(0.1, 0.3, 0.6) },
            uSkyHorizon: { value: new THREE.Color(0.6, 0.8, 0.9) },
            uSunColor: { value: new THREE.Color(1.0, 0.95, 0.8) }
        },
        side: THREE.BackSide,
        depthWrite: false
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // Ocean
    const oceanGeo = new THREE.PlaneGeometry(2000, 2000, 200, 200);
    oceanGeo.rotateX(-Math.PI / 2);

    const oceanMat = new THREE.ShaderMaterial({
        vertexShader: document.getElementById('oceanVertexShader').textContent,
        fragmentShader: document.getElementById('oceanFragmentShader').textContent,
        uniforms: {
            uTime: { value: 0.0 },
            uSunPosition: { value: new THREE.Vector3(100, 80, -100) },
            uSkyColor: { value: new THREE.Color(0.1, 0.3, 0.6) },
            uHorizonColor: { value: new THREE.Color(0.6, 0.8, 0.9) },
            uDeepColor: { value: new THREE.Color(0.0, 0.05, 0.2) },
            uShallowColor: { value: new THREE.Color(0.0, 0.3, 0.35) }
        },
        side: THREE.DoubleSide
    });

    const ocean = new THREE.Mesh(oceanGeo, oceanMat);
    scene.add(ocean);

    // Sun position animation (60 second cycle)
    function getSunPosition(time) {
        const angle = (time / 60.0) * Math.PI * 2;
        const radius = 300;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius * 0.5 + 100;
        const z = Math.sin(angle * 0.5) * radius * 0.3;
        return new THREE.Vector3(x, Math.max(y, 10), z);
    }

    // Resize handler
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const elapsed = clock.getElapsedTime();

        // Update sun position
        const sunPos = getSunPosition(elapsed);
        oceanMat.uniforms.uSunPosition.value.copy(sunPos);
        skyMat.uniforms.uSunPosition.value.copy(sunPos);
        oceanMat.uniforms.uTime.value = elapsed;

        // Camera orbit
        const orbitSpeed = 0.05;
        const orbitRadius = 150;
        const orbitHeight = 40 + Math.sin(elapsed * 0.1) * 15;
        camera.position.x = Math.cos(elapsed * orbitSpeed) * orbitRadius;
        camera.position.z = Math.sin(elapsed * orbitSpeed) * orbitRadius;
        camera.position.y = orbitHeight;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    animate();
})();
</script>
</body>

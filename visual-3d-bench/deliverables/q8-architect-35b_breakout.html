<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
border: 2px solid #333;
cursor: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 600;
canvas.width = W;
canvas.height = H;

// Audio context
let audioCtx = null;
function initAudio() {
if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, duration, type = 'square', volume = 0.15) {
if (!audioCtx) return;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
gain.gain.setValueAtTime(volume, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime + duration);
}

function playBrickBreak() {
const notes = [523, 587, 659, 784, 880, 988];
const n = notes[Math.floor(Math.random() * notes.length)];
playSound(n, 0.1, 'square', 0.1);
}

function playPaddleHit() {
playSound(220, 0.08, 'square', 0.12);
}

function playWallHit() {
playSound(180, 0.06, 'triangle', 0.08);
}

function playPowerUp() {
playSound(660, 0.05, 'sine', 0.12);
setTimeout(() => playSound(880, 0.08, 'sine', 0.12), 50);
}

function playLoseLife() {
playSound(200, 0.3, 'sawtooth', 0.15);
setTimeout(() => playSound(150, 0.3, 'sawtooth', 0.12), 150);
}

function playLevelUp() {
[523, 659, 784, 1047].forEach((f, i) => {
setTimeout(() => playSound(f, 0.15, 'sine', 0.12), i * 100);
});
}

function playGameOver() {
[400, 350, 300, 250, 200].forEach((f, i) => {
setTimeout(() => playSound(f, 0.3, 'sawtooth', 0.12), i * 150);
});
}

// Game state
const STATE_START = 0;
const STATE_PLAYING = 1;
const STATE_PAUSED = 2;
const STATE_GAMEOVER = 3;

let gameState = STATE_START;
let score = 0;
let lives = 3;
let level = 1;
let combo = 0;
let comboTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// Paddle
const paddle = {
x: W / 2,
y: H - 40,
w: 120,
h: 14,
speed: 8,
targetW: 120,
normalW: 120,
color: '#00ccff'
};

// Ball
let balls = [];
function createBall(x, y, dx, dy) {
return {
x: x || W / 2,
y: y || H - 55,
r: 8,
dx: dx || 4,
dy: dy || -4,
speed: 4,
active: true,
trail: []
};
}

// Bricks
let bricks = [];
const BRICK_ROWS = 6;
const BRICK_COLS = 12;
const BRICK_W = 58;
const BRICK_H = 22;
const BRICK_PAD = 4;
const BRICK_TOP = 60;
const BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

const BRICK_COLORS = [
'#ff3333', '#ff6633', '#ff9933', '#ffcc33', '#33ff33', '#33ccff'
];

const BRICK_POINTS = [10, 20, 30, 40, 50, 60];

function generateBricks() {
bricks = [];
for (let row = 0; row < BRICK_ROWS; row++) {
for (let col = 0; col < BRICK_COLS; col++) {
const hp = level >= 4 && Math.random() < 0.15 ? 2 : 1;
bricks.push({
x: BRICK_LEFT + col * (BRICK_W + BRICK_PAD),
y: BRICK_TOP + row * (BRICK_H + BRICK_PAD),
w: BRICK_W,
h: BRICK_H,
color: BRICK_COLORS[row],
points: BRICK_POINTS[row],
hp: hp,
maxHp: hp,
alive: true,
flash: 0
});
}
}
}

// Particles
let particles = [];
function spawnParticles(x, y, color, count = 12) {
for (let i = 0; i < count; i++) {
const angle = Math.random() * Math.PI * 2;
const speed = 1 + Math.random() * 4;
particles.push({
x: x,
y: y,
dx: Math.cos(angle) * speed,
dy: Math.sin(angle) * speed,
life: 1,
decay: 0.02 + Math.random() * 0.03,
size: 2 + Math.random() * 3,
color: color
});
}
}

// Power-ups
let powerUps = [];
const POWER_TYPES = ['multi', 'wide', 'laser', 'slow'];
const POWER_COLORS = { multi: '#ff66ff', wide: '#33ff33', laser: '#ff3333', slow: '#3399ff' };

function spawnPowerUp(x, y) {
if (Math.random() > 0.2) return;
const type = POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)];
powerUps.push({
x: x,
y: y,
w: 30,
h: 16,
type: type,
dy: 1.5,
color: POWER_COLORS[type],
alive: true,
bobOffset: 0
});
}

// Lasers
let lasers = [];
let laserTimer = 0;
const LASER_COOLDOWN = 15;

// Input
const keys = {};
let mouseX = W / 2;
let mouseActive = true;

document.addEventListener('keydown', (e) => {
keys[e.key] = true;
if (e.key === 'Escape') {
if (gameState === STATE_PLAYING) {
gameState = STATE_PAUSED;
} else if (gameState === STATE_PAUSED) {
gameState = STATE_PLAYING;
}
}
if (e.key === ' ' || e.key === 'Enter') {
if (gameState === STATE_START) {
initAudio();
startGame();
} else if (gameState === STATE_GAMEOVER) {
startGame();
}
}
if (e.key === 'l' && gameState === STATE_PLAYING) {
fireLaser();
}
});

document.addEventListener('keyup', (e) => {
keys[e.key] = false;
});

canvas.addEventListener('mousemove', (e) => {
const rect = canvas.getBoundingClientRect();
const scaleX = W / rect.width;
mouseX = (e.clientX - rect.left) * scaleX;
mouseActive = true;
});

canvas.addEventListener('click', () => {
initAudio();
if (gameState === STATE_START) {
startGame();
} else if (gameState === STATE_GAMEOVER) {
startGame();
}
});

// Laser
function fireLaser() {
if (laserTimer > 0) return;
lasers.push({
x: paddle.x - 15,
y: paddle.y - 4,
w: 4,
h: 12,
dy: -8,
alive: true
});
lasers.push({
x: paddle.x + 15,
y: paddle.y - 4,
w: 4,
h: 12,
dy: -8,
alive: true
});
laserTimer = LASER_COOLDOWN;
playSound(800, 0.05, 'sawtooth', 0.08);
}

// Game functions
function startGame() {
score = 0;
lives = 3;
level = 1;
combo = 0;
comboTimer = 0;
paddle.w = paddle.normalW;
paddle.targetW = paddle.normalW;
balls = [createBall()];
powerUps = [];
lasers = [];
particles = [];
generateBricks();
gameState = STATE_PLAYING;
}

function nextLevel() {
level++;
balls = [createBall()];
powerUps = [];
lasers = [];
paddle.w = paddle.normalW;
paddle.targetW = paddle.normalW;
generateBricks();
playLevelUp();
}

function loseLife() {
lives--;
combo = 0;
playLoseLife();
if (lives <= 0) {
gameState = STATE_GAMEOVER;
playGameOver();
} else {
balls = [createBall()];
powerUps = [];
}
}

// Collision helpers
function rectCircleCollision(rx, ry, rw, rh, cx, cy, cr) {
const closestX = Math.max(rx, Math.min(cx, rx + rw));
const closestY = Math.max(ry, Math.min(cy, ry + rh));
const dx = cx - closestX;
const dy = cy - closestY;
return (dx * dx + dy * dy) < (cr * cr);
}

// Update
function update() {
if (gameState !== STATE_PLAYING) return;

// Paddle movement
if (mouseActive) {
const targetX = mouseX - paddle.w / 2;
paddle.x += (targetX - paddle.x) * 0.2;
}
if (keys['ArrowLeft'] || keys['a']) {
paddle.x -= paddle.speed;
mouseActive = false;
}
if (keys['ArrowRight'] || keys['d']) {
paddle.x += paddle.speed;
mouseActive = false;
}
paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

// Paddle width animation
if (paddle.w < paddle.targetW) {
paddle.w = Math.min(paddle.w + 0.5, paddle.targetW);
} else if (paddle.w > paddle.targetW) {
paddle.w = Math.max(paddle.w - 0.5, paddle.targetW);
}

// Laser cooldown
if (laserTimer > 0) laserTimer--;

// Update lasers
lasers.forEach(l => {
if (!l.alive) return;
l.y += l.dy;
if (l.y < 0) l.alive = false;
// Check brick collision
bricks.forEach(b => {
if (!b.alive || !l.alive) return;
if (rectCircleCollision(b.x, b.y, b.w, b.h, l.x, l.y, l.w / 2)) {
l.alive = false;
b.hp--;
b.flash = 5;
if (b.hp <= 0) {
b.alive = false;
score += b.points;
spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 8);
playBrickBreak();
spawnPowerUp(b.x + b.w / 2, b.y + b.h / 2);
} else {
playSound(400, 0.05, 'square', 0.08);
}
}
});
});

// Update balls
balls.forEach(ball => {
if (!ball.active) return;

// Trail
ball.trail.push({ x: ball.x, y: ball.y });
if (ball.trail.length > 8) ball.trail.shift();

// Move ball
ball.x += ball.dx;
ball.y += ball.dy;

// Wall collisions
if (ball.x - ball.r < 0) {
ball.x = ball.r;
ball.dx = Math.abs(ball.dx);
playWallHit();
}
if (ball.x + ball.r > W) {
ball.x = W - ball.r;
ball.dx = -Math.abs(ball.dx);
playWallHit();
}
if (ball.y - ball.r < 0) {
ball.y = ball.r;
ball.dy = Math.abs(ball.dy);
playWallHit();
}

// Bottom - lose ball
if (ball.y + ball.r > H) {
ball.active = false;
}

// Paddle collision
if (ball.dy > 0 &&
ball.y + ball.r > paddle.y &&
ball.y + ball.r < paddle.y + paddle.h + 8 &&
ball.x > paddle.x - 4 &&
ball.x < paddle.x + paddle.w + 4) {

const hitPos = (ball.x - paddle.x) / paddle.w;
const angle = (hitPos - 0.5) * Math.PI * 0.75;
const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
const newSpeed = Math.min(speed + 0.05, 8);

ball.dx = Math.sin(angle) * newSpeed;
ball.dy = -Math.cos(angle) * newSpeed;
ball.y = paddle.y - ball.r;

playPaddleHit();
spawnParticles(ball.x, ball.y, '#00ccff', 5);
}

// Brick collision
bricks.forEach(b => {
if (!b.alive) return;
if (rectCircleCollision(b.x, b.y, b.w, b.h, ball.x, ball.y, ball.r)) {
// Determine collision side
const bcx = b.x + b.w / 2;
const bcy = b.y + b.h / 2;
const overlapX = (ball.r + b.w / 2) - Math.abs(ball.x - bcx);
const overlapY = (ball.r + b.h / 2) - Math.abs(ball.y - bcy);

if (overlapX < overlapY) {
ball.dx = -ball.dx;
} else {
ball.dy = -ball.dy;
}

b.hp--;
b.flash = 5;

if (b.hp <= 0) {
b.alive = false;
combo++;
comboTimer = 120;
const comboMult = Math.min(combo, 5);
score += b.points * comboMult;
spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 15);
playBrickBreak();
spawnPowerUp(b.x + b.w / 2, b.y + b.h / 2);
} else {
playSound(400, 0.05, 'square', 0.08);
}
}
});
});

// Remove inactive balls
balls = balls.filter(b => b.active);
if (balls.length === 0) {
loseLife();
}

// Update power-ups
powerUps.forEach(p => {
if (!p.alive) return;
p.y += p.dy;
p.bobOffset += 0.1;

// Paddle catch
if (p.y + p.h > paddle.y &&
p.y < paddle.y + paddle.h &&
p.x + p.w > paddle.x &&
p.x < paddle.x + paddle.w) {
p.alive = false;
applyPowerUp(p.type);
playPowerUp();
spawnParticles(p.x + p.w / 2, p.y + p.h / 2, p.color, 8);
}

// Off screen
if (p.y > H) p.alive = false;
});
powerUps = powerUps.filter(p => p.alive);

// Update particles
particles.forEach(p => {
p.x += p.dx;
p.y += p.dy;
p.dy += 0.05;
p.life -= p.decay;
});
particles = particles.filter(p => p.life > 0);

// Brick flash
bricks.forEach(b => {
if (b.flash > 0) b.flash--;
});

// Shake timer
if (shakeTimer > 0) shakeTimer--;

// Combo timer
if (comboTimer > 0) comboTimer--;
else combo = 0;

// Check level complete
if (bricks.every(b => !b.alive)) {
nextLevel();
}
}

function applyPowerUp(type) {
switch (type) {
case 'multi':
if (balls.length < 5) {
const newBalls = [];
balls.forEach(b => {
if (b.active) {
newBalls.push(createBall(b.x, b.y, -b.dx * 0.8, -b.dy * 0.8));
}
});
balls.push(...newBalls);
}
break;
case 'wide':
paddle.targetW = 200;
setTimeout(() => {
paddle.targetW = paddle.normalW;
}, 10000);
break;
case 'laser':
laserTimer = 0;
setTimeout(() => {
paddle.w = paddle.normalW;
paddle.targetW = paddle.normalW;
}, 10000);
break;
case 'slow':
balls.forEach(b => {
b.dx *= 0.6;
b.dy *= 0.6;
setTimeout(() => {
b.dx /= 0.6;
b.dy /= 0.6;
}, 5000);
});
break;
}
}

// Draw
function draw() {
ctx.save();

// Screen shake
if (shakeTimer > 0) {
const sx = (Math.random() - 0.5) * shakeIntensity;
const sy = (Math.random() - 0.5) * shakeIntensity;
ctx.translate(sx, sy);
}

// Background
const grad = ctx.createLinearGradient(0, 0, 0, H);
grad.addColorStop(0, '#0a0a2e');
grad.addColorStop(1, '#1a0a2e');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

// Grid lines
ctx.strokeStyle = 'rgba(255,255,255,0.02)';
ctx.lineWidth = 1;
for (let x = 0; x < W; x += 40) {
ctx.beginPath();
ctx.moveTo(x, 0);
ctx.lineTo(x, H);
ctx.stroke();
}

if (gameState === STATE_START) {
drawStartScreen();
} else if (gameState === STATE_PAUSED) {
drawGame();
drawPauseScreen();
} else if (gameState === STATE_GAMEOVER) {
drawGame();
drawGameOverScreen();
} else {
drawGame();
}

ctx.restore();
}

function drawStartScreen() {
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(0, 0, W, H);

ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

ctx.fillStyle = '#00ccff';
ctx.font = 'bold 56px "Segoe UI", sans-serif';
ctx.shadowColor = '#00ccff';
ctx.shadowBlur = 20;
ctx.fillText('BREAKOUT', W / 2, H / 2 - 120);
ctx.shadowBlur = 0;

ctx.fillStyle = '#ffffff';
ctx.font = '20px "Segoe UI", sans-serif';
ctx.fillText('Click or press Space to start', W / 2, H / 2 - 50);

ctx.fillStyle = '#aaa';
ctx.font = '16px "Segoe UI", sans-serif';
const instructions = [
'Move paddle: Mouse or Arrow Keys / A-D',
'Fire laser: Press L (when active)',
'Pause: Escape',
'',
'Power-ups:',
'🔵 Slow Ball - Ball slows down temporarily',
'🟢 Wide Paddle - Paddle gets wider temporarily',
'🟣 Multi-Ball - More balls appear',
'🔴 Laser - Paddle can shoot lasers',
'',
'Combo multiplier for consecutive brick hits!'
];
instructions.forEach((line, i) => {
ctx.fillText(line, W / 2, H / 2 + 10 + i * 22);
});
}

function drawPauseScreen() {
ctx.fillStyle = 'rgba(0,0,0,0.6)';
ctx.fillRect(0, 0, W, H);

ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 48px "Segoe UI", sans-serif';
ctx.fillText('PAUSED', W / 2, H / 2 - 20);
ctx.font = '20px "Segoe UI", sans-serif';
ctx.fillStyle = '#aaa';
ctx.fillText('Press Escape to resume', W / 2, H / 2 + 30);
}

function drawGameOverScreen() {
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(0, 0, W, H);

ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillStyle = '#ff3333';
ctx.font = 'bold 56px "Segoe UI", sans-serif';
ctx.shadowColor = '#ff3333';
ctx.shadowBlur = 20;
ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
ctx.shadowBlur = 0;

ctx.fillStyle = '#ffffff';
ctx.font = '28px "Segoe UI", sans-serif';
ctx.fillText('Score: ' + score, W / 2, H / 2 + 5);
ctx.font = '20px "Segoe UI", sans-serif';
ctx.fillStyle = '#aaa';
ctx.fillText('Level: ' + level, W / 2, H / 2 + 40);
ctx.font = '20px "Segoe UI", sans-serif';
ctx.fillStyle = '#aaa';
ctx.fillText('Click or press Space to restart', W / 2, H / 2 + 80);
}

function drawGame() {
// Bricks
bricks.forEach(b => {
if (!b.alive) return;
const flash = b.flash > 0;
const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
if (flash) {
grad.addColorStop(0, '#ffffff');
grad.addColorStop(1, '#ffffff');
} else {
grad.addColorStop(0, b.color);
grad.addColorStop(1, darkenColor(b.color, 30));
}
ctx.fillStyle = grad;

// Rounded rect
const r = 3;
ctx.beginPath();
ctx.moveTo(b.x + r, b.y);
ctx.lineTo(b.x + b.w - r, b.y);
ctx.quadraticCurveTo(b.x + b.w, b.y, b.x + b.w, b.y + r);
ctx.lineTo(b.x + b.w, b.y + b.h - r);
ctx.quadraticCurveTo(b.x + b.w, b.y + b.h, b.x + b.w - r, b.y + b.h);
ctx.lineTo(b.x + r, b.y + b.h);
ctx.quadraticCurveTo(b.x, b.y + b.h, b.x, b.y + b.h - r);
ctx.lineTo(b.x, b.y + r);
ctx.quadraticCurveTo(b.x, b.y, b.x + r, b.y);
ctx.closePath();
ctx.fill();

// HP indicator for multi-hit bricks
if (b.maxHp > 1) {
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 11px "Segoe UI", sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2);
}
});

// Power-ups
powerUps.forEach(p => {
ctx.fillStyle = p.color;
ctx.shadowColor = p.color;
ctx.shadowBlur = 8;

// Bobbing effect
const bobY = Math.sin(p.bobOffset) * 3;

ctx.beginPath();
ctx.roundRect(p.x - p.w / 2, p.y + bobY - p.h / 2, p.w, p.h, 4);
ctx.fill();

ctx.shadowBlur = 0;

// Icon
ctx.fillStyle = '#000';
ctx.font = 'bold 10px "Segoe UI", sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
const icons = { multi: '×3', wide: '▬', laser: 'L', slow: '◐' };
ctx.fillText(icons[p.type], p.x, p.y + bobY);
});

// Lasers
lasers.forEach(l => {
if (!l.alive) return;
ctx.fillStyle = '#ff3333';
ctx.shadowColor = '#ff3333';
ctx.shadowBlur = 6;
ctx.fillRect(l.x - l.w / 2, l.y - l.h / 2, l.w, l.h);
ctx.shadowBlur = 0;
});

// Balls
balls.forEach(ball => {
if (!ball.active) return;

// Trail
ball.trail.forEach((t, i) => {
const alpha = (i / ball.trail.length) * 0.3;
ctx.beginPath();
ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length), 0, Math.PI * 2);
ctx.fillStyle = `rgba(0, 204, 255, ${alpha})`;
ctx.fill();
});

// Ball
const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
ballGrad.addColorStop(0, '#ffffff');
ballGrad.addColorStop(0.5, '#00ccff');
ballGrad.addColorStop(1, '#006699');
ctx.beginPath();
ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
ctx.fillStyle = ballGrad;
ctx.shadowColor = '#00ccff';
ctx.shadowBlur = 10;
ctx.fill();
ctx.shadowBlur = 0;
});

// Paddle
const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
paddleGrad.addColorStop(0, '#00eeff');
paddleGrad.addColorStop(1, '#006699');
ctx.fillStyle = paddleGrad;
ctx.shadowColor = '#00ccff';
ctx.shadowBlur = 12;

ctx.beginPath();
ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
ctx.fill();
ctx.shadowBlur = 0;

// Paddle edge highlights
ctx.fillStyle = 'rgba(255,255,255,0.3)';
ctx.beginPath();
ctx.roundRect(paddle.x + 2, paddle.y + 1, paddle.w - 4, paddle.h / 2, 4);
ctx.fill();

// Particles
particles.forEach(p => {
ctx.globalAlpha = p.life;
ctx.fillStyle = p.color;
ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
});
ctx.globalAlpha = 1;

// HUD
drawHUD();
}

function drawHUD() {
ctx.fillStyle = 'rgba(0,0,0,0.4)';
ctx.fillRect(0, 0, W, 45);

// Score
ctx.textAlign = 'left';
ctx.textBaseline = 'middle';
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 18px "Segoe UI", sans-serif';
ctx.fillText('SCORE: ' + score, 15, 22);

// Lives
ctx.textAlign = 'center';
for (let i = 0; i < lives; i++) {
ctx.beginPath();
ctx.arc(W / 2 - 40 + i * 30, 22, 10, 0, Math.PI * 2);
ctx.fillStyle = '#ff3333';
ctx.shadowColor = '#ff3333';
ctx.shadowBlur = 6;
ctx.fill();
ctx.shadowBlur = 0;
}

// Level
ctx.textAlign = 'right';
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 18px "Segoe UI", sans-serif';
ctx.fillText('LEVEL: ' + level, W - 15, 22);

// Combo
if (combo > 1 && comboTimer > 0) {
ctx.textAlign = 'center';
ctx.fillStyle = '#ffcc00';
ctx.font = 'bold 16px "Segoe UI", sans-serif';
ctx.shadowColor = '#ffcc00';
ctx.shadowBlur = 8;
ctx.fillText('×' + Math.min(combo, 5) + ' COMBO', W / 2, 60);
ctx.shadowBlur = 0;
}

// Laser indicator
if (laserTimer === 0 && powerUps.some(p => p.alive && p.type === 'laser')) {
ctx.textAlign = 'right';
ctx.fillStyle = '#ff3333';
ctx.font = 'bold 14px "Segoe UI", sans-serif';
ctx.fillText('[L] LASER READY', W - 15, 42);
}
}

function darkenColor(hex, amount) {
let r = parseInt(hex.slice(1, 3), 16);
let g = parseInt(hex.slice(3, 5), 16);
let b = parseInt(hex.slice(5, 7), 16);
r = Math.max(0, r - amount);
g = Math.max(0, g - amount);
b = Math.max(0, b - amount);
return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

// Game loop
function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}

// RoundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
if (typeof r === 'number') r = [r, r, r, r];
this.moveTo(x + r[0], y);
this.lineTo(x + w - r[1], y);
this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
this.lineTo(x + w, y + h - r[2]);
this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
this.lineTo(x + r[3], y + h);
this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
this.lineTo(x, y + r[0]);
this.quadraticCurveTo(x, y, x + r[0], y);
this.closePath();
return this;
};
}

// Start
generateBricks();
gameLoop();
</script>

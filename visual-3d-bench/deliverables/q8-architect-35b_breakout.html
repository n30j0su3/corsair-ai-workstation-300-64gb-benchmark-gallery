<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { border: 2px solid #333; cursor: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'square', volume = 0.15) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playBrickHit() { playSound(520, 0.1, 'square', 0.12); }
function playPaddleHit() { playSound(300, 0.08, 'square', 0.1); }
function playWallHit() { playSound(200, 0.06, 'triangle', 0.08); }
function playLoseLife() {
    playSound(150, 0.3, 'sawtooth', 0.15);
    setTimeout(() => playSound(100, 0.4, 'sawtooth', 0.15), 150);
}
function playPowerUp() {
    playSound(400, 0.1, 'sine', 0.12);
    setTimeout(() => playSound(600, 0.1, 'sine', 0.12), 80);
    setTimeout(() => playSound(800, 0.15, 'sine', 0.12), 160);
}
function playLevelUp() {
    playSound(500, 0.15, 'sine', 0.15);
    setTimeout(() => playSound(650, 0.15, 'sine', 0.15), 100);
    setTimeout(() => playSound(800, 0.15, 'sine', 0.15), 200);
    setTimeout(() => playSound(1000, 0.25, 'sine', 0.15), 300);
}
function playGameOver() {
    playSound(400, 0.3, 'sawtooth', 0.15);
    setTimeout(() => playSound(300, 0.3, 'sawtooth', 0.15), 200);
    setTimeout(() => playSound(200, 0.3, 'sawtooth', 0.15), 400);
    setTimeout(() => playSound(100, 0.6, 'sawtooth', 0.15), 600);
}
function playLaser() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

// Game state
let state = 'start'; // start, playing, paused, gameover, levelcomplete
let score = 0;
let lives = 3;
let level = 1;
let ballSpeed = 4;
let particles = [];
let powerUps = [];
let lasers = [];
let activePowerUps = {};
let multiBallCount = 0;
let ballTrail = [];

// Paddle
const paddle = {
    x: canvas.width / 2 - 60,
    y: canvas.height - 30,
    width: 120,
    height: 14,
    speed: 8,
    baseWidth: 120
};

// Keys
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'Escape' && state === 'playing') state = 'paused';
    else if (e.key === 'Escape' && state === 'paused') state = 'playing';
    else if (e.key === 'Enter' && state === 'start') startGame();
    else if (e.key === 'Enter' && state === 'gameover') restartGame();
    else if (e.key === 'Enter' && state === 'levelcomplete') nextLevel();
    if (audioCtx.state === 'suspended') audioCtx.resume();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mouse
let mouseX = canvas.width / 2;
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});

// Ball
let balls = [];
function createBall(x, y, speed, dx, dy) {
    if (!dx) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI / 3;
        dx = Math.cos(angle) * speed;
        dy = Math.sin(angle) * speed;
    }
    return { x: x || canvas.width / 2, y: y || paddle.y - 15, radius: 8, dx, dy, speed };
}

function launchBall() {
    if (!balls.length) {
        balls.push(createBall());
    }
}

// Bricks
const brickRows = 6;
const brickCols = 10;
const brickWidth = 70;
const brickHeight = 22;
const brickGap = 4;
const brickOffsetX = (canvas.width - (brickCols * (brickWidth + brickGap) - brickGap)) / 2;
const brickOffsetY = 60;

const brickColors = [
    { fill: '#ff4444', points: 40, glow: '#ff6666' },
    { fill: '#ff8844', points: 35, glow: '#ffaa66' },
    { fill: '#ffcc00', points: 30, glow: '#ffdd44' },
    { fill: '#44cc44', points: 25, glow: '#66ee66' },
    { fill: '#4488ff', points: 20, glow: '#66aaFF' },
    { fill: '#aa44ff', points: 15, glow: '#cc66ff' }
];

let bricks = [];
function createBricks() {
    bricks = [];
    for (let r = 0; r < brickRows; r++) {
        for (let c = 0; c < brickCols; c++) {
            const hp = r < 1 ? 2 : 1;
            bricks.push({
                x: brickOffsetX + c * (brickWidth + brickGap),
                y: brickOffsetY + r * (brickHeight + brickGap),
                width: brickWidth,
                height: brickHeight,
                color: brickColors[r],
                alive: true,
                hp
            });
        }
    }
}

// Power-up types
const POWERUP_TYPES = [
    { type: 'multi', label: 'MULTI', color: '#ff44ff', duration: 0 },
    { type: 'wide', label: 'WIDE', color: '#44ffff', duration: 10000 },
    { type: 'laser', label: 'LASER', color: '#ffff44', duration: 8000 },
    { type: 'slow', label: 'SLOW', color: '#44ff44', duration: 8000 }
];

function spawnPowerUp(x, y) {
    if (Math.random() < 0.15) {
        const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        powerUps.push({
            x, y, width: 40, height: 18,
            dy: 2,
            type: type.type,
            label: type.label,
            color: type.color,
            duration: type.duration,
            timeLeft: type.duration
        });
    }
}

function applyPowerUp(powerUp) {
    playPowerUp();
    if (powerUp.type === 'multi') {
        const currentBalls = [...balls];
        currentBalls.forEach(ball => {
            for (let i = 0; i < 2; i++) {
                const angle = Math.atan2(ball.dy, ball.dx) + (Math.random() - 0.5) * 1.2;
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                balls.push(createBall(ball.x, ball.y, speed, Math.cos(angle) * speed, Math.sin(angle) * speed));
            }
        });
    } else if (powerUp.type === 'wide') {
        paddle.width = paddle.baseWidth + 60;
        activePowerUps.wide = true;
        if (powerUp.duration) {
            setTimeout(() => {
                paddle.width = paddle.baseWidth;
                delete activePowerUps.wide;
            }, powerUp.duration);
        }
    } else if (powerUp.type === 'laser') {
        activePowerUps.laser = true;
        if (powerUp.duration) {
            setTimeout(() => {
                delete activePowerUps.laser;
            }, powerUp.duration);
        }
    } else if (powerUp.type === 'slow') {
        activePowerUps.slow = true;
        if (powerUp.duration) {
            setTimeout(() => {
                delete activePowerUps.slow;
            }, powerUp.duration);
        }
        balls.forEach(ball => {
            const speed = ball.speed * 0.6;
            const angle = Math.atan2(ball.dy, ball.dx);
            ball.dx = Math.cos(angle) * speed;
            ball.dy = Math.sin(angle) * speed;
            ball.speed = speed;
        });
    }
}

// Particles
function createParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
            x, y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.03 + 0.02,
            size: Math.random() * 4 + 2,
            color
        });
    }
}

function createExplosionParticles(x, y, color, count = 25) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        particles.push({
            x, y,
            dx: Math.cos(angle) * speed,
            dy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.02 + 0.01,
            size: Math.random() * 5 + 3,
            color
        });
    }
}

// Collision detection
function rectCollision(ball, rect) {
    return ball.x + ball.radius > rect.x &&
           ball.x - ball.radius < rect.x + rect.width &&
           ball.y + ball.radius > rect.y &&
           ball.y - ball.radius < rect.y + rect.height;
}

function resolvePaddleCollision(ball) {
    const relX = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
    const angle = relX * Math.PI / 3;
    const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    ball.dx = Math.sin(angle) * speed;
    ball.dy = -Math.abs(Math.cos(angle) * speed);
    if (ball.dy > -1) ball.dy = -1;
}

// Laser logic
let lastLaserTime = 0;
function shootLaser() {
    const now = Date.now();
    if (now - lastLaserTime > 200) {
        lastLaserTime = now;
        lasers.push({
            x: paddle.x + 10,
            y: paddle.y,
            dy: -8,
            width: 3,
            height: 12
        });
        lasers.push({
            x: paddle.x + paddle.width - 10,
            y: paddle.y,
            dy: -8,
            width: 3,
            height: 12
        });
        playLaser();
    }
}

// Game functions
function startGame() {
    state = 'playing';
    score = 0;
    lives = 3;
    level = 1;
    ballSpeed = 4;
    balls = [];
    particles = [];
    powerUps = [];
    lasers = [];
    activePowerUps = {};
    createBricks();
    launchBall();
}

function restartGame() {
    startGame();
}

function nextLevel() {
    level++;
    ballSpeed = 4 + (level - 1) * 0.5;
    balls = [];
    powerUps = [];
    lasers = [];
    activePowerUps = {};
    paddle.width = paddle.baseWidth;
    createBricks();
    launchBall();
}

function loseLife() {
    lives--;
    playLoseLife();
    createExplosionParticles(paddle.x + paddle.width / 2, paddle.y, '#ff4444', 30);
    if (lives <= 0) {
        state = 'gameover';
        playGameOver();
    } else {
        balls = [];
        setTimeout(launchBall, 1000);
    }
}

function advanceLevel() {
    state = 'levelcomplete';
    playLevelUp();
}

// Update
function update() {
    if (state !== 'playing') return;

    // Paddle movement
    if (keys['ArrowLeft'] || keys['a']) {
        paddle.x -= paddle.speed;
    }
    if (keys['ArrowRight'] || keys['d']) {
        paddle.x += paddle.speed;
    }
    if (keys['ArrowLeft'] || keys['ArrowRight'] || keys['a'] || keys['d']) {
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
    } else {
        // Mouse control
        const targetX = mouseX - paddle.width / 2;
        paddle.x += (targetX - paddle.x) * 0.3;
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
    }

    // Laser
    if (activePowerUps.laser && keys[' ']) {
        shootLaser();
    }

    // Update lasers
    lasers.forEach(l => {
        l.y += l.dy;
    });
    lasers = lasers.filter(l => l.y > -20);

    // Laser-brick collision
    for (let i = lasers.length - 1; i >= 0; i--) {
        for (let j = bricks.length - 1; j >= 0; j--) {
            if (bricks[j].alive && rectCollision(lasers[i], bricks[j])) {
                bricks[j].hp--;
                if (bricks[j].hp <= 0) {
                    createBrickExplosion(bricks[j]);
                    score += bricks[j].color.points;
                    spawnPowerUp(bricks[j].x + bricks[j].width / 2, bricks[j].y + bricks[j].height / 2);
                }
                playBrickHit();
                createParticles(lasers[i].x, lasers[i].y, bricks[j].color.fill, 5);
                lasers.splice(i, 1);
                break;
            }
        }
    }

    // Update balls
    for (let b = balls.length - 1; b >= 0; b--) {
        const ball = balls[b];

        // Ball trail
        ballTrail.push({ x: ball.x, y: ball.y, life: 1 });
        if (ballTrail.length > 15) ballTrail.shift();

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collisions
        if (ball.x - ball.radius <= 0) {
            ball.x = ball.radius;
            ball.dx = Math.abs(ball.dx);
            playWallHit();
        }
        if (ball.x + ball.radius >= canvas.width) {
            ball.x = canvas.width - ball.radius;
            ball.dx = -Math.abs(ball.dx);
            playWallHit();
        }
        if (ball.y - ball.radius <= 0) {
            ball.y = ball.radius;
            ball.dy = Math.abs(ball.dy);
            playWallHit();
        }

        // Bottom - lose ball
        if (ball.y + ball.radius > canvas.height) {
            balls.splice(b, 1);
            continue;
        }

        // Paddle collision
        if (rectCollision(ball, paddle) && ball.dy > 0) {
            resolvePaddleCollision(ball);
            ball.y = paddle.y - ball.radius - 1;
            playPaddleHit();
        }

        // Brick collision
        for (let i = bricks.length - 1; i >= 0; i--) {
            if (!bricks[i].alive) continue;
            if (rectCollision(ball, bricks[i])) {
                const brick = bricks[i];
                // Determine collision side
                const overlapLeft = (ball.x + ball.radius) - brick.x;
                const overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
                const overlapTop = (ball.y + ball.radius) - brick.y;
                const overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);

                const minOverlapX = Math.min(overlapLeft, overlapRight);
                const minOverlapY = Math.min(overlapTop, overlapBottom);

                if (minOverlapX < minOverlapY) {
                    ball.dx = -ball.dx;
                } else {
                    ball.dy = -ball.dy;
                }

                brick.hp--;
                if (brick.hp <= 0) {
                    createBrickExplosion(brick);
                    score += brick.color.points;
                    spawnPowerUp(brick.x + brick.width / 2, brick.y + brick.height / 2);
                }
                playBrickHit();
                createParticles(ball.x, ball.y, brick.color.fill, 6);
                break;
            }
        }
    }

    // Update power-ups
    for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        pu.y += pu.dy;

        // Paddle catch
        if (pu.y + pu.height > paddle.y && pu.y < paddle.y + paddle.height &&
            pu.x + pu.width > paddle.x && pu.x < paddle.x + paddle.width) {
            applyPowerUp(pu);
            powerUps.splice(i, 1);
            continue;
        }

        // Off screen
        if (pu.y > canvas.height) {
            powerUps.splice(i, 1);
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.1;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Update ball trail
    for (let i = ballTrail.length - 1; i >= 0; i--) {
        ballTrail[i].life -= 0.08;
        if (ballTrail[i].life <= 0) ballTrail.splice(i, 1);
    }

    // Check level complete
    if (bricks.every(b => !b.alive)) {
        advanceLevel();
    }

    // Check all balls lost
    if (balls.length === 0 && state === 'playing') {
        loseLife();
    }
}

function createBrickExplosion(brick) {
    createExplosionParticles(
        brick.x + brick.width / 2,
        brick.y + brick.height / 2,
        brick.color.fill, 20
    );
    brick.alive = false;
}

// Draw
function drawBackground() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

function drawPaddle() {
    const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
    gradient.addColorStop(0, '#6688ff');
    gradient.addColorStop(0.5, '#4466dd');
    gradient.addColorStop(1, '#3355bb');
    ctx.fillStyle = gradient;

    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();

    // Glow
    ctx.shadowColor = '#6688ff';
    ctx.shadowBlur = 15;
    ctx.fillStyle = 'rgba(102,136,255,0.3)';
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 7);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.roundRect(paddle.x + 4, paddle.y + 2, paddle.width - 8, paddle.height / 3, 4);
    ctx.fill();
}

function drawBall(ball) {
    // Trail
    ballTrail.forEach(t => {
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.radius * t.life * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(102,136,255,${t.life * 0.3})`;
        ctx.fill();
    });

    // Ball glow
    ctx.shadowColor = '#88aaff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#ccddff';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball highlight
    ctx.beginPath();
    ctx.arc(ball.x - 2, ball.y - 2, ball.radius * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
}

function drawBricks() {
    bricks.forEach(brick => {
        if (!brick.alive) return;

        // Brick body
        const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
        gradient.addColorStop(0, brick.color.glow);
        gradient.addColorStop(1, brick.color.fill);
        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 3);
        ctx.fill();

        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.roundRect(brick.x + 2, brick.y + 2, brick.width - 4, brick.height / 3, 2);
        ctx.fill();

        // HP indicator for tough bricks
        if (brick.hp > 1) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(brick.hp, brick.x + brick.width / 2, brick.y + brick.height / 2);
        }
    });
}

function drawPowerUps() {
    powerUps.forEach(pu => {
        ctx.fillStyle = pu.color;
        ctx.shadowColor = pu.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.roundRect(pu.x, pu.y, pu.width, pu.height, 4);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pu.label, pu.x + pu.width / 2, pu.y + pu.height / 2);
    });
}

function drawLasers() {
    lasers.forEach(l => {
        ctx.fillStyle = '#ffff44';
        ctx.shadowColor = '#ffff44';
        ctx.shadowBlur = 6;
        ctx.fillRect(l.x - l.width / 2, l.y - l.height / 2, l.width, l.height);
        ctx.shadowBlur = 0;
    });
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
    ctx.globalAlpha = 1;
}

function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(`SCORE: ${score}`, 15, 12);

    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}`, canvas.width / 2, 12);

    // Lives
    ctx.textAlign = 'right';
    for (let i = 0; i < lives; i++) {
        ctx.beginPath();
        ctx.arc(canvas.width - 20 - i * 25, 22, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4444';
        ctx.fill();
    }

    // Active power-up indicators
    let py = 45;
    if (activePowerUps.wide) {
        ctx.fillStyle = '#44ffff';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('WIDE PADDLE', 15, py);
        py += 16;
    }
    if (activePowerUps.laser) {
        ctx.fillStyle = '#ffff44';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('LASER [SPACE]', 15, py);
        py += 16;
    }
    if (activePowerUps.slow) {
        ctx.fillStyle = '#44ff44';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('SLOW BALL', 15, py);
        py += 16;
    }
}

function drawStartScreen() {
    drawBackground();

    // Title
    ctx.fillStyle = '#6688ff';
    ctx.shadowColor = '#6688ff';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 56px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('BREAKOUT', canvas.width / 2, 150);
    ctx.shadowBlur = 0;

    // Decorative line
    const grad = ctx.createLinearGradient(canvas.width / 2 - 150, 0, canvas.width / 2 + 150, 0);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, '#6688ff');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2 - 150, 200);
    ctx.lineTo(canvas.width / 2 + 150, 200);
    ctx.stroke();

    // Instructions
    ctx.fillStyle = '#aaa';
    ctx.font = '16px Arial';
    const instructions = [
        '🏓 Move paddle: Mouse or Arrow Keys',
        '🔫 Laser shots: Hold Space (when active)',
        '⏸️  Pause: Escape',
        '',
        'Collect power-ups from destroyed bricks:',
        '  MULTI — Extra balls',
        '  WIDE  — Wider paddle',
        '  LASER — Shoot bricks',
        '  SLOW  — Slow down the ball'
    ];
    instructions.forEach((text, i) => {
        ctx.fillText(text, canvas.width / 2, 240 + i * 28);
    });

    // Start prompt
    const pulse = Math.sin(Date.now() / 500) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Arial';
    ctx.fillText('Press ENTER to Start', canvas.width / 2, 520);
    ctx.globalAlpha = 1;
}

function drawPauseScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#6688ff';
    ctx.shadowColor = '#6688ff';
    ctx.shadowBlur = 15;
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowBlur = 0;

    ctx.fillStyle = '#aaa';
    ctx.font = '18px Arial';
    ctx.fillText('Press ESC to Resume', canvas.width / 2, canvas.height / 2 + 30);
}
